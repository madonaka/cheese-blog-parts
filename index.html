<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Cheese Lab Admin · Premium Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f59e0b;
      --primary-hover: #d97706;
      --bg-gradient: linear-gradient(135deg, #fffbeb 0%, #ffedd5 100%);
      --glass: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    html {
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf2f2; /* 로고의 레드 포인트와 어울리는 아주 연한 베이지/핑크 */
      overflow: hidden;
      position: relative;
    }

    /* 치즈 테마의 부드러운 배경 레이어 */
    body::before {
      content: "";
      position: fixed;
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at 20% 30%, #fef3c7 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, #ffedd5 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, #fee2e2 0%, transparent 50%);
      filter: blur(60px);
      z-index: -1;
      animation: moveBg 25s infinite alternate ease-in-out;
    }

    @keyframes moveBg {
      from { transform: translate(-10%, -10%) rotate(0deg); }
      to { transform: translate(10%, 10%) rotate(10deg); }
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-logo-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto -60px;
      z-index: 10;
    }

    .login-logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
      transition: transform 0.3s ease;
    }

    .login-logo-wrapper:hover img {
      transform: scale(1.1) rotate(5deg);
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 80px 40px 40px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .login-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-header p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-field {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 8px;
      margin-left: 4px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.5);
      border: 1.5px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      font-size: 1rem;
      color: #1e293b;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .login-btn:hover {
      background: #0f172a;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
    }

    .login-btn:active { transform: scale(0.98); }

    .error-msg {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #ef4444;
      font-weight: 600;
      min-height: 20px;
    }

    /* 장식용 원 */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      z-index: -1;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-logo-wrapper">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhUOOizzOdCN2H7gmI4CoecWdYH1Saz-mmzf4d99_4ZW_nO4Jpiq7BdSke9phpebDQ_JOg92wjz_HwydTnO8N5_a75xSs2XViLtrK5bSaE46VrR0PJMZ5CHqJCZZQDdQEpum_hGIZd9Dh4FLzw6H9BJjBEYsN-mQQaA5ppDFftiTQQcKgILMtnUIQeY4o0I/s320/Logo.png" alt="Logo" />
    </div>

    <div class="login-card">
      <header class="login-header">
        <h1>Cheese Lab</h1>
        <p>Admin Control Center</p>
      </header>

      <form id="login-form">
        <div class="form-field">
          <label for="login-id">Access ID</label>
          <input type="text" id="login-id" class="form-input" placeholder="Your account ID" autocomplete="username">
        </div>
        <div class="form-field">
          <label for="login-pw">Security Key</label>
          <input type="password" id="login-pw" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="login-btn">
          Sign In
        </button>

        <p id="login-msg" class="error-msg"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
      authDomain: "auth.cheesehistory.com",
      projectId: "cheese-history-platform",
      storageBucket: "cheese-history-platform.firebasestorage.app",
      messagingSenderId: "206588835864",
      appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const idInput = document.getElementById("login-id");
      const pwInput = document.getElementById("login-pw");
      const msgEl = document.getElementById("login-msg");

      const loginId = idInput.value.trim();
      const password = pwInput.value;

      if (!loginId || !password) {
        msgEl.textContent = "아이디와 비밀번호를 입력해 주세요.";
        msgEl.classList.add("danger-text");
        return;
      }

      msgEl.textContent = "Firestore 로그인 시도 중...";
      msgEl.classList.remove("danger-text");

      try {
        // Firestore에서 loginId로 사용자 검색
        const q = query(collection(db, "employees"), where("loginId", "==", loginId));
        const snap = await getDocs(q);
        
        if (snap.empty) {
          msgEl.textContent = "로그인 실패: 일치하는 아이디를 찾을 수 없습니다.";
          msgEl.classList.add("danger-text");
          return;
        }

        let userData = null;
        snap.forEach(d => userData = d.data());

        // 비밀번호 대조
        if (userData.password !== password) {
          msgEl.textContent = "로그인 실패: 비밀번호가 일치하지 않습니다.";
          msgEl.classList.add("danger-text");
          return;
        }

        // 계정 상태 체크
        if (userData.active === 0) {
          msgEl.textContent = "로그인 실패: 이 계정은 비활성화 상태입니다. 관리자에게 문의하세요.";
          msgEl.classList.add("danger-text");
          return;
        }

        // 세션 정보 저장 (admin-common.js 호환)
        sessionStorage.setItem("cheese_admin_token", "firestore-session-" + Date.now());
        sessionStorage.setItem("cheese_admin_login_id", userData.loginId);
        sessionStorage.setItem("cheese_admin_display_name", userData.displayName);
        sessionStorage.setItem("cheese_admin_role", userData.role || "EMP");
        sessionStorage.setItem("cheese_admin_emp_no", userData.empNo);

        msgEl.textContent = `${userData.displayName}님, 반갑습니다. 관리 센터로 연결합니다...`;
        msgEl.style.color = "#059669"; // 세련된 그린 컬러
        
        setTimeout(() => {
          window.location.href = "./admin/dashboard/new_dashboard.html";
        }, 800);

      } catch (err) {
        console.error("로그인 중 에러:", err);
        msgEl.textContent = "로그인 오류: " + (err.message || String(err));
        msgEl.classList.add("danger-text");
      }
    });

    // 📱 모바일 강제 확대 방지 (Pinch-to-zoom & Double-tap zoom)
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>

<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cheese History Map — 예제</title>
<link rel="stylesheet" href="cheese-map.css">
</head><body style="padding:16px;background:#f4f5f2">

<!-- 마운트 지점 -->
<div id="samgukMap"></div>

<script src="viewer.js"></script>
<script>
  // 로컬 예제: 파일에서 로드 (실서비스에선 map=Firestore, reliefUrl=jsDelivr)
  Promise.all([
    fetch('data/samguk-map.json').then(function(r){return r.json();}),
    fetch('assets/rivers.json').then(function(r){return r.json();}),
    fetch('assets/land.json').then(function(r){return r.json();}),
    fetch('assets/land-paleo.json').then(function(r){return r.json();})
  ]).then(function(res){
    CheeseMap.render(document.getElementById('samgukMap'), {
      title: '삼국시대 동아시아',
      map: res[0],
      rivers: res[1],
      land: res[2].land,                // 벡터 해안선(지형·강·영토를 이 모양으로 클립)
      landPaleo: res[3].land,           // 고대 해안선(해수면 +8m 비정) — '고대 해안선' 토글로 교체
      reliefUrl: 'assets/relief.png',   // 실서비스: https://cdn.jsdelivr.net/gh/madonaka/cheese-blog-parts@main/map/assets/relief.png
      note: '연도를 눌러 세력 변화를 보세요. 지형은 실제 고도, 강은 실측 하천 데이터. 고대 해안선은 해수면 +8m 가정의 비정 해안선.'
    });
  });
</script>
</body></html>

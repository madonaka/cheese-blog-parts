<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cheese History Map — 세계지도 예제</title>
<link rel="stylesheet" href="cheese-map.css">
</head><body style="padding:16px;background:#f4f5f2">

<!-- 마운트 지점 -->
<div id="worldMap"></div>

<script src="viewer.js"></script>
<script>
  // 로컬 예제: 파일에서 로드 (실서비스에선 map=Firestore historyMaps/modern-world, reliefUrl=jsDelivr)
  Promise.all([
    fetch('data/world-modern-map.json').then(function(r){return r.json();}),
    fetch('assets/rivers-world.json').then(function(r){return r.json();}),
    fetch('assets/land-world.json').then(function(r){return r.json();})
  ]).then(function(res){
    CheeseMap.render(document.getElementById('worldMap'), {
      title: '근현대 세계',
      map: res[0],
      rivers: res[1],
      land: res[2].land,
      reliefUrl: 'assets/relief-world.webp',
      cityLabel: '도시',
      displayAspect: 1.9,
      initFocus: [-128, -38, 152, 74],
      note: '연도를 눌러 국경 변화를 보세요 · 국경: historical-basemaps(GPL-3.0) · 지형: 실제 고도 데이터'
    });
  });
</script>
</body></html>

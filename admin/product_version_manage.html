<!-- admin/product_version_manage.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 생애주기 통합 센터 - Cheese Master</title>
    <link rel="stylesheet" href="./admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-soft: #eff6ff;
            --accent: #f59e0b;
            --bg-page: #f8fafc;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg-page); color: #0f172a; margin: 0; }

        .workspace-center {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 120px 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* 1. Header & Identity */
        .workspace-header {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f1f5f9;
        }
        .header-identity { display: flex; align-items: center; gap: 24px; }
        .header-avatar {
            width: 80px; height: 80px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .header-info h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .header-info p { margin: 4px 0 0 0; color: #94a3b8; font-weight: 500; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        /* 2. Version Navigator (Horizontal Segment Control) */
        .version-navigation {
            position: sticky;
            top: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(241, 245, 249, 0.5);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
            z-index: 100;
        }
        .version-navigation::-webkit-scrollbar { display: none; } /* Chrome, Safari */

        .version-tab {
            flex: 0 0 auto;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #64748b;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .version-tab:hover { background: #fff; color: var(--primary); }
        .version-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-color: #f1f5f9;
        }
        .version-tab.active::after {
            content: '';
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        .btn-add-ver {
            background: var(--primary-soft);
            color: var(--primary);
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-add-ver:hover { background: var(--primary); color: white; }

        /* 3. Main Editor Cards */
        .editor-section {
            background: white;
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
            padding: 40px;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-group { margin-bottom: 50px; }
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .section-header i { color: var(--primary); font-size: 1.1rem; }
        .section-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }

        .grid-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .field-box label { display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        .input-accent {
            width: 100%; padding: 14px 18px;
            border: 1px solid #e2e8f0; border-radius: 16px;
            font-size: 1rem; transition: var(--transition);
            background: #f8fafc;
        }
        .input-accent:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* Media Upload */
        .upload-area {
            border: 2px dashed #e2e8f0;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            color: #94a3b8;
            font-weight: 600;
        }
        .upload-area:hover { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }

        /* License Cards */
        .license-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            position: relative;
        }
        .btn-remove { position: absolute; top: 12px; right: 12px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }

        /* 4. Floating Action Bar */
        .action-dock {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            padding: 12px 32px;
            display: flex;
            align-items: center; gap: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }
        .dock-btn {
            padding: 12px 24px; border-radius: 50px;
            font-weight: 800; font-size: 0.95rem;
            cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 8px;
            transition: var(--transition);
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .btn-dup { background: #334155; color: white; }
        .btn-del { background: transparent; color: #ef4444; border: 1px solid #ef4444; }

        /* States */
        #emptyCover { text-align: center; padding: 100px 0; color: #94a3b8; }
        .badge-status { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; font-weight: 800; }
        .st-active { background: #dcfce7; color: #15803d; }
        .st-discontinued { background: #fee2e2; color: #b91c1c; }

        @media (max-width: 768px) {
            .workspace-center { padding: 20px 10px 140px 10px; }
            .action-dock { bottom: 20px; width: 90%; gap: 10px; padding: 10px; }
            .dock-btn { font-size: 0.8rem; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="workspace-center">
                    <!-- 1. Header -->
                    <div class="workspace-header">
                        <div class="header-identity">
                            <div id="hAvatar" class="header-avatar gradient-gold">🧀</div>
                            <div class="header-info">
                                <h1 id="hTitle">...</h1>
                                <p id="hCategory">LOADING</p>
                            </div>
                        </div>
                        <button class="btn-add-ver" onclick="window.prepareCreateNew()">
                            <i class="fas fa-plus"></i> NEW VERSION
                        </button>
                    </div>

                    <!-- 2. Navigation Control -->
                    <div class="version-navigation" id="navTabs">
                        <!-- Loaded by JS -->
                    </div>

                    <!-- 3. Editor Space -->
                    <div id="editorContent">
                        <div id="emptyCover">
                            <i class="fas fa-layer-group" style="font-size: 4rem; opacity: 0.2; margin-bottom: 24px;"></i>
                            <h2>작업하실 버전을 선택해주세요.</h2>
                            <p>버전별 독립적인 판매 정보를 관리할 수 있습니다.</p>
                        </div>

                        <form id="unifiedEditForm" style="display: none;">
                            <input type="hidden" id="editDocId">

                            <div class="editor-section">
                                <!-- Section 1: Basic -->
                                <div class="section-group">
                                    <div class="section-header">
                                        <i class="fas fa-fingerprint"></i>
                                        <h3>BASIC IDENTITY</h3>
                                    </div>
                                    <div class="grid-row">
                                        <div class="field-box">
                                            <label>상품명 (표시용)</label>
                                            <input type="text" id="prodTitle" class="input-accent">
                                        </div>
                                        <div class="field-box">
                                            <label>카테고리 뱃지</label>
                                            <select id="prodBadge" class="input-accent"></select>
                                        </div>
                                    </div>
                                    <div class="grid-row">
                                        <div class="field-box">
                                            <label>이모지 아이콘</label>
                                            <input type="text" id="prodIcon" class="input-accent" oninput="liveUpdateHero()">
                                        </div>
                                        <div class="field-box">
                                            <label>배경 스타일</label>
                                            <select id="prodGradient" class="input-accent" onchange="liveUpdateHero()">
                                                <option value="gradient-gold">Cheese Gold</option>
                                                <option value="gradient-silver">Silver Moon</option>
                                                <option value="gradient-bronze">Bronze Era</option>
                                                <option value="gradient-blue">Deep Ocean</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="field-box">
                                        <label>요약 설명 (상세 페이지 노출)</label>
                                        <textarea id="prodDesc" class="input-accent" style="height: 100px; resize: none;"></textarea>
                                    </div>
                                </div>

                                <!-- Section 2: Distribution -->
                                <div class="section-group">
                                    <div class="section-header">
                                        <i class="fas fa-cloud-download-alt"></i>
                                        <h3>RELEASE & DISTRIBUTION</h3>
                                    </div>
                                    <div class="grid-row">
                                        <div class="field-box">
                                            <label>버전 넘버 (v1.0.0)</label>
                                            <input type="text" id="prodVersion" class="input-accent">
                                        </div>
                                        <div class="field-box">
                                            <label>메이저 번호 (구매 연동 정수)</label>
                                            <input type="number" id="prodMajorVersion" class="input-accent">
                                        </div>
                                    </div>
                                    <div class="field-box">
                                        <label>파일 다운로드 URL (Google Drive 등)</label>
                                        <div style="display: flex; gap: 8px;">
                                            <input type="text" id="prodDownloadUrl" class="input-accent" style="flex:1;">
                                            <button type="button" class="btn-add-ver" onclick="window.openFileRepo()"><i class="fas fa-archive"></i></button>
                                        </div>
                                    </div>
                                    <div class="grid-row">
                                        <div class="field-box">
                                            <label>확장자</label>
                                            <input type="text" id="prodFileFormat" class="input-accent">
                                        </div>
                                        <div class="field-box">
                                            <label>용량</label>
                                            <input type="text" id="prodFileSize" class="input-accent">
                                        </div>
                                    </div>
                                    <div style="padding: 20px; background: #fff1f2; border-radius: 20px; border: 1px solid #fee2e2;">
                                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; color: #b91c1c; font-weight: 800;">
                                            <input type="checkbox" id="isDiscontinued" style="width: 20px; height: 20px;">
                                            이 버전을 수동으로 판매 종료(Hide) 처리합니다.
                                        </label>
                                    </div>
                                </div>

                                <!-- Section 3: Licensing -->
                                <div class="section-group">
                                    <div class="section-header">
                                        <i class="fas fa-tags"></i>
                                        <h3>LICENSING & PRICING</h3>
                                        <button type="button" class="btn-add-ver" style="margin-left:auto; padding: 6px 14px;" onclick="window.addLicenseRow()">+ 옵션 추가</button>
                                    </div>
                                    <div id="licenseList"></div>
                                </div>

                                <!-- Section 4: Assets -->
                                <div class="section-group">
                                    <div class="section-header">
                                        <i class="fas fa-images"></i>
                                        <h3>MEDIA ASSETS</h3>
                                    </div>
                                    <div class="field-box">
                                        <label>메인 썸네일 (Thumbnail)</label>
                                        <div style="display: flex; gap: 24px; align-items: start;">
                                            <div id="tPrev" style="width: 140px; height: 140px; border-radius: 24px; background: #f8fafc; border: 1px solid #e2e8f0; overflow: hidden; flex-shrink:0;">
                                                <img id="mainImg" style="width: 100%; height:100%; object-fit: cover; display: none;">
                                            </div>
                                            <div style="flex:1;">
                                                <input type="text" id="prodImageUrl" class="input-accent" style="margin-bottom: 12px;" placeholder="이미지 URL">
                                                <div class="upload-area" id="upThumb"><i class="fas fa-upload"></i> Thumbnail 이미지 업로드</div>
                                                <input type="file" id="fThumb" style="display: none;" accept="image/*">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="field-box" style="margin-top: 24px;">
                                        <label>추가 갤러리 (Gallery)</label>
                                        <div id="gList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 12px;"></div>
                                        <div class="upload-area" id="upGallery" style="padding: 15px;">+ 추가 갤러리 이미지 업로드</div>
                                        <input type="file" id="fGallery" multiple style="display: none;" accept="image/*">
                                    </div>
                                </div>

                                <!-- Section 5: History -->
                                <div class="section-group">
                                    <div class="section-header">
                                        <i class="fas fa-pen-nib"></i>
                                        <h3>PATCH NOTES</h3>
                                    </div>
                                    <textarea id="prodUpdateNotes" class="input-accent" style="height: 120px; resize: none;" placeholder="이번 업데이트의 주요 내용을 작성해주세요."></textarea>
                                </div>
                            </div>

                            <!-- Floating Action Bar -->
                            <div class="action-dock">
                                <button type="button" class="dock-btn btn-del" id="btnDelete" onclick="window.runDelete()" style="display: none;">
                                    <i class="fas fa-trash-alt"></i> 삭제
                                </button>
                                <button type="button" class="dock-btn btn-dup" onclick="window.prepCopy()">
                                    <i class="fas fa-copy"></i> 현재 버전 복제
                                </button>
                                <button type="submit" class="dock-btn btn-save" id="btnSave">
                                    <i class="fas fa-check-circle"></i> 변경 사항 최종 저장
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Repository Modal -->
    <div class="modal-overlay" id="repoModal">
        <div class="modal-card" style="max-width: 600px;">
            <div class="modal-card-header">
                <h3 class="modal-card-title">파일 저장소 브라우저</h3>
                <button onclick="document.getElementById('repoModal').classList.remove('show')" style="border:none;background:none;font-size:1.5rem;cursor:pointer;">&times;</button>
            </div>
            <div style="padding: 24px;">
                <input type="text" id="repoSearch" class="input-accent" placeholder="파일명으로 필터..." oninput="filterRepo();" style="margin-bottom: 20px;">
                <div id="repoList" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productTitle = urlParams.get('title');

        let productsCache = [];
        let repoFiles = [];

        window.addEventListener('load', async () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Lifecycle', subtitle: 'Global Portfolio Management' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot' });

            await loadCats();
            if (productTitle) loadData();
            
            setupDD('upThumb', window.upMain);
            setupDD('upGallery', window.upGal);
        });

        async function loadCats() {
            const sel = document.getElementById('prodBadge');
            const snap = await getDocs(collection(db, "categories"));
            const cats = snap.docs.map(d => d.data().name);
            sel.innerHTML = '<option value="">Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        async function loadData() {
            try {
                const q = query(collection(db, "products"), where("title", "==", productTitle));
                const snap = await getDocs(q);
                productsCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => {
                    const maj = (b.major_version || 0) - (a.major_version || 0);
                    if (maj !== 0) return maj;
                    return (b.version || "").localeCompare((a.version || ""), undefined, {numeric:true});
                });

                if (productsCache.length === 0) return;

                const top = productsCache[0];
                document.getElementById('hTitle').innerText = top.title;
                document.getElementById('hCategory').innerText = top.badge_text || "UNCATEGORIZED";
                liveUpdateHero(top.icon, top.gradient_class);

                renderTabs();
            } catch (err) { console.error(err); }
        }

        function renderTabs() {
            const container = document.getElementById('navTabs');
            const activeId = document.getElementById('editDocId').value;
            container.innerHTML = productsCache.map(p => `
                <div class="version-tab ${p.id === activeId ? 'active' : ''}" onclick="window.selectVer('${p.id}')">
                    v${p.version}
                </div>
            `).join('');
        }

        function liveUpdateHero(icon, grad) {
            const tar = document.getElementById('hAvatar');
            tar.innerText = icon || document.getElementById('prodIcon')?.value || "🧀";
            tar.className = `header-avatar ${grad || document.getElementById('prodGradient')?.value}`;
        }
        window.liveUpdateHero = liveUpdateHero;

        window.selectVer = (id) => {
            const data = productsCache.find(p => p.id === id);
            if (!data) return;

            document.getElementById('emptyCover').style.display = 'none';
            document.getElementById('unifiedEditForm').style.display = 'block';
            document.getElementById('editDocId').value = id;
            document.getElementById('btnDelete').style.display = 'inline-flex';

            // Fill Fields
            document.getElementById('prodTitle').value = data.title;
            document.getElementById('prodBadge').value = data.badge_text || "";
            document.getElementById('prodIcon').value = data.icon || "🧀";
            document.getElementById('prodGradient').value = data.gradient_class || "gradient-gold";
            document.getElementById('prodDesc').value = data.description || "";
            document.getElementById('prodVersion').value = data.version || "";
            document.getElementById('prodMajorVersion').value = data.major_version || 1;
            document.getElementById('prodDownloadUrl').value = data.download_url || "";
            document.getElementById('prodFileFormat').value = data.file_format || "";
            document.getElementById('prodFileSize').value = data.file_size || "";
            document.getElementById('prodImageUrl').value = data.image_url || "";
            document.getElementById('isDiscontinued').checked = data.is_discontinued === true;
            document.getElementById('prodUpdateNotes').value = "";

            if (data.image_url) {
                document.getElementById('mainImg').src = data.image_url;
                document.getElementById('mainImg').style.display = 'block';
            } else {
                document.getElementById('mainImg').style.display = 'none';
            }

            document.getElementById('licenseList').innerHTML = "";
            (data.license_options || []).forEach(opt => window.addLicenseRow(opt));

            const gL = document.getElementById('gList');
            gL.innerHTML = "";
            (data.gallery_urls || []).forEach(url => window.addGalCard(url));

            renderTabs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.prepareCreateNew = () => {
            const base = productsCache[0];
            document.getElementById('emptyCover').style.display = 'none';
            document.getElementById('unifiedEditForm').style.display = 'block';
            document.getElementById('editDocId').value = "";
            document.getElementById('btnDelete').style.display = 'none';
            if (base) {
                document.getElementById('prodTitle').value = base.title;
                document.getElementById('prodVersion').value = (parseInt(base.major_version || 0) + 1) + ".0.0";
                document.getElementById('prodMajorVersion').value = (parseInt(base.major_version || 0) + 1);
            }
            renderTabs();
        };

        window.prepCopy = () => {
            document.getElementById('editDocId').value = "";
            document.getElementById('btnDelete').style.display = 'none';
            alert("입력 내용이 '신규 모드'로 복제되었습니다. 저장 시 새 데이터로 저장됩니다.");
            renderTabs();
        };

        // --- Save / Delete ---
        document.getElementById('unifiedEditForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            const id = document.getElementById('editDocId').value;

            const lics = Array.from(document.querySelectorAll('.license-item')).map(row => ({
                id: row.dataset.id,
                name: (row.querySelector('.l-sel').value === 'custom' ? row.querySelector('.l-inp').value : row.querySelector('.l-sel').value),
                meta: row.querySelector('.l-meta').value,
                originalPrice: Number(row.querySelector('.l-orig').value),
                price: Number(row.querySelector('.l-sale').value),
                max_downloads: Number(row.querySelector('.l-dl').value),
                expiry_days: Number(row.querySelector('.l-exp').value)
            }));

            const payload = {
                title: document.getElementById('prodTitle').value,
                price: lics[0]?.price || 0,
                original_price: lics[0]?.originalPrice || null,
                badge_text: document.getElementById('prodBadge').value,
                icon: document.getElementById('prodIcon').value,
                gradient_class: document.getElementById('prodGradient').value,
                description: document.getElementById('prodDesc').value,
                download_url: document.getElementById('prodDownloadUrl').value,
                image_url: document.getElementById('prodImageUrl').value,
                gallery_urls: Array.from(document.querySelectorAll('.g-val')).map(i => i.value).filter(v => v),
                file_format: document.getElementById('prodFileFormat').value,
                file_size: document.getElementById('prodFileSize').value,
                version: document.getElementById('prodVersion').value,
                major_version: Number(document.getElementById('prodMajorVersion').value),
                is_discontinued: document.getElementById('isDiscontinued').checked,
                license_options: lics,
                updatedAt: serverTimestamp()
            };

            const notes = document.getElementById('prodUpdateNotes').value.trim();
            if (notes || !id) {
                let h = [];
                if (id) h = (productsCache.find(x => x.id === id).update_history || []);
                payload.update_history = [{ version: payload.version, date: new Date().toISOString().split('T')[0], notes: notes || "Update applied" }, ...h];
            }

            try {
                if (id) await updateDoc(doc(db, "products", id), payload);
                else await addDoc(collection(db, "products"), { ...payload, createdAt: serverTimestamp() });
                alert("성공적으로 관리되었습니다!");
                location.reload();
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; }
        };

        window.runDelete = async () => {
            const id = document.getElementById('editDocId').value;
            if (!id || !confirm("이 버전을 영구히 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                location.reload();
            } catch (err) { alert(err.message); }
        };

        // --- UI Helpers ---
        window.addLicenseRow = (data = null) => {
            const list = document.getElementById('licenseList');
            const div = document.createElement('div');
            div.className = 'license-item';
            div.dataset.id = data?.id || Math.random().toString(36).substr(2, 9);
            div.innerHTML = `
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                <div class="grid-row" style="margin-bottom:12px;">
                    <div class="field-box">
                        <label>타입</label>
                        <select class="input-accent l-sel" onchange="window.lCh(this)">
                            <option value="Basic" ${data?.name==='Basic'?'selected':''}>Basic</option>
                            <option value="Premium" ${data?.name==='Premium'?'selected':''}>Premium</option>
                            <option value="custom" ${data && data.name!=='Basic' && data.name!=='Premium'?'selected':''}>상세 입력</option>
                        </select>
                        <input type="text" class="input-accent l-inp" value="${data?.name||'Basic'}" style="margin-top:8px; display:${data && data.name!=='Basic' && data.name!=='Premium'?'block':'none'};">
                    </div>
                </div>
                <div class="field-box" style="margin-bottom:12px;">
                    <label>혜택/메타 설명</label>
                    <input type="text" class="input-accent l-meta" value="${data?.meta||''}">
                </div>
                <div class="grid-row">
                    <input type="number" class="input-accent l-orig" placeholder="원래가격" value="${data?.originalPrice||0}">
                    <input type="number" class="input-accent l-sale" placeholder="판매가" value="${data?.price||0}">
                </div>
                <div class="grid-row" style="margin-top:12px;">
                    <input type="number" class="input-accent l-dl" placeholder="다운수" value="${data?.max_downloads||1}">
                    <input type="number" class="input-accent l-exp" placeholder="기간(일)" value="${data?.expiry_days||7}">
                </div>
            `;
            list.appendChild(div);
        };
        window.lCh = (s) => (s.nextElementSibling.style.display = s.value === 'custom' ? 'block' : 'none');
        window.addGalCard = (url="") => {
            const list = document.getElementById('gList');
            const d = document.createElement('div');
            d.style="position:relative; width:100px; height:100px; border-radius:12px; overflow:hidden; border:1px solid #eee;";
            d.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;"><input type="hidden" class="g-val" value="${url}"><button type="button" onclick="this.parentElement.remove()" style="position:absolute;top:2px;right:2px;background:red;color:white;border:none;border-radius:4px;font-size:10px;cursor:pointer;">&times;</button>`;
            list.appendChild(d);
        };

        // --- Media ---
        function setupDD(id, fn) {
            const el = document.getElementById(id);
            el.onclick = () => document.getElementById(id === 'upThumb' ? 'fThumb' : 'fGallery').click();
            el.ondragover = (e) => { e.preventDefault(); el.style.borderColor = "var(--primary)"; };
            el.ondragleave = () => { el.style.borderColor = "#e2e8f0"; };
            el.ondrop = (e) => { e.preventDefault(); fn(e.dataTransfer.files); };
        }
        window.upMain = async (fs) => {
            if(!fs[0]) return;
            try {
                const res = await window.uploadFileToGoogleDrive(fs[0]);
                if(res?.downloadUrl) {
                    document.getElementById('prodImageUrl').value=res.downloadUrl;
                    document.getElementById('mainImg').src=res.downloadUrl;
                    document.getElementById('mainImg').style.display='block';
                }
            } catch(e) { alert("Fail"); }
        };
        window.upGal = async (fs) => {
            for(let f of fs) {
                const res = await window.uploadFileToGoogleDrive(f);
                if(res?.downloadUrl) window.addGalCard(res.downloadUrl);
            }
        };

        // --- Repo ---
        window.openFileRepo = async () => {
            document.getElementById('repoModal').classList.add('show');
            const list = document.getElementById('repoList');
            list.innerHTML = 'Loading...';
            try {
                const snap = await getDocs(query(collection(db, "download_files"), orderBy("createdAt", "desc")));
                repoFiles = snap.docs.map(d => d.data());
                renderRepo(repoFiles);
            } catch (err) {}
        };
        function renderRepo(fs) {
            document.getElementById('repoList').innerHTML = fs.map(f => `
                <div style="padding:15px; border:1px solid #eee; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${f.name}</strong><br><small>${f.format} | ${f.size}</small></div>
                    <button type="button" class="btn-add-ver" onclick="window.setRepoFile('${f.url}', '${f.format}', '${f.size}')">선택</button>
                </div>
            `).join('') || 'Empty';
        }
        window.setRepoFile = (u, f, s) => {
            document.getElementById('prodDownloadUrl').value=u;
            document.getElementById('prodFileFormat').value=f;
            document.getElementById('prodFileSize').value=s;
            document.getElementById('repoModal').classList.remove('show');
        };
        window.filterRepo = () => {
            const k = document.getElementById('repoSearch').value.toLowerCase();
            renderRepo(repoFiles.filter(x => x.name.toLowerCase().includes(k)));
        };
    </script>
</body>
</html>

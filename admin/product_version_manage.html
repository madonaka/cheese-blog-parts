<!-- admin/product_version_manage.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 버전 관리 - Cheese History Admin</title>
    <link rel="stylesheet" href="./admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }
        .product-info-card {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .product-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .version-list-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }
        .version-table {
            width: 100%;
            border-collapse: collapse;
        }
        .version-table th {
            text-align: left;
            padding: 15px;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 700;
            border-bottom: 2px solid #f1f5f9;
        }
        .version-table td {
            padding: 20px 15px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .version-tag {
            background: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-active { background: #dcfce7; color: #15803d; }
        .status-discontinued { background: #fee2e2; color: #b91c1c; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-mini {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            background: #fff;
            color: #475569;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .btn-mini:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-mini.primary { background: #3b82f6; color: #fff; border: none; }
        .btn-mini.danger { color: #ef4444; border-color: #fecaca; }
        .btn-mini.danger:hover { background: #fef2f2; }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e2e8f0;
            transition: .4s;
            border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: #ef4444; }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        .changelog-popover {
            font-size: 0.75rem;
            color: #64748b;
            max-height: 60px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <header class="page-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="history.back()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; color:#64748b;"><i class="fas fa-arrow-left"></i></button>
                        <div>
                            <h1 style="font-size: 1.25rem; font-weight: 800; margin:0;" id="pageTitle">제품 버전 관리</h1>
                            <p style="font-size: 0.85rem; color: #64748b; margin:4px 0 0 0;">각 버전별 파일 및 수동 판매 상태를 관리합니다.</p>
                        </div>
                    </div>
                </header>

                <div id="productOverview" class="product-info-card">
                    <div id="productIcon" class="product-icon-large gradient-gold">🧀</div>
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                            <h2 id="productTitle" style="margin:0; font-size: 1.5rem; font-weight: 800;">...</h2>
                            <span id="currentActiveVersion" class="status-badge status-active">최신버전: v1.0.0</span>
                        </div>
                        <p id="productCategory" style="color: #64748b; margin:0; font-size: 0.9rem;">카테고리: </p>
                    </div>
                </div>

                <section class="version-list-card">
                    <h3 style="margin-top:0; margin-bottom: 25px; font-weight: 800; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">전체 버전 내역</h3>
                    <table class="version-table">
                        <thead>
                            <tr>
                                <th>버전 정보</th>
                                <th>등록일</th>
                                <th style="width: 250px;">업데이트 내용</th>
                                <th>라이선스/가격</th>
                                <th>판매 강제 종료</th>
                                <th style="text-align: right;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="versionTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 50px; color: #cbd5e1;">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </main>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productTitle = urlParams.get('title');

        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Version Manage', subtitle: '제품 생애주기 관리' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot' });
            if (productTitle) loadVersions();
            else alert("상품 제목 정보가 없습니다.");
        });

        async function loadVersions() {
            const tbody = document.getElementById('versionTableBody');
            try {
                // [Fix] 인덱스 오류 방지를 위해 where 조건만 사용하고 정렬은 클라이언트(JS)에서 수행
                const q = query(
                    collection(db, "products"), 
                    where("title", "==", productTitle)
                );
                const snap = await getDocs(q);
                
                // 클라이언트 정렬 (메이저 버전 내림차순 -> 상세 버전 내림차순)
                const products = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => {
                    const majorA = Number(a.major_version || 1);
                    const majorB = Number(b.major_version || 1);
                    if (majorB !== majorA) return majorB - majorA;
                    
                    const verA = (a.version || "1.0.0");
                    const verB = (b.version || "1.0.0");
                    return verB.localeCompare(verA, undefined, { numeric: true, sensitivity: 'base' });
                });

                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px;">해당 상품 정보를 찾을 수 없습니다.</td></tr>';
                    return;
                }

                // 최상단 정보 업데이트
                const latest = products[0];
                document.getElementById('productTitle').innerText = latest.title;
                document.getElementById('productCategory').innerText = `카테고리: ${latest.badge_text || '미정'}`;
                document.getElementById('productIcon').innerText = latest.icon || '🧀';
                document.getElementById('productIcon').className = `product-icon-large ${latest.gradient_class || 'gradient-gold'}`;
                document.getElementById('currentActiveVersion').innerText = `최신버전: v${latest.version}`;

                tbody.innerHTML = products.map((p, idx) => {
                    const date = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('ko-KR') : '-';
                    const isManualDiscontinued = p.is_discontinued === true;
                    
                    // 최근 업데이트 내용
                    const recentLog = p.update_history && p.update_history.length > 0 ? p.update_history[0].notes : (p.description || '-');
                    
                    return `
                        <tr>
                            <td>
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <span class="version-tag">v${p.version}</span>
                                    <span style="font-size: 0.75rem; color: #94a3b8; font-weight: 500;">Major: ${p.major_version || 1}</span>
                                </div>
                            </td>
                            <td><span style="font-size: 0.85rem; color: #64748b;">${date}</span></td>
                            <td><div class="changelog-popover">${recentLog}</div></td>
                            <td>
                                <div style="font-size: 0.85rem;">
                                    <div style="font-weight: 700;">${Number(p.price || 0).toLocaleString()}원</div>
                                    <div style="font-size: 0.75rem; color: #94a3b8;">${p.license_options?.length || 0}개 옵션</div>
                                </div>
                            </td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <label class="toggle-switch">
                                        <input type="checkbox" ${isManualDiscontinued ? 'checked' : ''} onchange="window.toggleDiscontinued('${p.id}', this.checked)">
                                        <span class="toggle-slider"></span>
                                    </label>
                                    <span style="font-size: 0.75rem; color: ${isManualDiscontinued ? '#ef4444' : '#64748b'}; font-weight: 700;">
                                        ${isManualDiscontinued ? '강제 종료됨' : '정상 판매'}
                                    </span>
                                </div>
                            </td>
                            <td style="text-align: right;">
                                <div class="action-btns" style="justify-content: flex-end;">
                                    <a href="${p.download_url}" target="_blank" class="btn-mini primary" title="파일 다운로드 테스트">
                                        <i class="fas fa-download"></i> 파일 확인
                                    </a>
                                    <button onclick="window.duplicateAsNewVersion('${p.id}')" class="btn-mini" title="이 데이터를 기반으로 새 버전 등록">
                                        <i class="fas fa-copy"></i> 복제
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; color:red;">로드 실패: ' + err.message + '</td></tr>';
            }
        }

        window.toggleDiscontinued = async (id, isDiscontinued) => {
            try {
                await updateDoc(doc(db, "products", id), {
                    is_discontinued: isDiscontinued
                });
                // 창 새로고침 없이 상태 텍스트만 업데이트 가능하지만, 안전하게 다시 로드
                loadVersions();
            } catch (err) {
                alert("상태 수정 실패: " + err.message);
            }
        };

        window.duplicateAsNewVersion = (id) => {
            if(confirm("이 버전의 설정을 기반으로 새로운 버전을 등록하시겠습니까?\n기존 상품 관리 페이지에서 데이터를 수정한 뒤 새 버전으로 저장하게 됩니다.")) {
                location.href = `store_manage.html?duplicateId=${id}`;
            }
        };

        window.loadVersions = loadVersions;
    </script>
</body>
</html>

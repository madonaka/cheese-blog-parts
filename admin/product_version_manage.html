<!-- admin/product_version_manage.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 통합 관리 - Cheese History Admin</title>
    <link rel="stylesheet" href="./admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.3);
        }

        body { background: #f8fafc; overflow-x: hidden; }

        .manage-container {
            display: flex;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            min-height: calc(100vh - 100px);
        }

        /* Left Side: Version List */
        .version-list-pane {
            flex: 0 0 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .version-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .version-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
            border-color: var(--primary);
        }
        .version-card.active {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }
        .version-card.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--primary);
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .version-tag { background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; }
        .date-tag { font-size: 0.7rem; color: #94a3b8; }
        .status-badge { font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; }
        .status-active { background: #dcfce7; color: #15803d; }
        .status-discontinued { background: #fee2e2; color: #b91c1c; }

        /* Right Side: Edit Form */
        .edit-pane {
            flex: 1;
            background: #fff;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .pane-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 20px;
        }
        .pane-title h2 { margin: 0; font-size: 1.5rem; font-weight: 800; }
        .pane-title p { margin: 4px 0 0 0; color: #64748b; font-size: 0.85rem; }

        /* Form Controls */
        .form-section { margin-bottom: 30px; }
        .form-section-title { font-size: 0.9rem; font-weight: 800; color: #1e293b; margin-bottom: 16px; border-left: 4px solid var(--primary); padding-left: 12px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #475569; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; transition: 0.2s; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.05); }
        
        /* License Options */
        .license-option-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid #e2e8f0;
        }

        /* Buttons */
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-outline { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
        .btn-outline:hover { background: #f8fafc; }
        .btn-danger { background: #fff1f2; color: #e11d48; border: 1px solid #ffe4e6; }
        .btn-danger:hover { background: #ffe4e6; }

        /* Preview Card */
        .preview-sticky {
            margin-top: 20px;
            padding: 15px;
            background: #fdf2f2;
            border-radius: 12px;
            border: 1px dashed #fecaca;
        }

        .prod-icon-preview {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        @media (max-width: 1000px) {
            .manage-container { flex-direction: column; }
            .version-list-pane { flex: none; width: 100%; }
            .edit-pane { position: static; max-height: none; }
        }

        /* Custom DropZone Style */
        .dropzone-mini {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .dropzone-mini:hover { border-color: var(--primary); background: #eff6ff; color: var(--primary); }

        #emptyState {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="manage-container">
                    <!-- Left: List -->
                    <div class="version-list-pane">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 style="margin:0; font-weight: 800; font-size: 1.1rem;">버전 히스토리</h3>
                            <button class="btn-action btn-primary" onclick="window.prepareCreateNew()" style="padding: 6px 14px; font-size: 0.75rem;">
                                <i class="fas fa-plus"></i> 새 버전 등록
                            </button>
                        </div>
                        <div id="versionList">
                            <!-- 로딩 중 -->
                            <div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>

                    <!-- Right: Editor -->
                    <div class="edit-pane" id="editorPane">
                        <div id="emptyState">
                            <i class="fas fa-edit" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i>
                            <p>좌측 리스트에서 버전을 선택하거나<br>새 버전을 등록하여 편집을 시작하세요.</p>
                        </div>

                        <form id="productEditForm" style="display: none;">
                            <div class="pane-header">
                                <div class="pane-title">
                                    <h2 id="editTitleText">버전 상세 편집</h2>
                                    <p id="editSubText">상품 데이터와 라이선스 정책을 관리합니다.</p>
                                </div>
                                <div class="action-btns">
                                    <button type="button" class="btn-action btn-danger" onclick="window.handleDelete()" id="btnDelete">삭제</button>
                                    <button type="submit" class="btn-action btn-primary" id="btnSave">데이터 저장</button>
                                </div>
                            </div>

                            <input type="hidden" id="editDocId">

                            <!-- Section 1: Basic -->
                            <div class="form-section">
                                <div class="form-section-title">기본 정보 및 아이콘</div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>상품명</label>
                                        <input type="text" id="prodTitle" class="form-control" required>
                                    </div>
                                    <div class="form-group">
                                        <label>카테고리 (뱃지)</label>
                                        <select id="prodBadge" class="form-control"></select>
                                    </div>
                                </div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>이모지 아이콘</label>
                                        <input type="text" id="prodIcon" class="form-control" placeholder="🧀" oninput="updatePreview()">
                                    </div>
                                    <div class="form-group">
                                        <label>그라데이션 배경</label>
                                        <select id="prodGradient" class="form-control" onchange="updatePreview()">
                                            <option value="gradient-gold">Gold</option>
                                            <option value="gradient-silver">Silver</option>
                                            <option value="gradient-bronze">Bronze</option>
                                            <option value="gradient-blue">Blue</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>상세 설명</label>
                                    <textarea id="prodDesc" class="form-control" style="height: 100px; resize: none;"></textarea>
                                </div>
                            </div>

                            <!-- Section 2: Files and Versions -->
                            <div class="form-section">
                                <div class="form-section-title">버전 및 다운로드 파일</div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>버전 명칭 (v1.0.0)</label>
                                        <input type="text" id="prodVersion" class="form-control">
                                    </div>
                                    <div class="form-group">
                                        <label>메이저 번호 (정수)</label>
                                        <input type="number" id="prodMajorVersion" class="form-control">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>다운로드 URL</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" id="prodDownloadUrl" class="form-control" placeholder="https://..." style="flex:1;">
                                        <button type="button" class="btn-action btn-outline" onclick="window.openFileSelectModal()" style="padding:0 15px;"><i class="fas fa-folder-open"></i></button>
                                    </div>
                                </div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>파일 형식</label>
                                        <input type="text" id="prodFileFormat" class="form-control" placeholder="PDF">
                                    </div>
                                    <div class="form-group">
                                        <label>파일 용량</label>
                                        <input type="text" id="prodFileSize" class="form-control" placeholder="0 MB">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #ef4444; font-weight: 800;">
                                        <input type="checkbox" id="isDiscontinued"> 이 상품 버전을 수동으로 판매 종료 처리
                                    </label>
                                </div>
                            </div>

                            <!-- Section 3: Pricing -->
                            <div class="form-section">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                    <div class="form-section-title" style="margin-bottom:0;">라이선스 옵션 및 가격</div>
                                    <button type="button" class="btn-action btn-outline" onclick="window.addLicenseOptionRow()" style="padding: 4px 12px; font-size: 0.75rem;">+ 옵션 추가</button>
                                </div>
                                <div id="licenseOptionsList"></div>
                            </div>

                            <!-- Section 4: Images -->
                            <div class="form-section">
                                <div class="form-section-title">대표 이미지 및 갤러리</div>
                                <div class="form-group">
                                    <label>대표 썸네일 URL</label>
                                    <div style="display: flex; gap: 12px; align-items: flex-start;">
                                        <div id="thumbPreviewBox" style="width: 80px; height: 80px; border-radius: 12px; background: #eee; overflow: hidden; border: 1px solid #e2e8f0; flex-shrink: 0;">
                                            <img id="mainImagePreview" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                                        </div>
                                        <div style="flex:1;">
                                            <input type="text" id="prodImageUrl" class="form-control" placeholder="이미지 URL 직접 입력" style="margin-bottom: 8px;">
                                            <div class="dropzone-mini" id="mainImageDropZone">클릭 또는 이미지 드래그하여 업로드</div>
                                            <input type="file" id="prodThumbFile" style="display: none;" accept="image/*">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>미디어 갤러리</label>
                                    <div id="galleryList" style="margin-bottom: 10px;"></div>
                                    <div class="dropzone-mini" id="galleryDropZone">갤러리 이미지 추가 업로드</div>
                                    <input type="file" id="galleryFileInput" multiple style="display: none;" accept="image/*">
                                </div>
                            </div>

                            <!-- Section 5: Changlog -->
                            <div class="form-section">
                                <div class="form-section-title">업데이트 내역 (중요)</div>
                                <textarea id="prodUpdateNotes" class="form-control" style="height: 100px; font-size: 0.85rem;" placeholder="이번 버전에 대한 변경 사항을 입력하세요."></textarea>
                                <div id="historyContainer" style="margin-top:15px; background: #f8fafc; padding: 15px; border-radius: 12px; font-size: 0.75rem; color: #64748b;">
                                    <div style="font-weight: 700; margin-bottom: 8px;">최근 히스토리 (읽기 전용)</div>
                                    <div id="historyList"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- File Select Modal (Same as Store) -->
    <div class="modal-overlay" id="fileSelectModal">
        <div class="modal-card" style="max-width: 550px;">
            <div class="modal-card-header">
                <h3 class="modal-card-title">파일 저장소에서 선택</h3>
                <button onclick="document.getElementById('fileSelectModal').classList.remove('show')" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <input type="text" id="modalFileSearch" class="form-control" placeholder="파일명으로 검색..." oninput="filterModalFiles()" style="margin-bottom:15px;">
            <div id="modalFileList" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productTitle = urlParams.get('title');

        let productsCache = [];
        let categories = [];
        let repositoryFiles = [];

        window.addEventListener('load', async () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Master', subtitle: '제품 생애주기 통합 관리' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot' });

            await loadCategories();
            if (productTitle) loadVersions();
            
            // Drag and Drop
            setupDD('mainImageDropZone', window.handleMainImageUpload);
            setupDD('galleryDropZone', window.handleGalleryUpload);
        });

        // --- Data Loading ---
        async function loadCategories() {
            const select = document.getElementById('prodBadge');
            try {
                const snap = await getDocs(collection(db, "categories"));
                categories = snap.docs.map(d => d.data().name);
                select.innerHTML = '<option value="">카테고리 선택</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        async function loadVersions() {
            const list = document.getElementById('versionList');
            try {
                const q = query(collection(db, "products"), where("title", "==", productTitle));
                const snap = await getDocs(q);
                productsCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => {
                    const maj = (b.major_version || 0) - (a.major_version || 0);
                    if (maj !== 0) return maj;
                    return (b.version || "").localeCompare((a.version || ""), undefined, {numeric:true});
                });

                if (productsCache.length === 0) {
                    list.innerHTML = '<p style="text-align:center; padding:20px;">정보 없음</p>';
                    return;
                }

                renderVersionList();
            } catch (err) { console.error(err); }
        }

        function renderVersionList() {
            const list = document.getElementById('versionList');
            const currentActiveId = document.getElementById('editDocId').value;

            list.innerHTML = productsCache.map(p => {
                const isManual = p.is_discontinued === true;
                const date = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('ko-KR') : '-';
                
                return `
                    <div class="version-card ${p.id === currentActiveId ? 'active' : ''}" onclick="window.loadToEditor('${p.id}')">
                        <div class="card-header">
                            <span class="version-tag">v${p.version}</span>
                            <span class="status-badge ${isManual ? 'status-discontinued' : 'status-active'}">
                                ${isManual ? '종료됨' : '판매중'}
                            </span>
                        </div>
                        <div style="font-size: 0.85rem; font-weight: 700; color: #1e293b;">Major: ${p.major_version}</div>
                        <div class="date-tag">${date} 등록</div>
                    </div>
                `;
            }).join('');
        }

        // --- Editor Logic ---
        window.loadToEditor = (id) => {
            const data = productsCache.find(p => p.id === id);
            if (!data) return;

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('productEditForm').style.display = 'block';

            document.getElementById('editDocId').value = id;
            document.getElementById('editTitleText').innerText = `v${data.version} 관리`;
            document.getElementById('btnDelete').style.display = 'inline-flex';

            // Fill Fields
            document.getElementById('prodTitle').value = data.title;
            document.getElementById('prodBadge').value = data.badge_text || "";
            document.getElementById('prodIcon').value = data.icon || "🧀";
            document.getElementById('prodGradient').value = data.gradient_class || "gradient-gold";
            document.getElementById('prodDesc').value = data.description || "";
            document.getElementById('prodVersion').value = data.version || "";
            document.getElementById('prodMajorVersion').value = data.major_version || 1;
            document.getElementById('prodDownloadUrl').value = data.download_url || "";
            document.getElementById('prodFileFormat').value = data.file_format || "";
            document.getElementById('prodFileSize').value = data.file_size || "";
            document.getElementById('prodImageUrl').value = data.image_url || "";
            document.getElementById('isDiscontinued').checked = data.is_discontinued === true;
            document.getElementById('prodUpdateNotes').value = "";

            // Thumbs
            if (data.image_url) {
                document.getElementById('mainImagePreview').src = data.image_url;
                document.getElementById('mainImagePreview').style.display = 'block';
            } else {
                document.getElementById('mainImagePreview').style.display = 'none';
            }

            // List Helpers
            document.getElementById('licenseOptionsList').innerHTML = "";
            (data.license_options || []).forEach(opt => window.addLicenseOptionRow(opt));

            document.getElementById('galleryList').innerHTML = "";
            (data.gallery_urls || []).forEach(url => window.addGalleryItem(url));

            // History
            const histList = document.getElementById('historyList');
            histList.innerHTML = (data.update_history || []).map(h => `
                <div style="margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <strong>v${h.version}</strong> (${h.date})<br>${h.notes}
                </div>
            `).join('') || '이력 없음';

            updatePreview();
            renderVersionList();
        };

        window.prepareCreateNew = () => {
            const data = productsCache[0]; // 기반 데이터
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('productEditForm').style.display = 'block';
            
            document.getElementById('editDocId').value = "";
            document.getElementById('editTitleText').innerText = "새 버전 등록";
            document.getElementById('btnDelete').style.display = 'none';
            
            if (data) {
                document.getElementById('prodVersion').value = (parseInt(data.major_version || 1) + 1) + ".0.0";
                document.getElementById('prodMajorVersion').value = parseInt(data.major_version || 1) + 1;
            }

            renderVersionList();
        };

        // --- Save Logic ---
        document.getElementById('productEditForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editDocId').value;
            const btn = document.getElementById('btnSave');
            btn.disabled = true;

            const licenseOptions = Array.from(document.querySelectorAll('.license-option-row')).map(row => ({
                id: row.dataset.id,
                name: (row.querySelector('.opt-name-select').value === 'custom' ? row.querySelector('.opt-name').value : row.querySelector('.opt-name-select').value),
                meta: row.querySelector('.opt-meta').value,
                originalPrice: Number(row.querySelector('.opt-original-price').value),
                price: Number(row.querySelector('.opt-price').value),
                max_downloads: Number(row.querySelector('.opt-max-dl').value),
                expiry_days: Number(row.querySelector('.opt-expiry').value)
            }));

            const payload = {
                title: document.getElementById('prodTitle').value,
                price: licenseOptions[0]?.price || 0,
                original_price: licenseOptions[0]?.originalPrice || null,
                badge_text: document.getElementById('prodBadge').value,
                icon: document.getElementById('prodIcon').value,
                gradient_class: document.getElementById('prodGradient').value,
                description: document.getElementById('prodDesc').value,
                download_url: document.getElementById('prodDownloadUrl').value,
                image_url: document.getElementById('prodImageUrl').value,
                gallery_urls: Array.from(document.querySelectorAll('.gallery-url')).map(i => i.value).filter(v => v),
                file_format: document.getElementById('prodFileFormat').value,
                file_size: document.getElementById('prodFileSize').value,
                version: document.getElementById('prodVersion').value,
                major_version: Number(document.getElementById('prodMajorVersion').value),
                is_discontinued: document.getElementById('isDiscontinued').checked,
                license_options: licenseOptions,
                updatedAt: serverTimestamp()
            };

            const notes = document.getElementById('prodUpdateNotes').value.trim();
            if (notes || !id) {
                let history = [];
                if (id) {
                    const prev = productsCache.find(x => x.id === id);
                    history = prev.update_history || [];
                }
                payload.update_history = [{ version: payload.version, date: new Date().toISOString().split('T')[0], notes: notes || "Initial release" }, ...history];
            }

            try {
                if (id) await updateDoc(doc(db, "products", id), payload);
                else await addDoc(collection(db, "products"), { ...payload, createdAt: serverTimestamp() });
                alert("저장 성공!");
                loadVersions();
            } catch (err) { alert("에러: " + err.message); }
            finally { btn.disabled = false; }
        };

        window.handleDelete = async () => {
            const id = document.getElementById('editDocId').value;
            if (!id || !confirm("정말 이 버전을 삭제하시겠습니까? 관련 데이터가 모두 삭제됩니다.")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                alert("삭제 완료");
                location.reload();
            } catch (err) { alert(err.message); }
        };

        // --- Helper Components (Same as store) ---
        window.addLicenseOptionRow = (data = null) => {
            const container = document.getElementById('licenseOptionsList');
            const rowId = data?.id || Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.className = 'license-option-row';
            div.dataset.id = rowId;
            const origPrice = data?.originalPrice || 0;
            const salePrice = data?.price || 0;

            div.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" style="position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; border: none; background: #fff1f2; color: #e11d48; cursor: pointer;">&times;</button>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <select class="form-control opt-name-select" onchange="window.handleLicenseNameChange(this)" style="flex:1;">
                        <option value="Basic" ${data?.name==='Basic'?'selected':''}>Basic</option>
                        <option value="Premium" ${data?.name==='Premium'?'selected':''}>Premium</option>
                        <option value="custom" ${data && data.name!=='Basic' && data.name!=='Premium'?'selected':''}>직접입력</option>
                    </select>
                    <input type="text" class="form-control opt-name" value="${data?.name||'Basic'}" style="flex:1.5; display:${data && data.name!=='Basic' && data.name!=='Premium'?'block':'none'};">
                </div>
                <input type="text" class="form-control opt-meta" placeholder="설명" value="${data?.meta||''}" style="margin-bottom:10px;">
                <div class="grid-2">
                    <input type="number" class="form-control opt-original-price" placeholder="원래가격" value="${origPrice}">
                    <input type="number" class="form-control opt-price" placeholder="할인가격" value="${salePrice}">
                </div>
                <div class="grid-2" style="margin-top:10px;">
                    <input type="number" class="form-control opt-max-dl" value="${data?.max_downloads||1}">
                    <input type="number" class="form-control opt-expiry" value="${data?.expiry_days||7}">
                </div>
            `;
            container.appendChild(div);
        };

        window.handleLicenseNameChange = (sel) => {
            sel.nextElementSibling.style.display = sel.value === 'custom' ? 'block' : 'none';
        };

        window.addGalleryItem = (url="") => {
            const container = document.getElementById('galleryList');
            const div = document.createElement('div');
            div.style = "display: flex; gap: 8px; align-items: center; margin-bottom:5px;";
            div.innerHTML = `<input type="text" class="form-control gallery-url" value="${url}" style="flex: 1;"><button type="button" onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">&times;</button>`;
            container.appendChild(div);
        };

        function updatePreview() {
            // Preview logic if needed
        }

        // --- File Select ---
        window.openFileSelectModal = async () => {
            document.getElementById('fileSelectModal').classList.add('show');
            try {
                const snap = await getDocs(query(collection(db, "download_files"), orderBy("createdAt", "desc")));
                repositoryFiles = snap.docs.map(d => d.data());
                renderModalFiles(repositoryFiles);
            } catch (err) { console.error(err); }
        };
        function renderModalFiles(files) {
            document.getElementById('modalFileList').innerHTML = files.map(f => `
                <div style="padding:10px; border:1px solid #eee; border-radius:8px; display:flex; justify-content:space-between;">
                    ${f.name} <button type="button" class="btn-primary" style="padding:4px 8px; font-size:0.7rem;" onclick="window.selectFile('${f.url}', '${f.format}', '${f.size}')">선택</button>
                </div>
            `).join('');
        }
        window.selectFile = (url, format, size) => {
            document.getElementById('prodDownloadUrl').value = url;
            document.getElementById('prodFileFormat').value = format;
            document.getElementById('prodFileSize').value = size;
            document.getElementById('fileSelectModal').classList.remove('show');
        };

        // --- Upload Helpers ---
        function setupDD(id, fn) {
            const el = document.getElementById(id);
            el.onclick = () => document.getElementById(id === 'mainImageDropZone' ? 'prodThumbFile' : 'galleryFileInput').click();
            el.ondragover = (e) => { e.preventDefault(); el.style.borderColor = "var(--primary)"; };
            el.ondragleave = () => { el.style.borderColor = "#e2e8f0"; };
            el.ondrop = (e) => { e.preventDefault(); fn(e.dataTransfer.files); };
        }

        window.handleMainImageUpload = async (files) => {
            if(!files[0]) return;
            try {
                const res = await window.uploadFileToGoogleDrive(files[0]);
                if(res?.downloadUrl) {
                    document.getElementById('prodImageUrl').value = res.downloadUrl;
                    document.getElementById('mainImagePreview').src = res.downloadUrl;
                    document.getElementById('mainImagePreview').style.display = 'block';
                }
            } catch(e) { alert("업로드 실패"); }
        };

        window.handleGalleryUpload = async (files) => {
            try {
                for(let f of files) {
                    const res = await window.uploadFileToGoogleDrive(f);
                    if(res?.downloadUrl) window.addGalleryItem(res.downloadUrl);
                }
            } catch(e) { alert("일부 실패"); }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시리즈 분석 페이퍼 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .column-manage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .editor-card { background: #fff; border-radius: 1.5rem; padding: 35px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.05); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 800; margin-bottom: 12px; color: #1e293b; }
        .form-control { width: 100%; padding: 16px 20px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 0.95rem; box-sizing: border-box; outline: none; background: #f8fafc; }
        .form-control:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .form-textarea { height: 400px; resize: vertical; line-height: 1.6; font-family: 'Pretendard', sans-serif; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn-action { flex: 1; padding: 18px; border-radius: 100px; font-weight: 900; font-size: 1.1rem; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-save { background: #1e293b; color: #fff; }
        .btn-save:hover { background: #0f172a; transform: translateY(-2px); }
        .btn-delete { background: #fee2e2; color: #b91c1c; flex: 0.3; }
        .btn-delete:hover { background: #fecaca; }
        .search-area { background: #f1f5f9; padding: 25px; border-radius: 20px; margin-bottom: 30px; display: flex; gap: 15px; align-items: flex-end; }
        .search-input-wrap { flex: 1; }
        .btn-search { background: #3b82f6; color: #fff; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; height: 55px; }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="column-manage-header">
                    <div>
                        <h1 style="font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px;">시리즈 분석 페이퍼 관리 ✒️</h1>
                        <p style="font-size: 0.9rem; color: #64748b;">특정 이슈 시리즈에 대한 전문적인 칼럼과 소견을 작성합니다.</p>
                    </div>
                </div>

                <div class="search-area">
                    <div class="search-input-wrap">
                        <label class="form-label">시리즈 ID (태그 예: mnforce-202501)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="search-id" class="form-control" placeholder="시리즈 ID를 입력하거나 오른쪽 버튼으로 찾으세요..." />
                            <button class="btn-search" style="background: var(--accent-red); white-space: nowrap;" onclick="discoverTags()">
                                <i class="fas fa-tags"></i> 아카이브 태그 스캔
                            </button>
                        </div>
                    </div>
                </div>

                <!-- [개선됨] 스마트 태그 탐색기 영역 -->
                <div id="tag-discovery-box" class="editor-card" style="display: none; border: 2px solid var(--accent-red); background: #fffafb; max-height: 700px; overflow-y: auto;">
                    <div style="position: sticky; top: -35px; background: #fffafb; padding: 10px 0 20px; z-index: 10; border-bottom: 1px solid #fee2e2; margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="margin:0; font-size: 1.2rem; font-weight: 950; color: var(--accent-red);">아카이브 스마트 태그 탐색기</h3>
                            <button onclick="document.getElementById('tag-discovery-box').style.display='none'" style="background:none; border:none; cursor:pointer; font-size:1.8rem; color:#999; line-height:1;">&times;</button>
                        </div>
                        
                        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 250px; position: relative;">
                                <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ccc;"></i>
                                <input type="text" id="tag-internal-search" class="form-control" style="padding-left: 45px; margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.03);" placeholder="태그 이름으로 찾기..." onkeyup="filterTagCloud()">
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <label style="font-size: 0.8rem; font-weight: 800; color: #666;">최소 사건 수:</label>
                                <select id="tag-min-count" class="form-control" style="width: auto; margin: 0; padding: 5px 15px;" onchange="filterTagCloud()">
                                    <option value="1">전체보기</option>
                                    <option value="3">3건 이상</option>
                                    <option value="5" selected>5건 이상 (추천)</option>
                                    <option value="10">10건 이상 (핵심 이슈)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="tag-discovery-sections">
                        <!-- 그룹별 태그들이 여기에 렌더링됨 -->
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                    <button class="btn-search" style="flex:1;" onclick="loadColumn()">연결된 칼럼 로드</button>
                    <button class="btn-search" style="background: #64748b; flex:1;" onclick="clearForm()">새로 작성</button>
                </div>

                <div class="editor-card" id="editor-box">
                    <div style="border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 10px;">
                        <h2 style="font-size: 1.1rem; font-weight: 800; color: #1e293b;">✒️ 페이퍼 에디터</h2>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">시리즈 ID (수정 불가)</label>
                            <input type="text" id="col-id" class="form-control" readonly style="background: #e2e8f0;" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">작성자 (Columnist)</label>
                            <input type="text" id="col-author" class="form-control" placeholder="작성자 성함을 입력하세요" />
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">칼럼 제목 (Analysis Title)</label>
                        <input type="text" id="col-title" class="form-control" placeholder="분석문의 제목을 입력하세요" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">작성 일자 (Date)</label>
                        <input type="text" id="col-date" class="form-control" placeholder="2025-05-12 (기재가 권장됨)" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">본문 내용 (Content)</label>
                        <textarea id="col-content" class="form-control form-textarea" placeholder="분석 내용을 입력하세요. 줄바꿈을 통해 문단을 구분하세요."></textarea>
                    </div>

                    <div class="btn-group">
                        <button class="btn-action btn-save" onclick="saveColumn()">
                            <i class="fas fa-save"></i> 칼럼 저장 및 아카이브 반영
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteColumn()">
                            <i class="fas fa-trash-alt"></i> 삭제
                        </button>
                    </div>
                </div>

                <!-- [추가] 칼럼 목록 섹션 -->
                <div class="editor-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                        <h2 style="font-size: 1.1rem; font-weight: 800; color: #1e293b;">📚 등록된 분석 페이퍼 목록</h2>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <input type="text" id="list-search" class="form-control" style="width: 200px; padding: 10px 15px; margin: 0;" placeholder="제목/ID로 리스트 검색..." onkeyup="filterList()">
                            <button class="btn-search" style="padding: 10px 15px; height: auto;" onclick="fetchAllColumns()">새로고침</button>
                        </div>
                    </div>
                    
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 150px;">시리즈 ID</th>
                                <th>칼럼 제목</th>
                                <th style="width: 120px;">작성자</th>
                                <th style="width: 120px;">수정일</th>
                            </tr>
                        </thead>
                        <tbody id="column-list-body">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 50px; color: #aaa;">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="sync-status" style="text-align: center; margin-top: 20px; font-weight: 800;"></div>
            </main>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script type="text/javascript">
        window.CHEESE_ADMIN_ACTIVE_PAGE = "series_column_manage";
        window.CHEESE_ADMIN_PAGE_SUBTITLE = "시리즈 분석 페이퍼";

        let allColumns = [];

        async function safeFetchDB(payload) {
            if (!window.CHEESE_ADMIN_DB_API) throw new Error("API 엔드포인트가 정의되지 않았습니다.");
            const res = await fetch(window.CHEESE_ADMIN_DB_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || "Firebase 통신 중 오류가 발생했습니다.");
            return data;
        }

        let discoveredTagsMaster = {}; // { tag: count }

        async function discoverTags() {
            const box = document.getElementById('tag-discovery-box');
            
            showAdminLoading("전체 아카이브에서 태그를 분석 중입니다...");
            try {
                const res = await safeFetchDB({ action: "get", collection: "historical_issues" });
                if(!res.ok) throw new Error("DB 접근 실패");

                const tagsMap = {};
                for(const doc of res.data) {
                    const months = doc.months || {};
                    Object.values(months).forEach(m => {
                        (m.events || []).forEach(ev => {
                            const tags = (ev.tags || "").split(',').map(t => t.trim()).filter(t => t);
                            tags.forEach(t => { tagsMap[t] = (tagsMap[t] || 0) + 1; });
                        });
                    });
                }

                discoveredTagsMaster = tagsMap;
                filterTagCloud();
                
                box.style.display = 'block';
                box.scrollIntoView({ behavior: 'smooth' });

            } catch(e) {
                alert("분석 실패: " + e.message);
            } finally {
                hideAdminLoading();
            }
        }

        function filterTagCloud() {
            const sections = document.getElementById('tag-discovery-sections');
            const search = document.getElementById('tag-internal-search').value.toLowerCase();
            const minCount = parseInt(document.getElementById('tag-min-count').value);
            
            const categories = {
                "정치·비상상황 (IMPORTANT)": { prefix: ["important-", "mnforce-"], tags: [] },
                "경제·금융 (ECONOMY)": { prefix: ["economy-"], tags: [] },
                "특별 연재 (SERIES)": { prefix: ["E-"], tags: [] },
                "기타 이슈": { prefix: [], tags: [] }
            };

            Object.keys(discoveredTagsMaster).forEach(tag => {
                const count = discoveredTagsMaster[tag];
                const matchesSearch = tag.toLowerCase().includes(search);
                const matchesCount = count >= minCount;

                if (matchesSearch && matchesCount) {
                    let categorized = false;
                    for (const cat of Object.values(categories)) {
                        if (cat.prefix.some(p => tag.startsWith(p))) {
                            cat.tags.push({ tag, count });
                            categorized = true;
                            break;
                        }
                    }
                    if (!categorized) categories["기타 이슈"].tags.push({ tag, count });
                }
            });

            let html = "";
            for (const [name, data] of Object.entries(categories)) {
                if (data.tags.length === 0) continue;
                
                // 건수 순 정렬
                data.tags.sort((a,b) => b.count - a.count);

                html += `
                    <div style="margin-bottom: 40px;">
                        <h4 style="font-size: 0.85rem; font-weight: 900; color: #1e293b; letter-spacing: 1px; border-left: 4px solid #1e293b; padding-left: 10px; margin-bottom: 15px;">${name}</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: baseline;">
                            ${data.tags.map(t => {
                                const size = Math.min(1.2, 0.85 + (t.count / 100)); // 상한선 설정
                                const isHeavy = t.count > 50;
                                return `
                                    <button onclick="pickTag('${t.tag}')" style="
                                        padding: 6px 15px; 
                                        border-radius: 20px; 
                                        border: 1px solid ${isHeavy ? '#111' : '#eee'}; 
                                        background: ${isHeavy ? '#111' : '#fff'}; 
                                        color: ${isHeavy ? '#fff' : '#111'};
                                        cursor: pointer; 
                                        font-size: ${size}rem; 
                                        font-weight: ${t.count > 20 ? '900' : '500'};
                                        box-shadow: 0 5px 15px rgba(0,0,0,0.03);
                                        transition: 0.2s;
                                    ">
                                        ${t.tag} <small style="opacity: 0.5; margin-left: 4px; font-weight: 400;">${t.count}</small>
                                    </button>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            if (html === "") {
                html = `<div style="text-align: center; padding: 100px; color: #aaa; font-weight: 800;">조건에 맞는 태그가 없습니다.</div>`;
            }

            sections.innerHTML = html;
        }

        window.pickTag = (tag) => {
            document.getElementById('search-id').value = tag;
            document.getElementById('tag-discovery-box').style.display = 'none';
            loadColumn(tag);
        };

        async function loadColumn(sid) {
            const id = sid || document.getElementById('search-id').value.trim();
            if(!id) { alert("시리즈 ID를 입력해 주세요."); return; }

            showAdminLoading("분석 칼럼을 불러오고 있습니다...");
            try {
                const res = await safeFetchDB({ action: "getDoc", collection: "series_analysis", id: id });
                if(res.ok && res.data) {
                    const d = res.data;
                    document.getElementById('col-id').value = id;
                    document.getElementById('col-title').value = d.title || "";
                    document.getElementById('col-author').value = d.author || "";
                    document.getElementById('col-date').value = d.date || "";
                    document.getElementById('col-content').value = d.content || "";
                    
                    document.getElementById('editor-box').scrollIntoView({ behavior: 'smooth' });
                } else {
                    handleDocNotFound(id);
                }
            } catch(e) {
                // [수정] 문서를 찾을 수 없는 경우는 에러가 아니라 '새로 작성' 안내로 유도
                if (e.message.includes("찾을 수 없습니다") || e.message.includes("NotFound") || e.message.includes("not find document")) {
                    handleDocNotFound(id);
                } else {
                    alert("불러오기 실패: " + e.message);
                }
            } finally {
                hideAdminLoading();
            }
        }

        function handleDocNotFound(id) {
            if(confirm(`[ ${id} ] 로 등록된 분석글이 아직 없습니다. 새로 작성하시겠습니까?`)) {
                clearForm();
                document.getElementById('col-id').value = id;
                document.getElementById('editor-box').scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function fetchAllColumns() {
            const tbody = document.getElementById('column-list-body');
            try {
                const res = await safeFetchDB({ action: "get", collection: "series_analysis" });
                if(res.ok && res.data) {
                    allColumns = res.data;
                    renderList(allColumns);
                }
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 50px; color: red;">목록 로드 실패: ${e.message}</td></tr>`;
            }
        }

        function renderList(list) {
            const tbody = document.getElementById('column-list-body');
            if(list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 50px; color: #aaa;">등록된 칼럼이 없습니다.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = list.map(item => `
                <tr onclick="loadColumn('${item.id}')" style="cursor: pointer;">
                    <td><span class="badge-key" style="background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;">${item.id}</span></td>
                    <td style="font-weight: 700;">${item.title || '(제목 없음)'}</td>
                    <td>${item.author || '-'}</td>
                    <td style="font-size: 0.8rem; color: #94a3b8;">${item.updatedAt ? item.updatedAt.split('T')[0] : (item.date || '-')}</td>
                </tr>
            `).join('');
        }

        function filterList() {
            const q = document.getElementById('list-search').value.toLowerCase();
            const filtered = allColumns.filter(c => 
                c.id.toLowerCase().includes(q) || 
                (c.title || "").toLowerCase().includes(q) ||
                (c.author || "").toLowerCase().includes(q)
            );
            renderList(filtered);
        }

        async function saveColumn() {
            const sid = document.getElementById('col-id').value.trim();
            const title = document.getElementById('col-title').value.trim();
            const author = document.getElementById('col-author').value.trim();
            const dateStr = document.getElementById('col-date').value.trim();
            const content = document.getElementById('col-content').value.trim();

            if(!sid) { alert("시리즈 ID가 정의되지 않았습니다. 먼저 ID를 입력하고 로드해 주세요."); return; }
            if(!title || !content) { alert("제목과 본문을 입력해 주세요."); return; }

            if(!confirm("해당 내용을 저장하시겠습니까?")) return;

            showAdminLoading("아카이브에 저장 중입니다...");
            try {
                await safeFetchDB({
                    action: "set",
                    collection: "series_analysis",
                    id: sid,
                    data: {
                        title: title,
                        author: author,
                        date: dateStr,
                        content: content,
                        updatedAt: new Date().toISOString()
                    }
                });
                alert("저장 완료!");
                fetchAllColumns(); // 목록 갱신
            } catch(e) {
                alert("저장 실패: " + e.message);
            } finally {
                hideAdminLoading();
            }
        }

        async function deleteColumn() {
            const sid = document.getElementById('col-id').value.trim();
            if(!sid) return;
            if(!confirm("정말로 이 분석 칼럼을 삭제하시겠습니까? 연대기 기록만 남게 됩니다.")) return;

            showAdminLoading("삭제 중...");
            try {
                await safeFetchDB({ action: "delDoc", collection: "series_analysis", id: sid });
                alert("삭제 완료.");
                clearForm();
                fetchAllColumns(); // 목록 갱신
            } catch(e) { alert("삭제 실패: " + e.message); }
            finally { hideAdminLoading(); }
        }

        function clearForm() {
            document.getElementById('col-id').value = "";
            document.getElementById('col-title').value = "";
            document.getElementById('col-author').value = "";
            document.getElementById('col-date').value = "";
            document.getElementById('col-content').value = "";
        }

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            fetchAllColumns();
        });
    </script>
</body>
</html>

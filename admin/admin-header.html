<!-- 관리자 토스트 알림 스타일 -->
<style>
#admin-toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}
.admin-toast {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-left: 4px solid #ef4444;
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 300px;
    max-width: 380px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    pointer-events: all;
    cursor: pointer;
    animation: adminToastIn 0.3s ease;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.admin-toast .toast-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
.admin-toast .toast-body { flex: 1; }
.admin-toast .toast-title { font-weight: 800; font-size: 0.85rem; color: #1e293b; margin-bottom: 3px; }
.admin-toast .toast-msg { font-size: 0.82rem; color: #475569; line-height: 1.4; }
.admin-toast .toast-close { font-size: 1rem; color: #94a3b8; flex-shrink: 0; line-height: 1; }
.admin-toast.hiding { opacity: 0; transform: translateX(30px); }
@keyframes adminToastIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
}
</style>
<div id="admin-toast-container"></div>

<!-- QnA 실시간 알림 스크립트 -->
<script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
        authDomain: "auth.cheesehistory.com",
        projectId: "cheese-history-platform",
        storageBucket: "cheese-history-platform.firebasestorage.app",
        messagingSenderId: "206588835864",
        appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
    };

    // [개선] 앱 이름 중복 방지 (다수 페이지에서 개별 초기화 시 충돌 방지)
    const app = initializeApp(firebaseConfig, "adminHeaderNotifier");
    const db = getFirestore(app);

    let qnaCount = 0;
    let refundCount = 0;

    const updateAdminGlobalBadge = () => {
        const total = qnaCount + refundCount;
        
        // 1. 헤더 종 배지 업데이트
        const headerBadge = document.getElementById('header-qna-badge');
        if (headerBadge) {
            headerBadge.innerText = total > 99 ? '99+' : total;
            headerBadge.style.display = total > 0 ? 'inline-block' : 'none';
        }

        // 2. 왼쪽 메뉴 배지 업데이트
        const sidebarBadge = document.getElementById('qna-count-badge');
        if (sidebarBadge) {
            sidebarBadge.innerText = total > 99 ? '99+' : total;
            sidebarBadge.style.display = total > 0 ? 'inline-block' : 'none';
        }
    };

    // 사이드바가 늦게 로드될 경우를 대비한 주기적 동기화
    setInterval(updateAdminGlobalBadge, 1000);

    // [개선] 모든 문의를 감시하여 클라이언트 측에서 미답변 개수 필터링
    onSnapshot(collection(db, "qna"), (snapshot) => {
        // answer 가 비어있거나(null, undefined, "") 인 것만 카운트
        const unanswered = snapshot.docs.filter(doc => {
            const data = doc.data();
            return !data.answer || data.answer.toString().trim() === "";
        });
        qnaCount = unanswered.length;
        updateAdminGlobalBadge();
    }, (err) => console.error("QnA 알림 리스너 오류:", err));

    // [추가] 대기 중인 환불 요청 감시
    const refundQuery = query(collection(db, "refunds"), where("status", "==", "pending"));
    onSnapshot(refundQuery, (snapshot) => {
        refundCount = snapshot.size;
        updateAdminGlobalBadge();
    }, (err) => console.error("Refund 알림 리스너 오류:", err));

    // [추가] 관리자 전용 notifications 구독 → 실시간 토스트 표시
    function showAdminToast(icon, title, message, link, docId) {
        const container = document.getElementById('admin-toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'admin-toast';
        toast.innerHTML = `
            <span class="toast-icon">${icon || '🔔'}</span>
            <div class="toast-body">
                <div class="toast-title">${title}</div>
                <div class="toast-msg">${message}</div>
            </div>
            <span class="toast-close">✕</span>
        `;

        const dismiss = async () => {
            toast.classList.add('hiding');
            setTimeout(() => toast.remove(), 300);
            // 읽음 처리
            if (docId) {
                try { await updateDoc(doc(db, "notifications", docId), { is_read: true }); } catch(e) {}
            }
        };

        toast.addEventListener('click', () => {
            dismiss();
            if (link) window.location.href = link;
        });
        toast.querySelector('.toast-close').addEventListener('click', (e) => {
            e.stopPropagation();
            dismiss();
        });

        container.appendChild(toast);
        // 8초 후 자동 닫기
        setTimeout(dismiss, 8000);
    }

    let adminNotiInitialized = false;
    const adminNotiQuery = query(
        collection(db, "notifications"),
        where("uid", "==", "admin"),
        where("is_read", "==", false)
    );
    onSnapshot(adminNotiQuery, (snapshot) => {
        snapshot.docChanges().forEach(change => {
            // 초기 로드 시 기존 알림은 토스트 없이 스킵, 이후 새로 추가되는 것만 표시
            if (change.type === "added" && adminNotiInitialized) {
                const data = change.doc.data();
                showAdminToast(
                    data.icon || '🔔',
                    '새 알림',
                    data.message,
                    data.link,
                    change.doc.id
                );
            }
        });
        adminNotiInitialized = true;
    }, (err) => console.error("Admin 알림 리스너 오류:", err));
</script>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>스토어 콘텐츠 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
        }

        h1, h2, h3, .tab-btn {
            font-family: 'Outfit', sans-serif;
        }

        .manage-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Top Header Section */
        .manage-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2.5rem;
            padding: 0 10px;
        }

        .header-title-group h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #1e293b, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -0.03em;
        }

        .header-title-group p {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Modern Tabs */
        .tabs-wrapper {
            background: rgba(255, 255, 255, 0.5);
            padding: 6px;
            border-radius: 18px;
            display: inline-flex;
            gap: 4px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn:hover {
            color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .tab-btn.active {
            color: white;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .tab-content {
            display: none;
            animation: slideUpFade 0.5s ease-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: var(--card-shadow);
        }

        /* Editor Styles */
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .editor-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: #1e293b;
        }

        .policy-editor {
            width: 100%;
            height: 550px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.7;
            color: #334155;
            resize: vertical;
            margin-bottom: 25px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.8);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .policy-editor:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Buttons */
        .btn-premium {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
        }

        .btn-premium i {
            font-size: 0.9rem;
        }

        /* Notice Section */
        .notice-container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        .notice-container-header h3 {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
            color: #1e293b;
        }

        .notice-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .notice-item {
            background: white;
            padding: 22px 28px;
            border-radius: 22px;
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .notice-item:hover {
            border-color: var(--primary-light);
            transform: scale(1.015);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
            background: #fff;
        }

        .notice-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: transparent;
            transition: all 0.3s;
        }

        .notice-item:hover::before {
            background: var(--primary);
        }

        .notice-info h4 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notice-info p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .notice-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge-pin { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }

        .notice-actions {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid #f1f5f9;
            background: #fff;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            font-size: 1rem;
        }

        .btn-action:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: rotate(5deg);
        }

        .btn-delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: rotate(-5deg);
        }

        /* Modal Redesign */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-card {
            background: white;
            padding: 45px;
            border-radius: 40px;
            width: 95%;
            max-width: 650px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.25);
            transform: translateY(0);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .modern-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            box-sizing: border-box;
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s;
            font-family: inherit;
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--primary-light);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 18px;
            cursor: pointer;
            border: 2px solid #f1f5f9;
            transition: all 0.3s;
        }

        .checkbox-group:hover {
            border-color: #e2e8f0;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @media (max-width: 768px) {
            .manage-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .header-title-group h1 { font-size: 1.8rem; }
            .tabs-wrapper { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
            .tab-btn { padding: 10px 16px; white-space: nowrap; flex: 1; }
            .glass-card { padding: 25px; border-radius: 20px; }
            .modal-card { padding: 30px; border-radius: 25px; }
        }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main class="manage-container">
                <header class="manage-header">
                    <div class="header-title-group">
                        <h1 id="page-display-title">스토어 콘텐츠 관리</h1>
                        <p>판매 사이트의 공지사항 및 법적 약관을 관리하고 실시간으로 반영하세요.</p>
                    </div>
                </header>

                <div class="tabs-wrapper">
                    <button class="tab-btn active" data-tab="notices">
                        <i class="fas fa-bullhorn" style="margin-right: 8px;"></i>공지사항
                    </button>
                    <button class="tab-btn" data-tab="terms">
                        <i class="fas fa-file-contract" style="margin-right: 8px;"></i>이용약관
                    </button>
                    <button class="tab-btn" data-tab="privacy">
                        <i class="fas fa-shield-alt" style="margin-right: 8px;"></i>개인정보
                    </button>
                </div>

                <!-- 📢 1. 공지사항 탭 -->
                <div class="tab-content active" id="tab-notices">
                    <div class="glass-card">
                        <div class="notice-container-header">
                            <h3>공지사항 목록</h3>
                            <button class="btn-premium" style="padding: 10px 20px; font-size: 0.9rem;" onclick="openNoticeModal()">
                                <i class="fas fa-plus"></i> 신규 공지 등록
                            </button>
                        </div>
                        <div id="noticeList" class="notice-list">
                            <p style="text-align: center; color: #94a3b8; padding: 60px;">데이터를 불러오는 중...</p>
                        </div>
                    </div>
                </div>

                <!-- 📜 2. 이용약관 탭 -->
                <div class="tab-content" id="tab-terms">
                    <div class="glass-card">
                        <div class="editor-header">
                            <h3>이용약관 에디터</h3>
                            <span id="termsUpdateAt" style="font-size: 0.85rem; color: var(--text-sub); font-weight: 600;">마지막 업데이트: -</span>
                        </div>
                        <textarea id="termsEditor" class="policy-editor" placeholder="이용약관 내용을 입력하세요..."></textarea>
                        <div style="display: flex; justify-content: flex-end;">
                            <button class="btn-premium" onclick="savePolicy('terms')">
                                <i class="fas fa-save"></i> 약관 내용 즉시 반영
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 🔒 3. 개인정보 처리방침 탭 -->
                <div class="tab-content" id="tab-privacy">
                    <div class="glass-card">
                        <div class="editor-header">
                            <h3>개인정보 처리방침 에디터</h3>
                            <span id="privacyUpdateAt" style="font-size: 0.85rem; color: var(--text-sub); font-weight: 600;">마지막 업데이트: -</span>
                        </div>
                        <textarea id="privacyEditor" class="policy-editor" placeholder="개인정보 처리방침 내용을 입력하세요..."></textarea>
                        <div style="display: flex; justify-content: flex-end;">
                            <button class="btn-premium" onclick="savePolicy('privacy')">
                                <i class="fas fa-save"></i> 처리방침 내용 즉시 반영
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Notice Modal -->
    <div class="modal-overlay" id="noticeModal">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 id="modalTitle" style="font-weight: 800; margin: 0; font-size: 1.6rem; color: #1e293b;">공지사항 등록</h2>
                <button type="button" style="background: none; border: none; font-size: 1.5rem; color: #94a3b8; cursor: pointer;" onclick="closeNoticeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="noticeForm">
                <input type="hidden" id="noticeId">
                <div class="form-group">
                    <label>공지 제목</label>
                    <input type="text" id="iptNoticeTitle" class="modern-input" required placeholder="예: [안내] 시스템 점검 공지">
                </div>
                <div class="form-group">
                    <label>상세 내용</label>
                    <textarea id="iptNoticeContent" class="modern-input" style="height: 220px; resize: none;" required placeholder="공지할 내용을 자세히 입력하세요."></textarea>
                </div>
                <div class="form-group">
                    <div class="checkbox-group" onclick="document.getElementById('iptNoticePinned').click(); event.stopPropagation();">
                        <input type="checkbox" id="iptNoticePinned" onclick="event.stopPropagation();">
                        <label for="iptNoticePinned" style="margin: 0; cursor: pointer; color: #1e293b;">필독 공지로 설정 (목록 최상단 고정)</label>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 40px;">
                    <button type="button" class="btn-premium" style="flex:1; background: #f1f5f9; color: #64748b; box-shadow: none;" onclick="closeNoticeModal()">취소</button>
                    <button type="submit" class="btn-premium" style="flex:2;">공지사항 저장 및 배포</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script>
        // Common DB API
        async function safeFetchDB(payload) {
            const res = await fetch(window.CHEESE_ADMIN_DB_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        let allNotices = [];

        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Site', subtitle: 'Store Content' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'store_content_manage' });

            initTabs();
            loadPolicies();
            loadNotices();
        });

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                };
            });
        }

        // --- Policies (Terms / Privacy) ---
        async function loadPolicies() {
            try {
                const res = await safeFetchDB({ action: "get", collection: "site_policies" });
                if (res.ok) {
                    const data = res.dataList || [];
                    const terms = data.find(p => p.id === 'terms');
                    const privacy = data.find(p => p.id === 'privacy');

                    if (terms) {
                        document.getElementById('termsEditor').value = terms.content || "";
                        document.getElementById('termsUpdateAt').innerText = `마지막 업데이트: ${new Date(terms.updatedAt).toLocaleString()}`;
                    }
                    if (privacy) {
                        document.getElementById('privacyEditor').value = privacy.content || "";
                        document.getElementById('privacyUpdateAt').innerText = `마지막 업데이트: ${new Date(privacy.updatedAt).toLocaleString()}`;
                    }
                }
            } catch (err) { console.error("Load Policies Error:", err); }
        }

        async function savePolicy(type) {
            const content = document.getElementById(type + 'Editor').value;
            if (!confirm(`정말 ${type === 'terms' ? '이용약관' : '개인정보 처리방침'}의 내용을 수정하시겠습니까?\n스토어에 즉시 반영됩니다.`)) return;

            try {
                const res = await safeFetchDB({
                    action: "update",
                    collection: "site_policies",
                    id: type,
                    data: {
                        content: content,
                        updatedAt: new Date().toISOString()
                    }
                });

                if (res.ok) {
                    alert("성공적으로 저장되었습니다.");
                    loadPolicies();
                } else {
                    // 문서가 존재하지 않을 경우 create 시도 (최초 등록)
                    const createRes = await safeFetchDB({
                        action: "create",
                        collection: "site_policies",
                        data: {
                            id: type,
                            content: content,
                            updatedAt: new Date().toISOString()
                        }
                    });
                    if (createRes.ok) {
                        alert("최초 등록이 완료되었습니다.");
                        loadPolicies();
                    }
                }
            } catch (err) { alert("저장 실패: " + err.message); }
        }

        // --- Notices ---
        async function loadNotices() {
            try {
                const res = await safeFetchDB({ action: "get", collection: "store_notices", orderByField: "createdAt" });
                if (res.ok) {
                    allNotices = res.dataList || [];
                    renderNotices();
                }
            } catch (err) { console.error("Load Notices Error:", err); }
        }

        function renderNotices() {
            const container = document.getElementById('noticeList');
            if (allNotices.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 60px;">등록된 공지사항이 없습니다.</p>';
                return;
            }

            // Pinned first, then date desc
            const sorted = [...allNotices].sort((a,b) => {
                if(a.isPinned !== b.isPinned) return b.isPinned ? 1 : -1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            container.innerHTML = sorted.map(n => `
                <div class="notice-item">
                    <div class="notice-info">
                        <h4>
                            ${n.isPinned ? '<span class="notice-badge badge-pin">필독</span>' : ''}
                            ${n.title}
                        </h4>
                        <p>
                            <i class="far fa-calendar-alt" style="margin-right: 5px;"></i>${new Date(n.createdAt).toLocaleDateString()}
                            <span style="margin: 0 10px; opacity: 0.3;">|</span>
                            <i class="far fa-file-alt" style="margin-right: 5px;"></i>${n.content.slice(0, 60)}${n.content.length > 60 ? '...' : ''}
                        </p>
                    </div>
                    <div class="notice-actions">
                        <button class="btn-action" onclick="editNotice('${n.id}')" title="수정">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteNotice('${n.id}')" title="삭제">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openNoticeModal = (id = null) => {
            const modal = document.getElementById('noticeModal');
            const form = document.getElementById('noticeForm');
            form.reset();
            document.getElementById('noticeId').value = id || "";
            document.getElementById('modalTitle').innerText = id ? "공지사항 수정" : "공지사항 등록";

            if (id) {
                const notice = allNotices.find(n => n.id === id);
                if (notice) {
                    document.getElementById('iptNoticeTitle').value = notice.title;
                    document.getElementById('iptNoticeContent').value = notice.content;
                    document.getElementById('iptNoticePinned').checked = notice.isPinned === true;
                }
            }

            modal.style.display = 'flex';
        };

        window.closeNoticeModal = () => {
            document.getElementById('noticeModal').style.display = 'none';
        };

        document.getElementById('noticeForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('noticeId').value;
            const data = {
                title: document.getElementById('iptNoticeTitle').value,
                content: document.getElementById('iptNoticeContent').value,
                isPinned: document.getElementById('iptNoticePinned').checked,
                updatedAt: new Date().toISOString()
            };

            try {
                let res;
                if (id) {
                    res = await safeFetchDB({ action: "update", collection: "store_notices", id: id, data: data });
                } else {
                    data.createdAt = new Date().toISOString();
                    res = await safeFetchDB({ action: "create", collection: "store_notices", data: data });
                }

                if (res.ok) {
                    alert("저장되었습니다.");
                    closeNoticeModal();
                    loadNotices();
                }
            } catch (err) { alert("저장 실패: " + err.message); }
        };

        window.editNotice = (id) => openNoticeModal(id);

        window.deleteNotice = async (id) => {
            if (!confirm("정말 이 공지사항을 삭제하시겠습니까?")) return;
            try {
                const res = await safeFetchDB({ action: "delete", collection: "store_notices", id: id });
                if (res.ok) {
                    alert("삭제되었습니다.");
                    loadNotices();
                }
            } catch (err) { alert("삭제 실패: " + err.message); }
        };
    </script>
</body>

</html>

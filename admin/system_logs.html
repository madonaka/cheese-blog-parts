<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>시스템 로그 센터 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./admin.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .log-filter-bar {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-size: 0.8rem; font-weight: 700; color: #64748b; }
        .filter-input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            outline: none;
        }

        .log-type-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .type-info { background: #e0f2fe; color: #0369a1; } /* Page View, etc */
        .type-success { background: #dcfce7; color: #166534; } /* Login, Purchase */
        .type-warning { background: #fef3c7; color: #92400e; } /* Logout, UI Action */
        .type-error { background: #fee2e2; color: #991b1b; } /* Errors */

        .admin-table td { font-size: 0.85rem; vertical-align: middle; }
        .path-text { font-family: monospace; color: #64748b; font-size: 0.75rem; }
        .uid-text { font-family: monospace; color: #94a3b8; font-size: 0.7rem; }

        .btn-detail {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-detail:hover { background: #e2e8f0; }

        /* Modal specific */
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .detail-label { width: 120px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        .detail-value { flex: 1; word-break: break-all; color: #1e293b; font-size: 0.85rem; font-family: monospace; }

        pre.raw-json {
            background: #1e293b;
            color: #d1d5db;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            overflow-x: auto;
            margin-top: 10px;
        }

        /* Pagination Styles */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .page-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modal Base Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalSlide 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
        }

        /* Dashboard Styles */
        .log-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
        .stat-sub { font-size: 0.75rem; color: #f97316; margin-top: 5px; font-weight: 600; }

        /* Icon Button Styles */
        .btn-refresh-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            font-size: 1.25rem;
        }
        .btn-refresh-icon:hover {
            background: #f1f5f9;
            transform: rotate(180deg);
            color: #3b82f6;
            border-color: #3b82f6;
        }
        .btn-refresh-icon:active { transform: scale(0.9) rotate(180deg); }

        /* GA Details Styles */
        .ga-details-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .ga-detail-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
        }
        .ga-detail-title { font-size: 0.95rem; font-weight: 800; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .ga-list { list-style: none; padding: 0; margin: 0; }
        .ga-list-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px dashed #f1f5f9;
            font-size: 0.85rem;
            color: #475569;
        }
        .ga-list-item:last-child { border: none; }
        .ga-label { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
        .ga-count { color: #3b82f6; font-weight: 700; }

        /* [Mobile Optimization] */
        @media (max-width: 768px) {
            .admin-header-row {
                flex-direction: row !important; /* 가로 유지 */
                align-items: center !important;
                justify-content: space-between !important;
                margin-bottom: 24px !important;
            }
            .admin-header-row h1 { font-size: 1.25rem !important; }
            .btn-refresh {
                width: auto !important;
                order: 0 !important;
            }
            .log-dashboard {
                grid-template-columns: 1fr 1fr; /* 모바일에서 2열 배치 */
                gap: 12px;
            }
            .stat-card {
                padding: 16px;
                border-radius: 16px;
            }
            .stat-value { font-size: 1.25rem; }
            .stat-sub { font-size: 0.7rem; }
            .log-filter-bar {
                flex-direction: column;
                gap: 12px;
            }
            .filter-group { width: 100%; }
            .filter-input { width: 100% !important; }
            
            /* 테이블 가로 스크롤 보장 */
            .admin-card {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .admin-table { min-width: 800px; }

            .ga-details-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>

        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="admin-header-row" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 800; color: #1e293b;">시스템 로그 센터</h1>
                        <p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">실시간 사용자 활동 데이터 분석</p>
                    </div>
                    <button class="btn-refresh-icon" onclick="loadLogs()" title="로그 새로고침">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                    </button>
                </div>

                <!-- [New] Log Insights Dashboard -->
                <div class="log-dashboard">
                    <div class="stat-card">
                        <div class="stat-label">실시간 접속 (GA4)</div>
                        <div id="ga-active-users" class="stat-value">...</div>
                        <div id="ga-active-users-err" class="stat-sub">현재 사이트 이용 중</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">오늘의 방문자 (GA4)</div>
                        <div id="ga-daily-users" class="stat-value">...</div>
                        <div class="stat-sub">오늘 총 활성 사용자</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">평균 체류 시간 (GA4)</div>
                        <div id="ga-avg-duration" class="stat-value">...</div>
                        <div class="stat-sub">오늘 세션 평균 체류</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">구매 전환율 (CVR)</div>
                        <div id="stat-conversion-rate" class="stat-value">0%</div>
                        <div class="stat-sub">로그인 대비 구매 비중</div>
                    </div>
                </div>

                <div style="margin-bottom: 25px; display: flex; justify-content: flex-end;">
                     <button class="btn-primary" style="background: #f8fafc; color: #3b82f6; border: 1px solid #3b82f6; padding: 8px 16px; font-size: 0.85rem;" onclick="window.open('https://analytics.google.com/analytics/web/', '_blank')">
                        Google Analytics 4 전체 리포트 보기
                    </button>
                </div>

                <div class="ga-details-row">
                    <div class="ga-detail-card">
                        <div class="ga-detail-title">🔥 오늘의 인기 페이지</div>
                        <div id="ga-top-pages" class="ga-list">
                            <div style="padding: 20px; text-align: center; color: #94a3b8;">데이터를 불러오고 있습니다...</div>
                        </div>
                    </div>
                    <div class="ga-detail-card">
                        <div class="ga-detail-title">🌍 유입/검색 경로</div>
                        <div id="ga-top-sources" class="ga-list">
                            <div style="padding: 20px; text-align: center; color: #94a3b8;">동기화 중...</div>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="log-filter-bar">
                    <div class="filter-group">
                        <label>검색</label>
                        <input type="text" id="logSearch" class="filter-input" placeholder="UID 또는 행동명 검색" style="width: 250px;">
                    </div>
                    <div class="filter-group">
                        <label>행동 분류</label>
                        <select id="actionFilter" class="filter-input">
                            <option value="">전체 로그</option>
                            <option value="PAGE_VIEW">페이지 조회</option>
                            <option value="LOGIN">로그인</option>
                            <option value="PURCHASE">구매 활동</option>
                            <option value="ERROR">오류/사고</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>플랫폼</label>
                        <select id="platformFilter" class="filter-input">
                            <option value="">모든 출처</option>
                            <option value="Cloudflare-Storefront">스토어프론트</option>
                            <option value="Cheese-Admin">관리자 센터</option>
                        </select>
                    </div>
                </div>

                <!-- Log Table -->
                <section class="admin-card">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 180px; cursor: pointer;" onclick="window.handleSort('timestamp')">발생 일시 <span id="sort-icon-timestamp">▼</span></th>
                                <th style="width: 120px; cursor: pointer;" onclick="window.handleSort('action')">행동 <span id="sort-icon-action"></span></th>
                                <th style="width: 150px; cursor: pointer;" onclick="window.handleSort('uid')">사용자(UID) <span id="sort-icon-uid"></span></th>
                                <th style="cursor: pointer;" onclick="window.handleSort('path')">경로/내용 <span id="sort-icon-path"></span></th>
                                <th style="width: 100px; cursor: pointer;" onclick="window.handleSort('platform')">플랫폼 <span id="sort-icon-platform"></span></th>
                                <th style="width: 80px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 100px;">로그 데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="pagination" class="pagination-container"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- Log Detail Modal -->
    <div id="logModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="logModalTitle">로그 상세 정보</h3>
                <button class="modal-close" onclick="closeLogModal()">&times;</button>
            </div>
            <div id="logModalContent" style="padding: 24px;">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <script src="./admin-common.js"></script>

    <script type="text/javascript">
        // Firebase SDK 삭제, Admin API fetch 사용
        async function safeFetchDB(payload) {
            if (!window.CHEESE_ADMIN_DB_API) throw new Error("API URL이 설정되지 않았습니다.");
            const res = await fetch(window.CHEESE_ADMIN_DB_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return data;
        }

        let allLogs = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // [New] 정렬 상태 관리
        let currentSortField = 'timestamp';
        let isAscending = false;

        window.handleSort = (field) => {
            if (currentSortField === field) {
                isAscending = !isAscending;
            } else {
                currentSortField = field;
                isAscending = (field === 'timestamp') ? false : true; // 시간은 최신순(내림차순)이 기본, 나머지는 오름차순 기본
            }
            
            // 모든 헤더 아이콘 초기화
            ['timestamp', 'action', 'uid', 'path', 'platform'].forEach(f => {
                const el = document.getElementById(`sort-icon-${f}`);
                if (el) el.innerText = '';
            });

            // 선택된 헤더 아이콘 업데이트
            const currentIcon = document.getElementById(`sort-icon-${field}`);
            if (currentIcon) currentIcon.innerText = isAscending ? '▲' : '▼';

            currentPage = 1; 
            renderLogTable();
        };

        async function loadLogs() {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 100px;">실시간 로그를 동기화 중입니다...</td></tr>';

            try {
                // 부하 방지를 위해 최근 1000건의 로그만 우선 로드
                const res = await safeFetchDB({ collection: "logs", orderByField: "timestamp", limitCount: 1000 });
                allLogs = res.data || [];

                // 요약 정보 업데이트 (유의미한 활용 제안)
                updateLogStats(allLogs);
                
                // [New] GA4 실시간 데이터 연동
                loadGA4Stats();

                renderLogTable();
            } catch (err) {
                console.error("Load Logs Error:", err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #ef4444; padding: 100px;">데이터 로드실패: ${err.message}</td></tr>`;
            }
        }

        // [New] 로그 유의미한 활용을 위한 통계 정보 업데이트 (고급화)
        function updateLogStats(logs) {
            const now = new Date();
            const min30 = 30 * 60 * 1000;
            const hour24 = 24 * 60 * 60 * 1000;

            let login30m = 0;
            let login24h = 0;
            let purchaseCount = 0;
            let userLoginCount = 0;

            logs.forEach(l => {
                if (!l.timestamp) return;
                const ts = new Date(l.timestamp).getTime();
                const diff = now.getTime() - ts;

                // 1. 로그인/가입 수 집계
                if (['user_login', 'user_signup'].includes(l.action)) {
                    userLoginCount++;
                    if (diff <= min30) login30m++;
                    if (diff <= hour24) login24h++;
                }

                // 2. 구매 성공 수 집계 (전환율용)
                if (l.action === 'purchase_success') {
                    purchaseCount++;
                }
            });

            // 3. 구매 전환율 (CVR) 계산
            const cvr = userLoginCount > 0 ? ((purchaseCount / userLoginCount) * 100).toFixed(1) : 0;

            // UI 업데이트
            if (document.getElementById('stat-conversion-rate')) {
                document.getElementById('stat-conversion-rate').innerText = `${cvr}%`;
            }
            
            console.log(`[분석 완료] 데이터 세트: ${logs.length}건`);
        }

        // [New] Google Analytics 4 실시간 데이터 로드
        async function loadGA4Stats() {
            // 여기에 사용자님의 Property ID를 입력하세요. (예: "123456789")
            const PROPERTY_ID = "528248600";
            const API_URL = "https://asia-northeast3-cheese-history-platform.cloudfunctions.net/getAnalyticsSummary";

            if (PROPERTY_ID.includes("PASTE_YOUR")) {
                console.warn("[GA4] Property ID가 설정되지 않았습니다.");
                return;
            }

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ propertyId: PROPERTY_ID })
                });
                const json = await res.json();

                if (json.ok) {
                    document.getElementById('ga-active-users').innerText = `${json.activeUsers}명`;
                    document.getElementById('ga-daily-users').innerText = `${json.dailyUsers}명`;
                    
                    const totalSec = Math.round(json.avgDuration);
                    const m = Math.floor(totalSec / 60);
                    const s = totalSec % 60;
                    document.getElementById('ga-avg-duration').innerText = m > 0 ? `${m}분 ${s}초` : `${s}초`;
                    
                    document.getElementById('ga-active-users-err').innerText = "현재 사이트 이용 중";
                    document.getElementById('ga-active-users-err').style.color = "#f97316";

                    // [추가] 인기 페이지 리스트 렌더링
                    const pageList = document.getElementById('ga-top-pages');
                    pageList.innerHTML = (json.topPages || []).map(p => `
                        <div class="ga-list-item">
                            <span class="ga-label" title="${p.path}">${p.path}</span>
                            <span class="ga-count">${p.views}회</span>
                        </div>
                    `).join('') || '<div style="padding: 20px; text-align: center; color: #94a3b8;">오늘 기록이 아직 없습니다.</div>';

                    // [추가] 유입 경로 리스트 렌더링
                    const sourceList = document.getElementById('ga-top-sources');
                    sourceList.innerHTML = (json.topSources || []).map(s => `
                        <div class="ga-list-item">
                            <span class="ga-label">${s.source}</span>
                            <span class="ga-count">${s.users}명</span>
                        </div>
                    `).join('') || '<div style="padding: 20px; text-align: center; color: #94a3b8;">유입 데이터 분석 중...</div>';

                } else {
                    throw new Error(json.error || "실패");
                }
            } catch (err) {
                console.error("[GA4 Sync Error]", err);
                document.getElementById('ga-active-users-err').innerText = `⚠️ 연결 실패: ${err.message}`;
                document.getElementById('ga-active-users-err').style.color = "#ef4444";
            }
        }

        function renderLogTable() {
            const search = document.getElementById('logSearch').value.toLowerCase();
            const action = document.getElementById('actionFilter').value;
            const platform = document.getElementById('platformFilter').value;

            const filtered = allLogs.filter(l => {
                const logAction = (l.action || '').toLowerCase();
                const filterAction = action.toLowerCase();
                
                const matchSearch = l.uid?.toLowerCase().includes(search) || logAction.includes(search);
                const matchAction = !action || logAction.includes(filterAction) || (filterAction === 'purchase' && logAction.includes('purchase'));
                const matchPlatform = !platform || l.platform === platform;
                return matchSearch && matchAction && matchPlatform;
            });

            // [New] 정렬 로직 적용
            filtered.sort((a, b) => {
                let vA = a[currentSortField] || '';
                let vB = b[currentSortField] || '';

                // 대소문자 무시 정렬
                if (typeof vA === 'string') vA = vA.toLowerCase();
                if (typeof vB === 'string') vB = vB.toLowerCase();

                if (vA < vB) return isAscending ? -1 : 1;
                if (vA > vB) return isAscending ? 1 : -1;
                return 0;
            });

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filtered.slice(startIndex, startIndex + itemsPerPage);

            const tbody = document.getElementById('logTableBody');
            if (paginatedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 100px;">조건에 맞는 로그가 없습니다.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = paginatedData.map(l => {
                const date = l.timestamp ? getKSTDateTimeString(new Date(l.timestamp)) : '-';
                const typeClass = getLogTypeClass(l.action);
                
                return `
                    <tr>
                        <td><span style="color: #64748b;">${date}</span></td>
                        <td><span class="log-type-badge ${typeClass}">${l.action}</span></td>
                        <td class="uid-text">${l.uid || 'Anonymous'}</td>
                        <td>
                            <div class="path-text">${l.path || '-'}</div>
                            <div style="font-weight: 600; font-size: 0.8rem; margin-top: 4px;">${formatSummary(l)}</div>
                        </td>
                        <td><span style="font-size: 0.7rem; color: #94a3b8;">${l.platform || '-'}</span></td>
                        <td><button class="btn-detail" onclick="viewLogDetail('${l.id}')">정보</button></td>
                    </tr>
                `;
            }).join('');

            renderPagination(totalItems);
        }

        function getLogTypeClass(action) {
            if (!action) return 'type-info';
            const a = action.toUpperCase();
            if (a.includes('ERROR') || a.includes('FAIL')) return 'type-error';
            if (a.includes('PURCHASE') || a.includes('LOGIN') || a.includes('SUCCESS')) return 'type-success';
            if (a.includes('LOGOUT') || a.includes('DELETE') || a.includes('UPDATE')) return 'type-warning';
            return 'type-info';
        }

        function formatSummary(log) {
            if (log.details?.title) return `상품: ${log.details.title}`;
            if (log.details?.message) return log.details.message;
            if (log.action === 'PAGE_VIEW') return '페이지 탐색 중';
            return '-';
        }

        function renderPagination(totalItems) {
            const paginationEl = document.getElementById('pagination');
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>이전</button>`;
            
            // 현재 페이지 전후 2개씩만 표시 (데이터가 많을 경우 대비)
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }

            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>다음</button>`;
            paginationEl.innerHTML = html;
        }

        window.changePage = (page) => {
            currentPage = page;
            renderLogTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.viewLogDetail = (id) => {
            const log = allLogs.find(l => l.id === id);
            if (!log) return;

            const content = document.getElementById('logModalContent');
            const date = log.timestamp ? new Date(log.timestamp).toLocaleString() : '-';
            
            content.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">발생 시각</div>
                    <div class="detail-value">${date}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">사용자 UID</div>
                    <div class="detail-value">${log.uid || 'Anonymous'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">브라우저 정보</div>
                    <div class="detail-value">${log.userAgent || '-'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">유입 경로</div>
                    <div class="detail-value">${log.referrer || '직접 유입'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">접속 경로</div>
                    <div class="detail-value">${log.path || '-'}</div>
                </div>
                <div style="margin-top: 25px;">
                    <h5 style="margin: 0 0 10px; font-size: 0.9rem;">Raw JSON Data</h5>
                    <pre class="raw-json">${JSON.stringify(log.details || {}, null, 2)}</pre>
                </div>
            `;

            document.getElementById('logModal').classList.add('show');
        };

        window.closeLogModal = () => {
            document.getElementById('logModal').classList.remove('show');
        };

        // Event Listeners
        document.getElementById('logSearch').addEventListener('input', () => { currentPage = 1; renderLogTable(); });
        document.getElementById('actionFilter').addEventListener('change', () => { currentPage = 1; renderLogTable(); });
        document.getElementById('platformFilter').addEventListener('change', () => { currentPage = 1; renderLogTable(); });

        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'System', subtitle: '실시간 로그' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'system_logs' });
            loadLogs();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>내 정보 관리 - Cheese Lab</title>
  
  <link rel="stylesheet" href="../admin.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <style>
    /* 프로필 전용 세련된 스타일 추가 */
    .profile-card {
      max-width: 500px;
      margin: 50px auto;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }
    .profile-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .profile-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a202c;
      margin-bottom: 8px;
    }
    .profile-header p {
      color: #718096;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 8px;
      margin-left: 2px;
    }
    .styled-input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .styled-input:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .styled-input:disabled {
      background: #f8fafc;
      color: #94a3b8;
      cursor: not-allowed;
    }
    .btn-submit-profile {
      width: 100%;
      padding: 14px;
      background: #1a202c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .btn-submit-profile:hover {
      background: #2d3748;
    }
    .info-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #edf2f7;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #4a5568;
      margin-top: 10px;
    }
  </style>

  <script>
    // ✅ API 주소 (V3.0 통합본 주소)
    window.CHEESE_LOGIN_API = "https://script.google.com/macros/s/AKfycbwLtN5N5ndt80qRnGPCkVIaus9YbyAFRPWbhfU5tyFOdULUmm8CPrV6ffngEH4r8Z_E/exec"; 
    
    const currId = sessionStorage.getItem("cheese_admin_login_id");
    const currName = sessionStorage.getItem("cheese_admin_display_name");
    const currEmpNo = sessionStorage.getItem("cheese_admin_emp_no");
    const currRole = sessionStorage.getItem("cheese_admin_role");
  </script>
  <script src="../admin-common.js" defer></script>
</head>
<body>

<div class="admin-shell">
  <div id="admin-header-slot"></div>
  <main class="admin-main">
    <aside id="admin-menu-slot" class="admin-sidebar"></aside>
    
    <section class="admin-content">
      <div class="profile-card">
        <div class="profile-header">
          <h2>내 정보 설정</h2>
          <p>계정 보안을 위해 정보를 관리해 주세요.</p>
          <div class="info-badge" id="role-badge">로딩 중...</div>
        </div>
        
        <div class="form-group">
          <label>사용자 정보</label>
          <input type="text" id="disp-info" class="styled-input" disabled>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <div class="form-group">
          <label>현재 비밀번호</label>
          <input type="password" id="old-pw" class="styled-input" placeholder="현재 사용 중인 비밀번호">
        </div>

        <div class="form-group">
          <label>새 비밀번호</label>
          <input type="password" id="new-pw" class="styled-input" placeholder="최소 4자리 이상">
        </div>

        <div class="form-group">
          <label>새 비밀번호 확인</label>
          <input type="password" id="confirm-pw" class="styled-input" placeholder="한 번 더 입력해 주세요">
        </div>

        <button onclick="updatePassword()" class="btn-submit-profile">비밀번호 변경 저장</button>
      </div>
    </section>
  </main>
</div>

<script>
  // 정보 출력
  if(currId) {
    document.getElementById('disp-info').value = `${currName} (${currId} / ${currEmpNo})`;
    document.getElementById('role-badge').textContent = `권한 레벨: ${currRole}`;
  }

  async function updatePassword() {
    const oldPw = document.getElementById('old-pw').value;
    const newPw = document.getElementById('new-pw').value;
    const confirmPw = document.getElementById('confirm-pw').value;

    if(!oldPw || !newPw || !confirmPw) return alert("빈칸을 모두 채워주세요.");
    if(newPw !== confirmPw) return alert("새 비밀번호 확인이 일치하지 않습니다.");
    if(newPw.length < 4) return alert("비밀번호는 최소 4자 이상이어야 합니다.");

    if(!confirm("비밀번호를 변경하면 로그아웃됩니다. 계속하시겠습니까?")) return;

    const payload = {
      mode: 'changePassword', // 🚨 서버와 대소문자 일치 확인됨
      loginId: currId,
      oldPassword: oldPw,
      newPassword: newPw
    };

    try {
      const res = await fetch(window.CHEESE_LOGIN_API, {
        method: 'POST',
        // 🚨 텍스트 형식으로 보내 서버에서 안전하게 JSON으로 읽게 함
        body: JSON.stringify(payload)
      });
      const json = await res.json();

      if(json.ok) {
        alert("비밀번호가 안전하게 변경되었습니다. 다시 로그인해 주세요.");
        sessionStorage.clear();
        location.href = "../index.html";
      } else {
        alert("실패: " + json.message);
      }
    } catch(e) {
      alert("네트워크 오류가 발생했습니다.");
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>대시보드 · Cheese Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./admin.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* =========================================
       Modern Dashboard Specific Styles (Bento Grid)
    ========================================= */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .dash-title .t {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .dash-title .s {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 0.25rem;
      font-weight: 500;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    /* Bento Grid Layout */
    .bento-layout {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.5rem;
      align-items: start;
    }

    .bento-main {
      grid-column: span 8;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .bento-side {
      grid-column: span 4;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Custom Card Enhancements */
    .card {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      padding: 1.5rem;
      border-radius: 1rem;
      background: #fff;
    }

    .card-header {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #0f172a;
      margin: 0;
    }

    .card-link {
      font-size: 0.8rem;
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .card-link:hover {
      color: var(--primary);
    }

    /* Feed List (공지사항, 반려함 등) */
    .feed-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .feed-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.75rem;
      border-radius: 0.75rem;
      background: #f8fafc;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .feed-item:hover {
      background: #fff;
      border-color: var(--border-color, #e2e8f0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transform: translateY(-1px);
    }

    .feed-content {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .feed-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-meta {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* Tags */
    .tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag.warn {
      background: #fef3c7;
      color: #d97706;
    }

    .tag.bad {
      background: #fee2e2;
      color: #dc2626;
    }

    .tag.info {
      background: #e0e7ff;
      color: #4f46e5;
    }

    /* 🚀 [NEW] Dashboard Overview Goal Cards (D-Day & Progress) */
    .big-goal-card {
      padding: 1.25rem;
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 1rem;
      margin-bottom: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .big-goal-card:hover {
      border-color: var(--primary, #3b82f6);
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1), 0 4px 6px -2px rgba(59, 130, 246, 0.05);
      transform: translateY(-2px);
    }

    .bgc-info {
      flex: 1;
      min-width: 0;
      padding-right: 1.5rem;
    }

    .bgc-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 0.7rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .bgc-title::before {
      content: '🚀';
      font-size: 1.1rem;
    }

    .bgc-progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .bgc-bar-bg {
      flex: 1;
      height: 8px;
      background: #f1f5f9;
      border-radius: 999px;
      overflow: hidden;
    }

    .bgc-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s ease-out;
    }

    .bgc-percent {
      font-size: 0.85rem;
      font-weight: 800;
      color: #64748b;
      width: 3rem;
      text-align: right;
      letter-spacing: -0.02em;
    }

    .bgc-dday {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 68px;
      height: 68px;
      border-radius: 14px;
      background: #eff6ff;
      color: #2563eb;
      flex-shrink: 0;
      border: 1px solid #bfdbfe;
    }

    .bgc-dday .d {
      font-size: 1.15rem;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .bgc-dday .l {
      font-size: 0.65rem;
      font-weight: 700;
      opacity: 0.85;
      margin-top: 2px;
    }

    .bgc-dday.urgent {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }

    /* 마감 임박/지연 */
    .bgc-dday.done {
      background: #f0fdf4;
      color: #16a34a;
      border-color: #bbf7d0;
    }

    /* 100% 완료 */

    /* Idea Cards */
    .idea-card {
      padding: 1rem;
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .idea-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #a855f7;
    }

    .idea-card:hover {
      transform: translateX(2px);
      border-color: #d8b4fe;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.08);
    }

    .idea-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      color: #1e293b;
    }

    .idea-desc {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Skeleton Loading */
    .shimmer {
      background: #f1f5f9;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .shimmer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
      animation: load 1.2s infinite;
    }

    @keyframes load {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* 🚀 Floating Action Button (FAB) */
    .fab-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 56px;
      height: 56px;
      background: var(--primary, #3b82f6);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4), 0 4px 6px -2px rgba(59, 130, 246, 0.2);
      border: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
      z-index: 999;
    }

    .fab-btn:hover {
      transform: translateY(-4px) scale(1.05);
      background: #2563eb;
    }

    .fab-btn:active {
      transform: translateY(0) scale(0.95);
    }

    /* 🚀 Quick Add Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .modal-card {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 1.25rem;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      transform: translateY(20px);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: 1rem;
    }

    .modal-overlay.show .modal-card {
      transform: translateY(0);
    }

    .modal-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .modal-card-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
    }

    .modal-close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
      padding: 0;
      line-height: 1;
    }

    .modal-close-btn:hover {
      color: #ef4444;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 0.4rem;
    }

    .form-control {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary, #3b82f6);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 90px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .btn-modal {
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-cancel:hover {
      background: #e2e8f0;
    }

    .btn-submit {
      background: var(--primary, #3b82f6);
      color: #fff;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .btn-submit:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    @media (max-width: 1024px) {

      .bento-main,
      .bento-side {
        grid-column: span 12;
      }
    }
  </style>
</head>

<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>

    <div class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>

      <main style="position: relative;">
        <header class="dash-header">
          <div class="dash-title">
            <h1 class="t">대시보드</h1>
            <p class="s">오늘의 프로젝트 진행 상황과 아이디어를 확인하세요.</p>
          </div>
          <div class="status-pill">
            <span style="display:inline-block; width:8px; height:8px; background:#3b82f6; border-radius:50%;"></span>
            <span>Update: 2026.02.14 17:45</span>
          </div>
        </header>

        <section class="bento-layout">
          <div class="bento-main">
            <div class="card" style="padding: 0; overflow: hidden;">
              <div class="card-header" style="padding: 1.5rem 1.5rem 0.5rem;">
                <h2 class="card-title">🗂 프로젝트 현황</h2>
                <a href="./todo_manage.html" class="card-link">전체 관리 →</a>
              </div>
              <div style="padding: 0 1.5rem 1.5rem;" id="goalTreeContainer">
                <div class="shimmer" style="height: 100px; width: 100%; margin-bottom: 1rem; border-radius: 16px;">
                </div>
                <div class="shimmer" style="height: 100px; width: 100%; border-radius: 16px;"></div>
              </div>
            </div>
          </div>

          <div class="bento-side">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">📌 공지사항</h2>
                <a href="./board.html" class="card-link">더보기 →</a>
              </div>
              <ul class="feed-list" id="noticeList">
                <li class="feed-item">
                  <div class="shimmer" style="height:40px; width:100%;"></div>
                </li>
              </ul>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 class="card-title">💡 아이디어 뱅크</h2>
                <a href="./todo_manage.html" class="card-link">전체보기 →</a>
              </div>
              <div id="ideaBoxContainer">
                <div class="shimmer" style="height:80px; width:100%; margin-bottom:0.75rem;"></div>
                <div class="shimmer" style="height:80px; width:100%;"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 class="card-title">🚨 반려된 요청</h2>
                <a href="./my-requests.html?filter=rejected" class="card-link">내역 보기 →</a>
              </div>
              <ul class="feed-list" id="myRejectedList">
                <li style="font-size:0.85rem; color:var(--text-sub); padding:0.5rem 0;">데이터 로딩 중...</li>
              </ul>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <button class="fab-btn" onclick="openQuickModal()" title="빠른 추가 (아이디어/버그/할일)">
    ＋
  </button>

  <div class="modal-overlay" id="quickAddModal">
    <div class="modal-card">
      <div class="modal-card-header">
        <h3 class="modal-card-title">✨ 빠른 기록 추가</h3>
        <button class="modal-close-btn" onclick="closeQuickModal()">×</button>
      </div>
      <div class="form-group">
        <label>유형</label>
        <select id="qaType" class="form-control">
          <option value="아이디어">💡 아이디어</option>
          <option value="버그">🐛 버그 수정</option>
          <option value="단순작업">✅ 일반 할 일</option>
        </select>
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="qaTitle" class="form-control" placeholder="어떤 생각이 떠오르셨나요?" autocomplete="off">
      </div>
      <div class="form-group">
        <label>상세 내용 (선택)</label>
        <textarea id="qaDetail" class="form-control" placeholder="구체적인 내용을 자유롭게 적어주세요."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" onclick="closeQuickModal()">취소</button>
        <button class="btn-modal btn-submit" id="btnSubmitQuickAdd" onclick="submitQuickAdd()">저장하기</button>
      </div>
    </div>
  </div>

  <script src="./admin-common.js"></script>
  <script>
    const DASHBOARD_API = 'https://script.google.com/macros/s/AKfycbyE0uUpF2VdePr6AC6VcK7UOI4y5zvkUfMHlGHEiNKiGiiAjSzr172140GtV5MpiwzaSg/exec';
    const TODO_API = "https://script.google.com/macros/s/AKfycbwn1TrLeSIAe570LRWMJxRzx88u3LQYF38Kme9WhMd-YQsrMsSggrNy3I_2SGKGXTpS/exec";

    function escapeHtml(s) { return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", "&#039;"); }

    function mountShell() {
      if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'dashboard', subtitle: '통합 대시보드' });
      if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'dashboard' });
    }

    /* 🚀 빠른 추가(Quick Add) 자바스크립트 로직 */
    function openQuickModal() {
      document.getElementById('quickAddModal').classList.add('show');
      setTimeout(() => document.getElementById('qaTitle').focus(), 100);
    }

    function closeQuickModal() {
      document.getElementById('quickAddModal').classList.remove('show');
      document.getElementById('qaTitle').value = '';
      document.getElementById('qaDetail').value = '';
      document.getElementById('qaType').value = '아이디어';
    }

    async function submitQuickAdd() {
      const type = document.getElementById('qaType').value;
      const title = document.getElementById('qaTitle').value.trim();
      const detail = document.getElementById('qaDetail').value.trim();

      if (!title) {
        alert('제목을 입력해주세요!');
        document.getElementById('qaTitle').focus();
        return;
      }

      const btn = document.getElementById('btnSubmitQuickAdd');
      btn.innerHTML = '저장 중...';
      btn.disabled = true;

      try {
        const payload = {
          mode: "addItem",
          type: type,
          title: title,
          detail: detail,
          status: "대기",
          connectedId: ""
        };

        const res = await fetch(TODO_API, { method: "POST", body: JSON.stringify(payload) });
        const json = await res.json();

        if (json.result === "success") {
          closeQuickModal();
          loadDashboard();
        } else { alert('등록 실패: ' + (json.msg || '서버 오류')); }
      } catch (e) {
        alert('통신 오류가 발생했습니다.\n\n' + e.message);
      } finally {
        btn.innerHTML = '저장하기';
        btn.disabled = false;
      }
    }

    // 공지사항 렌더링
    function renderNotices(items) {
      const ul = document.getElementById('noticeList');
      ul.innerHTML = '';
      if (!items || !items.length) { ul.innerHTML = '<li style=\"font-size:0.85rem; color:#64748b;\">등록된 공지사항이 없습니다.</li>'; return; }
      items.slice(0, 3).forEach(it => {
        const title = it.title || '';
        const date = it.date || (it.updatedAt ? String(it.updatedAt).slice(0, 10) : '');
        const level = (it.level || '').toLowerCase();

        let tagHtml = '<span class=\"tag info\">안내</span>';
        if (level === 'danger') tagHtml = '<span class=\"tag bad\">필독</span>';
        if (level === 'warn') tagHtml = '<span class=\"tag warn\">중요</span>';

        const li = document.createElement('li');
        li.className = 'feed-item';
        if (it.noticeId) { li.style.cursor = 'pointer'; li.onclick = () => location.href = `./notice.html?id=${it.noticeId}`; }

        li.innerHTML = `
          <div class=\"feed-content\">
            <div class=\"feed-title\">${escapeHtml(title)}</div>
            <div class=\"feed-meta\">${escapeHtml(date.replace(/-/g, '.'))}</div>
          </div>
          <div>${tagHtml}</div>
        `;
        ul.appendChild(li);
      });
    }

    // 반려 리스트 렌더링
    function renderMyRejected(items) {
      const ul = document.getElementById('myRejectedList');
      ul.innerHTML = '';
      if (!items || !items.length) { ul.innerHTML = '<li style=\"font-size:0.85rem; color:#64748b;\">최근 반려된 결재/요청이 없습니다. 🎉</li>'; return; }
      items.slice(0, 3).forEach(it => {
        const li = document.createElement('li');
        li.className = 'feed-item';
        li.innerHTML = `
          <div class=\"feed-content\">
            <div class=\"feed-title\">${escapeHtml(it.title)}</div>
            <div class=\"feed-meta\">${escapeHtml(it.date || '')}</div>
          </div>
          <div><span class=\"tag bad\">반려</span></div>
        `;
        ul.appendChild(li);
      });
    }

    // 🚀 [NEW] 날짜로부터 D-Day 정보를 계산하는 유틸 함수
    function getDdayInfo(dateStr) {
      if (!dateStr) return { text: '-', label: '기한 없음', status: 'normal' };

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const target = new Date(dateStr);
      target.setHours(0, 0, 0, 0);

      const diffDays = Math.ceil((target.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return { text: 'D-Day', label: '오늘 마감', status: 'urgent' };
      if (diffDays < 0) return { text: `D+${Math.abs(diffDays)}`, label: '지연됨', status: 'urgent' };
      if (diffDays <= 3) return { text: `D-${diffDays}`, label: '임박함', status: 'urgent' };

      return { text: `D-${diffDays}`, label: '남음', status: 'normal' };
    }

    // 🚀 [NEW] 직관적인 D-Day & 프로그레스 바 카드 렌더링
    function renderGoalTreeWidget(goals, tasks) {
      const root = document.getElementById('goalTreeContainer');
      root.innerHTML = "";

      // 완료된 항목을 제외한 '큰 목표'만 필터링
      const bigGoals = goals.filter(g => g['유형'] === '큰 목표' && g['상태'] !== '완료');

      if (bigGoals.length === 0) {
        root.innerHTML = '<div style="font-size:0.95rem; color:#64748b; text-align:center; padding: 3rem 0; font-weight:600;">현재 진행 중인 프로젝트가 없습니다. 🎉</div>';
        return;
      }

      bigGoals.forEach(bg => {
        // 1. 해당 큰 목표에 속한 중간 목표 ID 찾기
        const midGoalIds = goals.filter(m => m['상위ID'] === bg.ID).map(m => m.ID);

        // 2. 해당 중간 목표들에 속한 실제 할 일(Task) 찾기 (아이디어 제외)
        const relatedTasks = tasks.filter(t => midGoalIds.some(id => String(t['연결_중간목표ID']).includes(id)) && t['유형'] !== '아이디어');

        // 3. 진척률(Progress) 계산
        const totalTasks = relatedTasks.length;
        const completedTasks = relatedTasks.filter(t => t['상태'] === '완료').length;
        const progressPercent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

        // 4. D-Day 정보 가져오기
        const ddayInfo = getDdayInfo(bg['마감일']);

        // 진척률 100% 달성 시 D-Day 컬러 무효화하고 초록색(done)으로 표시
        if (progressPercent === 100) ddayInfo.status = 'done';

        // 5. DOM 생성 (클릭 시 전체 관리로 이동)
        const card = document.createElement('div');
        card.className = "big-goal-card";
        card.onclick = () => location.href = './todo_manage.html';

        const barColor = progressPercent === 100 ? '#10b981' : 'var(--primary, #3b82f6)';

        card.innerHTML = `
            <div class="bgc-info">
                <div class="bgc-title">${escapeHtml(bg['제목'])}</div>
                <div class="bgc-progress-wrap">
                    <div class="bgc-bar-bg">
                        <div class="bgc-bar-fill" style="width: ${progressPercent}%; background: ${barColor};"></div>
                    </div>
                    <div class="bgc-percent">${progressPercent}%</div>
                </div>
            </div>
            <div class="bgc-dday ${ddayInfo.status}">
                <div class="d">${ddayInfo.text}</div>
                <div class="l">${ddayInfo.label}</div>
            </div>
        `;

        root.appendChild(card);
      });
    }

    function renderIdeaWidget(tasks) {
      const root = document.getElementById('ideaBoxContainer');
      root.innerHTML = "";

      const ideas = tasks.filter(t => t['유형'] === '아이디어' && t['상태'] !== '완료');
      if (ideas.length === 0) {
        root.innerHTML = '<div style=\"font-size:0.85rem; color:#64748b;\">등록된 아이디어가 없습니다.</div>';
        return;
      }

      ideas.reverse().slice(0, 3).forEach(item => {
        const card = document.createElement('div');
        card.className = "idea-card";
        const plainText = (item['상세내용'] || "").replace(/<[^>]*>?/gm, '').slice(0, 60);

        card.innerHTML = `
            <div class=\"idea-title\">${escapeHtml(item['제목'])}</div>
            <div class=\"idea-desc\">${escapeHtml(plainText) || '내용 없음...'}</div>
        `;
        card.onclick = () => location.href = './todo_manage.html';
        root.appendChild(card);
      });
    }

    async function loadDashboard() {
      try {
        const res = await fetch(DASHBOARD_API + '?mode=listAnnouncements&limit=3');
        const json = await res.json();
        if (json && json.ok && Array.isArray(json.items)) {
          renderNotices(json.items.map(x => ({ title: x.title, date: x.createdAt?.slice(0, 10), level: x.level, noticeId: x.noticeId })));
        } else { renderNotices([]); }
      } catch (e) { console.warn('공지 로드 실패', e); renderNotices([]); }

      try {
        const res = await fetch(TODO_API + '?mode=getAllData');
        const json = await res.json();
        if (json.result === "success") {
          // 변경된 오버뷰 위젯으로 렌더링 호출
          renderGoalTreeWidget(json.goals || [], json.tasks || []);
          renderIdeaWidget(json.tasks || []);
        }
      } catch (e) {
        console.warn('할일 데이터 로드 실패', e);
        document.getElementById('goalTreeContainer').innerHTML = '<div style=\"color:#ef4444; font-size:0.9rem; padding:1rem;\">데이터 로드에 실패했습니다.</div>';
      }
      renderMyRejected([]);
    }

    (function init() {
      mountShell();
      loadDashboard();
    })();
  </script>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>쿠폰 관리 센터 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./admin.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .coupon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .coupon-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        .coupon-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .coupon-active::after {
            content: "ACTIVE";
            position: absolute;
            top: 15px;
            right: -25px;
            background: #10b981;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 30px;
            transform: rotate(45deg);
        }

        .coupon-expired::after {
            content: "EXPIRED";
            position: absolute;
            top: 15px;
            right: -25px;
            background: #ef4444;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 30px;
            transform: rotate(45deg);
        }

        .coupon-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .coupon-icon { font-size: 1.5rem; }
        .coupon-code { font-size: 1.2rem; font-weight: 900; color: #1e293b; font-family: monospace; }
        
        .coupon-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #3b82f6;
            margin-bottom: 8px;
        }

        .coupon-desc { font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-bottom: 20px; }

        .coupon-meta {
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .meta-item { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .meta-label { font-weight: 500; }
        .meta-value { font-weight: 700; color: #4b5563; }

        .coupon-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-coupon {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-deactivate { background: #fee2e2; color: #991b1b; }
        .btn-deactivate:hover { background: #fecaca; }
        .btn-delete { background: #f1f5f9; color: #64748b; }
        .btn-delete:hover { background: #e2e8f0; }

        /* Form styling */
        .coupon-form-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #3b82f6;
            margin-bottom: 40px;
            display: none;
        }
        .coupon-form-card.show { display: block; animation: slideDown 0.3s ease-out; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-item input:focus, .form-item select:focus, .form-item textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* Step-by-Step Styling */
        .form-steps-wrapper { display: flex; flex-direction: column; gap: 30px; }
        .form-step {
            border: 1px solid #f1f5f9; border-radius: 16px; padding: 24px;
            background: #f8fafc; transition: 0.3s;
        }
        .form-step:hover { border-color: #cbd5e1; background: #fff; }
        .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        .step-number {
            width: 28px; height: 28px; background: #1e293b; color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 800;
        }
        .step-title { font-size: 1rem; font-weight: 800; color: #1e293b; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .styled-input {
            padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0;
            outline: none; font-size: 0.9rem; background: #fff; width: 100%; box-sizing: border-box;
        }

        /* Modal for Product Selector */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.show { display: flex; }
        .product-selector-modal {
            background: #fff; border-radius: 20px; width: 500px; max-width: 90%; max-height: 80vh;
            padding: 30px; display: flex; flex-direction: column; gap: 20px;
        }
        .product-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .product-item {
            padding: 12px; border: 1px solid #f1f5f9; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .product-item:hover { background: #f8fafc; border-color: #3b82f6; }
        .product-item .name { font-weight: 700; font-size: 0.9rem; color: #1e293b; }
        .product-item .id { font-size: 0.75rem; color: #94a3b8; font-family: monospace; }
        
        .btn-inline {
            padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer;
            white-space: nowrap;
        }
        .btn-inline:hover { background: #f1f5f9; color: #1e293b; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
            .coupon-form-card { padding: 20px; border-width: 1px; }
            .form-step { padding: 15px; }
            .step-header { margin-bottom: 15px; padding-bottom: 10px; }
            .step-title { font-size: 0.95rem; }
            .coupon-grid { grid-template-columns: 1fr; }
            
            .coupon-card { padding: 20px; }
            .coupon-value { font-size: 1.3rem; }
            
            /* 수동 입력 버튼 텍스트가 잘리지 않게 조정 */
            .btn-inline { padding: 8px 10px; font-size: 0.75rem; }
            
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>

        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 800;">할인 쿠폰 관리</h1>
                        <p style="font-size: 0.85rem; color: #64748b;">신규 쿠폰을 생성하거나 기존 쿠폰의 혜택을 조정합니다.</p>
                    </div>
                    <button class="btn-primary" onclick="toggleCouponForm()" style="padding: 12px 24px; display: flex; align-items: center; gap: 8px;">
                        <span>+</span> 신규 쿠폰 마스터 생성
                    </button>
                </div>

                <!-- Create Coupon Form -->
                <div id="couponForm" class="coupon-form-card">
                    <h3 style="margin-top: 0; margin-bottom: 30px; display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 1.5rem;">🏗️</span> 쿠폰 마스터 설계 및 발행
                    </h3>
                    
                    <div class="form-steps-wrapper">
                        <!-- Step 1 -->
                        <div class="form-step">
                            <div class="step-header">
                                <span class="step-number">1</span>
                                <span class="step-title">핵심 혜택 및 코드 설정</span>
                            </div>
                            <div class="form-grid">
                                <div class="form-item">
                                    <label>쿠폰 코드 (영문/숫자 고유값)</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" id="fcCode" class="styled-input" placeholder="예: CHEESE20" maxlength="20">
                                        <button class="btn-inline" onclick="generateRandomCode()">✨ 자동 생성</button>
                                    </div>
                                </div>
                                <div class="form-item">
                                    <label>쿠폰 종류</label>
                                    <select id="fcType" class="styled-input">
                                        <option value="percent">퍼센트 할인 (%)</option>
                                        <option value="fixed">고정 금액 할인 (원)</option>
                                    </select>
                                </div>
                                <div class="form-item">
                                    <label>할인 값</label>
                                    <input type="number" id="fcValue" class="styled-input" placeholder="예: 20 또는 5000">
                                </div>
                                <div class="form-item">
                                    <label>최소 주문금액</label>
                                    <input type="number" id="fcMinAmount" class="styled-input" value="0">
                                </div>
                            </div>
                        </div>

                        <!-- Step 2 -->
                        <div class="form-step">
                            <div class="step-header">
                                <span class="step-number">2</span>
                                <span class="step-title">발행 유형 및 타겟팅 설정</span>
                            </div>
                            <div class="form-grid">
                                <div class="form-item">
                                    <label>발행 유형</label>
                                    <select id="fcIssueType" class="styled-input">
                                        <option value="public">공용 코드 (직접 입력)</option>
                                        <option value="download">다운로드형 (상품페이지 노출)</option>
                                        <option value="auto">자동 지급 (가입/이벤트)</option>
                                    </select>
                                </div>
                                <div class="form-item">
                                    <label>발급 대상 조건 (Targeting)</label>
                                    <select id="fcTargetCriteria" class="styled-input">
                                        <option value="everyone">모든 사용자 (로그인 시)</option>
                                        <option value="purchased_product">특정 상품 주문 경험자</option>
                                        <option value="purchased_external">외부 사이트 구매자 (주문정보)</option>
                                        <option value="new_user">신규 가입자 (첫 주문 전)</option>
                                    </select>
                                </div>
                                <div class="form-item" id="fcTargetRow" style="display: none;">
                                    <label id="fcTargetLabel">대상 상품 ID / 조건값</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" id="fcTargetValue" class="styled-input" placeholder="예: prod_usa_001">
                                        <button class="btn-inline" id="fcTargetSearchBtn" onclick="openProductSelector('fcTargetValue')">🔍 검색</button>
                                    </div>
                                </div>
                                <div class="form-item" id="fcTargetListRow" style="display: none; grid-column: span 2;">
                                    <label>외부 주문 정보 리스트 (주문번호 | 주문일시)</label>
                                    <textarea id="fcTargetList" class="styled-input" style="height: 100px; resize: vertical;" placeholder="#7159355 | 26.03.14&#10;#7159356 | 26.03.15"></textarea>
                                    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 5px;">외부 사이트(크몽 등) 데이터를 한 줄에 하나씩 입력해 주세요.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Step 3 -->
                        <div class="form-step">
                            <div class="step-header">
                                <span class="step-number">3</span>
                                <span class="step-title">유효 기간 및 사용 한도</span>
                            </div>
                            <div class="form-grid">
                                <div class="form-item">
                                    <label>만료일 (유효 기간)</label>
                                    <input type="date" id="fcExpiry" class="styled-input">
                                </div>
                                <div class="form-item">
                                    <label>전체 선착순 수량 (총 발행 수량)</label>
                                    <input type="number" id="fcLimit" class="styled-input" value="100">
                                    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 5px;">전체 발급 가능 총량 (선착순 수량)</p>
                                </div>
                                <div class="form-item">
                                    <label>1인당 사용 가능 횟수</label>
                                    <input type="number" id="fcPerUser" class="styled-input" value="1">
                                    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 5px;">한 명의 유저가 최대 몇 번 사용할 수 있는지 설정 (기본 1회)</p>
                                </div>
                            </div>
                        </div>

                        <!-- Step 4 -->
                        <div class="form-step">
                            <div class="step-header">
                                <span class="step-number">4</span>
                                <span class="step-title">상품 적용 범위 설정</span>
                            </div>
                            <div class="form-grid">
                                <div class="form-item" style="grid-column: span 2;">
                                    <label>쿠폰이 적용될 상품 범위</label>
                                    <select id="fcRange" class="styled-input">
                                        <option value="all">전체 상품 적용</option>
                                        <option value="category">특정 카테고리만 적용</option>
                                        <option value="product">특정 상품에만 전용</option>
                                    </select>
                                </div>
                                <div class="form-item" id="fcRangeTargetRow" style="display: none; grid-column: span 2;">
                                    <label>대상 카테고리명 또는 상품 ID (쉼표 구분)</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" id="fcRangeTarget" class="styled-input" placeholder="예: E-Book, History 또는 상품ID1, 상품ID2">
                                        <button class="btn-inline" id="rangeSearchBtn" onclick="openProductSelector('fcRangeTarget')">🔍 상품 검색</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; border-top: 2px solid #f1f5f9; padding-top: 30px; display: flex; gap: 12px; justify-content: flex-end;">
                        <button class="btn-delete" onclick="toggleCouponForm()" style="padding: 12px 24px; border: 1px solid #e2e8f0;">취소</button>
                        <button class="btn-primary" onclick="saveCoupon()" style="padding: 12px 40px; font-size: 1rem;">기획 및 발행 완료</button>
                    </div>
                </div>

                <!-- Coupon List -->
                <div id="couponGrid" class="coupon-grid">
                    <!-- Cards will be injected here -->
                    <p style="text-align: center; color: #94a3b8; padding: 100px 0; width: 100%;">쿠폰 데이터를 불러오는 중입니다...</p>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Product Selector Modal -->
    <div id="productSelectorModal" class="modal-overlay">
        <div class="product-selector-modal">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">📦 상품 선택</h3>
                <button onclick="closeProductSelector()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <input type="text" id="psSearch" placeholder="상품명으로 검색..." style="padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; width: 100%; box-sizing: border-box;">
            <div id="psList" class="product-list">
                <!-- Products will be injected here -->
            </div>
        </div>
    </div>

    <script src="./admin-common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, updateDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allCoupons = [];

        async function loadCoupons() {
            try {
                const q = query(collection(db, "coupons"), orderBy("created_at", "desc"));
                const snapshot = await getDocs(q);
                allCoupons = [];
                snapshot.forEach(doc => {
                    allCoupons.push({ id: doc.id, ...doc.data() });
                });
                renderCoupons();
            } catch (err) {
                console.error("Load Coupons Error:", err);
            }
        }

        function renderCoupons() {
            const grid = document.getElementById('couponGrid');
            if (allCoupons.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 100px 0; width: 100%;">등록된 쿠폰이 없습니다. 신규 쿠폰을 생성해 보세요!</p>';
                return;
            }

            const todayKst = getKSTDateString(); // 한국 시간 오늘 날짜 (YYYY-MM-DD)

            grid.innerHTML = allCoupons.map(c => {
                const isExpired = c.expired_at && c.expired_at < todayKst; 
                const statusClass = (c.is_active && !isExpired) ? 'coupon-active' : (isExpired ? 'coupon-expired' : '');
                const valueText = c.type === 'percent' ? `${c.value}%` : `${Number(c.value).toLocaleString()}원`;

                return `
                    <div class="coupon-card ${statusClass}">
                        <div class="coupon-header">
                            <span class="coupon-icon">🎫</span>
                            <span class="coupon-code">${c.code}</span>
                        </div>
                        <div class="coupon-value">${valueText} 할인</div>
                        <div class="coupon-desc">
                            최소 ${Number(c.min_order_amount).toLocaleString()}원 이상 구매 시 사용 가능합니다.
                        </div>
                        <div class="coupon-meta">
                            <div class="meta-item">
                                <span class="meta-label">사용 현황</span>
                                <span class="meta-value">${c.used_count || 0} / ${c.usage_limit}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">만료일</span>
                                <span class="meta-value">${c.expired_at || '무제한'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">유형 / 범위</span>
                                <span class="meta-value">${c.issue_type || 'public'} / ${c.range || 'all'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">발급 대상</span>
                                <span class="meta-value">${c.target_criteria === 'purchased_product' ? `구매자(${c.target_value})` : (c.target_criteria || '전체')}</span>
                            </div>
                        </div>
                        <div class="coupon-actions">
                            <button class="btn-coupon btn-deactivate" onclick="toggleCouponStatus('${c.id}', ${c.is_active})">
                                ${c.is_active ? '비활성화' : '활성화'}
                            </button>
                            <button class="btn-coupon btn-delete" onclick="deleteCoupon('${c.id}')">삭제</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.toggleCouponForm = () => {
            document.getElementById('couponForm').classList.toggle('show');
        };

        window.saveCoupon = async () => {
            const code = document.getElementById('fcCode').value.trim().toUpperCase();
            const type = document.getElementById('fcType').value;
            const value = Number(document.getElementById('fcValue').value);
            const minAmount = Number(document.getElementById('fcMinAmount').value);
            const limitVal = Number(document.getElementById('fcLimit').value);
            const perUserLimit = Number(document.getElementById('fcPerUser').value) || 1;
            const expiry = document.getElementById('fcExpiry').value;
            const issueType = document.getElementById('fcIssueType').value;
            const targetCriteria = document.getElementById('fcTargetCriteria').value;
            const targetValue = document.getElementById('fcTargetValue').value.trim();
            const targetListRaw = document.getElementById('fcTargetList').value;
            // 줄바꿈으로 나누고 공백 제거하여 저장
            const targetList = targetListRaw.split('\n').map(s => s.trim()).filter(s => s);
            const range = document.getElementById('fcRange').value;
            const rangeTarget = document.getElementById('fcRangeTarget').value;

            if (!code || !value) {
                alert("코드와 할인 정보를 정확히 입력해 주세요.");
                return;
            }

            try {
                await addDoc(collection(db, "coupons"), {
                    code, type, value,
                    min_order_amount: minAmount,
                    usage_limit: limitVal,
                    per_user_limit: perUserLimit,
                    used_count: 0,
                    expired_at: expiry,
                    issue_type: issueType,
                    target_criteria: targetCriteria,
                    target_value: targetValue,
                    target_list: targetList, // [추가] 이메일 리스트
                    range: range,
                    range_target: rangeTarget,
                    is_active: true,
                    created_at: serverTimestamp()
                });
                
                alert("쿠폰이 성공적으로 발행되었습니다.");
                toggleCouponForm();
                loadCoupons();
            } catch (err) {
                console.error("Save Coupon Error:", err);
                alert("발행 실패: " + err.message);
            }
        };

        window.toggleCouponStatus = async (id, currentStatus) => {
            try {
                await updateDoc(doc(db, "coupons", id), {
                    is_active: !currentStatus
                });
                loadCoupons();
            } catch (err) {
                console.error("Update Status Error:", err);
            }
        };

        window.generateRandomCode = () => {
            const prefix = "CHEESE";
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let random = "";
            for (let i = 0; i < 6; i++) {
                random += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('fcCode').value = `${prefix}-${random}`;
        };

        // Product Selector Logic
        let targetInputId = "";
        let productListForSelector = [];

        window.openProductSelector = async (inputId) => {
            targetInputId = inputId;
            document.getElementById('productSelectorModal').classList.add('show');
            
            if (productListForSelector.length === 0) {
                const snapshot = await getDocs(collection(db, "products"));
                productListForSelector = [];
                snapshot.forEach(doc => {
                    productListForSelector.push({ id: doc.id, ...doc.data() });
                });
            }
            renderProductSelectorList();
        };

        window.closeProductSelector = () => {
            document.getElementById('productSelectorModal').classList.remove('show');
        };

        function renderProductSelectorList(filter = "") {
            const list = document.getElementById('psList');
            const filtered = productListForSelector.filter(p => p.title.toLowerCase().includes(filter.toLowerCase()));
            
            list.innerHTML = filtered.map(p => `
                <div class="product-item" onclick="selectProduct('${p.id}')">
                    <span class="name">${p.title}</span>
                    <span class="id">${p.id}</span>
                </div>
            `).join('');
        }

        window.selectProduct = (id) => {
            const input = document.getElementById(targetInputId);
            if (targetInputId === 'fcRangeTarget' && input.value) {
                // 쉼표로 구분하여 추가
                const current = input.value.split(',').map(s => s.trim()).filter(s => s);
                if (!current.includes(id)) {
                    current.push(id);
                    input.value = current.join(', ');
                }
            } else {
                input.value = id;
            }
            closeProductSelector();
        };

        document.getElementById('psSearch').addEventListener('input', (e) => {
            renderProductSelectorList(e.target.value);
        });

        window.deleteCoupon = async (id) => {
            if (!confirm("정말 이 쿠폰을 삭제하시겠습니까? 기록이 영구삭제됩니다.")) return;
            try {
                await deleteDoc(doc(db, "coupons", id));
                loadCoupons();
            } catch (err) {
                console.error("Delete Coupon Error:", err);
            }
        };

        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Marketing', subtitle: '쿠폰 마스터 관리' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'coupon_manage' });
            loadCoupons();

            // 범위 선택에 따른 타겟 입력 표시 토글
            document.getElementById('fcRange').addEventListener('change', (e) => {
                const targetRow = document.getElementById('fcRangeTargetRow');
                targetRow.style.display = (e.target.value === 'all') ? 'none' : 'block';
            });

            // 발급 대상 조건에 따른 입력 표시 토글
            document.getElementById('fcTargetCriteria').addEventListener('change', (e) => {
                const targetRow = document.getElementById('fcTargetRow');
                const listRow = document.getElementById('fcTargetListRow');
                const val = e.target.value;
                
                // 검색 버튼 및 라벨 조정
                if (val === 'purchased_product') {
                    targetRow.style.display = 'block';
                    listRow.style.display = 'none';
                    document.getElementById('fcTargetLabel').innerText = "대상 상품 ID";
                    document.getElementById('fcTargetSearchBtn').style.display = 'inline-block';
                } else if (val === 'purchased_external') {
                    targetRow.style.display = 'block';
                    listRow.style.display = 'block';
                    document.getElementById('fcTargetLabel').innerText = "외부 이벤트 명칭 (참고용)";
                    document.getElementById('fcTargetSearchBtn').style.display = 'none';
                    document.getElementById('fcTargetValue').placeholder = "예: 크몽 미국사연표 구매자";
                } else {
                    targetRow.style.display = 'none';
                    listRow.style.display = 'none';
                }
            });

            // 적용 범위에 따른 검색 버튼 텍스트 변경
            document.getElementById('fcRange').addEventListener('change', (e) => {
                const btn = document.getElementById('rangeSearchBtn');
                if (e.target.value === 'category') {
                    btn.style.display = 'none'; // 카테고리는 일단 수동입력 또는 별도 로직 필요 (현재는 상품 검색 위주)
                } else if (e.target.value === 'product') {
                    btn.style.display = 'inline-block';
                }
            });
        });
    </script>
</body>

</html>

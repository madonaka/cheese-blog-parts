<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>회원 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./admin.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .membership-manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
        }

        .user-table-card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .status-select {
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff;
        }

        table.admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.admin-table th,
        table.admin-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        table.admin-table th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #f1f5f9;
        }

        .user-name {
            font-weight: 700;
            color: #1e293b;
            display: block;
        }

        .user-email {
            font-size: 0.8rem;
            color: #64748b;
        }

        .status-active { background: #dcfce7; color: #166534; }
        .status-pending { background: #fff7ed; color: #9a3412; }
        .status-blocked { background: #fee2e2; color: #991b1b; }

        .loyal-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-left: 5px;
            border: 1px solid #fde68a;
        }

        .order-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .order-history-item:last-child { border-bottom: none; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal-card {
            background: #fff;
            width: 90%;
            max-width: 500px;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .btn-action {
            color: #3b82f6;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 600;
        }

        /* Pagination Styles */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .page-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .page-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>

        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="membership-manage-header">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 800;">스토어 회원 관리</h1>
                        <p style="font-size: 0.85rem; color: #64748b;">치즈 히스토리 스토어의 가입 회원 현황을 관리합니다.</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">전체 회원</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">활성 회원</div>
                        <div class="stat-value" id="stat-active" style="color: #166534;">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">탈퇴 유예</div>
                        <div class="stat-value" id="stat-pending" style="color: #9a3412;">0</div>
                    </div>
                </div>

                <!-- User Table -->
                <section class="user-table-card">
                    <div class="filter-bar">
                        <input type="text" id="userSearch" class="search-input" placeholder="이름 또는 이메일로 검색..." />
                        <select id="statusFilter" class="status-select">
                            <option value="">모든 상태</option>
                            <option value="active">활성</option>
                            <option value="withdrawal_pending">탈퇴 유예</option>
                            <option value="blocked">차단</option>
                        </select>
                    </div>

                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>회원 정보</th>
                                <th>가입일</th>
                                <th>최근 접속</th>
                                <th>구매 건수</th>
                                <th>총 구매액</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 50px;">회원 데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- Pagination Container -->
                    <div id="pagination" class="pagination-container"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- User Detail Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-weight: 800; margin: 0;">회원 상세 정보</h3>
                <button onclick="closeUserModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div id="userDetailContent">
                <!-- Data injected here -->
            </div>

            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-cancel" onclick="closeUserModal()" style="padding: 10px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer;">닫기</button>
                <button id="btn-toggle-block" class="btn-submit" style="padding: 10px 20px; border-radius: 8px; border: none; background: #ef4444; color: #fff; cursor: pointer; font-weight: 600;">상태 변경</button>
            </div>
        </div>
    </div>

    <script src="./admin-common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allUsers = [];
        let allOrders = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            try {
                // 1. 유저 목록 불러오기
                const userQ = query(collection(db, "users"), orderBy("created_at", "desc"));
                const userSnapshot = await getDocs(userQ);
                allUsers = [];
                userSnapshot.forEach((doc) => {
                    allUsers.push({ id: doc.id, ...doc.data() });
                });

                // 2. 전체 주문 목록 불러오기 (데이터가 많아지면 유저별 쿼리 권장)
                const orderSnapshot = await getDocs(collection(db, "orders"));
                allOrders = [];
                orderSnapshot.forEach((doc) => {
                    allOrders.push({ id: doc.id, ...doc.data() });
                });

                updateStats();
                renderUserTable();
            } catch (err) {
                console.error("User Load Error:", err);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 50px; color: red;">데이터 로드 중 오류가 발생했습니다.</td></tr>';
            }
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = allUsers.length;
            document.getElementById('stat-active').innerText = allUsers.filter(u => u.status === 'active' || !u.status).length;
            document.getElementById('stat-pending').innerText = allUsers.filter(u => u.status === 'withdrawal_pending').length;
        }

        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            const search = document.getElementById('userSearch').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allUsers.filter(u => {
                const matchSearch = u.displayName?.toLowerCase().includes(search) || u.email?.toLowerCase().includes(search);
                const matchStatus = !status || u.status === status || (status === 'active' && !u.status);
                return matchSearch && matchStatus;
            });

            // 페이징 처리
            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            // 페이지 범위를 벗어나지 않도록 조정
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filtered.slice(startIndex, startIndex + itemsPerPage);

            if (paginatedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 50px;">회원이 없습니다.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = paginatedData.map(u => {
                const statusLabel = u.status === 'withdrawal_pending' ? '탈퇴 유예' : (u.status === 'blocked' ? '차단됨' : '정상');
                const statusClass = u.status === 'withdrawal_pending' ? 'status-pending' : (u.status === 'blocked' ? 'status-blocked' : 'status-active');
                const photo = u.photo_url || "https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg";
                const createdDate = u.created_at ? new Date(u.created_at.toDate()).toLocaleDateString() : '-';
                
                // 이름이 없으면 이메일 아이디 부분 사용, 최근 접속일 필드 호환 처리
                const displayName = u.displayName || u.email?.split('@')[0] || 'Member';
                const lastLoginTs = u.last_login_at || u.last_login;
                const lastLogin = lastLoginTs ? new Date(lastLoginTs.toDate()).toLocaleString() : '-';

                // 구매 통계 계산
                const userOrders = allOrders.filter(o => o.uid === u.id);
                const orderCount = userOrders.length;
                const totalAmount = userOrders.reduce((sum, o) => sum + (Number(o.price) || 0), 0);
                
                // 단골 여부 (2건 이상 구매)
                const isLoyal = orderCount >= 2;

                return `
                    <tr>
                        <td>
                            <div class="user-info">
                                <img src="${photo}" class="user-avatar" />
                                <div>
                                    <span class="user-name">
                                        ${displayName}
                                        ${isLoyal ? '<span class="loyal-badge">💎 단골</span>' : ''}
                                    </span>
                                    <span class="user-email">${u.email}</span>
                                </div>
                            </div>
                        </td>
                        <td>${createdDate}</td>
                        <td><span style="font-size: 0.8rem; color: #64748b;">${lastLogin}</span></td>
                        <td><strong>${orderCount}건</strong></td>
                        <td><strong>${totalAmount.toLocaleString()}원</strong></td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td>
                            <button class="btn-action" onclick="window.viewUserDetail('${u.id}')">상세/관리</button>
                        </td>
                    </tr>
                `;
            }).join('');

            renderPagination(totalItems);
        }

        function renderPagination(totalItems) {
            const paginationEl = document.getElementById('pagination');
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = `
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>이전</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                // 페이지가 너무 많을 경우 현재 페이지 주변만 표시하는 로직을 추가할 수도 있습니다.
                html += `
                    <button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>
                `;
            }

            html += `
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>다음</button>
            `;

            paginationEl.innerHTML = html;
        }

        window.changePage = (page) => {
            currentPage = page;
            renderUserTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.viewUserDetail = async (id) => {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;

            // 해당 유저의 주문 내역 필터링
            const userOrders = allOrders.filter(o => o.uid === id);

            const content = document.getElementById('userDetailContent');
            const createdDate = user.created_at ? new Date(user.created_at.toDate()).toLocaleString() : '-';
            const withdrawalDate = user.withdrawal_at ? new Date(user.withdrawal_at.toDate()).toLocaleString() : '-';
            
            content.innerHTML = `
                <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 25px;">
                    <img src="${user.photo_url || 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg'}" style="width: 80px; height: 80px; border-radius: 50%;" />
                    <div>
                        <h4 style="margin: 0; font-size: 1.2rem;">${user.displayName || user.email?.split('@')[0] || 'Member'}</h4>
                        <p style="margin: 5px 0 0; color: #64748b;">${user.email}</p>
                        <p style="margin: 5px 0 0; font-size: 0.8rem; color: #94a3b8;">UID: ${user.id}</p>
                    </div>
                </div>
                
                <div style="background: #f8fafc; padding: 20px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 25px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: #64748b;">최초 가입일</span>
                        <span style="font-weight: 600;">${createdDate}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: #64748b;">현재 상태</span>
                        <span style="font-weight: 700;">${user.status || 'active'}</span>
                    </div>
                    ${user.status === 'withdrawal_pending' ? `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #ef4444;">
                        <span style="font-weight: 600;">탈퇴 신청일</span>
                        <span style="font-weight: 600;">${withdrawalDate}</span>
                    </div>
                    ` : ''}
                </div>

                <h4 style="font-size: 1rem; font-weight: 800; margin-bottom: 15px;">🛍️ 구매 내역 (${userOrders.length}건)</h4>
                <div style="max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px;">
                    ${userOrders.length > 0 ? userOrders.map(o => `
                        <div class="order-history-item">
                            <div>
                                <div style="font-weight: 700; font-size: 0.9rem;">${o.title}</div>
                                <div style="font-size: 0.75rem; color: #94a3b8;">${new Date(o.created_at?.toDate()).toLocaleDateString()}</div>
                            </div>
                            <div style="font-weight: 800; color: #1e293b;">${Number(o.price).toLocaleString()}원</div>
                        </div>
                    `).join('') : '<div style="padding: 20px; text-align: center; color: #94a3b8;">구매 내역이 없습니다.</div>'}
                </div>
            `;

            const blockBtn = document.getElementById('btn-toggle-block');
            const isBlocked = user.status === 'blocked';
            blockBtn.innerText = isBlocked ? "차단 해제" : "계정 차단";
            blockBtn.style.background = isBlocked ? "#3b82f6" : "#ef4444";
            
            blockBtn.onclick = async () => {
                const nextStatus = isBlocked ? "active" : "blocked";
                if (!confirm(`회원 상태를 [${nextStatus}]로 변경하시겠습니까?`)) return;
                
                try {
                    await updateDoc(doc(db, "users", id), { status: nextStatus });
                    alert("변경되었습니다.");
                    closeUserModal();
                    loadUsers();
                } catch (e) {
                    alert("변경 실패");
                }
            };

            document.getElementById('userModal').classList.add('show');
        };

        window.closeUserModal = () => {
            document.getElementById('userModal').classList.remove('show');
        };

        document.getElementById('userSearch').addEventListener('input', () => {
            currentPage = 1; // 검색 시 1페이지로 리셋
            renderUserTable();
        });
        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1; // 필터 변경 시 1페이지로 리셋
            renderUserTable();
        });

        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Store', subtitle: '회원 관리' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'membership_manage' });
            loadUsers();
        });
    </script>
</body>

</html>

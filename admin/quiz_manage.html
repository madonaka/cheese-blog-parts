<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>역사 문제은행 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .quiz-manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .quiz-table-card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            overflow-x: auto;
        }

        table.admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.admin-table th,
        table.admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        table.admin-table th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .badge-category {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .cat-elementary { background: #dcfce7; color: #166534; }
        .cat-middle { background: #dbeafe; color: #1e40af; }
        .cat-high { background: #fef9c3; color: #854d0e; }
        .cat-history { background: #f3e8ff; color: #6b21a8; }
        .cat-general { background: #f1f5f9; color: #475569; }

        .level-high { color: #ef4444; font-weight: 800; }
        .level-mid { color: #f59e0b; font-weight: 800; }
        .level-low { color: #10b981; font-weight: 800; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal-card {
            background: #fff;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 24px;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .form-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #475569;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #3b82f6;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .option-radio {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn-pill {
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-secondary { background: #f1f5f9; color: #475569; }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #64748b;
            transition: 0.2s;
        }

        .btn-icon:hover { transform: scale(1.2); }
        .btn-icon.edit:hover { color: #3b82f6; }
        .btn-icon.delete:hover { color: #ef4444; }

        /* AI Assistant UI */
        .ai-assistant-box {
            background: #f0f7ff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }
        .ai-assistant-box.show { display: block; }
        .ai-badge {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <div class="quiz-manage-header">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 800;">역사 문제은행 관리 🏛️</h1>
                        <p style="font-size: 0.85rem; color: #64748b;">다양한 카테고리의 학습 문제를 등록하고 관리합니다.</p>
                    </div>
                    <button class="btn-pill btn-primary" onclick="openQuizModal()">
                        <i class="fas fa-plus"></i> 새 문제 등록
                    </button>
                </div>

                <!-- Stats Summary -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                        <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 700;">전체 문제 수</div>
                        <div id="stat-total-quiz" style="font-size: 2rem; font-weight: 900; margin-top: 5px;">0</div>
                    </div>
                    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                        <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 700;">한능검 카테고리</div>
                        <div id="stat-history-quiz" style="font-size: 2rem; font-weight: 900; margin-top: 5px; color: #6b21a8;">0</div>
                    </div>
                </div>

                <div class="quiz-table-card">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 100px;">카테고리</th>
                                <th style="width: 80px;">난이도</th>
                                <th>문제 내용</th>
                                <th style="width: 150px;">연관 상품</th>
                                <th style="width: 100px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="quizTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 100px;">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div class="modal-overlay" id="quizModal">
        <div class="modal-card">
            <h3 id="modalTitle" style="font-size: 1.4rem; font-weight: 800; margin-bottom: 25px;">새 문제 등록</h3>
            <form id="quizForm">
                <input type="hidden" id="editQuizId">

                <!-- AI Assistant Trigger -->
                <div style="margin-bottom: 20px;">
                    <button type="button" onclick="document.getElementById('aiAssistantBox').classList.toggle('show')" 
                        style="background: #f8fafc; border: 1.5px dashed #3b82f6; width: 100%; padding: 12px; border-radius: 14px; color: #3b82f6; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <span>✨ AI 문제 초안 생성 어시스턴트 열기</span>
                    </button>
                </div>

                <!-- AI Assistant Box -->
                <div id="aiAssistantBox" class="ai-assistant-box">
                    <div class="ai-badge">AI ASSISTANT</div>
                    <label class="form-label" style="color: #1e40af;">문제의 주제나 기존 텍스트를 붙여넣으세요</label>
                    <textarea id="aiInput" class="form-control" style="height: 100px; margin-bottom: 12px; border-color: #bfdbfe;" placeholder="예: 세종대왕의 업적에 대해 물어봐줘 / 또는 기존 문제 텍스트 붙여넣기"></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-pill btn-primary" style="flex: 1; background: #3b82f6;" onclick="window.generateQuizWithAI()">
                            AI로 초안 생성 및 자동 채우기
                        </button>
                    </div>
                    <div id="aiLoader" style="display: none; font-size: 0.8rem; color: #3b82f6; margin-top: 10px; font-weight: 700; text-align: center;">
                        <i class="fas fa-spinner fa-spin"></i> AI가 역사 자료를 분석하여 문제를 구성 중입니다...
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label class="form-label">카테고리 구분</label>
                        <select id="quizCategory" class="form-control" required>
                            <option value="elementary">초등</option>
                            <option value="middle">중등</option>
                            <option value="high">고등</option>
                            <option value="history">한능검</option>
                            <option value="general">일반 상식</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">난이도</label>
                        <select id="quizLevel" class="form-control" required>
                            <option value="low">하 (기초)</option>
                            <option value="mid">중 (보통)</option>
                            <option value="high">상 (심화)</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">질문(Question)</label>
                    <textarea id="quizQuestion" class="form-control" style="height: 60px; resize: none;" required placeholder="질문 내용을 입력하세요. 예: 다음 자료를 보고..."></textarea>
                </div>

                <div class="form-section" style="background: #f1f5f9;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <label class="form-label" style="margin: 0;"><i class="fas fa-file-alt"></i> 지문 및 사료 (Passage)</label>
                        <label style="font-size: 0.75rem; font-weight: 700; color: #64748b; cursor: pointer;">
                            <input type="checkbox" id="hasPassage" onchange="document.getElementById('passageDetail').style.display = this.checked ? 'block' : 'none'"> 지문 추가하기
                        </label>
                    </div>
                    
                    <div id="passageDetail" style="display: none;">
                        <textarea id="quizPassageText" class="form-control" style="height: 120px; border-style: dashed; margin-bottom: 12px;" placeholder="지문 상자에 들어갈 텍스트를 입력하세요."></textarea>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <input type="text" id="quizPassageImageUrl" class="form-control" style="font-size: 0.8rem;" placeholder="지문에 들어갈 이미지 URL">
                        </div>
                    </div>
                </div>

                <div class="form-section" style="background: #fff;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <label class="form-label" style="margin: 0;">보기(Options) & 정답 선택</label>
                        <div style="background: #f1f5f9; padding: 4px; border-radius: 8px; display: flex; gap: 4px;">
                            <button type="button" id="optTypeText" class="btn-pill" style="padding: 4px 12px; font-size: 0.75rem; background: #111; color: #fff;" onclick="window.setOptionType('text')">텍스트</button>
                            <button type="button" id="optTypeImage" class="btn-pill" style="padding: 4px 12px; font-size: 0.75rem; background: transparent; color: #64748b;" onclick="window.setOptionType('image')">이미지</button>
                            <input type="hidden" id="quizOptionType" value="text">
                        </div>
                    </div>
                    
                    <div id="optionsContainer">
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="0" class="option-radio" required>
                            <input type="text" class="form-control quiz-option" placeholder="보기 1번" required>
                        </div>
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="1" class="option-radio">
                            <input type="text" class="form-control quiz-option" placeholder="보기 2번" required>
                        </div>
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="2" class="option-radio">
                            <input type="text" class="form-control quiz-option" placeholder="보기 3번" required>
                        </div>
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="3" class="option-radio">
                            <input type="text" class="form-control quiz-option" placeholder="보기 4번" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">정답 해설 (설명)</label>
                    <textarea id="quizExplanation" class="form-control" style="height: 80px; resize: none;" placeholder="정답에 대한 자세한 설명을 입력하세요."></textarea>
                    
                    <div style="margin-top: 15px;">
                        <label class="form-label">연관 상품 아이디 (Optional)</label>
                        <select id="quizRelatedProduct" class="form-control">
                            <option value="">연관 상품 없음</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px;">
                    <button type="button" class="btn-pill btn-secondary" onclick="closeQuizModal()">취소</button>
                    <button type="submit" class="btn-pill btn-primary">자료 저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./admin-common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let quizzes = [];
        let products = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadProducts();
            await loadQuizzes();
        });

        // --- AI Quiz Generation Logic ---
        window.generateQuizWithAI = async () => {
            const inputText = document.getElementById('aiInput').value.trim();
            if (!inputText) {
                alert("문제의 주제나 원문을 입력해 주세요.");
                return;
            }

            const loader = document.getElementById('aiLoader');
            loader.style.display = 'block';

            // AI 시뮬레이션
            await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));

            try {
                // 초안 채우기 로직
                let aiResult = {
                    category: 'history',
                    level: 'mid',
                    question: '',
                    passage_text: '',
                    passage_image_url: '',
                    option_type: 'text',
                    options: ['', '', '', ''],
                    correct_answer: 0,
                    explanation: ''
                };

                // 2세대 고도화 파싱 로직
                const lines = inputText.split('\n').map(l => l.trim()).filter(l => l);
                
                // 1. 선지 패턴 정의 (①, ⑤, 1., 5. 등)
                const optRegex = /^[①-⑤]|[1-5][\.)]/;
                
                // 2. 가공된 라인 분류
                let potentialQuestion = "";
                let passageLines = [];
                let foundOptions = [];
                let isCapturingOptions = false;

                lines.forEach(line => {
                    // 메타데이터(오늘의 퀴즈 등) 제외
                    if (line.includes('<오늘의') || line.includes('박사 되자')) return;

                    if (optRegex.test(line)) {
                        isCapturingOptions = true;
                        foundOptions.push(line.replace(optRegex, '').trim());
                    } else if (line.endsWith('?') || line.includes('옳은 것은') || line.includes('고르시오')) {
                        // 질문으로 보이는 줄 (기존에 질문이 있더라도 마지막 질문 줄이 진짜일 확률이 높음)
                        if (potentialQuestion) passageLines.push(potentialQuestion);
                        potentialQuestion = line;
                    } else if (line.includes('[선지]') || line.includes('보기')) {
                        // 선지 구분선 (무시)
                    } else {
                        // 그 외는 지문(Passage)
                        passageLines.push(line);
                    }
                });

                // --- 데이터 배정 ---
                aiResult.question = potentialQuestion || "다음 자료를 보고 물음에 답하시오.";
                aiResult.passage_text = passageLines.join('\n');
                
                if (foundOptions.length > 0) {
                    aiResult.options = foundOptions.slice(0, 4);
                    // 옵션이 부족하면 기본값 채우기
                    while (aiResult.options.length < 4) aiResult.options.push(`보기 ${aiResult.options.length + 1}`);
                }

                aiResult.explanation = "AI가 문장 종결 어미(?)와 패턴을 분석하여 질문, 지문, 보기를 재배치했습니다. 정답 번호를 꼭 확인해 주세요.";

                // 주제 기반 생성 (사용자가 붙여넣기가 아닌 키워드만 입력했을 때 보강)
                if (foundOptions.length === 0) {
                    if (inputText.includes("세종") || inputText.includes("한글")) {
                        aiResult.question = "다음 중 세종대왕 시기에 이루어진 문화적 업적으로 가장 적절한 것은?";
                        aiResult.options = ["훈민정음 창제", "경국대전 완성", "수원 화성 축조", "대동법 실시"];
                        aiResult.correct_answer = 0;
                        aiResult.explanation = "세종대왕은 1443년 백성들이 쉽게 글을 익힐 수 있도록 훈민정음을 창제하였습니다.";
                    } else if (inputText.includes("구석기") || inputText.includes("신석기") || inputText.includes("청동기")) {
                        aiResult.question = "다음 사진에 나타난 유물을 사용했던 시대에 대한 설명으로 옳은 것은?";
                        aiResult.passage_text = "농경과 목축이 시작되었으며, 정착 생활을 하며 움집을 짓고 살았다. (신석기 예시)";
                        aiResult.options = ["주먹도끼를 사용하였다.", "가락바퀴를 이용하였다.", "철제 무기를 사용하였다.", "비파형 동검을 제작하였다."];
                        aiResult.correct_answer = 1;
                        aiResult.explanation = `${inputText} 시대에 대한 AI 분석 내용입니다. 유물을 검토해 주세요.`;
                    }
                }

                // 폼 자동 채우기
                document.getElementById('quizQuestion').value = aiResult.question;
                document.getElementById('quizCategory').value = aiResult.category;
                document.getElementById('quizLevel').value = aiResult.level;
                document.getElementById('quizExplanation').value = aiResult.explanation;
                
                // 지문 자동 채우기
                if (aiResult.passage_text) {
                    document.getElementById('hasPassage').checked = true;
                    document.getElementById('passageDetail').style.display = 'block';
                    document.getElementById('quizPassageText').value = aiResult.passage_text;
                    document.getElementById('quizPassageImageUrl').value = aiResult.passage_image_url;
                }

                window.setOptionType(aiResult.option_type);

                const optInputs = document.querySelectorAll('.quiz-option');
                aiResult.options.forEach((opt, idx) => {
                    if (optInputs[idx]) optInputs[idx].value = opt;
                });
                
                const radioInputs = document.getElementsByName('correctAnswer');
                if (radioInputs[aiResult.correct_answer]) radioInputs[aiResult.correct_answer].checked = true;

                window.showNotification("AI 초안 생성 완료", "입력하신 내용을 바탕으로 지문과 문항을 구성했습니다.", "success");
                document.getElementById('aiAssistantBox').classList.remove('show');
            } catch (err) {
                console.error(err);
                alert("AI 생성 중 오류가 발생했습니다.");
            } finally {
                loader.style.display = 'none';
            }
        };

        async function loadProducts() {
            try {
                const snap = await getDocs(collection(db, "products"));
                products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const select = document.getElementById('quizRelatedProduct');
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.innerText = p.title;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadQuizzes() {
            const tbody = document.getElementById('quizTableBody');
            try {
                const q = query(collection(db, "quizzes"), orderBy("created_at", "desc"));
                const snap = await getDocs(q);
                quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                renderQuizzes();
                updateStats();
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">데이터 로드 실패</td></tr>';
            }
        }

        function renderQuizzes() {
            const tbody = document.getElementById('quizTableBody');
            if (quizzes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px;">등록된 문제가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = quizzes.map(q => {
                const catInfo = getCategoryInfo(q.category);
                const levelInfo = getLevelInfo(q.level);
                const relatedProd = products.find(p => p.id === q.related_product_id)?.title || '-';

                return `
                    <tr>
                        <td><span class="badge-category ${catInfo.class}">${catInfo.label}</span></td>
                        <td><span class="${levelInfo.class}">${levelInfo.label}</span></td>
                        <td>
                            <div style="font-weight:700; color:#1e293b; max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${q.question}</div>
                            <div style="font-size:0.75rem; color:#94a3b8; margin-top:4px;">${q.options[q.correct_answer]} (정답)</div>
                        </td>
                        <td><div style="font-size:0.85rem; color:#64748b;">${relatedProd}</div></td>
                        <td class="actions">
                            <button class="btn-icon edit" onclick="window.openEditQuizModal('${q.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete" onclick="window.deleteQuiz('${q.id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getCategoryInfo(cat) {
            const maps = {
                elementary: { label: '초등', class: 'cat-elementary' },
                middle: { label: '중등', class: 'cat-middle' },
                high: { label: '고등', class: 'cat-high' },
                history: { label: '한능검', class: 'cat-history' },
                general: { label: '상식', class: 'cat-general' }
            };
            return maps[cat] || { label: cat, class: '' };
        }

        function getLevelInfo(lv) {
            const maps = {
                high: { label: '상', class: 'level-high' },
                mid: { label: '중', class: 'level-mid' },
                low: { label: '하', class: 'level-low' }
            };
            return maps[lv] || { label: lv, class: '' };
        }

        function updateStats() {
            document.getElementById('stat-total-quiz').innerText = quizzes.length;
            document.getElementById('stat-history-quiz').innerText = quizzes.filter(q => q.category === 'history').length;
        }

        // Modal Logic
        window.openQuizModal = () => {
            document.getElementById('quizForm').reset();
            document.getElementById('editQuizId').value = "";
            document.getElementById('modalTitle').innerText = "새 문제 등록";
            document.getElementById('quizModal').classList.add('show');
        };

        window.closeQuizModal = () => document.getElementById('quizModal').classList.remove('show');

        window.openEditQuizModal = async (id) => {
            const q = quizzes.find(item => item.id === id);
            if (!q) return;

            document.getElementById('editQuizId').value = id;
            document.getElementById('modalTitle').innerText = "문제 정보 수정";
            document.getElementById('quizCategory').value = q.category;
            document.getElementById('quizLevel').value = q.level;
            document.getElementById('quizQuestion').value = q.question;
            
            // 지문 정보 복식 채우기
            const hasPassage = !!(q.passage_text || q.passage_image_url);
            document.getElementById('hasPassage').checked = hasPassage;
            document.getElementById('passageDetail').style.display = hasPassage ? 'block' : 'none';
            document.getElementById('quizPassageText').value = q.passage_text || "";
            document.getElementById('quizPassageImageUrl').value = q.passage_image_url || "";

            document.getElementById('quizExplanation').value = q.explanation || "";
            document.getElementById('quizRelatedProduct').value = q.related_product_id || "";

            // 보기 형식 복식 채우기
            window.setOptionType(q.option_type || 'text');

            const optInputs = document.querySelectorAll('.quiz-option');
            const radioInputs = document.getElementsByName('correctAnswer');
            
            q.options.forEach((opt, idx) => {
                if (optInputs[idx]) optInputs[idx].value = opt;
            });
            if (radioInputs[q.correct_answer]) radioInputs[q.correct_answer].checked = true;

            document.getElementById('quizModal').classList.add('show');
        };

        window.setOptionType = (type) => {
            const textBtn = document.getElementById('optTypeText');
            const imgBtn = document.getElementById('optTypeImage');
            const hiddenInput = document.getElementById('quizOptionType');
            const optInputs = document.querySelectorAll('.quiz-option');

            hiddenInput.value = type;
            if (type === 'text') {
                textBtn.style.background = '#111'; textBtn.style.color = '#fff';
                imgBtn.style.background = 'transparent'; imgBtn.style.color = '#64748b';
                optInputs.forEach((inv, idx) => inv.placeholder = `보기 ${idx+1}번 텍스트`);
            } else {
                imgBtn.style.background = '#111'; imgBtn.style.color = '#fff';
                textBtn.style.background = 'transparent'; textBtn.style.color = '#64748b';
                optInputs.forEach((inv, idx) => inv.placeholder = `보기 ${idx+1}번 이미지 URL`);
            }
        };

        window.deleteQuiz = async (id) => {
            if (!confirm("정말 이 문제를 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, "quizzes", id));
                window.showNotification("삭제 성공", "문제가 기록에서 제거되었습니다.", "info");
                loadQuizzes();
            } catch (err) { console.error(err); }
        };

        // Form Submit
        document.getElementById('quizForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editQuizId').value;
            const category = document.getElementById('quizCategory').value;
            const level = document.getElementById('quizLevel').value;
            const question = document.getElementById('quizQuestion').value;
            
            const hasPassage = document.getElementById('hasPassage').checked;
            const passageText = hasPassage ? document.getElementById('quizPassageText').value : "";
            const passageImageUrl = hasPassage ? document.getElementById('quizPassageImageUrl').value : "";
            const optionType = document.getElementById('quizOptionType').value;

            const explanation = document.getElementById('quizExplanation').value;
            const relatedProductId = document.getElementById('quizRelatedProduct').value;

            const options = Array.from(document.querySelectorAll('.quiz-option')).map(i => i.value);
            const correctAnswer = parseInt(document.querySelector('input[name="correctAnswer"]:checked').value);

            const quizData = {
                category,
                level,
                question,
                passage_text: passageText,
                passage_image_url: passageImageUrl,
                option_type: optionType,
                options,
                correct_answer: correctAnswer,
                explanation,
                related_product_id: relatedProductId,
                updated_at: serverTimestamp()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "quizzes", id), quizData);
                    window.showNotification("수정 완료", "문제 정보가 업데이트되었습니다.", "success");
                } else {
                    quizData.created_at = serverTimestamp();
                    await addDoc(collection(db, "quizzes"), quizData);
                    window.showNotification("등록 성공", "새로운 문제가 은행에 추가되었습니다.", "success");
                }
                closeQuizModal();
                loadQuizzes();
            } catch (err) {
                console.error(err);
                window.showNotification("오류", "자료 저장 중 문제가 발생했습니다.", "error");
            }
        };

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이슈 시리즈 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../admin.css" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #0f172a; --sub: #475569;
            --line: rgba(15,23,42,0.10); --shadow: 0 10px 28px rgba(15,23,42,0.08);
            --r: 16px; --accent: #1e293b; --accent-red: #8b2c2c;
        }

        .am-wrap { padding: 14px; max-width: 1240px; margin: 0 auto; }
        .am-title { font-size: 20px; font-weight: 1000; letter-spacing: -0.02em; margin: 10px 0 4px; }
        .am-subtitle { font-size: 13px; color: var(--sub); margin: 0 0 18px; }
        .am-layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }

        .am-card {
            background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
            padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
        }
        .am-card-title {
            font-size: 13px; font-weight: 1000; color: var(--text); margin: 0 0 14px;
            padding-bottom: 10px; border-bottom: 1px solid var(--line);
            display: flex; align-items: center; justify-content: space-between;
        }

        /* 검색 + 필터 */
        .am-input-search {
            width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px;
            font-size: 13px; background: #f8fafc; outline: none; box-sizing: border-box;
            margin-bottom: 10px;
        }
        .am-input-search:focus { border-color: #3b82f6; background: #fff; }

        .filter-btns { display: flex; gap: 6px; margin-bottom: 10px; }
        .filter-btn {
            flex: 1; padding: 7px 0; border-radius: 8px; font-size: 11px; font-weight: 900;
            cursor: pointer; border: 1px solid var(--line); background: #fff; transition: 0.15s;
        }
        .filter-btn:hover { background: #f1f5f9; }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .filter-btn.f-mnforce.active { background: var(--accent-red); border-color: var(--accent-red); }
        .filter-btn.f-important.active { background: #1e40af; border-color: #1e40af; }

        /* 태그 목록 */
        .tag-list { list-style: none; padding: 0; margin: 0; max-height: 600px; overflow-y: auto; }
        .tag-list-item {
            padding: 10px 12px; border-bottom: 1px solid #f1f5f9;
            cursor: pointer; border-radius: 8px; transition: background 0.12s;
        }
        .tag-list-item:hover { background: #f8fafc; }
        .tag-list-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; padding-left: 9px; }
        .tag-list-item.in-series { background: #f0fdf4; border-left: 3px solid #22c55e; padding-left: 9px; }
        .tag-label { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
        .tag-full { font-size: 10px; color: #94a3b8; font-family: monospace; margin-bottom: 4px; }
        .tag-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .tag-count { font-size: 10px; color: #94a3b8; }
        .tag-badge { font-size: 10px; font-weight: 900; padding: 2px 7px; border-radius: 99px; }
        .tag-badge.has-content { background: #dcfce7; color: #15803d; }
        .tag-badge.no-content  { background: #f1f5f9; color: #94a3b8; }
        .tag-badge.t-mnforce   { background: #fee2e2; color: #b91c1c; }
        .tag-badge.t-important { background: #dbeafe; color: #1e40af; }

        .scan-hint { font-size: 12px; color: #94a3b8; text-align: center; padding: 40px 16px; line-height: 1.7; }

        /* 시리즈 ID 멀티 */
        .series-id-primary {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            background: #f1f5f9; border: 1px solid var(--line); border-radius: 10px;
        }
        .series-id-badge {
            font-size: 9px; font-weight: 900; letter-spacing: 1px;
            background: #1e293b; color: #fff; padding: 3px 7px; border-radius: 4px; flex-shrink: 0;
        }
        .series-id-value { font-size: 13px; font-weight: 700; color: #0f172a; flex: 1; word-break: break-all; }
        .series-id-hint { font-size: 12px; color: #94a3b8; margin: 6px 0 0; }

        /* 날짜 필터 */
        .date-filter-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .date-filter-input {
            flex: 1; padding: 7px 6px; border: 1px solid var(--line); border-radius: 8px;
            font-size: 11px; font-weight: 700; background: #f8fafc; outline: none;
            text-align: center; min-width: 0;
            appearance: textfield;
            -moz-appearance: textfield;
        }
        .date-filter-input::-webkit-inner-spin-button,
        .date-filter-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .date-filter-input:focus { border-color: #3b82f6; background: #fff; }
        .date-filter-input.has-value { border-color: #6366f1; background: #eef2ff; }
        .date-filter-clear {
            flex-shrink: 0; width: 26px; height: 26px; border: 1px solid var(--line);
            border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center; color: #94a3b8;
            transition: 0.12s;
        }
        .date-filter-clear:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }

        /* 폼 */
        .am-field { margin-bottom: 14px; }
        .am-label { font-size: 11px; font-weight: 900; color: var(--sub); display: block; margin-bottom: 6px; }
        .am-input, .am-textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--line);
            border-radius: 10px; font-size: 13px; font-weight: 600; background: #f8fafc;
            outline: none; box-sizing: border-box; font-family: system-ui, sans-serif;
            transition: border-color 0.15s;
        }
        .am-input:focus, .am-textarea:focus { border-color: #3b82f6; background: #fff; }
        .am-input[readonly] { background: #f1f5f9; color: #64748b; cursor: default; }
        .am-textarea { min-height: 90px; resize: vertical; }
        .am-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .form-section-divider {
            display: flex; align-items: center; gap: 10px; margin: 20px 0 16px;
            font-size: 11px; font-weight: 900; color: #94a3b8; letter-spacing: 1.5px;
        }
        .form-section-divider::before, .form-section-divider::after {
            content: ""; flex: 1; height: 1px; background: var(--line);
        }

        /* 영향 태그 행 */
        .impact-tag-row { display: flex; gap: 8px; align-items: center; }
        .impact-tag-row .am-input { margin: 0; }
        .btn-remove-tag {
            width: 34px; height: 34px; flex-shrink: 0; border: none; border-radius: 8px;
            background: #fee2e2; color: #b91c1c; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; transition: 0.15s; line-height: 1;
        }
        .btn-remove-tag:hover { background: #fecaca; }

        /* Quill */
        .am-quill-wrap { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; }
        .am-quill-wrap .ql-toolbar { border: none; border-bottom: 1px solid var(--line); }
        .am-quill-wrap .ql-container { border: none; font-size: 14px; min-height: 320px; }
        .am-quill-wrap .ql-editor { min-height: 320px; }

        /* 버튼 */
        .am-btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
        .am-btn {
            padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 900;
            cursor: pointer; border: 1px solid var(--line); background: #fff;
            font-family: system-ui, sans-serif; transition: all 0.15s;
        }
        .am-btn:hover { background: #f1f5f9; }
        .am-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .am-btn.primary:hover { background: #0f172a; }
        .am-btn.danger { background: #fff; color: #b91c1c; border-color: #fca5a5; }
        .am-btn.danger:hover { background: #fef2f2; }
        .am-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .am-status { font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
        .am-status.ok  { background: #dcfce7; color: #15803d; }
        .am-status.err { background: #fee2e2; color: #b91c1c; }
        .am-hidden { display: none !important; }

        /* 타임라인 미리보기 */
        .tl-prev-tag { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
        .tl-prev-tag-header { padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tl-prev-tag-name { font-size: 12px; font-weight: 900; color: var(--accent-red); }
        .tl-prev-tag-count { font-size: 10px; color: #94a3b8; font-weight: 700; }
        .tl-prev-tag-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
        .tl-prev-item { display: flex; gap: 10px; align-items: baseline; }
        .tl-prev-date { font-size: 10px; font-weight: 900; color: var(--accent-red); min-width: 48px; flex-shrink: 0; }
        .tl-prev-title { font-size: 12px; color: var(--text); font-weight: 600; line-height: 1.4; }
        .tl-prev-year { font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 1px; padding: 4px 0 2px; }
        .tl-prev-empty { font-size: 11px; color: #94a3b8; font-style: italic; padding: 8px 0; }

        /* 연관 태그 추천 패널 */
        .related-panel-header { margin-bottom: 10px; }
        .related-panel-title { font-size: 11px; font-weight: 900; color: var(--sub); display: block; margin-bottom: 3px; }
        .related-panel-sub { font-size: 11px; color: #94a3b8; line-height: 1.5; }
        .related-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-chip {
            padding: 5px 11px; border-radius: 99px; font-size: 11px; font-weight: 900;
            cursor: pointer; border: 1px solid; transition: all 0.15s; line-height: 1.4;
        }
        .tag-chip.chip-mnforce  { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }
        .tag-chip.chip-mnforce:hover:not(.chip-already)  { background: #fee2e2; }
        .tag-chip.chip-important { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .tag-chip.chip-important:hover:not(.chip-already) { background: #dbeafe; }
        .tag-chip.chip-already  { opacity: 0.4; cursor: default; }

        @media (max-width: 900px) { .am-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script src="../admin-common.js"></script>
    <script>
        window.CHEESE_ADMIN_ACTIVE_PAGE = "article_manage";
        window.CHEESE_ADMIN_PAGE_SUBTITLE = "이슈 시리즈 관리";
    </script>

    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>
            <main class="admin-content">
                <div class="am-wrap">
                    <h2 class="am-title">이슈 시리즈 관리</h2>
                    <p class="am-subtitle">mnforce · important 태그 기반 이슈에 개요, 진행상황, 영향 분석을 작성합니다.</p>

                    <div class="am-layout">
                        <!-- ── 좌: 태그 목록 ── -->
                        <div>
                            <div class="am-card">
                                <div class="am-card-title">
                                    <span>이슈 태그 목록</span>
                                    <button class="am-btn" style="padding:6px 12px;font-size:11px;" onclick="scanTags()">🔄 스캔</button>
                                </div>
                                <input type="text" id="tag-search" class="am-input-search" placeholder="태그명으로 검색..." oninput="renderTagList()">
                                <div class="filter-btns">
                                    <button class="filter-btn active" data-f="all"       onclick="setFilter('all')">전체</button>
                                    <button class="filter-btn f-mnforce"  data-f="mnforce"   onclick="setFilter('mnforce')">mnforce</button>
                                    <button class="filter-btn f-important" data-f="important" onclick="setFilter('important')">important</button>
                                </div>
                                <div class="date-filter-row">
                                    <input type="number" id="filter-year"  class="date-filter-input" placeholder="연도" min="2000" max="2099" oninput="onDateFilterInput(this);renderTagList()">
                                    <input type="number" id="filter-month" class="date-filter-input" placeholder="월"   min="1"    max="12"   oninput="onDateFilterInput(this);renderTagList()">
                                    <input type="number" id="filter-day"   class="date-filter-input" placeholder="일"   min="1"    max="31"   oninput="onDateFilterInput(this);renderTagList()">
                                    <button class="date-filter-clear" title="날짜 필터 초기화" onclick="clearDateFilter()">×</button>
                                </div>
                                <ul class="tag-list" id="tag-list">
                                    <li class="scan-hint">🔄 스캔 버튼을 눌러<br>아카이브 태그를 불러오세요.</li>
                                </ul>
                            </div>
                        </div>

                        <!-- ── 우: 에디터 ── -->
                        <div>
                            <div class="am-card">
                                <div class="am-card-title">
                                    <span id="am-form-title">시리즈 에디터</span>
                                    <span id="am-doc-id" style="font-size:11px;color:#94a3b8;font-weight:700;"></span>
                                </div>

                                <div class="am-field">
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                        <label class="am-label" style="margin:0;">시리즈 ID</label>
                                        <button type="button" id="btn-add-series-id" class="am-hidden" onclick="addSeriesId()"
                                            style="background:#3b82f6;color:#fff;border:none;padding:5px 12px;border-radius:7px;font-weight:900;font-size:11px;cursor:pointer;">+ ID 추가</button>
                                    </div>
                                    <div id="series-ids-list" style="display:flex;flex-direction:column;gap:6px;"></div>
                                    <p id="series-id-hint" class="series-id-hint">좌측 목록에서 태그를 선택하세요</p>
                                </div>

                                <div class="am-field">
                                    <label class="am-label">진행상황 (Status)</label>
                                    <input id="am-status-val" class="am-input" type="text" placeholder="예: 2심 진행 중 / 판결 확정 / 수사 종결">
                                </div>

                                <div class="am-field">
                                    <label class="am-label">사건 개요 (Overview)</label>
                                    <textarea id="am-overview" class="am-textarea" style="min-height:110px;" placeholder="사건의 핵심 배경과 개요를 간략히 작성하세요..."></textarea>
                                </div>

                                <div class="am-field">
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                        <label class="am-label" style="margin:0;">영향 관련 태그 (Impact Tags)</label>
                                        <button type="button" onclick="addImpactTag();renderImpactTimelines();" style="background:#10b981;color:#fff;border:none;padding:6px 14px;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;">+ 태그 추가</button>
                                    </div>
                                    <div id="impact-tags-list" style="display:flex;flex-direction:column;gap:8px;"></div>
                                </div>

                                <div id="impact-timeline-preview" class="am-hidden">
                                    <div class="form-section-divider">TIMELINE PREVIEW</div>
                                    <div id="impact-timeline-body" style="display:flex;flex-direction:column;gap:20px;"></div>
                                    <button type="button" onclick="renderImpactTimelines()"
                                        style="margin-top:10px;background:none;border:none;color:#94a3b8;font-size:11px;font-weight:900;cursor:pointer;padding:4px 0;">
                                        ↺ 새로고침
                                    </button>
                                </div>

                                <div id="related-tags-panel" class="am-field am-hidden">
                                    <div class="related-panel-header">
                                        <span class="related-panel-title">📎 연관 태그 추천</span>
                                        <span class="related-panel-sub">같은 이벤트에서 함께 등장한 태그입니다. 클릭하면 영향 태그에 추가됩니다.</span>
                                    </div>
                                    <div id="related-tags-chips" class="related-chips-wrap"></div>
                                </div>

                                <div class="form-section-divider">EDITORIAL — 심층 칼럼 (선택)</div>

                                <div class="am-field">
                                    <label class="am-label">칼럼 제목</label>
                                    <input id="am-title" class="am-input" type="text" placeholder="심층 분석 칼럼이 있을 때 입력 (없으면 비워두세요)">
                                </div>

                                <div class="am-row2">
                                    <div class="am-field">
                                        <label class="am-label">작성자</label>
                                        <input id="am-author" class="am-input" type="text" placeholder="예: 치즈 편집팀">
                                    </div>
                                    <div class="am-field">
                                        <label class="am-label">작성일</label>
                                        <input id="am-date" class="am-input" type="text" placeholder="예: 2025-05-12">
                                    </div>
                                </div>

                                <div class="am-field">
                                    <label class="am-label">본문 (Quill 에디터)</label>
                                    <div class="am-quill-wrap">
                                        <div id="am-editor"></div>
                                    </div>
                                </div>

                                <div class="am-btn-row">
                                    <button class="am-btn primary" id="am-save-btn" onclick="saveDoc()">저장</button>
                                    <button class="am-btn" onclick="clearForm()">초기화</button>
                                    <button class="am-btn danger am-hidden" id="am-delete-btn" onclick="deleteDoc()">삭제</button>
                                </div>
                                <div id="am-status-msg" class="am-status am-hidden"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        async function safeFetchDB(payload) {
            if (!window.CHEESE_ADMIN_DB_API) throw new Error("API 엔드포인트가 정의되지 않았습니다.");
            const res = await fetch(window.CHEESE_ADMIN_DB_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || "Firebase 오류");
            return data;
        }

        let quill;
        let _activeExtraInput = null;
        let _activeExtraTimer = null;

        function bindExtraIdInput(input) {
            input.addEventListener('focus', () => {
                clearTimeout(_activeExtraTimer);
                _activeExtraInput = input;
                input.style.borderColor = '#3b82f6';
                input.style.background = '#eff6ff';
            });
            input.addEventListener('blur', () => {
                input.style.borderColor = '';
                input.style.background = '';
                _activeExtraTimer = setTimeout(() => { _activeExtraInput = null; }, 200);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('tag-list').addEventListener('click', e => {
                const li = e.target.closest('.tag-list-item');
                if (!li || li.dataset.label === undefined) return;
                if (_activeExtraInput) {
                    _activeExtraInput.value = li.dataset.label;
                    _activeExtraInput.focus();
                    renderTagList();
                } else {
                    const emptyExtra = Array.from(document.querySelectorAll('.series-id-extra'))
                        .find(el => !el.value.trim());
                    if (emptyExtra) {
                        emptyExtra.value = li.dataset.label;
                        emptyExtra.focus();
                        renderTagList();
                    } else {
                        selectTag(li.dataset.label);
                    }
                }
            });

            quill = new Quill('#am-editor', {
                theme: 'snow',
                placeholder: '심층 분석 본문을 입력하세요 (선택사항)...',
                modules: {
                    toolbar: [
                        [{ header: [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ color: [] }, { background: [] }],
                        [{ list: 'ordered' }, { list: 'bullet' }],
                        [{ indent: '-1' }, { indent: '+1' }],
                        ['blockquote', 'code-block'],
                        ['link'],
                        ['clean']
                    ]
                }
            });
        });

        // ── 태그 변환 유틸 ──
        function tagToLabel(tag) {
            const raw = tag.replace(/^(mnforce-|eporce-|important-)/, '');
            return raw.replace(/^(정치|경제|사회|국제)-/, '');
        }

        function tagType(tag) {
            if (tag.startsWith('mnforce-') || tag.startsWith('eporce-')) return 'mnforce';
            if (tag.startsWith('important-')) return 'important';
            return null;
        }

        // ── 전역 상태 ──
        let tagItems = [];
        let activeFilter = 'all';
        let currentLabel = '';
        let cachedIssuesData = [];

        // ── 스캔 ──
        async function scanTags() {
            showAdminLoading('아카이브 태그를 분석 중입니다...');
            try {
                const [issuesRes, analysisRes] = await Promise.all([
                    safeFetchDB({ action: "get", collection: "historical_issues" }),
                    safeFetchDB({ action: "get", collection: "series_analysis" })
                ]);

                cachedIssuesData = issuesRes.data || [];
                const analysisIds = new Set((analysisRes.data || []).map(d => d.id));
                const tagMap = {};

                for (const doc of cachedIssuesData) {
                    const year = (doc.id || '').replace('year_', '');
                    Object.entries(doc.months || {}).forEach(([monthKey, m]) => {
                        (m.events || []).forEach(ev => {
                            const dateStr = ev.date_start || (year && monthKey ? `${year}-${monthKey}` : '');
                            (ev.tags || '').split(',').forEach(t => {
                                t = t.trim();
                                const type = tagType(t);
                                if (!type) return;
                                const label = tagToLabel(t);
                                if (!label) return;
                                if (!tagMap[label]) tagMap[label] = { tag: t, type, count: 0, dates: new Set() };
                                tagMap[label].count++;
                                if (dateStr) tagMap[label].dates.add(dateStr);
                            });
                        });
                    });
                }

                tagItems = Object.entries(tagMap)
                    .map(([label, info]) => ({ label, ...info, hasContent: analysisIds.has(label) }))
                    .sort((a, b) => b.count - a.count);

                renderTagList();
            } catch (e) {
                alert('스캔 실패: ' + e.message);
            } finally {
                hideAdminLoading();
            }
        }

        // ── 목록 렌더 ──
        function renderTagList() {
            const q = (document.getElementById('tag-search').value || '').toLowerCase();
            const ul = document.getElementById('tag-list');

            const rawYear  = (document.getElementById('filter-year')?.value  || '').trim();
            const rawMonth = (document.getElementById('filter-month')?.value || '').trim();
            const rawDay   = (document.getElementById('filter-day')?.value   || '').trim();
            const filterYear  = rawYear;
            const filterMonth = rawMonth ? rawMonth.padStart(2, '0') : '';
            const filterDay   = rawDay   ? rawDay.padStart(2, '0')   : '';
            const hasDateFilter = !!(filterYear || filterMonth || filterDay);

            const filtered = tagItems.filter(item => {
                const matchFilter = activeFilter === 'all' || item.type === activeFilter;
                const matchSearch = !q || item.label.toLowerCase().includes(q) || item.tag.toLowerCase().includes(q);
                if (!matchFilter || !matchSearch) return false;
                if (!hasDateFilter) return true;
                return Array.from(item.dates || []).some(dateStr => {
                    const parts = dateStr.split('-');
                    if (filterYear  && parts[0] !== filterYear)              return false;
                    if (filterMonth && (parts[1] || '') !== filterMonth)     return false;
                    if (filterDay   && (parts[2] || '') !== filterDay)       return false;
                    return true;
                });
            });

            if (filtered.length === 0) {
                ul.innerHTML = `<li class="scan-hint">조건에 맞는 태그가 없습니다.</li>`;
                return;
            }

            const extraIdSet = new Set(getSeriesIds().slice(1));
            ul.innerHTML = filtered.map(item => {
                let cls = 'tag-list-item';
                if (item.label === currentLabel) cls += ' active';
                else if (extraIdSet.has(item.label)) cls += ' in-series';
                return `
                <li class="${cls}" data-label="${escAttr(item.label)}">
                    <div class="tag-label">${escHtml(item.label)}</div>
                    <div class="tag-full">${escHtml(item.tag)}</div>
                    <div class="tag-meta">
                        <span class="tag-badge t-${item.type}">${item.type}</span>
                        <span class="tag-badge ${item.hasContent ? 'has-content' : 'no-content'}">${item.hasContent ? '✅ 등록됨' : '미등록'}</span>
                        <span class="tag-count">${item.count}건</span>
                    </div>
                </li>`;
            }).join('');
        }

        function onDateFilterInput(el) {
            el.classList.toggle('has-value', !!el.value.trim());
        }

        function clearDateFilter() {
            ['filter-year', 'filter-month', 'filter-day'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.value = ''; el.classList.remove('has-value'); }
            });
            renderTagList();
        }

        function setFilter(type) {
            activeFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.f === type);
            });
            renderTagList();
        }

        // ── 태그 선택 → 에디터 로드 ──
        async function selectTag(label) {
            if (!label) return;
            currentLabel = label;
            renderTagList();

            showAdminLoading('데이터를 불러오는 중...');
            try {
                const res = await safeFetchDB({ action: "getDoc", collection: "series_analysis", id: label });
                if (res.ok && res.data) {
                    populateForm(label, res.data);
                    document.getElementById('am-delete-btn').classList.remove('am-hidden');
                } else {
                    prepareNewForm(label);
                }
                showRelatedSuggestions(label);
                renderImpactTimelines();
            } catch (e) {
                const isNotFound = e.message.includes('찾을 수 없') || e.message.includes('NotFound') || e.message.includes('not find');
                if (isNotFound) {
                    prepareNewForm(label);
                    showRelatedSuggestions(label);
                    renderImpactTimelines();
                } else {
                    showStatus('로드 실패: ' + e.message, 'err');
                }
            } finally {
                hideAdminLoading();
            }
        }

        // ── 시리즈 ID 멀티 헬퍼 ──
        function renderSeriesIds(ids) {
            const list = document.getElementById('series-ids-list');
            const hint = document.getElementById('series-id-hint');
            const addBtn = document.getElementById('btn-add-series-id');
            if (!ids || ids.length === 0) {
                list.innerHTML = '';
                if (hint) hint.style.display = '';
                if (addBtn) addBtn.classList.add('am-hidden');
                return;
            }
            if (hint) hint.style.display = 'none';
            if (addBtn) addBtn.classList.remove('am-hidden');
            list.innerHTML = ids.map((id, i) => i === 0
                ? `<div class="series-id-primary">
                       <span class="series-id-badge">PRIMARY</span>
                       <span class="series-id-value">${escHtml(id)}</span>
                   </div>`
                : `<div class="impact-tag-row">
                       <input type="text" class="am-input series-id-extra" value="${escAttr(id)}"
                           placeholder="클릭 후 좌측 태그 선택" style="font-size:12px;"
                           title="이 필드를 클릭한 뒤 좌측 태그 목록에서 태그를 선택하면 자동 입력됩니다" />
                       <button type="button" class="btn-remove-tag" onclick="removeExtraIdRow(this)">×</button>
                   </div>`
            ).join('');
            list.querySelectorAll('.series-id-extra').forEach(bindExtraIdInput);
        }

        function addSeriesId(label = '') {
            if (!document.querySelector('.series-id-primary')) return;
            const list = document.getElementById('series-ids-list');
            const row = document.createElement('div');
            row.className = 'impact-tag-row';
            row.innerHTML = `
                <input type="text" class="am-input series-id-extra" value="${escAttr(label)}"
                    placeholder="클릭 후 좌측 태그 선택" style="font-size:12px;"
                    title="이 필드를 클릭한 뒤 좌측 태그 목록에서 태그를 선택하면 자동 입력됩니다" />
                <button type="button" class="btn-remove-tag" onclick="removeExtraIdRow(this)">×</button>
            `;
            const newInput = row.querySelector('.series-id-extra');
            bindExtraIdInput(newInput);
            list.appendChild(row);
            newInput.focus();
        }

        function removeExtraIdRow(btn) {
            btn.closest('.impact-tag-row').remove();
            renderTagList();
        }

        function getSeriesIds() {
            const primaryEl = document.querySelector('.series-id-value');
            const primary = primaryEl ? primaryEl.textContent.trim() : '';
            if (!primary) return [];
            const extras = Array.from(document.querySelectorAll('.series-id-extra'))
                .map(el => el.value.trim()).filter(Boolean);
            return [primary, ...extras];
        }

        function prepareNewForm(label) {
            clearFormFields();
            renderSeriesIds([label]);
            document.getElementById('am-doc-id').textContent = label;
            document.getElementById('am-form-title').textContent = '새 시리즈 작성';
            renderTagList();
        }

        function populateForm(label, d) {
            const ids = Array.isArray(d.series_ids) && d.series_ids.length > 0 ? d.series_ids : [label];
            renderSeriesIds(ids);
            document.getElementById('am-doc-id').textContent = ids[0];
            document.getElementById('am-form-title').textContent = '시리즈 수정';
            document.getElementById('am-status-val').value = d.status || '';
            document.getElementById('am-overview').value = d.overview || '';
            document.getElementById('am-title').value = d.title || '';
            document.getElementById('am-author').value = d.author || '';
            document.getElementById('am-date').value = d.date || '';
            if (quill) quill.root.innerHTML = d.content || '';
            renderImpactTags(Array.isArray(d.impact_tags) ? d.impact_tags : []);
            clearStatus();
            renderTagList();
        }

        // ── 저장 ──
        async function saveDoc() {
            const ids = getSeriesIds();
            if (!ids.length) { showStatus('좌측 목록에서 태그를 먼저 선택하세요.', 'err'); return; }
            const label = ids[0];

            const data = {
                series_ids:  ids,
                status:      document.getElementById('am-status-val').value.trim(),
                overview:    document.getElementById('am-overview').value.trim(),
                title:       document.getElementById('am-title').value.trim(),
                author:      document.getElementById('am-author').value.trim(),
                date:        document.getElementById('am-date').value.trim(),
                content:     quill ? quill.root.innerHTML : '',
                impact_tags: getImpactTags(),
                updatedAt:   new Date().toISOString()
            };

            const saveBtn = document.getElementById('am-save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = '저장 중...';
            try {
                await safeFetchDB({ action: "set", collection: "series_analysis", id: label, data });
                showStatus('✅ 저장 완료!', 'ok');
                document.getElementById('am-delete-btn').classList.remove('am-hidden');
                document.getElementById('am-form-title').textContent = '시리즈 수정';
                ids.forEach(id => {
                    const item = tagItems.find(t => t.label === id);
                    if (item) item.hasContent = true;
                });
                renderTagList();
            } catch (e) {
                showStatus('저장 실패: ' + e.message, 'err');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '저장';
            }
        }

        // ── 삭제 ──
        async function deleteDoc() {
            const ids = getSeriesIds();
            const label = ids[0];
            if (!label) return;
            if (!confirm(`"${label}" 시리즈 내용을 삭제하시겠습니까?\n아카이브 타임라인 데이터는 그대로 유지됩니다.`)) return;

            showAdminLoading('삭제 중...');
            try {
                await safeFetchDB({ action: "delDoc", collection: "series_analysis", id: label });
                ids.forEach(id => {
                    const item = tagItems.find(t => t.label === id);
                    if (item) item.hasContent = false;
                });
                clearForm();
                showStatus('✅ 삭제 완료', 'ok');
            } catch (e) {
                showStatus('삭제 실패: ' + e.message, 'err');
            } finally {
                hideAdminLoading();
            }
        }

        // ── 폼 초기화 ──
        function clearForm() {
            currentLabel = '';
            clearFormFields();
            document.getElementById('am-delete-btn').classList.add('am-hidden');
            renderTagList();
        }

        function clearFormFields() {
            document.getElementById('am-form-title').textContent = '시리즈 에디터';
            document.getElementById('am-doc-id').textContent = '';
            renderSeriesIds([]);
            document.getElementById('am-status-val').value = '';
            document.getElementById('am-overview').value = '';
            document.getElementById('am-title').value = '';
            document.getElementById('am-author').value = '';
            document.getElementById('am-date').value = '';
            if (quill) quill.root.innerHTML = '';
            renderImpactTags([]);
            const relPanel = document.getElementById('related-tags-panel');
            if (relPanel) relPanel.classList.add('am-hidden');
            const tlPanel = document.getElementById('impact-timeline-preview');
            if (tlPanel) tlPanel.classList.add('am-hidden');
            clearStatus();
        }

        // ── 영향 태그 헬퍼 ──
        function addImpactTag(tag = '', note = '') {
            const list = document.getElementById('impact-tags-list');
            const row = document.createElement('div');
            row.className = 'impact-tag-row';
            row.innerHTML = `
                <input type="text" class="am-input impact-tag-name" placeholder="태그명" value="${escAttr(tag)}" style="flex:0 0 180px;" />
                <input type="text" class="am-input impact-tag-note" placeholder="영향 설명" value="${escAttr(note)}" />
                <button type="button" class="btn-remove-tag" onclick="this.closest('.impact-tag-row').remove()">×</button>
            `;
            list.appendChild(row);
        }

        function getImpactTags() {
            return Array.from(document.querySelectorAll('#impact-tags-list .impact-tag-row')).map(row => ({
                tag:  row.querySelector('.impact-tag-name').value.trim(),
                note: row.querySelector('.impact-tag-note').value.trim()
            })).filter(t => t.tag);
        }

        function renderImpactTags(tags) {
            document.getElementById('impact-tags-list').innerHTML = '';
            (tags || []).forEach(t => addImpactTag(t.tag || '', t.note || ''));
        }

        // ── 타임라인 미리보기 ──
        function buildTagTimeline(label) {
            const events = [];
            for (const doc of cachedIssuesData) {
                Object.entries(doc.months || {}).forEach(([m, mData]) => {
                    (mData.events || []).forEach(ev => {
                        const tagList = (ev.tags || '').split(',').map(t => t.trim()).filter(Boolean);
                        if (tagList.some(t => tagToLabel(t) === label)) {
                            events.push({ month: m, year: doc.id ? doc.id.replace('year_', '') : '', title: ev.title || '', date_start: ev.date_start || '' });
                        }
                    });
                });
            }
            events.sort((a, b) => {
                const dA = `${a.year}${a.month}${a.date_start}`;
                const dB = `${b.year}${b.month}${b.date_start}`;
                return dA.localeCompare(dB);
            });
            return events;
        }

        function renderImpactTimelines() {
            const panel = document.getElementById('impact-timeline-preview');
            const body = document.getElementById('impact-timeline-body');
            if (!panel || !body) return;

            if (!cachedIssuesData.length) { panel.classList.add('am-hidden'); return; }

            const impactTags = getImpactTags();
            if (!impactTags.length) { panel.classList.add('am-hidden'); return; }

            body.innerHTML = impactTags.map(t => {
                const events = buildTagTimeline(t.tag);
                let lastYear = '';
                const rows = events.map(ev => {
                    let html = '';
                    if (ev.year !== lastYear) {
                        html += `<div class="tl-prev-year">${ev.year}</div>`;
                        lastYear = ev.year;
                    }
                    const day = ev.date_start ? ev.date_start.split('-').pop() : '';
                    html += `<div class="tl-prev-item">
                        <span class="tl-prev-date">${ev.month}${day ? '.' + day : ''}</span>
                        <span class="tl-prev-title">${escHtml(ev.title || '제목 없음')}</span>
                    </div>`;
                    return html;
                }).join('');

                return `<details class="tl-prev-tag" open>
                    <summary class="tl-prev-tag-header">
                        <span class="tl-prev-tag-name">${escHtml(t.tag)}</span>
                        <span class="tl-prev-tag-count">${events.length}건</span>
                    </summary>
                    <div class="tl-prev-tag-body">
                        ${events.length ? rows : '<div class="tl-prev-empty">이 태그로 등록된 이벤트가 없습니다.</div>'}
                    </div>
                </details>`;
            }).join('');

            panel.classList.remove('am-hidden');
        }

        // ── 연관 태그 추천 ──
        function findRelatedTags(mnforceLabel) {
            const coTags = {};
            for (const doc of cachedIssuesData) {
                Object.values(doc.months || {}).forEach(m => {
                    (m.events || []).forEach(ev => {
                        const tags = (ev.tags || '').split(',').map(t => t.trim()).filter(Boolean);
                        const hasCurrent = tags.some(t => tagToLabel(t) === mnforceLabel);
                        if (!hasCurrent) return;
                        tags.forEach(t => {
                            const type = tagType(t);
                            if (!type) return;
                            const label = tagToLabel(t);
                            if (!label || label === mnforceLabel) return;
                            if (!coTags[label]) coTags[label] = { tag: t, type, count: 0 };
                            coTags[label].count++;
                        });
                    });
                });
            }
            return Object.entries(coTags)
                .map(([label, info]) => ({ label, ...info }))
                .sort((a, b) => b.count - a.count);
        }

        function showRelatedSuggestions(label) {
            const panel = document.getElementById('related-tags-panel');
            const chipsWrap = document.getElementById('related-tags-chips');
            if (!panel || !chipsWrap) return;

            if (!cachedIssuesData.length) {
                panel.classList.add('am-hidden');
                return;
            }

            const related = findRelatedTags(label);
            if (!related.length) {
                panel.classList.add('am-hidden');
                return;
            }

            const existingTags = new Set(getImpactTags().map(t => t.tag));
            chipsWrap.innerHTML = related.map(r => {
                const already = existingTags.has(r.label);
                return `<button type="button"
                    class="tag-chip chip-${r.type}${already ? ' chip-already' : ''}"
                    ${already ? '' : `onclick="addFromSuggestion('${escAttr(r.label)}')"`}
                    title="${escAttr(r.tag)} · ${r.count}건 공출현"
                >${already ? '✓ ' : '+ '}${escHtml(r.label)}<span style="opacity:0.55;font-size:9px;margin-left:4px;">${r.count}</span></button>`;
            }).join('');

            panel.classList.remove('am-hidden');
        }

        function addFromSuggestion(label) {
            const existing = getImpactTags().map(t => t.tag);
            if (existing.includes(label)) return;
            addImpactTag(label, '');
            showRelatedSuggestions(currentLabel);
            renderImpactTimelines();
        }

        // ── 상태 메시지 ──
        function showStatus(msg, type) {
            const el = document.getElementById('am-status-msg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'am-status' + (type ? ` ${type}` : '');
            el.classList.remove('am-hidden');
        }
        function clearStatus() {
            const el = document.getElementById('am-status-msg');
            if (el) el.classList.add('am-hidden');
        }

        function escHtml(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function escAttr(str) { return String(str ?? '').replace(/"/g, '&quot;'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>역사 지도 편집</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../admin.css" />
</head>
<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>
    <div class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>
      <main class="admin-content">
<style>
  .med{ --ink:#252017; --soft:#6b6350; --line:#ddd6c6; --card:#fbf9f3; --panel:#f3efe4;
    --ocean:rgb(95,131,137); --land:#f2f0e8; --landln:#c7b998;
    max-width:1060px; margin:0 auto; padding:8px; color:var(--ink);
    font-family:"Helvetica Neue","Apple SD Gothic Neo","Malgun Gothic",sans-serif; line-height:1.5; }
  .med h2{ font-family:Georgia,"Nanum Myeongjo",serif; font-size:1.4rem; margin:0; }
  .med-sub{ margin:2px 0 10px; color:var(--soft); font-size:.85rem; }
  .med-bar{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:7px; }
  .med-lbl{ font-size:.78rem; color:var(--soft); margin-right:2px; }
  .med-act{ border:1px solid var(--line); background:var(--card); font:inherit; font-size:.82rem; padding:6px 10px; border-radius:7px; cursor:pointer; }
  .med-act:hover{ background:#fff; } .med-act.on{ background:#efeadd; font-weight:700; }
  .med-status{ font-size:.78rem; color:var(--soft); margin-left:4px; }
  .med-chip{ display:inline-flex; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .med-chip.on{ border-color:#252017; }
  .med-chip button{ border:none; background:none; font:inherit; font-size:.82rem; padding:5px 6px; cursor:pointer; color:var(--ink); }
  .med-chip .csel{ font-weight:600; padding:5px 8px; } .med-chip.on .csel{ background:#fff; }
  .med-chip .cmv,.med-chip .cdel{ color:var(--soft); font-size:.72rem; }
  .med-chip button:hover{ background:#fff; } .med-chip .cdel:hover{ color:#c0453f; }
  .med-chip .dot{ display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
  .med-preset{ border:1px dashed var(--line); background:none; font:inherit; font-size:.8rem; padding:5px 9px; border-radius:7px; cursor:pointer; color:var(--soft); }
  .med-preset:hover{ background:#fff; color:var(--ink); }
  .med-new{ font:inherit; font-size:.8rem; padding:5px 7px; border:1px solid var(--line); border-radius:6px; width:96px; }
  .med-wrap{ position:relative; }
  .med-svg{ width:100%; height:auto; display:block; border-radius:9px; border:1px solid var(--line); touch-action:none; background:var(--ocean); }
  .med-svg.pan{ cursor:grab; } .med-svg.pan:active{ cursor:grabbing; } .med-svg.city{ cursor:crosshair; }
  .med-svg .land{ fill:var(--land); stroke:var(--landln); stroke-width:.6; stroke-linejoin:round; }
  /* 투명도는 그룹에 1회만 — 구간(reach) 겹침이 진해지지 않게 */
  #riverPath{ opacity:.55; }
  .med-river{ fill:none; stroke:#3d6f8e; stroke-linejoin:round; stroke-linecap:round; }
  .med-terr{ fill-opacity:.42; stroke:#fff; stroke-opacity:.85; stroke-linejoin:round; }
  .med-active-ol{ fill:none; stroke:#252017; stroke-dasharray:3 2; stroke-opacity:.55; }
  .med-vtx{ fill:#fff; stroke:#252017; cursor:grab; } .med-vtx:hover{ fill:#ffe; }
  .med-mid{ fill:#252017; fill-opacity:.35; cursor:copy; }
  .med-lab{ fill:#20242a; paint-order:stroke; stroke:#fff; stroke-width:2.6px; stroke-linejoin:round; text-anchor:middle; font-weight:700; pointer-events:none; }
  .med-nlab{ fill:#7a715a; text-anchor:middle; pointer-events:none; font-style:italic; }
  .med-citymk{ stroke:#fff; }
  .med-citylab{ fill:#2a2417; paint-order:stroke; stroke:#fff; stroke-width:2.4px; stroke-linejoin:round; font-weight:700; pointer-events:none; }
  .med-citysel{ fill:none; stroke:#252017; stroke-dasharray:2 2; }
  .med-zoom{ position:absolute; right:10px; bottom:10px; display:flex; flex-direction:column; gap:4px; }
  .med-zoom button{ width:30px; height:30px; border:1px solid var(--line); background:rgba(255,255,255,.9); border-radius:7px; font-size:16px; cursor:pointer; }
  .med-hint{ font-size:.78rem; color:var(--soft); margin:8px 0 0; }
  .med-cpanel{ margin-top:8px; border:1px solid var(--line); border-radius:9px; padding:10px 12px; background:var(--panel); font-size:.82rem; display:none; }
  .med-cpanel table{ border-collapse:collapse; margin-top:6px; }
  .med-cpanel td,.med-cpanel th{ padding:3px 10px 3px 0; text-align:left; font-weight:400; }
  .med-cpanel th{ color:var(--soft); font-size:.74rem; }
  .med-cpanel select,.med-cpanel input{ font:inherit; font-size:.8rem; padding:2px 5px; border:1px solid var(--line); border-radius:5px; }
  .med-out{ width:100%; box-sizing:border-box; margin-top:8px; height:56px; font-family:ui-monospace,Consolas,monospace; font-size:.66rem;
    border:1px solid var(--line); border-radius:7px; padding:8px; background:#fff; color:#333; display:none; }
</style>

<div class="med">
  <h2>삼국시대 지도 편집기 <span style="font-weight:400;font-size:.82rem;color:var(--soft)">· 지형 · 영토 · 도시</span></h2>
  <p class="med-sub">고도별 색 지형도(hypsometric) 위에 영토를 반투명으로 편집합니다. 지형이 다 비치고, 도시는 연도별로 소속·등급이 바뀝니다.</p>

  <div class="med-bar" id="medYears"></div>
  <div class="med-bar"><span class="med-lbl">나라</span><span id="medKings" style="display:contents"></span></div>
  <div class="med-bar">
    <span class="med-lbl">＋ 추가</span><span id="medPresets" style="display:contents"></span>
    <input class="med-new" id="medNewName" placeholder="새 나라 이름">
    <input type="color" id="medNewColor" value="#7a5cc0" style="width:34px;height:30px;border:1px solid var(--line);border-radius:6px;padding:1px;cursor:pointer">
    <button class="med-act" id="medAdd">추가</button>
  </div>
  <div class="med-bar">
    <span class="med-lbl">모드</span>
    <button class="med-act" id="btnCity">🏰 도시</button>
    <button class="med-act" id="medPan">🖐 이동</button>
    <button class="med-act" id="medDel">🗑 점 지우기</button>
    <span class="med-lbl">레이어</span>
    <button class="med-act on" id="btnRelief">⛰ 지형</button>
    <button class="med-act on" id="btnRiver">💧 강</button>
    <button class="med-act on" id="btnCityVis">🏙 도시</button>
    <button class="med-act on" id="medClip">🌊 클립</button>
    <button class="med-act" id="medLock">✓ 잠금</button>
    <button class="med-act" id="medSave">💾 저장</button>
    <button class="med-act" id="medLoad">📂 불러오기</button>
    <button class="med-act" id="medReset">↺ 초기화</button>
    <span class="med-status" id="medStatus"></span>
  </div>

      if(ci===selCity && cityMode){ var ring=document.createElementNS(NS,"circle"); ring.setAttribute("cx",p[0]);ring.setAttribute("cy",p[1]);ring.setAttribute("r",9*k);ring.setAttribute("class","med-citysel");ring.setAttribute("stroke-width",1.3*k); gCity.appendChild(ring); }
      var mk;
      if(info[1]==="cap"){ mk=document.createElementNS(NS,"text"); mk.setAttribute("x",p[0]); mk.setAttribute("y",p[1]+5.5*k); mk.setAttribute("text-anchor","middle"); mk.setAttribute("font-size",16*k); mk.setAttribute("fill",col); mk.setAttribute("style","paint-order:stroke;stroke:#fff;stroke-width:"+(2.4*k)+"px"); mk.textContent="★"; }
      else { mk=document.createElementNS(NS,"circle"); mk.setAttribute("cx",p[0]); mk.setAttribute("cy",p[1]); mk.setAttribute("r",4.2*k); mk.setAttribute("fill",col); mk.setAttribute("stroke-width",1*k); }
      mk.setAttribute("class","med-citymk"); mk.dataset.ci=ci; mk.style.pointerEvents=cityMode?"auto":"none"; if(cityMode)mk.style.cursor="pointer";
      gCity.appendChild(mk);
      var lab=document.createElementNS(NS,"text"); lab.setAttribute("x",p[0]+(info[1]==="cap"?9:7)*k); lab.setAttribute("y",p[1]+4*k); lab.setAttribute("class","med-citylab"); lab.setAttribute("font-size",11*k); lab.textContent=c.name; gCity.appendChild(lab);
    }); }

  function render(){
    var k=vb.w/BASE[0]; drawNeigh();
    gTerr.innerHTML=""; gLab.innerHTML=""; gHand.innerHTML="";
    gTerr.setAttribute("clip-path", clip?"url(#landClip)":"");
    var geom=cleanGeom();
    nations.forEach(function(n){ var g=geom[n.id]; if(!g||!g.length) return;
      var path=document.createElementNS(NS,"path"); path.setAttribute("d",mpPath(g)); path.setAttribute("class","med-terr");
      path.setAttribute("fill",n.color); path.setAttribute("fill-rule","evenodd"); path.setAttribute("stroke-width",1.1*k); gTerr.appendChild(path);
      var big=null,ba=-1; g.forEach(function(poly){var r=poly[0];var b=[9e9,9e9,-9e9,-9e9];r.forEach(function(p){if(p[0]<b[0])b[0]=p[0];if(p[0]>b[2])b[2]=p[0];if(p[1]<b[1])b[1]=p[1];if(p[1]>b[3])b[3]=p[1];});var a=(b[2]-b[0])*(b[3]-b[1]);if(a>ba){ba=a;big=b;}});
      if(big){ var t=document.createElementNS(NS,"text"); t.setAttribute("x",(big[0]+big[2])/2); t.setAttribute("y",(big[1]+big[3])/2+4*k);
        t.setAttribute("class","med-lab"); t.setAttribute("font-size",12*k); t.textContent=n.name; gLab.appendChild(t); } });
    drawCities();
    if(locked||panMode||cityMode||!active) return;
    var pts=state[year][active]||(state[year][active]=[]);
    if(pts.length>1){ var ol=document.createElementNS(NS,"path"); ol.setAttribute("d",rawPath(pts)); ol.setAttribute("class","med-active-ol"); ol.setAttribute("stroke-width",1*k); gHand.appendChild(ol); }
    for(var i=0;i<pts.length;i++){ if(pts.length<3 && i===pts.length-1) break;
      var a=proj(pts[i][0],pts[i][1]), b=proj(pts[(i+1)%pts.length][0],pts[(i+1)%pts.length][1]);
      var m=document.createElementNS(NS,"circle"); m.setAttribute("cx",(a[0]+b[0])/2); m.setAttribute("cy",(a[1]+b[1])/2);
      m.setAttribute("r",3.4*k); m.setAttribute("class","med-mid"); m.dataset.ins=i; gHand.appendChild(m); }
    pts.forEach(function(ll,i){ var p=proj(ll[0],ll[1]); var c=document.createElementNS(NS,"circle");
      c.setAttribute("cx",p[0]); c.setAttribute("cy",p[1]); c.setAttribute("r",5.2*k); c.setAttribute("stroke-width",1.5*k);
      c.setAttribute("class","med-vtx"); c.dataset.i=i; gHand.appendChild(c); });
  }

  function svgXY(e){ var pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; var q=pt.matrixTransform(svg.getScreenCTM().inverse()); return [q.x,q.y]; }

  var drag=null, pan=null;
  svg.addEventListener("pointerdown",function(e){
    if(panMode){ pan={sx:e.clientX,sy:e.clientY,vx:vb.x,vy:vb.y}; svg.setPointerCapture(e.pointerId); return; }
    if(cityMode){ if(locked) return; var ct=e.target;
      if(ct.classList.contains("med-citymk")){ selCity=+ct.dataset.ci; buildCityPanel(); render(); return; }
      var cxy=svgXY(e), cll=unproj(cxy[0],cxy[1]); var nc={name:"새 도시",lon:d2(cll[0]),lat:d2(cll[1]),y:{}};
      nc.y[year]=[active||(nations[0]&&nations[0].id),"fort"]; cities.push(nc); selCity=cities.length-1; buildCityPanel(); render(); status("도시 추가 — 아래에서 이름·연도별 소속 설정"); return; }
    if(locked||!active) return; var t=e.target;
    if(delMode){ if(t.classList.contains("med-vtx")){ state[year][active].splice(+t.dataset.i,1); render(); } return; }
    if(t.classList.contains("med-vtx")){ var i=+t.dataset.i; if(e.altKey){ state[year][active].splice(i,1); render(); return; } drag={i:i}; svg.setPointerCapture(e.pointerId); return; }
    if(t.classList.contains("med-mid")){ var idx=+t.dataset.ins; var xy=svgXY(e); var ll=unproj(xy[0],xy[1]); state[year][active].splice(idx+1,0,[d2(ll[0]),d2(ll[1])]); render(); return; }
    if(t.classList.contains("med-terr")||t.classList.contains("med-lab")) return;
    var xy2=svgXY(e); var ll2=unproj(xy2[0],xy2[1]); (state[year][active]||(state[year][active]=[])).push([d2(ll2[0]),d2(ll2[1])]); render();
  });
  svg.addEventListener("pointermove",function(e){
    if(pan){ var sc=vb.w/svg.clientWidth; vb.x=pan.vx-(e.clientX-pan.sx)*sc; vb.y=pan.vy-(e.clientY-pan.sy)*sc;
      vb.x=Math.max(0,Math.min(BASE[0]-vb.w,vb.x)); vb.y=Math.max(0,Math.min(BASE[1]-vb.h,vb.y)); applyVB(); return; }
    if(drag){ var xy=svgXY(e); var ll=unproj(xy[0],xy[1]); state[year][active][drag.i]=[d2(ll[0]),d2(ll[1])]; render(); } });
  svg.addEventListener("pointerup",function(){ drag=null; pan=null; });
  svg.addEventListener("wheel",function(e){ e.preventDefault(); var xy=svgXY(e); zoomAt(xy[0],xy[1], e.deltaY<0?0.84:1.19); },{passive:false});
  svg.addEventListener("contextmenu",function(e){ var t=e.target;
    if(cityMode && t.classList&&t.classList.contains("med-citymk")){ e.preventDefault(); cities.splice(+t.dataset.ci,1); selCity=null; buildCityPanel(); render(); return; }
    if(locked||!active) return;
    if(t.classList&&t.classList.contains("med-vtx")){ e.preventDefault(); state[year][active].splice(+t.dataset.i,1); render(); } });

  // ---- city panel ----
  function buildCityPanel(){ var wrap=document.getElementById("medCPanel");
    if(!cityMode || selCity==null || !cities[selCity]){ wrap.style.display="none"; wrap.innerHTML=""; return; }
    var c=cities[selCity];
    var optHtml=nations.map(function(n){return '<option value="'+n.id+'">'+n.name+'</option>';}).join("");
    var rows=YEARS.map(function(Y){ var on=!!c.y[Y.y];
      return '<tr><td><b>'+Y.y+'년</b></td><td><label><input type="checkbox" class="cyOn" data-y="'+Y.y+'" '+(on?"checked":"")+'> 표시</label></td>'
       +'<td>소속 <select class="cyOwner" data-y="'+Y.y+'" '+(on?"":"disabled")+'>'+optHtml+'</select></td>'
       +'<td>등급 <select class="cyType" data-y="'+Y.y+'" '+(on?"":"disabled")+'><option value="cap">수도 ★</option><option value="fort">성 ●</option></select></td></tr>'; }).join("");
    wrap.innerHTML='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><b>도시</b> <input id="cyName" class="med-new" style="width:130px" value="'+String(c.name).replace(/"/g,"&quot;")+'"><button class="med-act" id="cyDel">🗑 이 도시 삭제</button></div>'
      +'<table><tr><th>연도</th><th></th><th>소속 나라</th><th>등급</th></tr>'+rows+'</table>';
    wrap.style.display="block";
    YEARS.forEach(function(Y){ var inf=c.y[Y.y]; if(inf){ var os=wrap.querySelector('.cyOwner[data-y="'+Y.y+'"]'); var ts=wrap.querySelector('.cyType[data-y="'+Y.y+'"]'); if(os)os.value=inf[0]; if(ts)ts.value=inf[1]; } });
    wrap.querySelector("#cyName").oninput=function(){ c.name=this.value; render(); };
    wrap.querySelector("#cyDel").onclick=function(){ cities.splice(selCity,1); selCity=null; buildCityPanel(); render(); };
    wrap.querySelectorAll(".cyOn").forEach(function(cb){ cb.onchange=function(){ var y=cb.dataset.y;
      if(cb.checked){ c.y[y]=[active||nations[0].id,"fort"]; } else { delete c.y[y]; } buildCityPanel(); render(); }; });
    wrap.querySelectorAll(".cyOwner").forEach(function(sel){ sel.onchange=function(){ var y=sel.dataset.y; if(c.y[y]) c.y[y][0]=sel.value; render(); }; });
    wrap.querySelectorAll(".cyType").forEach(function(sel){ sel.onchange=function(){ var y=sel.dataset.y; if(c.y[y]) c.y[y][1]=sel.value; render(); }; });
  }

  var yb=document.getElementById("medYears");
  YEARS.forEach(function(Y,i){ var b=document.createElement("button"); b.className="med-act"+(i===0?" on":"");
    b.innerHTML='<b style="font-family:Georgia,serif">'+Y.y+'년</b> · '+Y.nm;
    b.onclick=function(){ year=Y.y; yb.querySelectorAll(".med-act").forEach(function(x){x.classList.remove("on");}); b.classList.add("on"); document.getElementById("medCurY").textContent=Y.y; render(); }; yb.appendChild(b); });

  function buildBar(){ kb.innerHTML="";
    nations.forEach(function(n){ var chip=document.createElement("span"); chip.className="med-chip"+(n.id===active?" on":"");
      chip.innerHTML='<button class="csel"><span class="dot" style="background:'+n.color+'"></span>'+n.name+'</button>'
        +'<button class="cmv" data-d="-1" title="우선순위 낮춤">◀</button><button class="cmv" data-d="1" title="우선순위 높임">▶</button><button class="cdel" title="삭제">✕</button>';
      chip.querySelector(".csel").onclick=function(){ active=n.id; document.getElementById("medCur").textContent=n.name; buildBar(); render(); };
      chip.querySelectorAll(".cmv").forEach(function(mvb){ mvb.onclick=function(ev){ ev.stopPropagation(); move(n.id,+mvb.dataset.d); }; });
      chip.querySelector(".cdel").onclick=function(ev){ ev.stopPropagation(); if(nations.length<=1){ status("최소 1개는 남겨두세요"); return; } if(confirm(n.name+' 나라를 삭제할까요?')) delNation(n.id); };
      kb.appendChild(chip); }); }

  var pb=document.getElementById("medPresets");
  Object.keys(PRESETS).forEach(function(pn){ var b=document.createElement("button"); b.className="med-preset";
    b.innerHTML='<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+PRESETS[pn].color+';margin-right:5px;vertical-align:-1px"></span>'+pn;
    b.onclick=function(){ var ex=nations.find(function(n){return n.name===pn;}); if(ex){ active=ex.id; document.getElementById("medCur").textContent=pn; buildBar(); render(); status(pn+" 선택"); return; }
      addNation(pn,PRESETS[pn].color,PRESETS[pn].pts); status(pn+" 추가됨"); }; pb.appendChild(b); });
  document.getElementById("medAdd").onclick=function(){ var nm=document.getElementById("medNewName").value.trim(); if(!nm){ status("이름을 입력하세요"); return; }
    addNation(nm, document.getElementById("medNewColor").value, null); document.getElementById("medNewName").value=""; status(nm+" 추가됨 (지도를 클릭해 그리세요)"); };

  function setMode(which){ // 상호 배타 모드
    panMode = which==="pan"; delMode = which==="del"; cityMode = which==="city";
    document.getElementById("medPan").classList.toggle("on",panMode);
    document.getElementById("medDel").classList.toggle("on",delMode);
    document.getElementById("btnCity").classList.toggle("on",cityMode);
    svg.classList.toggle("pan",panMode); svg.classList.toggle("city",cityMode);
    if(!cityMode) selCity=null; buildCityPanel(); render(); }
  document.getElementById("btnCity").onclick=function(){ setMode(cityMode?null:"city"); status(cityMode?"":"도시 모드: 지도 클릭=추가, 마커=선택, 우클릭=삭제"); };
  document.getElementById("medPan").onclick=function(){ setMode(panMode?null:"pan"); };
  document.getElementById("medDel").onclick=function(){ setMode(delMode?null:"del"); status(delMode?"점 지우기 모드: 점 클릭=삭제":""); };

  document.getElementById("btnRelief").onclick=function(){ var im=document.getElementById("reliefImg"); var on=im.style.display!=="none"; im.style.display=on?"none":""; this.classList.toggle("on",!on); };
  document.getElementById("btnRiver").onclick=function(){ var rp=document.getElementById("riverPath"); var on=rp.style.display!=="none"; rp.style.display=on?"none":""; this.classList.toggle("on",!on); };
  document.getElementById("btnCityVis").onclick=function(){ showCity=!showCity; this.classList.toggle("on",showCity); render(); };
  document.getElementById("medClip").onclick=function(){ clip=!clip; this.classList.toggle("on",clip); render(); };
  document.getElementById("medLock").onclick=function(){ locked=!locked; this.textContent=locked?"✎ 편집 재개":"✓ 잠금"; render(); };
  document.getElementById("medReset").onclick=function(){ initFresh(); buildBar(); buildCityPanel(); render(); status("전체 초기화"); };
  document.getElementById("medSave").onclick=saveData;
  document.getElementById("medLoad").onclick=loadData;
  document.getElementById("zIn").onclick=function(){ zoomAt(vb.x+vb.w/2,vb.y+vb.h/2,0.7); };
  document.getElementById("zOut").onclick=function(){ zoomAt(vb.x+vb.w/2,vb.y+vb.h/2,1.43); };
  document.getElementById("zRst").onclick=function(){ vb={x:0,y:0,w:BASE[0],h:BASE[1]}; applyVB(); render(); };

  try{ if(localStorage.getItem(STORE_KEY)) loadData(); }catch(e){}
  buildBar(); render();
})();
</script>
      </main>
    </div>
  </div>
  <script src="../admin-common.js"></script>
</body>

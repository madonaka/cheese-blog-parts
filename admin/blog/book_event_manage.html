<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사건 기록 · Cheese Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../admin.css" />
  <script src="../admin-common.js"></script>
  <script>
    window.CHEESE_ADMIN_ACTIVE_PAGE = "book_event_manage";
    window.CHEESE_ADMIN_PAGE_SUBTITLE = "사건 기록";
  </script>
  <style>
    :root {
      --bg: #f3f4f6; --card: #fff; --text: #0f172a; --sub: #475569;
      --line: rgba(15,23,42,0.10); --shadow: 0 10px 28px rgba(15,23,42,0.08);
      --r: 16px; --accent: #1e293b; --accent2: #7c3aed;
    }
    .ev-wrap { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .ev-title { font-size: 20px; font-weight: 900; margin: 8px 0 18px; }
    .ev-top { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .ev-search { flex: 1; padding: 9px 14px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; }
    .ev-btn { padding: 9px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; }
    .ev-btn:hover { opacity: 0.85; }

    /* 테이블 */
    .ev-table-wrap { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; padding: 12px 14px; text-align: left; font-weight: 700; color: var(--sub); border-bottom: 1px solid var(--line); }
    td { padding: 12px 14px; border-bottom: 1px solid var(--line); color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #ede9fe; color: #7c3aed; margin-right: 4px; }
    .action-btn { padding: 4px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; border: 1.5px solid; background: transparent; margin-right: 4px; }
    .edit-btn { color: #3b82f6; border-color: #bfdbfe; }
    .del-btn { color: #ef4444; border-color: #fecaca; }
    .empty-msg { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }

    /* 모달 */
    .ev-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .ev-modal-bg.open { display: flex; }
    .ev-modal { background: #fff; border-radius: 20px; padding: 28px; width: 620px; max-width: 95vw; box-shadow: 0 24px 60px rgba(0,0,0,0.2); margin: auto; }
    .ev-modal-title { font-size: 18px; font-weight: 900; margin: 0 0 20px; }
    .ev-field { margin-bottom: 14px; }
    .ev-field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 5px; }
    .ev-field input, .ev-field textarea, .ev-field select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 10px;
      font-size: 14px; box-sizing: border-box; font-family: inherit;
    }
    .ev-field textarea { resize: vertical; min-height: 72px; }
    .ev-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* 등장 위치 섹션 */
    .section-label { font-size: 13px; font-weight: 800; color: var(--text); margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--line); }
    .appearance-entry { background: #f8fafc; border: 1.5px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .app-field-label { font-size: 11px; font-weight: 700; color: var(--sub); display: block; margin-bottom: 3px; }
    .app-header { display: flex; gap: 8px; margin-bottom: 8px; align-items: start; }
    .app-book-select-wrap { flex: 1; }
    .app-header select { padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; box-sizing: border-box; width: 100%; background: #fff; }
    .app-vol-chapter-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .app-vol-chapter-area.single { grid-template-columns: 1fr; }
    .app-vol-chapter-area select, .app-vol-chapter-area input { width: 100%; padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #fff; }
    .remove-row-btn { padding: 7px 10px; border: 1.5px solid #fecaca; border-radius: 8px; color: #ef4444; background: transparent; cursor: pointer; font-size: 12px; align-self: start; margin-top: 16px; }
    .add-row-btn { padding: 8px 14px; border: 1.5px dashed #cbd5e1; border-radius: 8px; background: transparent; color: #64748b; font-size: 12px; cursor: pointer; margin-top: 4px; }
    .add-row-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* 연관 인물 */
    .char-search-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .char-search-row input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; }
    .char-search-row button { padding: 8px 14px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; }
    .char-search-results { max-height: 150px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; display: none; }
    .char-search-results.visible { display: block; }
    .char-result-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--line); }
    .char-result-item:last-child { border-bottom: none; }
    .char-result-item:hover { background: #f1f5f9; }
    .selected-chars { display: flex; flex-wrap: wrap; gap: 6px; }
    .selected-char-tag { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: #ede9fe; border-radius: 20px; font-size: 12px; color: var(--accent2); font-weight: 700; }
    .selected-char-tag button { border: none; background: none; cursor: pointer; color: #9333ea; font-size: 14px; line-height: 1; padding: 0; }

    /* 책별 필터 바 */
    .book-filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; }
    .book-filter-bar .filter-label { font-size: 12px; font-weight: 700; color: var(--sub); white-space: nowrap; }
    .book-filter-bar select { padding: 6px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; background: #fff; color: var(--text); }
    .book-filter-bar select:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    .book-filter-bar select.filter-active { border-color: #3b82f6 !important; background: #eff6ff; color: #1d4ed8; font-weight: 700; }
    .filter-clear-btn { padding: 6px 12px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 12px; cursor: pointer; background: transparent; color: var(--sub); }
    .filter-clear-btn:hover { background: #e2e8f0; }

    .ev-modal-footer { display: flex; gap: 8px; margin-top: 20px; }
    .ev-modal-footer button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .save-btn { background: var(--accent); color: #fff; }
    .cancel-btn { background: #e2e8f0; color: var(--text); }

    /* 사건 유형 토글 */
    .ev-type-toggle { display: flex; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 0; }
    .ev-type-toggle label { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 9px 12px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--sub); background: #f8fafc; transition: background 0.15s, color 0.15s; border: none; }
    .ev-type-toggle label:first-child { border-right: 1.5px solid var(--line); }
    .ev-type-toggle input[type="radio"] { display: none; }
    .ev-type-toggle input[type="radio"]:checked + label { background: var(--accent); color: #fff; }
    /* 날짜 입력 행 */
    .ev-date-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
    .ev-date-row input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; box-sizing: border-box; }
    .ev-date-preview { margin-top: 6px; font-size: 13px; color: #7c3aed; font-weight: 700; min-height: 18px; }
    /* 목록 유형 배지 */
    .type-badge { display: inline-block; padding: 1px 7px; border-radius: 5px; font-size: 10px; font-weight: 800; margin-right: 3px; vertical-align: middle; }
    .type-dated { background: #dbeafe; color: #1d4ed8; }
    .type-bg { background: #fef3c7; color: #92400e; }

    /* ── 모바일 (640px 이하) ── */
    @media (max-width: 640px) {
      .ev-wrap { padding: 12px; }
      .ev-top { flex-direction: column; align-items: stretch; }
      .ev-search { width: 100%; box-sizing: border-box; }
      .ev-btn { width: 100%; text-align: center; }

      .book-filter-bar { flex-direction: column; align-items: stretch; gap: 6px; }
      .book-filter-bar select { width: 100%; box-sizing: border-box; }
      .filter-clear-btn { width: 100%; box-sizing: border-box; }

      /* 테이블 → 카드 변환 */
      .ev-table-wrap { background: transparent; border: none; box-shadow: none; overflow: visible; }
      .ev-table-wrap table thead { display: none; }
      .ev-table-wrap table,
      .ev-table-wrap tbody,
      .ev-table-wrap tr,
      .ev-table-wrap td { display: block; width: 100%; box-sizing: border-box; }
      .ev-table-wrap tr {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 10px;
        padding: 14px;
        box-shadow: 0 2px 8px rgba(15,23,42,0.05);
      }
      .ev-table-wrap tr:last-child { margin-bottom: 0; }
      .ev-table-wrap tr:hover td { background: transparent; }
      .ev-table-wrap td {
        padding: 4px 0;
        border: none;
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 13px;
        color: var(--text);
      }
      .ev-table-wrap td::before {
        content: attr(data-label);
        font-size: 11px;
        font-weight: 700;
        color: var(--sub);
        min-width: 60px;
        flex-shrink: 0;
        padding-top: 2px;
      }
      /* 사건명 행 — 강조 + 구분선 */
      .ev-table-wrap td[data-label="사건명"] {
        font-size: 15px;
        padding-bottom: 10px;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--line);
        align-items: center;
      }
      .ev-table-wrap td[data-label="사건명"]::before { padding-top: 0; }
      /* 관리 버튼 행 — 오른쪽 정렬 */
      .ev-table-wrap td[data-label="관리"] {
        justify-content: flex-end;
        padding-top: 10px;
        margin-top: 6px;
        border-top: 1px solid var(--line);
      }
      .ev-table-wrap td[data-label="관리"]::before { display: none; }
      .action-btn { padding: 7px 16px; font-size: 13px; }
      /* 빈 값(−) 행 숨김 */
      .ev-table-wrap td.mobile-hide { display: none; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <div id="admin-header-slot"></div>
  <div class="admin-main">
    <aside id="admin-menu-slot" class="admin-sidebar"></aside>
    <main class="admin-content">
      <div class="ev-wrap">
        <h2 class="ev-title">사건 기록</h2>
        <div class="ev-top">
          <input class="ev-search" id="ev-search" placeholder="사건명 또는 시대 검색..." oninput="renderList()">
          <button class="ev-btn" onclick="openModal()">+ 사건 추가</button>
        </div>
        <div class="book-filter-bar">
          <span class="filter-label">📚 책별 필터</span>
          <select id="filter-book" onchange="onFilterBookChange()"><option value="">전체 책</option></select>
          <select id="filter-volume" onchange="onFilterVolumeChange()" disabled><option value="">전체 권</option></select>
          <select id="filter-chapter" onchange="renderList()" disabled><option value="">전체 장</option></select>
          <button class="filter-clear-btn" onclick="clearFilters()">초기화</button>
        </div>
        <div class="ev-table-wrap">
          <table>
            <thead>
              <tr>
                <th>사건명</th>
                <th>시대</th>
                <th>등장 책</th>
                <th>연관 인물</th>
                <th>태그</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="ev-tbody">
              <tr><td colspan="6" class="empty-msg">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 모달 -->
<div class="ev-modal-bg" id="ev-modal-bg">
  <div class="ev-modal">
    <h3 class="ev-modal-title" id="ev-modal-title">사건 추가</h3>
    <input type="hidden" id="ev-id">

    <div class="ev-field">
      <label>사건명 *</label>
      <input type="text" id="ev-title" placeholder="예: 임진왜란">
    </div>
    <div class="ev-field">
      <label>사건 요약</label>
      <textarea id="ev-summary" placeholder="이 사건에 대한 요약..."></textarea>
    </div>

    <div class="ev-field">
      <label>사건 유형 *</label>
      <div class="ev-type-toggle">
        <input type="radio" name="ev-type" id="ev-type-dated" value="dated">
        <label for="ev-type-dated" onclick="toggleEventType('dated')">📅 날짜 있는 사건</label>
        <input type="radio" name="ev-type" id="ev-type-background" value="background">
        <label for="ev-type-background" onclick="toggleEventType('background')">🗺️ 시대상 / 문화 / 배경</label>
      </div>
    </div>

    <div id="ev-date-section" class="ev-field" style="display:none;">
      <label>날짜 <span style="font-weight:400; color:#94a3b8; font-size:11px;">— 월, 일은 선택 입력</span></label>
      <div class="ev-date-row">
        <input type="number" id="ev-date-year" placeholder="연도  예) 1901" min="1" max="2100" oninput="updateDatePreview()">
        <input type="number" id="ev-date-month" placeholder="월" min="1" max="12" oninput="updateDatePreview()">
        <input type="number" id="ev-date-day" placeholder="일" min="1" max="31" oninput="updateDatePreview()">
      </div>
      <div class="ev-date-preview" id="ev-date-preview"></div>
    </div>

    <div id="ev-era-section" class="ev-field" style="display:none;">
      <label>시대 / 배경</label>
      <input type="text" id="ev-era" placeholder="예: 조선 후기, 1900년대 초반">
    </div>

    <div class="ev-field">
      <label>태그 (쉼표로 구분)</label>
      <input type="text" id="ev-tags" placeholder="예: 전쟁, 외교">
    </div>
    <div class="ev-field">
      <label>메모</label>
      <textarea id="ev-memo" placeholder="추가 메모..."></textarea>
    </div>

    <div class="section-label">📚 등장 위치</div>
    <div id="ev-appearances-list"></div>
    <button class="add-row-btn" onclick="addAppearanceRow()">+ 등장 위치 추가</button>

    <div class="section-label">👤 연관 인물</div>
    <div class="char-search-row">
      <input type="text" id="char-search-input" placeholder="인물 이름 검색..." oninput="searchChars()">
    </div>
    <div class="char-search-results" id="char-search-results"></div>
    <div class="selected-chars" id="selected-chars"></div>

    <div class="ev-modal-footer">
      <button class="cancel-btn" onclick="closeModal()">취소</button>
      <button class="save-btn" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script>
  async function safeFetchDB(payload) {
    if (!window.CHEESE_ADMIN_DB_API) throw new Error("API 엔드포인트가 정의되지 않았습니다.");
    const res = await fetch(window.CHEESE_ADMIN_DB_API, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Firebase 오류");
    return data;
  }

  let ALL_EVENTS = [];
  let ALL_BOOKS = [];
  let ALL_CHARS = [];
  let selectedCharIds = [];

  function esc(s) {
    return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ── 책별 필터 ── */
  function buildBookFilter() {
    const sel = document.getElementById("filter-book");
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">전체 책</option>' +
      ALL_BOOKS.map(b => `<option value="${b.id}" ${b.id === cur ? "selected" : ""}>${esc(b.title)}</option>`).join("");
  }

  function onFilterBookChange() {
    const bookId = document.getElementById("filter-book")?.value || "";
    const volSel = document.getElementById("filter-volume");
    const chSel = document.getElementById("filter-chapter");
    if (volSel) { volSel.innerHTML = '<option value="">전체 권</option>'; volSel.disabled = true; }
    if (chSel) { chSel.innerHTML = '<option value="">전체 장</option>'; chSel.disabled = true; }
    if (bookId) {
      const book = ALL_BOOKS.find(b => b.id === bookId);
      const vols = (book?.volumes || []).filter(v => v.label);
      if (vols.length && volSel) {
        vols.forEach(v => { const o = document.createElement("option"); o.value = v.label; o.textContent = v.label; volSel.appendChild(o); });
        volSel.disabled = false;
      }
    }
    document.getElementById("filter-book")?.classList.toggle("filter-active", !!bookId);
    renderList();
  }

  function onFilterVolumeChange() {
    const bookId = document.getElementById("filter-book")?.value || "";
    const volLabel = document.getElementById("filter-volume")?.value || "";
    const chSel = document.getElementById("filter-chapter");
    if (chSel) { chSel.innerHTML = '<option value="">전체 장</option>'; chSel.disabled = true; }
    if (bookId && volLabel) {
      const book = ALL_BOOKS.find(b => b.id === bookId);
      const vol = (book?.volumes || []).find(v => v.label === volLabel);
      const chs = vol?.chapters || [];
      if (chs.length && chSel) {
        chs.forEach(ch => { const o = document.createElement("option"); o.value = ch; o.textContent = ch; chSel.appendChild(o); });
        chSel.disabled = false;
      }
    }
    document.getElementById("filter-volume")?.classList.toggle("filter-active", !!volLabel);
    renderList();
  }

  function clearFilters() {
    const bookSel = document.getElementById("filter-book");
    const volSel = document.getElementById("filter-volume");
    const chSel = document.getElementById("filter-chapter");
    if (bookSel) { bookSel.value = ""; bookSel.classList.remove("filter-active"); }
    if (volSel) { volSel.innerHTML = '<option value="">전체 권</option>'; volSel.disabled = true; volSel.classList.remove("filter-active"); }
    if (chSel) { chSel.innerHTML = '<option value="">전체 장</option>'; chSel.disabled = true; chSel.classList.remove("filter-active"); }
    renderList();
  }

  function toggleEventType(type) {
    const datedRadio = document.getElementById("ev-type-dated");
    const bgRadio = document.getElementById("ev-type-background");
    const dateSection = document.getElementById("ev-date-section");
    const eraSection = document.getElementById("ev-era-section");
    if (datedRadio) datedRadio.checked = (type === "dated");
    if (bgRadio) bgRadio.checked = (type === "background");
    if (dateSection) dateSection.style.display = type === "dated" ? "" : "none";
    if (eraSection) eraSection.style.display = type === "background" ? "" : "none";
  }

  function updateDatePreview() {
    const y = document.getElementById("ev-date-year")?.value;
    const m = document.getElementById("ev-date-month")?.value;
    const d = document.getElementById("ev-date-day")?.value;
    const prev = document.getElementById("ev-date-preview");
    if (!prev) return;
    let parts = [];
    if (y) parts.push(y + "년");
    if (m) parts.push(m + "월");
    if (d) parts.push(d + "일");
    prev.textContent = parts.length ? "▸ " + parts.join(" ") : "";
  }

  function formatEventDate(ev) {
    const type = ev.event_type || "background";
    if (type === "dated") {
      let parts = [];
      if (ev.date_year) parts.push(ev.date_year + "년");
      if (ev.date_month) parts.push(ev.date_month + "월");
      if (ev.date_day) parts.push(ev.date_day + "일");
      const dateStr = parts.join(" ") || "-";
      return `<span class="type-badge type-dated">날짜</span><span style="color:#1d4ed8; font-weight:700;">${esc(dateStr)}</span>`;
    } else if (ev.event_type === "background") {
      return `<span class="type-badge type-bg">시대상</span>${esc(ev.era || "-")}`;
    }
    return esc(ev.era || "-");
  }

  async function loadAll() {
    try {
      const [evRes, bookRes, charRes] = await Promise.all([
        safeFetchDB({ action: "get", collection: "reading_book_events", orderByField: "created_at" }),
        safeFetchDB({ action: "get", collection: "reading_books" }),
        safeFetchDB({ action: "get", collection: "reading_characters" })
      ]);
      ALL_EVENTS = evRes.data || [];
      ALL_BOOKS = bookRes.data || [];
      ALL_CHARS = charRes.data || [];
      buildBookFilter();
      renderList();
    } catch (e) {
      const tbody = document.getElementById("ev-tbody");
      if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="empty-msg" style="color:#ef4444;">불러오기 실패: ${e.message}</td></tr>`;
    }
  }

  function renderList() {
    const q = (document.getElementById("ev-search")?.value || "").toLowerCase();
    const bookId = document.getElementById("filter-book")?.value || "";
    const volLabel = document.getElementById("filter-volume")?.value || "";
    const chLabel = document.getElementById("filter-chapter")?.value || "";
    const filtered = ALL_EVENTS.filter(e => {
      const matchQ = (e.title || "").toLowerCase().includes(q) ||
        (e.era || "").toLowerCase().includes(q) ||
        (e.date_year ? String(e.date_year) : "").includes(q);
      const matchBook = !bookId || (e.appearances || []).some(a => {
        if (a.book_id !== bookId) return false;
        if (volLabel && (a.volume_label || "") !== volLabel) return false;
        if (chLabel && (a.chapter_label || a.chapter || "") !== chLabel) return false;
        return true;
      });
      return matchQ && matchBook;
    });
    const tbody = document.getElementById("ev-tbody");
    if (!tbody) return;
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-msg">등록된 사건이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(ev => {
      const bookTitles = (ev.appearances || []).map(a => a.book_title || "").filter(Boolean);
      const uniqueBooks = [...new Set(bookTitles)];
      const charCount = (ev.related_character_ids || []).length;
      const tags = (ev.tags || []).map(t => `<span class="badge">${esc(t)}</span>`).join("");
      const booksStr = uniqueBooks.map(esc).join(", ") || "-";
      return `<tr>
        <td data-label="사건명"><strong>${esc(ev.title)}</strong></td>
        <td data-label="시대">${formatEventDate(ev)}</td>
        <td data-label="등장 책" style="font-size:12px; color:#64748b;"${booksStr === "-" ? ' class="mobile-hide"' : ""}>${booksStr}</td>
        <td data-label="연관 인물">${charCount}명</td>
        <td data-label="태그"${!tags ? ' class="mobile-hide"' : ""}>${tags || "-"}</td>
        <td data-label="관리">
          <button class="action-btn edit-btn" onclick="openModal('${ev.id}')">수정</button>
          <button class="action-btn del-btn" onclick="deleteEvent('${ev.id}', '${esc(ev.title || "")}')">삭제</button>
        </td>
      </tr>`;
    }).join("");
  }

  /* 계단식 선택 헬퍼 */
  function evOnBookChange(selectEl) {
    const entry = selectEl.closest(".appearance-entry");
    if (!entry) return;
    evBuildVolChapterUI(entry, ALL_BOOKS.find(b => b.id === selectEl.value) || null, "", "");
  }

  function evOnVolumeChange(selectEl) {
    const entry = selectEl.closest(".appearance-entry");
    if (!entry) return;
    const book = ALL_BOOKS.find(b => b.id === (entry.querySelector(".app-book-id")?.value || ""));
    const vol = (book?.volumes || []).find(v => (v.label || "") === selectEl.value);
    const chArea = entry.querySelector(".app-chapter-area");
    if (chArea) evBuildChapterUI(chArea, vol || null, "");
  }

  function evBuildVolChapterUI(entry, book, volumeLabel, chapterLabel) {
    const area = entry.querySelector(".app-vol-chapter-area");
    if (!area) return;
    area.innerHTML = "";
    const volumes = (book && book.volumes) || [];
    if (volumes.length === 0) {
      area.className = "app-vol-chapter-area single";
      area.innerHTML = `<div><span class="app-field-label">장/절 (직접 입력)</span><input class="app-chapter-label" type="text" placeholder="예: 1장" value="${esc(chapterLabel || "")}"></div>`;
      return;
    }
    area.className = "app-vol-chapter-area";
    const selVol = volumes.length === 1 && !volumeLabel ? (volumes[0].label || "") : volumeLabel;
    const volWrap = document.createElement("div");
    volWrap.innerHTML = `<span class="app-field-label">권</span><select class="app-vol-select" onchange="evOnVolumeChange(this)"><option value="">권 선택</option>${volumes.map(v => `<option value="${esc(v.label||"")}" ${(v.label||"")===selVol?"selected":""}>${esc(v.label||"본편")}</option>`).join("")}</select>`;
    area.appendChild(volWrap);
    const chArea = document.createElement("div");
    chArea.className = "app-chapter-area";
    area.appendChild(chArea);
    const selectedVol = volumes.find(v => (v.label||"") === selVol) || (volumes.length === 1 ? volumes[0] : null);
    evBuildChapterUI(chArea, selectedVol || null, chapterLabel);
  }

  function evBuildChapterUI(container, volume, selectedChapter) {
    container.innerHTML = "";
    const chapters = (volume && volume.chapters) || [];
    const wrap = document.createElement("div");
    if (chapters.length === 0) {
      wrap.innerHTML = `<span class="app-field-label">장/절 (직접 입력)</span><input class="app-chapter-label" type="text" placeholder="예: 1장" value="${esc(selectedChapter||"")}">`;
    } else {
      const hasCustom = selectedChapter && !chapters.includes(selectedChapter);
      wrap.innerHTML = `<span class="app-field-label">장/절</span><select class="app-chapter-label" onchange="if(this.value==='__custom__'){const i=document.createElement('input');i.className='app-chapter-label';i.type='text';i.placeholder='직접 입력';this.parentNode.replaceChild(i,this);i.focus();}"><option value="">선택</option>${chapters.map(ch=>`<option value="${esc(ch)}" ${ch===selectedChapter?"selected":""}>${esc(ch)}</option>`).join("")}<option value="__custom__" ${hasCustom?"selected":""}>직접 입력...</option></select>`;
      if (hasCustom) setTimeout(()=>{const s=wrap.querySelector("select");if(s){const i=document.createElement("input");i.className="app-chapter-label";i.type="text";i.value=selectedChapter||"";s.parentNode.replaceChild(i,s);}},0);
    }
    container.appendChild(wrap);
  }

  function addAppearanceRow(data) {
    const list = document.getElementById("ev-appearances-list");
    if (!list) return;
    const d = data || {};
    const bookOptions = ALL_BOOKS.map(b => `<option value="${b.id}" ${b.id === d.book_id ? "selected" : ""}>${esc(b.title)}</option>`).join("");
    const row = document.createElement("div");
    row.className = "appearance-entry";
    row.innerHTML = `
      <div class="app-header">
        <div class="app-book-select-wrap">
          <span class="app-field-label">책/작품</span>
          <select class="app-book-id" onchange="evOnBookChange(this)">
            <option value="">책 선택</option>
            ${bookOptions}
          </select>
        </div>
        <button class="remove-row-btn" onclick="this.closest('.appearance-entry').remove()" type="button">✕</button>
      </div>
      <div class="app-vol-chapter-area single"></div>
      <div style="margin-top:8px;">
        <span class="app-field-label">등장 맥락 메모</span>
        <input class="app-note" type="text" placeholder="등장 맥락 메모" value="${esc(d.note || "")}" style="width:100%; padding:7px 10px; border:1.5px solid var(--line); border-radius:8px; font-size:13px; box-sizing:border-box;">
      </div>
    `;
    list.appendChild(row);

    if (d.book_id) {
      evBuildVolChapterUI(row, ALL_BOOKS.find(b => b.id === d.book_id) || null, d.volume_label || "", d.chapter_label || d.chapter || "");
    } else {
      const area = row.querySelector(".app-vol-chapter-area");
      if (area) area.innerHTML = `<div><span class="app-field-label">장/절</span><input class="app-chapter-label" type="text" placeholder="책을 먼저 선택하세요" disabled style="background:#f1f5f9; color:#94a3b8;"></div>`;
    }
  }

  function getAppearances() {
    const list = document.getElementById("ev-appearances-list");
    if (!list) return [];
    return Array.from(list.querySelectorAll(".appearance-entry")).map(row => {
      const bookId = row.querySelector(".app-book-id")?.value || "";
      const book = ALL_BOOKS.find(b => b.id === bookId);
      const volSel = row.querySelector(".app-vol-select");
      const chEl = row.querySelector(".app-chapter-label");
      const chVal = chEl ? chEl.value : "";
      return {
        book_id: bookId,
        book_title: book ? book.title : "",
        volume_label: volSel ? volSel.value : "",
        chapter_label: chVal === "__custom__" ? "" : chVal,
        note: row.querySelector(".app-note")?.value.trim() || ""
      };
    }).filter(a => a.book_id);
  }

  function searchChars() {
    const q = (document.getElementById("char-search-input")?.value || "").toLowerCase();
    const resultsEl = document.getElementById("char-search-results");
    if (!resultsEl) return;
    if (!q) { resultsEl.classList.remove("visible"); return; }
    const matches = ALL_CHARS.filter(c =>
      !selectedCharIds.includes(c.id) &&
      ((c.name || "").toLowerCase().includes(q) ||
       (c.alt_names || []).some(n => n.toLowerCase().includes(q)))
    ).slice(0, 8);
    if (!matches.length) { resultsEl.classList.remove("visible"); return; }
    resultsEl.innerHTML = matches.map(c =>
      `<div class="char-result-item" onclick="selectChar('${c.id}', '${esc(c.name || "")}')">
        ${esc(c.name || "")}${(c.alt_names||[]).length ? ` <span style="color:#94a3b8;font-size:11px;">(${(c.alt_names||[]).join(", ")})</span>` : ""}
      </div>`
    ).join("");
    resultsEl.classList.add("visible");
  }

  function selectChar(id, name) {
    if (selectedCharIds.includes(id)) return;
    selectedCharIds.push(id);
    renderSelectedChars();
    const inp = document.getElementById("char-search-input");
    if (inp) inp.value = "";
    const res = document.getElementById("char-search-results");
    if (res) res.classList.remove("visible");
  }

  function removeChar(id) {
    selectedCharIds = selectedCharIds.filter(x => x !== id);
    renderSelectedChars();
  }

  function renderSelectedChars() {
    const el = document.getElementById("selected-chars");
    if (!el) return;
    el.innerHTML = selectedCharIds.map(id => {
      const c = ALL_CHARS.find(x => x.id === id);
      const name = c ? c.name : id;
      return `<span class="selected-char-tag">${esc(name)} <button onclick="removeChar('${id}')">×</button></span>`;
    }).join("");
  }

  function openModal(id) {
    const modal = document.getElementById("ev-modal-bg");
    if (!modal) return;
    selectedCharIds = [];

    const list = document.getElementById("ev-appearances-list");
    if (list) list.innerHTML = "";

    if (id) {
      const ev = ALL_EVENTS.find(x => x.id === id);
      if (!ev) return;
      document.getElementById("ev-modal-title").textContent = "사건 수정";
      document.getElementById("ev-id").value = ev.id;
      document.getElementById("ev-title").value = ev.title || "";
      document.getElementById("ev-summary").value = ev.summary || "";
      document.getElementById("ev-tags").value = (ev.tags || []).join(", ");
      document.getElementById("ev-memo").value = ev.memo || "";
      const evType = ev.event_type || "background";
      toggleEventType(evType);
      if (evType === "dated") {
        const dyEl = document.getElementById("ev-date-year");
        const dmEl = document.getElementById("ev-date-month");
        const ddEl = document.getElementById("ev-date-day");
        if (dyEl) dyEl.value = ev.date_year || "";
        if (dmEl) dmEl.value = ev.date_month || "";
        if (ddEl) ddEl.value = ev.date_day || "";
        updateDatePreview();
      } else {
        const eraEl = document.getElementById("ev-era");
        if (eraEl) eraEl.value = ev.era || "";
      }
      (ev.appearances || []).forEach(a => addAppearanceRow(a));
      selectedCharIds = [...(ev.related_character_ids || [])];
    } else {
      document.getElementById("ev-modal-title").textContent = "사건 추가";
      document.getElementById("ev-id").value = "";
      ["ev-title","ev-summary","ev-era","ev-tags","ev-memo"].forEach(eid => {
        const el = document.getElementById(eid);
        if (el) el.value = "";
      });
      ["ev-date-year","ev-date-month","ev-date-day"].forEach(eid => {
        const el = document.getElementById(eid);
        if (el) el.value = "";
      });
      const prev = document.getElementById("ev-date-preview");
      if (prev) prev.textContent = "";
      toggleEventType("dated");
    }
    renderSelectedChars();
    modal.classList.add("open");
  }

  function closeModal() {
    const modal = document.getElementById("ev-modal-bg");
    if (modal) modal.classList.remove("open");
  }

  async function saveEvent() {
    const title = (document.getElementById("ev-title")?.value || "").trim();
    if (!title) { alert("사건명을 입력하세요."); return; }

    const id = document.getElementById("ev-id")?.value || ("bevt_" + Date.now());
    const isNew = !document.getElementById("ev-id")?.value;
    const tagsRaw = (document.getElementById("ev-tags")?.value || "").split(",").map(t => t.trim()).filter(Boolean);

    const evType = document.getElementById("ev-type-dated")?.checked ? "dated" : "background";
    const data = {
      title,
      event_type: evType,
      summary: (document.getElementById("ev-summary")?.value || "").trim(),
      tags: tagsRaw,
      memo: (document.getElementById("ev-memo")?.value || "").trim(),
      appearances: getAppearances(),
      related_character_ids: [...selectedCharIds],
      updated_at: new Date().toISOString()
    };
    if (evType === "dated") {
      data.date_year = parseInt(document.getElementById("ev-date-year")?.value || "") || null;
      data.date_month = parseInt(document.getElementById("ev-date-month")?.value || "") || null;
      data.date_day = parseInt(document.getElementById("ev-date-day")?.value || "") || null;
      data.era = "";
    } else {
      data.era = (document.getElementById("ev-era")?.value || "").trim();
      data.date_year = null;
      data.date_month = null;
      data.date_day = null;
    }
    if (isNew) data.created_at = new Date().toISOString();

    try {
      await safeFetchDB({ action: "set", collection: "reading_book_events", id, data });

      // 연관 인물의 related_event_ids도 업데이트
      const prevEvent = ALL_EVENTS.find(e => e.id === id);
      const prevCharIds = prevEvent ? (prevEvent.related_character_ids || []) : [];
      const added = selectedCharIds.filter(cid => !prevCharIds.includes(cid));
      const removed = prevCharIds.filter(cid => !selectedCharIds.includes(cid));

      await Promise.all([
        ...added.map(async cid => {
          const c = ALL_CHARS.find(x => x.id === cid);
          if (!c) return;
          const evIds = [...new Set([...(c.related_event_ids || []), id])];
          await safeFetchDB({ action: "set", collection: "reading_characters", id: cid, data: { related_event_ids: evIds } });
          c.related_event_ids = evIds;
        }),
        ...removed.map(async cid => {
          const c = ALL_CHARS.find(x => x.id === cid);
          if (!c) return;
          const evIds = (c.related_event_ids || []).filter(eid => eid !== id);
          await safeFetchDB({ action: "set", collection: "reading_characters", id: cid, data: { related_event_ids: evIds } });
          c.related_event_ids = evIds;
        })
      ]);

      closeModal();
      if (isNew) ALL_EVENTS.unshift({ ...data, id });
      else {
        const idx = ALL_EVENTS.findIndex(e => e.id === id);
        if (idx >= 0) ALL_EVENTS[idx] = { ...data, id };
      }
      renderList();
    } catch (e) {
      alert("저장 실패: " + e.message);
    }
  }

  async function deleteEvent(id, title) {
    if (!confirm(`"${title}" 사건을 삭제하시겠습니까?`)) return;
    try {
      await safeFetchDB({ action: "delete", collection: "reading_book_events", id });
      ALL_EVENTS = ALL_EVENTS.filter(e => e.id !== id);
      renderList();
    } catch (e) {
      alert("삭제 실패: " + e.message);
    }
  }


  document.addEventListener("DOMContentLoaded", loadAll);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>책 관리 · Cheese Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../admin.css" />
  <script src="../admin-common.js"></script>
  <script>
    window.CHEESE_ADMIN_ACTIVE_PAGE = "book_manage";
    window.CHEESE_ADMIN_PAGE_SUBTITLE = "책 관리";
  </script>
  <style>
    :root {
      --bg: #f3f4f6; --card: #fff; --text: #0f172a; --sub: #475569;
      --line: rgba(15,23,42,0.10); --shadow: 0 10px 28px rgba(15,23,42,0.08);
      --r: 16px; --accent: #1e293b; --accent2: #3b82f6;
    }
    .bm-wrap { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .bm-title { font-size: 20px; font-weight: 900; margin: 8px 0 18px; }
    .bm-top { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .bm-search { flex: 1; padding: 9px 14px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; }
    .bm-btn { padding: 9px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; }
    .bm-btn:hover { opacity: 0.85; }

    /* 카드 그리드 */
    .bm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .bm-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; box-shadow: var(--shadow); }
    .bm-card-title { font-size: 15px; font-weight: 800; margin: 0 0 4px; }
    .bm-card-meta { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    .bm-vol-summary { font-size: 12px; color: var(--accent2); margin-bottom: 6px; }
    .bm-card-memo { font-size: 12px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bm-card-actions { display: flex; gap: 6px; margin-top: 12px; }
    .bm-card-actions button { flex: 1; padding: 6px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 12px; cursor: pointer; background: transparent; }
    .bm-card-actions .edit-btn { color: #3b82f6; border-color: #bfdbfe; }
    .bm-card-actions .del-btn { color: #ef4444; border-color: #fecaca; }
    .empty-msg { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }

    /* 모달 */
    .bm-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .bm-modal-bg.open { display: flex; }
    .bm-modal { background: #fff; border-radius: 20px; padding: 0; width: 620px; max-width: 95vw; box-shadow: 0 24px 60px rgba(0,0,0,0.2); margin: auto; overflow: hidden; }
    .bm-modal-hd { padding: 24px 28px 0; }
    .bm-modal-title { font-size: 18px; font-weight: 900; margin: 0 0 16px; }

    /* 탭 */
    .bm-tabs { display: flex; border-bottom: 2px solid var(--line); padding: 0 28px; }
    .bm-tab-btn { padding: 10px 16px; font-size: 13px; font-weight: 700; border: none; background: transparent; cursor: pointer; color: #94a3b8; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .bm-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .bm-tab-panel { display: none; padding: 20px 28px; }
    .bm-tab-panel.active { display: block; }

    /* 폼 */
    .bm-field { margin-bottom: 14px; }
    .bm-field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 5px; }
    .bm-field input, .bm-field textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 10px;
      font-size: 14px; box-sizing: border-box; font-family: inherit;
    }
    .bm-field textarea { resize: vertical; min-height: 64px; }
    .bm-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* 권/목차 */
    .vol-hint { font-size: 12px; color: #94a3b8; margin: 0 0 14px; line-height: 1.6; }
    .vol-card { background: #f8fafc; border: 1.5px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .vol-card:hover { border-color: #bfdbfe; }
    .vol-card-header { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .vol-label-input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; font-weight: 700; }
    .vol-remove-btn { padding: 6px 10px; border: 1.5px solid #fecaca; border-radius: 8px; color: #ef4444; background: transparent; cursor: pointer; font-size: 12px; white-space: nowrap; }

    /* 목차 칩 */
    .ch-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 28px; }
    .ch-chip { display: flex; align-items: center; gap: 3px; padding: 3px 8px; background: #dbeafe; color: #1d4ed8; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .ch-chip button { border: none; background: none; cursor: pointer; color: #1d4ed8; font-size: 13px; line-height: 1; padding: 0; }

    /* 목차 입력 */
    .ch-add-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    .ch-add-input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; }
    .ch-add-btn { padding: 7px 12px; border: 1.5px solid #bfdbfe; border-radius: 8px; background: transparent; color: #3b82f6; font-size: 12px; cursor: pointer; font-weight: 700; white-space: nowrap; }

    /* 자동 생성 */
    .ch-auto-row { display: flex; gap: 6px; align-items: center; padding: 8px 0; border-top: 1px dashed #e2e8f0; }
    .ch-auto-label { font-size: 11px; color: #94a3b8; white-space: nowrap; }
    .ch-auto-from, .ch-auto-to { width: 56px; padding: 6px 8px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; text-align: center; }
    .ch-auto-unit { padding: 6px 8px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; background: #fff; }
    .ch-auto-gen-btn { padding: 6px 12px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    .add-vol-btn { padding: 8px 16px; border: 1.5px dashed #cbd5e1; border-radius: 8px; background: transparent; color: #64748b; font-size: 13px; cursor: pointer; width: 100%; }
    .add-vol-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* 권별 시대 범위 */
    .vol-era-row { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .vol-era-row .era-unit { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    .vol-era-year { width: 76px; padding: 5px 8px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; text-align: center; box-sizing: border-box; }
    .vol-era-month { width: 52px; padding: 5px 8px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; text-align: center; box-sizing: border-box; }
    .vol-era-preview { font-size: 11px; color: #3b82f6; font-weight: 700; margin-left: 4px; white-space: nowrap; }

    .bm-modal-footer { display: flex; gap: 8px; padding: 16px 28px 24px; }
    .bm-modal-footer button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .save-btn { background: var(--accent); color: #fff; }
    .cancel-btn { background: #e2e8f0; color: var(--text); }
  </style>
</head>
<body>
<div class="admin-shell">
  <div id="admin-header-slot"></div>
  <div class="admin-main">
    <aside id="admin-menu-slot" class="admin-sidebar"></aside>
    <main class="admin-content">
      <div class="bm-wrap">
        <h2 class="bm-title">책 관리</h2>
        <div class="bm-top">
          <input class="bm-search" id="bm-search" placeholder="제목 또는 저자 검색..." oninput="renderList()">
          <button class="bm-btn" onclick="openModal()">+ 책 추가</button>
        </div>
        <div class="bm-grid" id="bm-grid">
          <div class="empty-msg">불러오는 중...</div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 모달 -->
<div class="bm-modal-bg" id="bm-modal-bg">
  <div class="bm-modal">
    <div class="bm-modal-hd">
      <h3 class="bm-modal-title" id="bm-modal-title">책 추가</h3>
      <input type="hidden" id="bm-id">
    </div>
    <div class="bm-tabs">
      <button class="bm-tab-btn active" data-tab="info" onclick="bmSwitchTab('info')">기본 정보</button>
      <button class="bm-tab-btn" data-tab="volumes" onclick="bmSwitchTab('volumes')">권 · 목차</button>
    </div>

    <!-- 탭1: 기본 정보 -->
    <div class="bm-tab-panel active" id="bm-tab-info">
      <div class="bm-field">
        <label>작품 제목 *</label>
        <input type="text" id="bm-title" placeholder="예: 태백산맥">
      </div>
      <div class="bm-field">
        <label>저자</label>
        <input type="text" id="bm-author" placeholder="예: 조정래">
      </div>
      <div class="bm-field-row">
        <div class="bm-field">
          <label>출판사</label>
          <input type="text" id="bm-publisher">
        </div>
        <div class="bm-field">
          <label>출판연도</label>
          <input type="number" id="bm-year" placeholder="예: 1986">
        </div>
      </div>
      <div class="bm-field">
        <label>메모</label>
        <textarea id="bm-memo" placeholder="이 작품에 대한 메모..."></textarea>
      </div>
    </div>

    <!-- 탭2: 권/목차 -->
    <div class="bm-tab-panel" id="bm-tab-volumes">
      <p class="vol-hint">
        단행본: 권 레이블을 비워두고 목차만 추가하세요.<br>
        장편 시리즈: "1권", "2권" 또는 "제1부" 등으로 권을 구분하세요.<br>
        목차를 등록하면 인물·사건 기록 시 드롭다운으로 선택할 수 있습니다.
      </p>
      <div id="bm-volumes-list"></div>
      <button class="add-vol-btn" onclick="addVolumeCard()">+ 권 추가</button>
    </div>

    <div class="bm-modal-footer">
      <button class="cancel-btn" onclick="closeModal()">취소</button>
      <button class="save-btn" onclick="saveBook()">저장</button>
    </div>
  </div>
</div>

<script>
  async function safeFetchDB(payload) {
    if (!window.CHEESE_ADMIN_DB_API) throw new Error("API 엔드포인트가 정의되지 않았습니다.");
    const res = await fetch(window.CHEESE_ADMIN_DB_API, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Firebase 오류");
    return data;
  }

  let ALL_BOOKS = [];

  function esc(s) {
    return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function loadBooks() {
    try {
      const res = await safeFetchDB({ action: "get", collection: "reading_books", orderByField: "created_at" });
      ALL_BOOKS = res.data || [];
      renderList();
    } catch (e) {
      const grid = document.getElementById("bm-grid");
      if (grid) grid.innerHTML = `<div class="empty-msg" style="color:#ef4444;">불러오기 실패: ${e.message}</div>`;
    }
  }

  function renderList() {
    const q = (document.getElementById("bm-search")?.value || "").toLowerCase();
    const filtered = ALL_BOOKS.filter(b =>
      (b.title || "").toLowerCase().includes(q) ||
      (b.author || "").toLowerCase().includes(q)
    );
    const grid = document.getElementById("bm-grid");
    if (!grid) return;
    if (!filtered.length) { grid.innerHTML = `<div class="empty-msg">등록된 책이 없습니다.</div>`; return; }
    grid.innerHTML = filtered.map(b => {
      const volumes = b.volumes || [];
      const totalChapters = volumes.reduce((s, v) => s + (v.chapters || []).length, 0);
      let volSummary = "";
      if (volumes.length > 1) volSummary = `전 ${volumes.length}권`;
      if (totalChapters) volSummary += (volSummary ? " · " : "") + `총 ${totalChapters}장`;
      // 권별 시대 요약
      const eraLines = volumes
        .map(v => {
          const text = buildEraText(v.era_from, v.era_to);
          if (!text) return "";
          return v.label ? `<span style="color:#64748b;">${esc(v.label)}</span> ${esc(text)}` : esc(text);
        })
        .filter(Boolean);
      return `<div class="bm-card">
        <div class="bm-card-title">${esc(b.title || "(제목 없음)")}</div>
        <div class="bm-card-meta">${[b.author, b.year ? b.year + "년" : ""].filter(Boolean).map(esc).join(" · ") || ""}</div>
        ${volSummary ? `<div class="bm-vol-summary">📚 ${esc(volSummary)}</div>` : ""}
        ${eraLines.length ? `<div style="font-size:11px; color:#3b82f6; margin-bottom:5px; line-height:1.7;">📅 ${eraLines.join("<br>📅 ")}</div>` : ""}
        ${b.memo ? `<div class="bm-card-memo">${esc(b.memo)}</div>` : ""}
        <div class="bm-card-actions">
          <button class="edit-btn" onclick="openModal('${b.id}')">수정</button>
          <button class="del-btn" onclick="deleteBook('${b.id}', '${esc(b.title || "")}')">삭제</button>
        </div>
      </div>`;
    }).join("");
  }

  /* ── 탭 ── */
  function bmSwitchTab(tab) {
    document.querySelectorAll(".bm-tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".bm-tab-panel").forEach(p => p.classList.toggle("active", p.id === "bm-tab-" + tab));
  }

  /* ── 권 카드 ── */
  function addVolumeCard(data) {
    const list = document.getElementById("bm-volumes-list");
    if (!list) return;
    const d = data || { label: "", chapters: [] };
    const ef = d.era_from || {};
    const et = d.era_to || {};
    const card = document.createElement("div");
    card.className = "vol-card";
    card.innerHTML = `
      <div class="vol-card-header">
        <input class="vol-label-input" type="text" placeholder="권 레이블 (예: 1권, 제1부 — 생략 가능)" value="${esc(d.label || "")}">
        <button class="vol-remove-btn" onclick="this.closest('.vol-card').remove()" type="button">이 권 삭제</button>
      </div>
      <div class="vol-era-row">
        <span class="era-unit">시대</span>
        <input class="vol-era-year vol-era-from-year" type="number" placeholder="시작 연도" min="1" max="2100" value="${ef.year || ""}" oninput="updateEraPreview(this)">
        <span class="era-unit">년</span>
        <input class="vol-era-month vol-era-from-month" type="number" placeholder="월" min="1" max="12" value="${ef.month || ""}" oninput="updateEraPreview(this)">
        <span class="era-unit">월 ~</span>
        <input class="vol-era-year vol-era-to-year" type="number" placeholder="끝 연도" min="1" max="2100" value="${et.year || ""}" oninput="updateEraPreview(this)">
        <span class="era-unit">년</span>
        <input class="vol-era-month vol-era-to-month" type="number" placeholder="월" min="1" max="12" value="${et.month || ""}" oninput="updateEraPreview(this)">
        <span class="era-unit">월</span>
        <span class="vol-era-preview">${buildEraText(ef, et) ? "▸ " + buildEraText(ef, et) : ""}</span>
      </div>
      <div class="ch-chips"></div>
      <div class="ch-add-row">
        <input class="ch-add-input" type="text" placeholder="목차 이름 입력 후 Enter (예: 1장, 2장...)">
        <button class="ch-add-btn" type="button">추가</button>
      </div>
      <div class="ch-auto-row">
        <span class="ch-auto-label">자동생성:</span>
        <input class="ch-auto-from" type="number" placeholder="1" min="1" value="1">
        <span class="ch-auto-label">~</span>
        <input class="ch-auto-to" type="number" placeholder="30" min="1">
        <select class="ch-auto-unit">
          <option>장</option><option>절</option><option>편</option><option>화</option><option>부</option>
        </select>
        <button class="ch-auto-gen-btn" type="button" onclick="autoGenChapters(this)">생성</button>
      </div>
    `;

    // 기존 챕터 렌더
    const chipsEl = card.querySelector(".ch-chips");
    (d.chapters || []).forEach(ch => addChip(chipsEl, ch));

    // Enter / ｜ 구분자로 챕터 추가
    const addInput = card.querySelector(".ch-add-input");
    const addBtn = card.querySelector(".ch-add-btn");
    function doAdd() {
      const raw = addInput.value;
      const parts = raw.split("｜").map(s => s.trim()).filter(Boolean);
      if (parts.length > 1) {
        parts.forEach(p => addChip(chipsEl, p));
      } else if (parts.length === 1) {
        addChip(chipsEl, parts[0]);
      }
      addInput.value = "";
      addInput.focus();
    }
    addInput.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); doAdd(); } });
    addInput.addEventListener("input", e => { if (addInput.value.includes("｜")) doAdd(); });
    addBtn.addEventListener("click", doAdd);

    list.appendChild(card);
  }

  function addChip(container, text) {
    const chip = document.createElement("span");
    chip.className = "ch-chip";
    chip.dataset.chapter = text;
    chip.innerHTML = `${esc(text)} <button type="button" title="삭제">×</button>`;
    chip.querySelector("button").addEventListener("click", () => chip.remove());
    container.appendChild(chip);
  }

  function autoGenChapters(btn) {
    const card = btn.closest(".vol-card");
    if (!card) return;
    const from = parseInt(card.querySelector(".ch-auto-from")?.value) || 1;
    const to = parseInt(card.querySelector(".ch-auto-to")?.value);
    const unit = card.querySelector(".ch-auto-unit")?.value || "장";
    if (!to || to < from) { alert("끝 번호를 입력하세요."); return; }
    if (to - from > 500) { alert("한 번에 최대 500개까지 생성할 수 있습니다."); return; }
    const chips = card.querySelector(".ch-chips");
    for (let i = from; i <= to; i++) addChip(chips, `${i}${unit}`);
    card.querySelector(".ch-auto-to").value = "";
  }

  function buildEraText(from, to) {
    if (!from || !from.year) return "";
    let s = from.year + "년";
    if (from.month) s += " " + from.month + "월";
    if (to && to.year) {
      let e = to.year + "년";
      if (to.month) e += " " + to.month + "월";
      s += " ~ " + e;
    }
    return s;
  }

  function updateEraPreview(input) {
    const card = input.closest(".vol-card");
    if (!card) return;
    const fy = parseInt(card.querySelector(".vol-era-from-year")?.value) || 0;
    const fm = parseInt(card.querySelector(".vol-era-from-month")?.value) || 0;
    const ty = parseInt(card.querySelector(".vol-era-to-year")?.value) || 0;
    const tm = parseInt(card.querySelector(".vol-era-to-month")?.value) || 0;
    const from = fy ? { year: fy, month: fm || null } : null;
    const to = ty ? { year: ty, month: tm || null } : null;
    const preview = card.querySelector(".vol-era-preview");
    if (preview) {
      const text = buildEraText(from, to);
      preview.textContent = text ? "▸ " + text : "";
    }
  }

  function getVolumes() {
    return Array.from(document.querySelectorAll("#bm-volumes-list .vol-card")).map(card => {
      const fy = parseInt(card.querySelector(".vol-era-from-year")?.value) || null;
      const fm = parseInt(card.querySelector(".vol-era-from-month")?.value) || null;
      const ty = parseInt(card.querySelector(".vol-era-to-year")?.value) || null;
      const tm = parseInt(card.querySelector(".vol-era-to-month")?.value) || null;
      return {
        label: card.querySelector(".vol-label-input")?.value.trim() || "",
        era_from: fy ? { year: fy, month: fm } : null,
        era_to: ty ? { year: ty, month: tm } : null,
        chapters: Array.from(card.querySelectorAll(".ch-chip")).map(c => c.dataset.chapter).filter(Boolean)
      };
    });
  }

  /* ── 모달 ── */
  function openModal(id) {
    const modal = document.getElementById("bm-modal-bg");
    if (!modal) return;
    const volList = document.getElementById("bm-volumes-list");
    if (volList) volList.innerHTML = "";
    bmSwitchTab("info");

    if (id) {
      const b = ALL_BOOKS.find(x => x.id === id);
      if (!b) return;
      document.getElementById("bm-modal-title").textContent = "책 수정";
      document.getElementById("bm-id").value = b.id;
      document.getElementById("bm-title").value = b.title || "";
      document.getElementById("bm-author").value = b.author || "";
      document.getElementById("bm-publisher").value = b.publisher || "";
      document.getElementById("bm-year").value = b.year || "";
      document.getElementById("bm-memo").value = b.memo || "";
      (b.volumes || []).forEach(v => addVolumeCard(v));
    } else {
      document.getElementById("bm-modal-title").textContent = "책 추가";
      document.getElementById("bm-id").value = "";
      ["bm-title","bm-author","bm-publisher","bm-year","bm-memo"].forEach(eid => {
        const el = document.getElementById(eid);
        if (el) el.value = "";
      });
    }
    modal.classList.add("open");
  }

  function closeModal() {
    const modal = document.getElementById("bm-modal-bg");
    if (modal) modal.classList.remove("open");
  }

  async function saveBook() {
    const title = (document.getElementById("bm-title")?.value || "").trim();
    if (!title) { alert("작품 제목을 입력하세요."); return; }

    const id = document.getElementById("bm-id")?.value || ("book_" + Date.now());
    const isNew = !document.getElementById("bm-id")?.value;
    const data = {
      title,
      author: (document.getElementById("bm-author")?.value || "").trim(),
      publisher: (document.getElementById("bm-publisher")?.value || "").trim(),
      year: parseInt(document.getElementById("bm-year")?.value) || null,
      memo: (document.getElementById("bm-memo")?.value || "").trim(),
      volumes: getVolumes(),
      updated_at: new Date().toISOString()
    };
    if (isNew) data.created_at = new Date().toISOString();

    try {
      await safeFetchDB({ action: "set", collection: "reading_books", id, data });
      closeModal();
      if (isNew) ALL_BOOKS.unshift({ ...data, id });
      else {
        const idx = ALL_BOOKS.findIndex(b => b.id === id);
        if (idx >= 0) ALL_BOOKS[idx] = { ...data, id };
      }
      renderList();
    } catch (e) {
      alert("저장 실패: " + e.message);
    }
  }

  async function deleteBook(id, title) {
    if (!confirm(`"${title}" 책을 삭제하시겠습니까?`)) return;
    try {
      await safeFetchDB({ action: "delete", collection: "reading_books", id });
      ALL_BOOKS = ALL_BOOKS.filter(b => b.id !== id);
      renderList();
    } catch (e) {
      alert("삭제 실패: " + e.message);
    }
  }


  document.addEventListener("DOMContentLoaded", loadBooks);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>타이핑 암기 퀴즈 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--admin-header-h));
            overflow: hidden;
            padding: 0 !important;
        }

        .page-topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .page-topbar h1 { font-size: 1.1rem; font-weight: 800; flex: 1; }

        .two-panel { display: flex; flex: 1; overflow: hidden; }

        .set-panel {
            width: 280px;
            flex-shrink: 0;
            background: #f8fafc;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .set-panel-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
        }

        .set-panel-head span {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex: 1;
        }

        .btn-new-set {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .set-panel-filter {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            background: #fff;
            display: flex;
            gap: 6px;
        }

        .set-panel-filter select {
            flex: 1;
            font-size: 0.78rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            background: #f8fafc;
            color: #374151;
        }

        .set-list { flex: 1; overflow-y: auto; }

        .set-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
        }

        .set-item:hover  { background: #f0f4ff; }
        .set-item.active { background: #e8eeff; border-left: 3px solid var(--primary); padding-left: 11px; }

        .set-item-cat {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .cat-korean   { background: #dcfce7; color: #166534; }
        .cat-japanese { background: #fff7ed; color: #c2410c; }
        .cat-chinese  { background: #dbeafe; color: #1e40af; }
        .cat-world    { background: #f3e8ff; color: #6b21a8; }

        .set-item-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.4;
            word-break: keep-all;
            color: #1e293b;
        }

        .set-item-meta {
            margin-top: 4px;
            font-size: 0.72rem;
            color: var(--text-sub);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pub-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .pub-dot.pub   { background: #22c55e; }
        .pub-dot.draft { background: #9ca3af; }

        /* ── 오른쪽 에디터 ── */
        .editor-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.8;
        }

        .editor-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .editor-topbar h2 { font-size: 0.95rem; font-weight: 700; flex: 1; }

        .editor-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

        /* ── 카드 ── */
        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .card-head {
            padding: 14px 18px 10px;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-head h3 { font-size: 0.88rem; font-weight: 700; flex: 1; }

        .card-body { padding: 16px 18px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-full  { grid-column: 1 / -1; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }

        .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-control {
            border: 1.5px solid var(--border);
            border-radius: 7px;
            padding: 8px 11px;
            font-size: 0.87rem;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .form-control:focus { outline: none; border-color: var(--primary); }
        textarea.form-control { resize: vertical; min-height: 90px; }

        /* ── 버튼 ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary      { background: var(--primary); color: #fff; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-ghost        { background: #f1f5f9; color: #374151; border: 1px solid var(--border); }
        .btn-ghost:hover  { background: #e8eeff; color: var(--primary); }
        .btn-danger       { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #fee2e2; }
        .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

        /* ── 카테고리 칩 ── */
        .subject-chip-group {
            display: flex;
            gap: 0;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .subject-chip {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #fff;
            border: none;
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.12s;
            color: #374151;
        }

        .subject-chip:last-child { border-right: none; }
        .subject-chip.active { background: var(--primary); color: #fff; }

        /* ── 스텝 미리보기 ── */
        .step-preview-list { display: flex; flex-direction: column; gap: 8px; }

        .step-preview-item {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            background: #f8fafc;
        }

        .step-preview-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .step-badge {
            background: var(--primary);
            color: #fff;
            border-radius: 5px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .step-preview-chars {
            font-size: 1.15rem;
            font-family: 'Noto Serif KR', serif;
            letter-spacing: 0.05em;
            color: #1e293b;
            line-height: 2;
            word-break: break-all;
        }

        .step-new { color: var(--primary); font-weight: 700; }

        /* ── 모달 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal-card {
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }

        .modal-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 8px; }
        .modal-card p  { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

        .empty-state {
            padding: 32px 20px;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.85rem;
        }

        /* ── Toast & Spinner ── */
        #toast {
            position: fixed;
            bottom: 28px; right: 28px;
            background: #1e293b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s;
            z-index: 9999;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }

        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 모바일 ── */
        .btn-mobile-back { display: none; }

        @media (max-width: 768px) {
            .two-panel { flex-direction: column; overflow: hidden; }
            .set-panel { width: 100%; height: 100%; border-right: none; }
            .editor-panel { display: none; width: 100%; }
            .two-panel.mobile-editor-open .set-panel   { display: none; }
            .two-panel.mobile-editor-open .editor-panel { display: flex; }
            .btn-mobile-back { display: inline-flex !important; }
            .form-grid { grid-template-columns: 1fr; }
            .subject-chip-group { overflow-x: auto; flex-wrap: nowrap; }
            .subject-chip { white-space: nowrap; font-size: 0.75rem; padding: 6px 10px; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>

<div class="admin-shell">
    <div id="admin-header-slot"></div>
    <div class="admin-main">
        <aside id="admin-menu-slot" class="admin-sidebar"></aside>

        <main>
            <!-- 상단 바 -->
            <div class="page-topbar">
                <h1><i class="fas fa-keyboard" style="color:var(--primary);"></i>&nbsp; 타이핑 암기 퀴즈 관리</h1>
                <button class="btn btn-ghost btn-sm" onclick="loadQuizList()">
                    <i class="fas fa-sync-alt"></i> 새로고침
                </button>
            </div>

            <div class="two-panel">

                <!-- ── 왼쪽: 목록 ── -->
                <aside class="set-panel">
                    <div class="set-panel-head">
                        <span>퀴즈 목록</span>
                        <button class="btn-new-set" onclick="openNewForm()">
                            <i class="fas fa-plus"></i> 새 퀴즈
                        </button>
                    </div>
                    <div class="set-panel-filter">
                        <select id="filter-category" onchange="renderQuizList()">
                            <option value="">전체 분야</option>
                            <option value="korean">한국사</option>
                            <option value="japanese">일본사</option>
                            <option value="chinese">중국사</option>
                            <option value="world">세계사</option>
                        </select>
                        <select id="filter-status" onchange="renderQuizList()">
                            <option value="">전체 상태</option>
                            <option value="published">공개</option>
                            <option value="draft">초안</option>
                        </select>
                    </div>
                    <div class="set-list" id="quiz-list">
                        <div class="empty-state">불러오는 중...</div>
                    </div>
                </aside>

                <!-- ── 오른쪽: 에디터 ── -->
                <div class="editor-panel">

                    <div class="editor-placeholder" id="editor-placeholder">
                        <div>
                            <div style="font-size:2rem; margin-bottom:10px;">⌨️</div>
                            <div>왼쪽에서 퀴즈를 선택하거나<br>새로 만드세요.</div>
                        </div>
                    </div>

                    <div id="editor-area" style="display:none; flex-direction:column; flex:1; min-height:0; overflow:hidden;">

                        <div class="editor-topbar">
                            <button class="btn btn-ghost btn-sm btn-mobile-back" onclick="closeMobileEditor()">
                                <i class="fas fa-arrow-left"></i> 목록
                            </button>
                            <h2 id="editor-title-text">퀴즈 편집</h2>
                            <button class="btn btn-danger btn-sm" id="btn-delete" onclick="promptDelete()" style="display:none;">
                                <i class="fas fa-trash-alt"></i> 삭제
                            </button>
                            <button class="btn btn-primary btn-sm" id="btn-save" onclick="saveQuiz()">
                                <i class="fas fa-save"></i> 저장
                            </button>
                        </div>

                        <div class="editor-body">

                            <!-- 기본 정보 -->
                            <div class="card">
                                <div class="card-head">
                                    <h3><i class="fas fa-info-circle" style="color:var(--primary);"></i>&nbsp; 기본 정보</h3>
                                </div>
                                <div class="card-body">
                                    <div class="form-grid">

                                        <div class="form-group form-full">
                                            <label class="form-label">제목</label>
                                            <input type="text" class="form-control" id="q-title" placeholder="예: 조선 왕 순서 외우기">
                                        </div>

                                        <div class="form-group form-full">
                                            <label class="form-label">고유 ID (영문 slug)</label>
                                            <div style="display:flex; gap:8px;">
                                                <input type="text" class="form-control" id="q-id" placeholder="예: kr-joseon-kings-01" style="flex:1;">
                                                <button type="button" class="btn btn-ghost btn-sm" onclick="generateId()">
                                                    <i class="fas fa-sync-alt"></i> 자동 생성
                                                </button>
                                            </div>
                                            <span style="font-size:0.72rem; color:var(--text-sub);">영문 소문자·숫자·하이픈. 저장 후 변경 불가.</span>
                                        </div>

                                        <div class="form-group form-full">
                                            <label class="form-label">역사 분야</label>
                                            <div class="subject-chip-group" id="cat-chips">
                                                <button type="button" class="subject-chip active" data-val="korean"   onclick="setCategory('korean')">🇰🇷 한국사</button>
                                                <button type="button" class="subject-chip"        data-val="japanese" onclick="setCategory('japanese')">🇯🇵 일본사</button>
                                                <button type="button" class="subject-chip"        data-val="chinese"  onclick="setCategory('chinese')">🇨🇳 중국사</button>
                                                <button type="button" class="subject-chip"        data-val="world"    onclick="setCategory('world')">🌍 세계사</button>
                                            </div>
                                        </div>

                                        <div class="form-group form-full">
                                            <label class="form-label">설명 (한 줄 소개)</label>
                                            <input type="text" class="form-control" id="q-description" placeholder="예: 조선 왕 순서를 단계별로 타이핑하며 외워봅시다">
                                        </div>

                                        <div class="form-group">
                                            <label class="form-label">게시 상태</label>
                                            <select class="form-control" id="q-status">
                                                <option value="draft">초안 (비공개)</option>
                                                <option value="published">공개</option>
                                            </select>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <!-- 암기 내용 & 스텝 설정 -->
                            <div class="card">
                                <div class="card-head">
                                    <h3><i class="fas fa-keyboard" style="color:#6b7280;"></i>&nbsp; 암기 내용 & 스텝 설정</h3>
                                </div>
                                <div class="card-body">
                                    <div class="form-grid">

                                        <div class="form-group form-full">
                                            <label class="form-label">암기 텍스트</label>
                                            <textarea
                                                class="form-control"
                                                id="q-content"
                                                style="min-height:100px; font-size:1.1rem; font-family:'Noto Serif KR',serif; letter-spacing:0.05em;"
                                                placeholder="예: 태정태세문단세예성연중인명성선광인효현숙경영정순헌철고순"
                                                oninput="schedulePreview()"></textarea>
                                            <span style="font-size:0.72rem; color:var(--text-sub);">공백 포함 그대로 저장됩니다.</span>
                                        </div>

                                        <div class="form-group">
                                            <label class="form-label">스텝당 글자 수</label>
                                            <input type="number" class="form-control" id="q-step-size"
                                                min="1" max="100" value="7"
                                                oninput="schedulePreview()">
                                            <span style="font-size:0.72rem; color:var(--text-sub);">
                                                누적 방식: 1스텝 → 1~N글자, 2스텝 → 1~2N글자
                                            </span>
                                        </div>

                                        <div class="form-group">
                                            <label class="form-label">총 스텝 수 (자동 계산)</label>
                                            <input type="text" class="form-control" id="q-total-steps" disabled value="-"
                                                style="background:#f8fafc; color:var(--text-sub);">
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <!-- 스텝 미리보기 -->
                            <div class="card">
                                <div class="card-head">
                                    <h3><i class="fas fa-eye" style="color:#6b7280;"></i>&nbsp; 스텝 미리보기</h3>
                                    <span style="font-size:0.72rem; color:var(--text-sub);">
                                        <span style="color:var(--primary); font-weight:700;">파란색</span>이 이 스텝에서 새로 외울 글자
                                    </span>
                                </div>
                                <div class="card-body">
                                    <div class="step-preview-list" id="step-preview-list">
                                        <div class="empty-state" style="padding:16px 0;">암기 텍스트와 스텝당 글자 수를 입력하면 자동으로 표시됩니다.</div>
                                    </div>
                                </div>
                            </div>

                        </div><!-- editor-body -->
                    </div><!-- editor-area -->
                </div><!-- editor-panel -->

            </div><!-- two-panel -->
        </main>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-card">
        <h3>퀴즈 삭제</h3>
        <p>이 타이핑 암기 퀴즈를 삭제합니다. 계속하시겠습니까?</p>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeDeleteModal()">취소</button>
            <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="../admin-common.js"></script>
<script>

// ── API 헬퍼 ──────────────────────────────
async function safeFetchDB(payload) {
    if (!window.CHEESE_ADMIN_DB_API) throw new Error('CHEESE_ADMIN_DB_API 주소가 설정되지 않았습니다.');
    const res = await fetch(window.CHEESE_ADMIN_DB_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '서버 통신 오류');
    return data;
}

// ── Toast ──────────────────────────────────
function toast(msg, isErr = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = isErr ? '#dc2626' : '#1e293b';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
}

// ── 상태 ──────────────────────────────────
let allQuizzes      = [];
let currentId       = null;
let isNew           = false;
let currentCategory = 'korean';
let previewTimer    = null;

// ── 목록 로드 ──────────────────────────────
async function loadQuizList() {
    const listEl = document.getElementById('quiz-list');
    listEl.innerHTML = '<div class="empty-state">불러오는 중...</div>';

    try {
        const res = await safeFetchDB({ collection: 'typing_quizzes', orderByField: 'created_at' });
        allQuizzes = res.data ?? [];
        renderQuizList();
    } catch (e) {
        listEl.innerHTML = `<div class="empty-state">로드 실패: ${e.message}</div>`;
    }
}

function renderQuizList() {
    const listEl      = document.getElementById('quiz-list');
    const catFilter    = document.getElementById('filter-category').value;
    const statusFilter = document.getElementById('filter-status').value;

    let docs = allQuizzes.slice();
    if (catFilter)    docs = docs.filter(d => d.category === catFilter);
    if (statusFilter) docs = docs.filter(d => d.status   === statusFilter);

    if (!docs.length) {
        listEl.innerHTML = '<div class="empty-state">퀴즈가 없습니다.</div>';
        return;
    }

    const catLabel = { korean: '한국사', japanese: '일본사', chinese: '중국사', world: '세계사' };

    listEl.innerHTML = docs.map(d => {
        const stepCount = computeStepCount(d.content, d.step_size);
        return `
        <div class="set-item${currentId === d.id ? ' active' : ''}" onclick="openQuiz('${d.id}')">
            <span class="set-item-cat cat-${d.category ?? 'korean'}">${catLabel[d.category] ?? d.category}</span>
            <div class="set-item-title">${d.title ?? '(제목 없음)'}</div>
            <div class="set-item-meta">
                <span class="pub-dot ${d.status === 'published' ? 'pub' : 'draft'}"></span>
                <span>${d.status === 'published' ? '공개' : '초안'}</span>
                <span>${(d.content ?? '').length}글자 · ${stepCount}스텝</span>
            </div>
        </div>`;
    }).join('');
}

function computeStepCount(content, stepSize) {
    if (!content || !stepSize) return 0;
    return Math.ceil(content.length / (stepSize || 1));
}

// ── 새 폼 열기 ──────────────────────────────
function openNewForm() {
    isNew           = true;
    currentId       = null;
    currentCategory = 'korean';

    document.getElementById('editor-placeholder').style.display = 'none';
    document.getElementById('editor-area').style.display        = 'flex';
    document.getElementById('btn-delete').style.display         = 'none';
    document.getElementById('editor-title-text').textContent    = '새 타이핑 퀴즈';
    openMobileEditor();
    clearForm();
    renderPreview();
}

function openQuiz(docId) {
    const d = allQuizzes.find(q => q.id === docId);
    if (!d) { toast('데이터를 찾을 수 없습니다.', true); return; }

    currentId       = docId;
    isNew           = false;
    currentCategory = d.category ?? 'korean';

    document.getElementById('editor-placeholder').style.display = 'none';
    document.getElementById('editor-area').style.display        = 'flex';
    document.getElementById('btn-delete').style.display         = '';
    document.getElementById('editor-title-text').textContent    = d.title ?? '퀴즈 편집';
    openMobileEditor();
    renderQuizList();
    populateForm(d);
    renderPreview();
}

// ── 폼 ──────────────────────────────────────
function clearForm() {
    const idInput = document.getElementById('q-id');
    idInput.value    = '';
    idInput.disabled = false;
    document.getElementById('q-title').value       = '';
    document.getElementById('q-description').value = '';
    document.getElementById('q-content').value     = '';
    document.getElementById('q-step-size').value   = '7';
    document.getElementById('q-status').value      = 'draft';
    document.getElementById('q-total-steps').value = '-';
    setCategory('korean');
}

function populateForm(d) {
    const idInput    = document.getElementById('q-id');
    idInput.value    = d.id ?? '';
    idInput.disabled = true;
    document.getElementById('q-title').value       = d.title ?? '';
    document.getElementById('q-description').value = d.description ?? '';
    document.getElementById('q-content').value     = d.content ?? '';
    document.getElementById('q-step-size').value   = d.step_size ?? 7;
    document.getElementById('q-status').value      = d.status ?? 'draft';
    setCategory(d.category ?? 'korean');
    updateTotalSteps();
}

function setCategory(val) {
    currentCategory = val;
    document.querySelectorAll('#cat-chips .subject-chip').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === val);
    });
}

function generateId() {
    const catMap = { korean: 'kr', japanese: 'jp', chinese: 'cn', world: 'wl' };
    const cat = catMap[currentCategory] ?? 'kr';
    document.getElementById('q-id').value = cat + '-typing-' + Date.now().toString(36);
}

function updateTotalSteps() {
    const content  = document.getElementById('q-content').value;
    const stepSize = parseInt(document.getElementById('q-step-size').value) || 1;
    const total    = content ? Math.ceil(content.length / stepSize) : 0;
    document.getElementById('q-total-steps').value = total
        ? `${total}스텝 (총 ${content.length}글자)`
        : '-';
}

// ── 스텝 미리보기 (debounce) ──────────────
function schedulePreview() {
    updateTotalSteps();
    clearTimeout(previewTimer);
    previewTimer = setTimeout(renderPreview, 350);
}

function renderPreview() {
    const content  = document.getElementById('q-content').value.trim();
    const stepSize = parseInt(document.getElementById('q-step-size').value) || 1;
    const listEl   = document.getElementById('step-preview-list');

    if (!content) {
        listEl.innerHTML = '<div class="empty-state" style="padding:16px 0;">암기 텍스트와 스텝당 글자 수를 입력하면 자동으로 표시됩니다.</div>';
        return;
    }

    const totalSteps = Math.ceil(content.length / stepSize);
    const items = [];

    for (let i = 0; i < totalSteps; i++) {
        const prevEnd = i * stepSize;
        const currEnd = Math.min((i + 1) * stepSize, content.length);
        const prevPart = content.substring(0, prevEnd);
        const newPart  = content.substring(prevEnd, currEnd);

        const charsHtml =
            [...prevPart].map(ch => `<span>${ch === ' ' ? '&nbsp;' : ch}</span>`).join('') +
            [...newPart].map(ch  => `<span class="step-new">${ch === ' ' ? '&nbsp;' : ch}</span>`).join('');

        items.push(`
            <div class="step-preview-item">
                <div class="step-preview-header">
                    <span class="step-badge">${i + 1}</span>
                    <span style="font-size:0.78rem; font-weight:600; color:var(--text-sub);">
                        1~${currEnd}번째 글자 (${currEnd}글자)
                    </span>
                </div>
                <div class="step-preview-chars">${charsHtml}</div>
            </div>
        `);
    }

    listEl.innerHTML = items.join('');
}

// ── 저장 ──────────────────────────────────
async function saveQuiz() {
    const title   = document.getElementById('q-title').value.trim();
    const content = document.getElementById('q-content').value.trim();

    if (!title)   { toast('제목을 입력하세요.', true); return; }
    if (!content) { toast('암기 텍스트를 입력하세요.', true); return; }

    let docId = currentId ?? document.getElementById('q-id').value.trim();
    if (!docId) { toast('고유 ID를 자동 생성하세요.', true); return; }
    if (/[^a-z0-9\-_]/.test(docId)) {
        toast('고유 ID는 영문 소문자·숫자·하이픈만 사용 가능합니다.', true);
        return;
    }

    const stepSize = Math.max(1, parseInt(document.getElementById('q-step-size').value) || 5);
    const payload  = {
        title,
        description: document.getElementById('q-description').value.trim(),
        category:    currentCategory,
        content,
        step_size:   stepSize,
        status:      document.getElementById('q-status').value,
        updated_at:  new Date().toISOString(),
    };

    if (isNew) payload.created_at = new Date().toISOString();

    const btn = document.getElementById('btn-save');
    btn.innerHTML = '<span class="spinner"></span> 저장 중...';
    btn.disabled  = true;

    try {
        await safeFetchDB({ action: 'set', collection: 'typing_quizzes', id: docId, data: payload });

        if (isNew) {
            currentId = docId;
            isNew     = false;
            document.getElementById('q-id').disabled        = true;
            document.getElementById('btn-delete').style.display = '';
        }

        document.getElementById('editor-title-text').textContent = title;

        const merged = { id: docId, ...payload };
        const idx    = allQuizzes.findIndex(q => q.id === docId);
        if (idx >= 0) allQuizzes[idx] = merged; else allQuizzes.unshift(merged);

        renderQuizList();
        toast('저장되었습니다.');
    } catch (e) {
        toast('저장 실패: ' + e.message, true);
    } finally {
        btn.innerHTML = '<i class="fas fa-save"></i> 저장';
        btn.disabled  = false;
    }
}

// ── 삭제 ──────────────────────────────────
function promptDelete() {
    document.getElementById('delete-modal').classList.add('open');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('open');
}

async function confirmDelete() {
    closeDeleteModal();
    if (!currentId) return;

    try {
        await safeFetchDB({ action: 'delete', collection: 'typing_quizzes', id: currentId });
        toast('삭제되었습니다.');
        allQuizzes = allQuizzes.filter(q => q.id !== currentId);
        currentId  = null;
        document.getElementById('editor-area').style.display        = 'none';
        document.getElementById('editor-placeholder').style.display = '';
        closeMobileEditor();
        renderQuizList();
    } catch (e) {
        toast('삭제 실패: ' + e.message, true);
    }
}

// ── 모바일 패널 전환 ──────────────────────
function openMobileEditor() {
    document.querySelector('.two-panel')?.classList.add('mobile-editor-open');
}

function closeMobileEditor() {
    document.querySelector('.two-panel')?.classList.remove('mobile-editor-open');
}

// ── 초기화 ──────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadQuizList();
});

</script>

<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Library Manage</title>

  <!-- ✅ 관리자 공통 CSS 유지 -->
  <link rel="stylesheet" href="../admin.css" />
  <!-- ✅ 기존 방식 유지: 헤더/메뉴 슬롯 렌더 -->
  <script src="../admin-common.js"></script>

  <!-- ✅ 프리미엄 디자인을 위한 외부 리소스 -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <!-- ✅ 관리자 공통 CSS 유지 -->
  <link rel="stylesheet" href="../admin.css" />
  <!-- ✅ 기존 방식 유지: 헤더/메뉴 슬롯 렌더 -->
  <script src="../admin-common.js"></script>

  <style>
    :root {
      --primary: #0f172a;
      --primary-light: #1e293b;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.1);
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --text-muted: #64748b;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-premium: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 10px 10px -5px rgba(15, 23, 42, 0.04);
    }

    body {
      font-family: 'Inter', 'Pretendard', sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .lm-wrap {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header & Tabs */
    .page-header {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .page-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(15, 23, 42, 0.05);
      padding: 4px;
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      width: fit-content;
    }

    .tab-btn {
      border: none;
      background: transparent;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-muted);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn i {
      width: 16px;
      height: 16px;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.5);
    }

    .tab-btn.active {
      background: var(--card-bg);
      color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-premium);
      margin-bottom: 24px;
      transition: transform 0.2s;
    }

    .card-title {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Inputs & Buttons */
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .input,
    .select,
    .textarea {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      background: var(--bg);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .textarea {
      width: 100%;
      min-height: 200px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-md);
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: var(--primary-light);
      box-shadow: var(--shadow);
    }

    .btn.secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      background: #fff;
      border-color: var(--accent);
      color: var(--accent);
    }

    .mini-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
    }

    .mini-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mini-btn.danger:hover {
      background: #ef4444;
      border-color: #ef4444;
    }

    /* Lists */
    .builder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 980px) {
      .builder-grid {
        grid-template-columns: 1fr;
      }
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .list::-webkit-scrollbar {
      width: 6px;
    }

    .list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      transition: all 0.2s;
    }

    .item:hover {
      transform: translateX(4px);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .item .icon-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item .name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .item .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .pill {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .muted {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .hr {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }


    /* template editor drag */
    .tpl-card {
      cursor: grab;
    }

    .tpl-card.dragging {
      opacity: .45;
    }

    .tpl-drop {
      outline: 2px dashed rgba(59, 130, 246, .35);
    }
  </style>
</head>

<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>

    <div class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>

      <main class="admin-content">
        <div class="lm-wrap">

          <header class="page-header">
            <div>
              <h1 class="page-title">Library Manage</h1>
              <p class="muted">섹션을 조합하여 뉴스 템플릿을 빌드하고 관리합니다.</p>
            </div>
          </header>

          <aside class="tabs">
            <button class="tab-btn active" data-tab="builder">
              <i data-lucide="layout-template"></i> 템플릿 빌더
            </button>
            <button class="tab-btn" data-tab="sections">
              <i data-lucide="component"></i> 섹션 관리
            </button>
            <button class="tab-btn" data-tab="templates">
              <i data-lucide="files"></i> 템플릿 보기
            </button>
          </aside>

          <!-- ============ Builder ============ -->
          <section id="tab-builder">
            <div class="card">
              <div class="card-title"><i data-lucide="settings"></i> 기본 설정</div>
              <div class="row">
                <div class="input-group" style="flex: 1; min-width: 300px;">
                  <label class="input-label">API URL</label>
                  <input id="apiUrl" class="input" placeholder="https://..." />
                </div>
                <div class="input-group">
                  <label class="input-label">템플릿 ID</label>
                  <input id="tplId" class="input" placeholder="예: news_v1" />
                </div>
                <div class="input-group">
                  <label class="input-label">템플릿 이름</label>
                  <input id="tplName" class="input" placeholder="예: 뉴스 레이아웃" />
                </div>
              </div>

              <div class="hr"></div>

              <div class="row">
                <button class="btn secondary" id="btnAutoImgSlots">
                  <i data-lucide="image"></i> IMG 슬롯 자동지정
                </button>
                <button class="btn secondary" id="btnAutoBodySlots">
                  <i data-lucide="type"></i> BODY 슬롯 자동지정
                </button>
                <div style="flex:1"></div>
                <button class="btn secondary" id="btnPreviewJson">
                  <i data-lucide="code"></i> JSON 미리보기
                </button>
                <button class="btn" id="btnSaveTemplate">
                  <i data-lucide="save"></i> 템플릿 저장
                </button>
              </div>

              <div class="muted" style="margin-top: 16px; display: flex; align-items: flex-start; gap: 8px;">
                <i data-lucide="info" style="width: 16px; height: 16px; margin-top: 2px;"></i>
                <span>왼쪽 섹션 목록에서 섹션을 추가하고 오른쪽에서 순서를 조정하세요. 각 섹션에 SLOT 번호를 부여해야 올바르게 작동합니다.</span>
              </div>
            </div>

            <div class="builder-grid">
              <!-- Available Sections -->
              <div class="card">
                <div class="card-title">
                  <i data-lucide="library"></i> 섹션 라이브러리
                  <span class="pill" id="secCount">0</span>
                </div>
                <div class="row">
                  <input id="secSearch" class="input" style="flex:1" placeholder="섹션 이름 검색..." />
                  <button class="mini-btn" id="btnReloadSections" title="새로고침">
                    <i data-lucide="rotate-cw"></i>
                  </button>
                </div>
                <div class="hr"></div>
                <div class="list" id="secList"></div>
              </div>

              <!-- Selected Sections -->
              <div class="card">
                <div class="card-title">
                  <i data-lucide="list-ordered"></i> 선택된 섹션
                  <span class="pill" id="selCount">0</span>
                  <div style="flex:1"></div>
                  <button class="btn secondary" style="padding: 6px 12px; font-size: 12px;" id="btnClearSel">
                    <i data-lucide="trash-2"></i> 비우기
                  </button>
                </div>
                <div class="hr"></div>
                <div class="list" id="selList"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-title">
                <i data-lucide="eye"></i> JSON 출력
                <div style="flex:1"></div>
                <span id="jsonMsg"></span>
              </div>
              <textarea id="jsonPreview" class="textarea" readonly placeholder='저장 전 "JSON 미리보기" 버튼을 눌러주세요.'></textarea>
            </div>
          </section>

          <!-- ============ Sections ============ -->
          <section id="tab-sections" style="display:none;">
            <div class="card">
              <div class="card-title">
                <i data-lucide="edit-3"></i> 섹션 에디터
                <span id="editingSecBadge" class="pill"
                  style="display:none; margin-left:10px; background: #1e293b; color: #ffffff; font-size:12px; font-weight:700;">편집
                  중: <span id="editingSecName"></span></span>
                <span class="pill"
                  style="margin-left:8px; background: #f1f5f9; color: #64748b; font-size:11px; border: 1px solid #e2e8f0; display: inline-flex; align-items: center; gap: 4px;">
                  <span style="width:6px; height:6px; background:#10b981; border-radius:50%;"></span>
                  Update: <span id="lastModTime">로딩 중...</span>
                </span>
                <div style="flex:1"></div>
                <button class="btn secondary" id="btnSecLoadList">목록 동기화</button>
              </div>
              <div class="row">
                <div class="input-group" style="flex: 1;">
                  <label class="input-label">섹션 파일명</label>
                  <input id="secName" class="input" placeholder="filename.html" />
                </div>
                <button class="btn secondary" id="btnSecNew"><i data-lucide="plus-circle"></i> 신규</button>
                <button class="btn secondary" id="btnSecLoad">열기</button>
                <button class="btn" id="btnSecSave">저장</button>
                <button class="btn secondary danger-btn" id="btnSecDelete"
                  style="background:#fee2e2; color:#b91c1c; border-color:#fecaca;"><i data-lucide="trash-2"></i>
                  삭제</button>
                <button class="btn secondary" id="btnSecMakeBody">기본 템플릿</button>
              </div>
              <div style="margin-top:20px;">
                <textarea id="secHtml" class="textarea" style="min-height: 400px; font-family: monospace;"
                  placeholder="HTML 소스 코드를 입력하세요..."></textarea>
              </div>
              <div id="secMsg" style="margin-top: 10px; font-size: 13px;"></div>
            </div>

            <div class="card">
              <div class="card-title">
                <i data-lucide="folder-open"></i> 모든 섹션
                <span class="pill" id="secListCount2">0</span>
              </div>
              <div class="list" id="secList2"></div>
            </div>
          </section>

          <!-- ============ Templates ============ -->
          <section id="tab-templates" style="display:none;">
            <div class="builder-grid">
              <div class="card">
                <div class="card-title">
                  <i data-lucide="file-stack"></i> 등록된 템플릿
                  <div style="flex:1"></div>
                  <button class="mini-btn" id="btnTplReload"><i data-lucide="rotate-cw"></i></button>
                </div>
                <div class="list" id="tplList"></div>
              </div>

              <div class="card">
                <div class="card-title">
                  <i data-lucide="layers"></i> 템플릿 구성 요소
                  <div style="flex:1"></div>
                  <button class="btn secondary" style="padding: 6px 12px; font-size: 12px;" id="btnTplToBuilder">
                    빌더로 보내기
                  </button>
                </div>
                <div class="list" id="tplSectionsList"></div>
                <div class="hr"></div>
                <button class="btn" style="width: 100%; justify-content: center;" id="btnTplSaveOrder">순서 저장</button>
              </div>
            </div>

            <div class="card">
              <div class="card-title">
                <i data-lucide="file-json"></i> 소스 데이터
                <span id="tplMsg"></span>
              </div>
              <textarea id="tplJson" class="textarea" readonly></textarea>
            </div>
          </section>

        </div>
      </main>
    </div>
  </div>

  <!-- ============ 커스텀 모달 ============ -->
  <div id="customModal"
    style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(15,23,42,0.55); backdrop-filter:blur(6px); align-items:center; justify-content:center;">
    <div id="customModalCard"
      style="background:#fff; border-radius:20px; padding:32px; width:100%; max-width:420px; margin:1rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.3); transform:scale(0.92); opacity:0; transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease;">
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:18px;">
        <div id="customModalIcon"
          style="width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;">
        </div>
        <div>
          <div id="customModalTitle" style="font-size:17px; font-weight:800; color:#0f172a; line-height:1.3;"></div>
          <div id="customModalSub" style="font-size:13px; color:#64748b; margin-top:3px;"></div>
        </div>
      </div>
      <div id="customModalBody"
        style="font-size:14px; color:#475569; line-height:1.7; background:#f8fafc; border-radius:12px; padding:14px 16px; margin-bottom:24px; word-break:break-all;">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button id="customModalCancel"
          style="padding:10px 22px; border-radius:10px; border:1px solid #e2e8f0; background:#f1f5f9; color:#475569; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s;">취소</button>
        <button id="customModalConfirm"
          style="padding:10px 22px; border-radius:10px; border:none; font-size:14px; font-weight:700; cursor:pointer; color:#fff; transition:all 0.15s;">확인</button>
      </div>
    </div>
  </div>

  <script>
    /** =========================
     * 커스텀 모달 헬퍼
     * ========================= */
    (function setupModal() {
      const overlay = document.getElementById('customModal');
      const card = document.getElementById('customModalCard');

      function openModal() {
        overlay.style.display = 'flex';
        requestAnimationFrame(() => {
          card.style.transform = 'scale(1)';
          card.style.opacity = '1';
        });
      }
      function closeModal() {
        card.style.transform = 'scale(0.92)';
        card.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 220);
      }

      overlay.addEventListener('click', e => { if (e.target === overlay) { closeModal(); if (window._activeResolve) window._activeResolve(false); } });

      document.getElementById('customModalConfirm').onclick = () => { closeModal(); if (window._activeResolve) window._activeResolve(true); };
      document.getElementById('customModalCancel').onclick = () => { closeModal(); if (window._activeResolve) window._activeResolve(false); };

      window.showConfirm = function ({ title, sub = '', body = '', type = 'danger', confirmText = '확인', cancelText = '취소' }) {
        const S = {
          danger: { bg: '#fef2f2', color: '#dc2626', icon: '🗑️', btnBg: '#ef4444' },
          warn: { bg: '#fffbeb', color: '#d97706', icon: '⚠️', btnBg: '#f59e0b' },
          info: { bg: '#eff6ff', color: '#2563eb', icon: 'ℹ️', btnBg: '#3b82f6' },
        }[type] || { bg: '#fef2f2', color: '#dc2626', icon: '⚠️', btnBg: '#ef4444' };

        const iconEl = document.getElementById('customModalIcon');
        iconEl.style.background = S.bg;
        iconEl.style.color = S.color;
        iconEl.textContent = S.icon;

        document.getElementById('customModalTitle').textContent = title;
        document.getElementById('customModalSub').textContent = sub;
        document.getElementById('customModalBody').innerHTML = body;

        const cancelBtn = document.getElementById('customModalCancel');
        const confirmBtn = document.getElementById('customModalConfirm');
        cancelBtn.textContent = cancelText;
        cancelBtn.style.display = '';
        confirmBtn.textContent = confirmText;
        confirmBtn.style.background = S.btnBg;

        openModal();
        return new Promise(resolve => { window._activeResolve = resolve; });
      };

      window.showAlert = function ({ title, body = '', type = 'info' }) {
        document.getElementById('customModalCancel').style.display = 'none';
        return window.showConfirm({ title, body, type, confirmText: '확인' });
      };
    })();

    /** =========================
     * ✅ admin-common.js 연동
     * ========================= */
    (function renderShellOnce() {
      try {
        if (window.AdminCommon && typeof window.AdminCommon.renderShell === "function") {
          window.AdminCommon.renderShell({
            headerSlotId: "admin-header-slot",
            menuSlotId: "admin-menu-slot",
            activeMenu: "library_manage"
          });
        }
      } catch (_) { }
    })();

    const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbwXqz1uMy3EOrisCEKIe0Fk7yu0P6MQ1ddHDvo7Sr_CPEYY0RHP2GyUBL8YhaBqxnmBJg/exec";
    const $ = (id) => document.getElementById(id);

    function setMsg(el, text, isErr = false) {
      if (!el) return;
      el.textContent = text || "";
      el.style.color = isErr ? "crimson" : "rgba(15,23,42,0.65)";
    }

    function apiUrl() { return ($("apiUrl")?.value || "").trim() || DEFAULT_API_URL; }

    async function apiGet(mode, params = {}) {
      const url = new URL(apiUrl());
      url.searchParams.set("mode", mode);
      url.searchParams.set("_ts", String(Date.now()));
      Object.entries(params || {}).forEach(([k, v]) => { if (v !== undefined && v !== null) url.searchParams.set(k, String(v)); });
      const r = await fetch(url.toString(), { method: "GET", cache: "no-store" });
      return await r.json();
    }

    async function apiPost(mode, bodyObj) {
      const url = new URL(apiUrl());
      const body = new URLSearchParams();
      body.set("mode", String(mode || ""));
      Object.entries(bodyObj || {}).forEach(([k, v]) => { if (v !== undefined && v !== null) body.set(k, String(v)); });
      const r = await fetch(url.toString(), { method: "POST", body, cache: "no-store" });
      return await r.json();
    }

    /** =========================
     * Tabs
     * ========================= */
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        ["builder", "sections", "templates"].forEach(t => {
          const el = $("tab-" + t);
          if (el) el.style.display = (t === tab) ? "" : "none";
        });
      };
    });

    /** =========================
     * 데이터 상태 및 유틸
     * ========================= */
    let ALL_SECTIONS = [];
    let SELECTED = [];
    let CURRENT_TPL = null;
    let TPL_SECTIONS = [];
    let _dragIndex = -1;
    let sortableSel = null;

    // 이름 변경 감지를 위한 변수
    let LAST_SEC_NAME = "";
    let LAST_TPL_ID = "";

    function updateEditingStatus(type, name) {
      if (type === 'section') {
        const badge = $("editingSecBadge");
        const nameEl = $("editingSecName");
        if (name) {
          badge.style.display = "inline-flex";
          nameEl.textContent = name;
          console.log("[Status] Now editing section:", name);
        } else {
          badge.style.display = "none";
        }
      }
    }

    function displayLastModified() {
      const lastMod = new Date(document.lastModified);
      const y = lastMod.getFullYear();
      const m = String(lastMod.getMonth() + 1).padStart(2, '0');
      const d = String(lastMod.getDate()).padStart(2, '0');
      const hh = String(lastMod.getHours()).padStart(2, '0');
      const mm = String(lastMod.getMinutes()).padStart(2, '0');
      const ss = String(lastMod.getSeconds()).padStart(2, '0');
      $("lastModTime").textContent = `${y}.${m}.${d} ${hh}:${mm}:${ss}`;
      console.log("[Build] Document last modified:", document.lastModified);
    }

    /**
     * 특정 접두사(BODY 또는 IMG)로 시작하는 슬롯 번호의 최대값을 찾음
     */
    function findMaxSlotNumber_(prefix) {
      let maxN = 0;
      for (const s of SELECTED) {
        try {
          const v = JSON.parse(s.varsText || "{}");
          // SLOT 또는 IMG_SLOT 키 모두에서 확인
          const slotValue = String(v?.SLOT || v?.IMG_SLOT || "").trim().toUpperCase();
          const m = slotValue.match(new RegExp(`^${prefix}_(\\d+)$`));
          if (m) maxN = Math.max(maxN, parseInt(m[1], 10));
        } catch (_) { }
      }
      return maxN;
    }

    function isImageSectionName_(name) {
      const n = String(name || "").toLowerCase();
      return n.includes("img") || n.includes("image") || n.includes("cheese_img");
    }

    async function getSectionHtmlCached(name) {
      if (SECTION_CACHE.has(name)) return SECTION_CACHE.get(name);
      try {
        const r = await apiGet("getSection", { name });
        const html = r.html || "";
        SECTION_CACHE.set(name, html);
        return html;
      } catch (e) { return ""; }
    }

    /**
     * 섹션이 본문형인지 이미지형인지 판단
     */
    async function checkSectionType(name) {
      const html = await getSectionHtmlCached(name);
      const isImg = isImageSectionName_(name) || /{{\s*(IMG_[A-Z0-9_]+|THUMB_URL)\s*}}/i.test(html);
      const isBody = html.includes("{{BODY}}");
      return { isImg, isBody };
    }

    /** =========================
     * 렌더링 로직
     * ========================= */
    function renderSectionList() {
      const q = $("secSearch").value.trim().toLowerCase();
      const list = $("secList");
      list.innerHTML = "";
      const filtered = ALL_SECTIONS.filter(s => !q || s.name.toLowerCase().includes(q));
      $("secCount").textContent = filtered.length;

      filtered.forEach(s => {
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
          <div class="icon-box"><i data-lucide="component"></i></div>
          <div style="min-width:0; flex:1;">
            <div class="name">${s.name}</div>
          </div>
          <button class="mini-btn" title="템플릿에 추가"><i data-lucide="plus"></i></button>
        `;
        row.querySelector("button").onclick = () => {
          SELECTED.push({ name: s.name, varsText: "" });
          renderSelected();
          updateJsonPreviewSafe_();
        };
        list.appendChild(row);
      });
      if (window.lucide) lucide.createIcons();
    }

    function renderSelected() {
      const list = $("selList");
      list.innerHTML = "";
      $("selCount").textContent = SELECTED.length;

      SELECTED.forEach((s, idx) => {
        const row = document.createElement("div");
        row.className = "item";
        let vSummary = "";
        try {
          const v = JSON.parse(s.varsText || "{}");
          const keys = Object.keys(v);
          if (keys.length) vSummary = " · " + keys.map(k => `${k}=${v[k]}`).join(", ");
        } catch (e) { }

        row.innerHTML = `
          <div class="icon-box" style="cursor:grab;"><i data-lucide="grip-vertical"></i></div>
          <div style="min-width:0; flex:1;">
            <div class="name">${s.name}</div>
            <div class="meta"><span class="pill">#${idx + 1}</span> ${vSummary}</div>
          </div>
          <div class="row" style="gap:4px; margin-bottom:0;">
            <button class="mini-btn" data-act="up" title="위로"><i data-lucide="chevron-up"></i></button>
            <button class="mini-btn" data-act="down" title="아래로"><i data-lucide="chevron-down"></i></button>
            <button class="mini-btn" data-act="slot" title="자동 슬롯 지정"><i data-lucide="hash"></i></button>
            <button class="mini-btn" data-act="vars" title="변수 설정"><i data-lucide="settings-2"></i></button>
            <button class="mini-btn danger" data-act="rm" title="제거"><i data-lucide="x"></i></button>
          </div>
        `;

        row.querySelector('[data-act="up"]').onclick = () => {
          if (idx <= 0) return;
          [SELECTED[idx - 1], SELECTED[idx]] = [SELECTED[idx], SELECTED[idx - 1]];
          renderSelected(); updateJsonPreviewSafe_();
        };
        row.querySelector('[data-act="down"]').onclick = () => {
          if (idx >= SELECTED.length - 1) return;
          [SELECTED[idx + 1], SELECTED[idx]] = [SELECTED[idx], SELECTED[idx + 1]];
          renderSelected(); updateJsonPreviewSafe_();
        };
        row.querySelector('[data-act="rm"]').onclick = () => {
          SELECTED.splice(idx, 1); renderSelected(); updateJsonPreviewSafe_();
        };

        row.querySelector('[data-act="slot"]').onclick = async () => {
          const type = await checkSectionType(s.name);
          let vars = {}; try { vars = JSON.parse(s.varsText || "{}"); } catch (e) { }

          if (type.isImg) {
            const next = findMaxSlotNumber_("IMG") + 1;
            delete vars.SLOT;
            vars.IMG_SLOT = `IMG_${next}`;
          } else {
            const next = findMaxSlotNumber_("BODY") + 1;
            delete vars.IMG_SLOT;
            vars.SLOT = `BODY_${next}`;
          }
          s.varsText = JSON.stringify(vars, null, 2);
          renderSelected(); updateJsonPreviewSafe_();
        };

        row.querySelector('[data-act="vars"]').onclick = () => {
          const v = prompt("vars(JSON) 입력", s.varsText || "");
          if (v !== null) { s.varsText = v.trim(); renderSelected(); updateJsonPreviewSafe_(); }
        };

        list.appendChild(row);
      });
      if (window.lucide) lucide.createIcons();

      // SortableJS 활성화
      if (SELECTED.length > 0) {
        if (sortableSel) sortableSel.destroy();
        sortableSel = new Sortable(list, {
          animation: 150,
          handle: '.icon-box',
          onEnd: (evt) => {
            const oldIdx = evt.oldIndex;
            const newIdx = evt.newIndex;
            if (oldIdx === newIdx) return;
            const item = SELECTED.splice(oldIdx, 1)[0];
            SELECTED.splice(newIdx, 0, item);
            renderSelected();
            updateJsonPreviewSafe_();
          }
        });
      }
    }

    function updateJsonPreviewSafe_() {
      try {
        const sections = SELECTED.map(s => {
          let vars = undefined;
          if (s.varsText.trim()) {
            try { vars = JSON.parse(s.varsText); } catch (e) { vars = undefined; }
          }
          return vars ? { name: s.name, vars } : { name: s.name };
        });
        const idVal = $("tplId").value.trim();
        const nameVal = $("tplName").value.trim();
        if (!idVal && !nameVal && sections.length === 0) {
          $("jsonPreview").value = "";
          return;
        }
        $("jsonPreview").value = JSON.stringify({ id: idVal, name: nameVal, sections }, null, 2);
        setMsg($("jsonMsg"), "JSON 생성됨");
      } catch (e) {
        setMsg($("jsonMsg"), "JSON 오류", true);
      }
    }

    /** =========================
     * 버튼 액션들
     * ========================= */
    async function autoAssignBodySlots_() {
      let n = findMaxSlotNumber_("BODY");
      for (let item of SELECTED) {
        let v = {}; try { v = JSON.parse(item.varsText || "{}"); } catch (e) { }
        if (v.SLOT) continue;

        const type = await checkSectionType(item.name);
        if (type.isBody) {
          n++;
          v.SLOT = `BODY_${n}`;
          delete v.IMG_SLOT;
          item.varsText = JSON.stringify(v, null, 2);
        }
      }
      renderSelected(); updateJsonPreviewSafe_();
    }

    async function autoAssignImgSlots_() {
      let n = findMaxSlotNumber_("IMG");
      for (let item of SELECTED) {
        let v = {}; try { v = JSON.parse(item.varsText || "{}"); } catch (e) { }
        if (v.IMG_SLOT) continue;

        const type = await checkSectionType(item.name);
        if (type.isImg) {
          n++;
          v.IMG_SLOT = `IMG_${n}`;
          delete v.SLOT;
          item.varsText = JSON.stringify(v, null, 2);
        }
      }
      renderSelected(); updateJsonPreviewSafe_();
    }

    async function reloadSections() {
      const res = await apiGet("listSections");
      ALL_SECTIONS = res.items || [];
      renderSectionList();

      const list2 = $("secList2");
      list2.innerHTML = "";
      $("secListCount2").textContent = ALL_SECTIONS.length;
      ALL_SECTIONS.forEach(s => {
        const r = document.createElement("div");
        r.className = "item";
        r.innerHTML = `
          <div class="icon-box"><i data-lucide="file-code"></i></div>
          <div class="name" style="flex:1;">${s.name}</div>
          <button class="btn secondary" style="padding: 6px 12px; font-size: 12px; height: auto;">편집</button>
        `;
        r.querySelector("button").onclick = async () => {
          $("secName").value = s.name;
          LAST_SEC_NAME = s.name; // 로드된 이름 저장
          updateEditingStatus('section', s.name);
          const d = await apiGet("getSection", { name: s.name });
          $("secHtml").value = d.html || "";
          document.querySelector('[data-tab="sections"]').click();
          setMsg($("secMsg"), `'${s.name}' 로드 완료`);
        };
        list2.appendChild(r);
      });
      if (window.lucide) lucide.createIcons();
    }

    async function loadTemplates() {
      const res = await apiGet("listTemplates");
      const list = $("tplList");
      list.innerHTML = "";
      (res.items || []).forEach(it => {
        const r = document.createElement("div");
        r.className = "item";
        r.innerHTML = `
          <div class="icon-box"><i data-lucide="file-json"></i></div>
          <div class="name" style="flex:1;">${it.id}</div>
          <button class="btn secondary" style="padding: 6px 12px; font-size: 12px; height: auto;">열기</button>
        `;
        r.querySelector("button").onclick = async () => {
          const d = await apiGet("getTemplate", { template_id: it.id });
          $("tplJson").value = d.json || "";
          const obj = JSON.parse(d.json || "{}");
          CURRENT_TPL = obj;
          LAST_TPL_ID = it.id; // 로드된 ID 저장
          TPL_SECTIONS = [...(obj.sections || [])];
          renderTplSectionsEditor();
        };
        list.appendChild(r);
      });
      if (window.lucide) lucide.createIcons();
    }

    function renderTplSectionsEditor() {
      const list = $("tplSectionsList");
      list.innerHTML = "";
      TPL_SECTIONS.forEach((s, i) => {
        const r = document.createElement("div");
        r.className = "item";
        r.innerHTML = `
          <div class="icon-box"><i data-lucide="layers"></i></div>
          <div class="name" style="flex:1;">${s.name}</div>
          <button class="mini-btn danger" title="삭제"><i data-lucide="trash-2"></i></button>
        `;
        r.querySelector("button").onclick = () => { TPL_SECTIONS.splice(i, 1); renderTplSectionsEditor(); };
        list.appendChild(r);
      });
      if (window.lucide) lucide.createIcons();
    }

    /** =========================
     * 초기화 및 이벤트 바인딩
     * ========================= */
    $("btnReloadSections").onclick = reloadSections;
    $("secSearch").oninput = renderSectionList;
    $("btnClearSel").onclick = () => { if (confirm("비울까요?")) { SELECTED = []; renderSelected(); updateJsonPreviewSafe_(); } };
    $("btnAutoBodySlots").onclick = autoAssignBodySlots_;
    $("btnAutoImgSlots").onclick = autoAssignImgSlots_;
    $("btnPreviewJson").onclick = updateJsonPreviewSafe_;

    $("btnSaveTemplate").onclick = async () => {
      const newId = $("tplId").value.trim();
      if (!newId) return alert("템플릿 ID를 입력하세요.");

      // 이름 변경 감지
      if (LAST_TPL_ID && LAST_TPL_ID !== newId) {
        const choice = confirm(`템플릿 ID가 '${LAST_TPL_ID}'에서 '${newId}'로 변경되었습니다.\n\n[확인]: 이름을 변경하고 기존 파일을 삭제합니다.\n[취소]: 기존 파일을 유지하고 새 이름으로 저장(복사)합니다.`);
        if (choice) {
          // 기존 파일 삭제 시도
          await apiPost("templateDelete", { template_id: LAST_TPL_ID });
        }
      }

      const res = await apiPost("templateUpsert", { template_id: newId, json: $("jsonPreview").value, name: $("tplName").value });
      if (res.ok) {
        alert("저장 완료");
        LAST_TPL_ID = newId;
        loadTemplates();
      }
    };

    $("btnSecSave").onclick = async () => {
      const newName = $("secName").value.trim();
      if (!newName) return alert("섹션 파일명을 입력하세요.");

      const oldName = (LAST_SEC_NAME || "").trim();
      console.log("[Save] oldName:", oldName, "| newName:", newName);

      setMsg($("secMsg"), "저장 중...");
      try {
        let res;

        if (oldName && oldName !== newName) {
          // ─── 이름이 바뀐 경우: 드라이브 파일명을 직접 변경 (새 파일 생성 없음) ───
          console.log("[Rename] 파일명 변경:", oldName, "→", newName);
          res = await apiPost("sectionRename", {
            old_name: oldName,
            new_name: newName,
            html: $("secHtml").value
          });
        } else {
          // ─── 이름이 같은 경우: 내용만 업데이트 ───
          res = await apiPost("sectionUpsert", {
            name: newName,
            html: $("secHtml").value
          });
        }

        if (res.ok) {
          LAST_SEC_NAME = newName;
          updateEditingStatus('section', newName);
          setMsg($("secMsg"), `'${newName}' 저장 완료`);
          reloadSections();
        } else {
          alert("저장 실패: " + (res.message || "알 수 없는 오류"));
          setMsg($("secMsg"), "저장 실패", true);
        }
      } catch (e) {
        alert("에러 발생: " + e.message);
        setMsg($("secMsg"), "통신 에러", true);
      }
    };

    $("btnSecLoad").onclick = async () => {
      const name = $("secName").value.trim();
      if (!name) return alert("파일명을 입력하세요.");
      const d = await apiGet("getSection", { name });
      $("secHtml").value = d.html || "";
      LAST_SEC_NAME = name; // 로드된 이름 저장
      updateEditingStatus('section', name);
      setMsg($("secMsg"), `'${name}' 로드 완료`);
    };

    $("btnSecMakeBody").onclick = () => {
      $("secHtml").value = `<!-- SECTION:${$("secName").value || 'body.html'} START -->\n{{BODY}}\n<!-- SECTION END -->`;
    };

    $("btnTplReload").onclick = loadTemplates;
    $("btnTplToBuilder").onclick = () => {
      if (!CURRENT_TPL) return;
      $("tplId").value = CURRENT_TPL.id;
      $("tplName").value = CURRENT_TPL.name;
      SELECTED = TPL_SECTIONS.map(s => ({ name: s.name, varsText: JSON.stringify(s.vars || {}, null, 2) }));
      renderSelected(); updateJsonPreviewSafe_();
      document.querySelector('[data-tab="builder"]').click();
    };

    $("btnSecLoadList").onclick = reloadSections;
    $("btnSecNew").onclick = () => {
      $("secName").value = "";
      $("secHtml").value = "";
      LAST_SEC_NAME = "";
      updateEditingStatus('section', null);
      setMsg($("secMsg"), "내용이 초기화되었습니다.");
    };

    $("btnSecDelete").onclick = async () => {
      const name = $("secName").value.trim();
      if (!name) {
        await showAlert({ title: '파일명 없음', body: '삭제할 섹션 파일명이 입력되지 않았습니다.', type: 'warn' });
        return;
      }
      const confirmed = await showConfirm({
        title: '섹션 파일 삭제',
        sub: '이 작업은 되돌릴 수 없습니다.',
        body: `<b style="color:#dc2626;">'${name}'</b> 섹션 파일을 구글 드라이브에서 영구 삭제합니다.<br><br>정말 삭제하시겠습니까?`,
        type: 'danger',
        confirmText: '삭제하기',
        cancelText: '취소'
      });
      if (!confirmed) return;
      try {
        setMsg($("secMsg"), '삭제 중...');
        const res = await apiPost('sectionDelete', { name });
        if (res.ok) {
          LAST_SEC_NAME = '';
          updateEditingStatus('section', null);
          $("secName").value = '';
          $("secHtml").value = '';
          setMsg($("secMsg"), `'${name}' 삭제 완료`);
          reloadSections();
        } else {
          await showAlert({ title: '삭제 실패', body: res.message || '알 수 없는 오류가 발생했습니다.', type: 'warn' });
        }
      } catch (e) {
        await showAlert({ title: '통신 오류', body: e.message, type: 'danger' });
      }
    };

    window.onload = () => {
      $("apiUrl").value = DEFAULT_API_URL;
      displayLastModified();
      reloadSections();
      loadTemplates();
    };
  </script>
</body>

</html>

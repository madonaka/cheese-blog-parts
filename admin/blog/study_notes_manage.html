<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학습 임시 노트 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .am-wrap { padding: 14px; max-width: 1200px; margin: 0 auto; }
        
        /* ── 페이지 헤더 ── */
        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 14px; border-bottom: 2px solid #333; padding-bottom: 10px;
        }
        .page-header h2 { font-size: 1.35rem; margin: 0; font-weight: 900; letter-spacing: -0.02em; }
        .page-header p { font-size: 12px; color: #64748b; margin: 4px 0 0; }
        
        .notes-summary {
            font-size: 0.88rem;
            color: #64748b;
            font-weight: 700;
        }

        /* ── 컨트롤 바 ── */
        .board-controls {
            display: flex; gap: 8px; margin-bottom: 20px; justify-content: flex-start; align-items: center;
        }
        .search-input {
            padding: 7px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; width: 260px; outline: none;
        }
        .search-input:focus { border-color: #3b82f6; }
        
        .btn-sm {
            padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 700;
            cursor: pointer; border: 1px solid #ddd; background: #fff; transition: 0.15s;
        }
        .btn-sm:hover { background: #f1f5f9; }
        .btn-sm.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .btn-sm.primary:hover { background: #2563eb; }

        /* ── 노트 그리드 ── */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .note-card {
            background: #fff;
            border: 1px solid rgba(15,23,42,0.10);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(15,23,42,0.04);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15,23,42,0.08);
        }
        
        .note-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }
        
        .note-user-email {
            font-size: 0.88rem;
            font-weight: 700;
            color: #0f172a;
            word-break: break-all;
        }
        
        .note-user-id {
            font-size: 0.68rem;
            color: #94a3b8;
            font-family: monospace;
            margin-top: 2px;
        }
        
        .note-study-title {
            font-size: 0.78rem;
            font-weight: 800;
            background: #f1f5f9;
            color: #475569;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 4px;
            display: inline-block;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .note-content {
            font-size: 0.88rem;
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
            flex: 1;
            min-height: 80px;
            word-break: break-all;
        }
        
        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
        }
        
        .note-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .btn-delete-note {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .btn-delete-note:hover {
            background: #fecaca;
        }

        .board-empty {
            text-align: center;
            padding: 80px 0;
            color: #94a3b8;
            border: 1px dashed rgba(15,23,42,0.1);
            border-radius: 12px;
            background: #fff;
            grid-column: 1 / -1;
        }
        .board-empty i {
            margin-bottom: 12px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <script src="../admin-common.js"></script>
    <script>
        window.CHEESE_ADMIN_ACTIVE_PAGE = "study_notes_manage";
        window.CHEESE_ADMIN_PAGE_SUBTITLE = "학습 임시 피드백 노트 관리";
    </script>

    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>
            <main class="admin-content">
                <div class="am-wrap">

                    <!-- ── 페이지 헤더 ── -->
                    <div class="page-header">
                        <div>
                            <h2>📝 학습 임시 피드백 노트 관리</h2>
                            <p>사용자들이 learn/viewer 페이지에서 작성한 학습 내용 수정 요청 임시 피드백을 실시간으로 확인합니다.</p>
                        </div>
                        <div class="notes-summary">
                            총 <span id="total-count" style="color: #3b82f6; font-weight: 900; font-size: 1.1rem;">0</span>개의 피드백
                        </div>
                    </div>

                    <!-- ── 검색 및 조작 ── -->
                    <div class="board-controls">
                        <input type="text" id="search-keyword" class="search-input" placeholder="이메일, 학습 시퀀스명, 내용 검색..." onkeyup="if(event.key==='Enter')filterNotes()">
                        <button class="btn-sm primary" onclick="filterNotes()">검색</button>
                        <button class="btn-sm" onclick="loadNotesData()" title="목록 새로고침">🔄 새로고침</button>
                    </div>

                    <!-- ── 로딩 스피너 ── -->
                    <div id="loading-spinner" style="text-align: center; padding: 60px 0; color: #64748b;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 10px; font-size: 0.9rem;">Firestore에서 노트를 로딩하는 중...</p>
                    </div>

                    <!-- ── 노트 목록 그리드 ── -->
                    <div id="notes-list" class="notes-grid" style="display: none;"></div>
                    
                    <!-- ── 빈 데이터 안내 ── -->
                    <div id="empty-message" class="board-empty" style="display: none;">
                        <i class="far fa-sticky-note fa-3x"></i>
                        <p style="margin-top: 10px;">작성된 학습 피드백 노트가 없습니다.</p>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDK v10.7.1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "cheese-history-platform.firebaseapp.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);

        let allNotes = [];

        // 데이터 로드 함수
        async function loadNotesData() {
            const loading = document.getElementById("loading-spinner");
            const grid = document.getElementById("notes-list");
            const empty = document.getElementById("empty-message");

            loading.style.display = "block";
            grid.style.display = "none";
            empty.style.display = "none";

            try {
                const q = query(collection(db, "study_notes"), orderBy("updatedAt", "desc"));
                const querySnapshot = await getDocs(q);
                allNotes = [];
                querySnapshot.forEach((doc) => {
                    allNotes.push({ id: doc.id, ...doc.data() });
                });
                renderNotes(allNotes);
            } catch (error) {
                console.error("Error loading notes:", error);
                alert("노트 데이터를 로드하는 중 오류가 발생했습니다: " + error.message);
                loading.style.display = "none";
            }
        }

        // 노트 카드 그리드 렌더링 함수
        function renderNotes(notes) {
            const loading = document.getElementById("loading-spinner");
            const grid = document.getElementById("notes-list");
            const empty = document.getElementById("empty-message");
            const totalCount = document.getElementById("total-count");

            loading.style.display = "none";
            totalCount.textContent = notes.length;

            if (notes.length === 0) {
                grid.style.display = "none";
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            grid.style.display = "grid";

            grid.innerHTML = notes.map(note => {
                const date = note.updatedAt ? new Date(note.updatedAt.seconds * 1000).toLocaleString() : "-";
                const contentText = note.content || "";
                
                return `
                    <div class="note-card" id="note-card-${note.id}">
                        <div class="note-card-header">
                            <div>
                                <div class="note-user-email">${escapeHtml(note.userEmail)}</div>
                                <div class="note-user-id">UID: ${escapeHtml(note.userId)}</div>
                            </div>
                            <button class="btn-delete-note" data-id="${note.id}">삭제</button>
                        </div>
                        <div>
                            <div class="note-study-title" title="${escapeHtml(note.studyTitle)}">
                                📚 ${escapeHtml(note.studyTitle || note.studyId)}
                            </div>
                        </div>
                        <div class="note-content">${escapeHtml(contentText)}</div>
                        <div class="note-footer">
                            <span class="note-date"><i class="far fa-clock"></i> ${date}</span>
                            <a href="/learn/viewer.html?id=${note.studyId}" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 700;">학습 바로가기 →</a>
                        </div>
                    </div>
                `;
            }).join("");

            // 삭제 버튼 이벤트 바인딩
            grid.querySelectorAll(".btn-delete-note").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const id = e.target.dataset.id;
                    if (confirm("이 피드백 노트를 정말로 삭제하시겠습니까? 데이터베이스에서 영구적으로 지워집니다.")) {
                        try {
                            await deleteDoc(doc(db, "study_notes", id));
                            allNotes = allNotes.filter(n => n.id !== id);
                            renderNotes(allNotes);
                        } catch (err) {
                            alert("삭제 실패: " + err.message);
                        }
                    }
                });
            });
        }

        // 검색 필터링 함수
        function filterNotes() {
            const keyword = document.getElementById("search-keyword").value.trim().toLowerCase();
            if (!keyword) {
                renderNotes(allNotes);
                return;
            }

            const filtered = allNotes.filter(note => {
                const email = (note.userEmail || "").toLowerCase();
                const title = (note.studyTitle || "").toLowerCase();
                const id = (note.studyId || "").toLowerCase();
                const content = (note.content || "").toLowerCase();

                return email.includes(keyword) || title.includes(keyword) || id.includes(keyword) || content.includes(keyword);
            });

            renderNotes(filtered);
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 전역 범위 연결
        window.loadNotesData = loadNotesData;
        window.filterNotes = filterNotes;

        // 초기 화면 진입 시 트리거
        document.addEventListener("DOMContentLoaded", () => {
            loadNotesData();
        });
    </script>
</body>
</html>

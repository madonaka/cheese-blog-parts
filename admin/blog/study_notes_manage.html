<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학습 임시 노트 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .am-wrap { padding: 14px; max-width: 1200px; margin: 0 auto; }
        
        /* ── 페이지 헤더 ── */
        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 14px; border-bottom: 2px solid #333; padding-bottom: 10px;
        }
        .page-header h2 { font-size: 1.35rem; margin: 0; font-weight: 900; letter-spacing: -0.02em; }
        .page-header p { font-size: 12px; color: #64748b; margin: 4px 0 0; }
        
        .notes-summary {
            font-size: 0.88rem;
            color: #64748b;
            font-weight: 700;
        }

        /* ── 컨트롤 바 ── */
        .board-controls {
            display: flex; gap: 8px; margin-bottom: 20px; justify-content: flex-start; align-items: center;
        }
        .search-input {
            padding: 7px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; width: 260px; outline: none;
        }
        .search-input:focus { border-color: #3b82f6; }
        
        .btn-sm {
            padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 700;
            cursor: pointer; border: 1px solid #ddd; background: #fff; transition: 0.15s;
        }
        .btn-sm:hover { background: #f1f5f9; }
        .btn-sm.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .btn-sm.primary:hover { background: #2563eb; }

        /* ── 게시판 테이블 ── */
        .table-responsive {
            background: #fff; 
            border: 1px solid rgba(15,23,42,0.1); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(15,23,42,0.02);
        }
        .board-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            table-layout: fixed;
        }
        .board-table th {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 10px;
            font-weight: 800;
            color: #475569;
            text-align: left;
        }
        .board-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .board-row {
            cursor: pointer;
            transition: background 0.12s;
        }
        .board-row:hover {
            background: #f8fafc;
        }
        .board-row.active {
            background: #eff6ff;
        }

        .board-empty {
            text-align: center;
            padding: 60px 0;
            color: #94a3b8;
        }
        .board-empty i {
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        /* ── 상세 보기 섹션 ── */
        .detail-section {
            margin-top: 25px;
            background: #fff;
            border: 1px solid rgba(15,23,42,0.10);
            border-top: 3px solid #3b82f6;
            border-radius: 12px;
            box-shadow: 0 10px 28px rgba(15,23,42,0.08);
            padding: 24px;
            animation: slideDown 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }
        .detail-title {
            font-size: 1.05rem;
            font-weight: 900;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .detail-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .meta-label {
            font-size: 0.72rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .meta-value {
            font-size: 0.88rem;
            font-weight: 700;
            color: #334155;
            word-break: break-all;
        }
        
        .detail-content-area {
            font-size: 0.92rem;
            line-height: 1.7;
            color: #1e293b;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 120px;
            margin-bottom: 20px;
        }
        
        .detail-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .detail-btn-go {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <script src="../admin-common.js"></script>
    <script>
        window.CHEESE_ADMIN_ACTIVE_PAGE = "study_notes_manage";
        window.CHEESE_ADMIN_PAGE_SUBTITLE = "학습 임시 피드백 노트 관리";
    </script>

    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>
            <main class="admin-content">
                <div class="am-wrap">

                    <!-- ── 페이지 헤더 ── -->
                    <div class="page-header">
                        <div>
                            <h2>📝 학습 임시 피드백 노트 관리</h2>
                            <p>사용자들이 learn/viewer 페이지에서 작성한 학습 내용 수정 요청 임시 피드백을 목록에서 실시간으로 확인합니다.</p>
                        </div>
                        <div class="notes-summary">
                            총 <span id="total-count" style="color: #3b82f6; font-weight: 900; font-size: 1.1rem;">0</span>개의 피드백
                        </div>
                    </div>

                    <!-- ── 검색 및 조작 ── -->
                    <div class="board-controls">
                        <input type="text" id="search-keyword" class="search-input" placeholder="이메일, 학습 시퀀스명, 내용 검색..." onkeyup="if(event.key==='Enter')filterNotes()">
                        <button class="btn-sm primary" onclick="filterNotes()">검색</button>
                        <button class="btn-sm" onclick="loadNotesData()" title="목록 새로고침">🔄 새로고침</button>
                    </div>

                    <!-- ── 로딩 스피너 ── -->
                    <div id="loading-spinner" style="text-align: center; padding: 60px 0; color: #64748b;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 10px; font-size: 0.9rem;">Firestore에서 노트를 로딩하는 중...</p>
                    </div>

                    <!-- ── 게시판 테이블 리스트 ── -->
                    <div id="table-wrap" class="table-responsive" style="display: none;">
                        <table class="board-table">
                            <thead>
                                <tr>
                                    <th style="width: 55px; text-align: center;">번호</th>
                                    <th style="width: 210px;">작성자 (이메일)</th>
                                    <th style="width: 250px;">대상 학습 시퀀스</th>
                                    <th>피드백 요약 (클릭 시 하단에 상세 표시)</th>
                                    <th style="width: 160px; text-align: center;">작성일시</th>
                                    <th style="width: 80px; text-align: center;">관리</th>
                                </tr>
                            </thead>
                            <tbody id="board-tbody">
                                <tr><td colspan="6" class="board-empty">불러오는 중...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- ── 빈 데이터 안내 ── -->
                    <div id="empty-message" class="board-empty" style="display: none; border: 1px dashed rgba(15,23,42,0.1); border-radius: 12px; background: #fff;">
                        <i class="far fa-sticky-note fa-3x"></i>
                        <p style="margin-top: 10px;">작성된 학습 피드백 노트가 없습니다.</p>
                    </div>

                    <!-- ── 상세 보기 섹션 (테이블 아래 노출) ── -->
                    <div id="detail-section" class="detail-section" style="display: none;">
                        <div class="detail-header">
                            <div class="detail-title">
                                <i class="fas fa-search"></i> 피드백 상세 보기
                            </div>
                            <button class="btn-sm" onclick="closeDetail()" style="padding: 5px 10px;">✕ 닫기</button>
                        </div>
                        <div class="detail-meta-grid">
                            <div class="meta-item">
                                <span class="meta-label">작성자 이메일</span>
                                <span class="meta-value" id="detail-email">-</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">사용자 UID</span>
                                <span class="meta-value" id="detail-uid" style="font-family: monospace; font-size: 0.78rem;">-</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">학습 시퀀스명</span>
                                <span class="meta-value" id="detail-study-title">-</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">학습 ID (studyId)</span>
                                <span class="meta-value" id="detail-study-id" style="font-family: monospace; font-size: 0.78rem;">-</span>
                            </div>
                        </div>
                        <div class="meta-label" style="margin-bottom: 6px;">피드백 내용</div>
                        <div class="detail-content-area" id="detail-content">-</div>
                        
                        <div class="detail-actions">
                            <button class="btn-sm" id="detail-btn-delete" style="background:#fee2e2; color:#b91c1c; border-color:#fca5a5; font-weight:700;">피드백 삭제</button>
                            <a href="#" id="detail-btn-go" target="_blank" class="btn-sm primary detail-btn-go">학습 바로가기 →</a>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDK v10.7.1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "cheese-history-platform.firebaseapp.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);

        let allNotes = [];
        let activeNoteId = null;

        // 데이터 로드 함수
        async function loadNotesData() {
            const loading = document.getElementById("loading-spinner");
            const tableWrap = document.getElementById("table-wrap");
            const empty = document.getElementById("empty-message");

            loading.style.display = "block";
            tableWrap.style.display = "none";
            empty.style.display = "none";
            closeDetail();

            try {
                const q = query(collection(db, "study_notes"), orderBy("updatedAt", "desc"));
                const querySnapshot = await getDocs(q);
                allNotes = [];
                querySnapshot.forEach((doc) => {
                    allNotes.push({ id: doc.id, ...doc.data() });
                });
                renderNotes(allNotes);
            } catch (error) {
                console.error("Error loading notes:", error);
                alert("노트 데이터를 로드하는 중 오류가 발생했습니다: " + error.message);
                loading.style.display = "none";
            }
        }

        // 테이블 리스트 렌더링 함수
        function renderNotes(notes) {
            const loading = document.getElementById("loading-spinner");
            const tableWrap = document.getElementById("table-wrap");
            const tbody = document.getElementById("board-tbody");
            const empty = document.getElementById("empty-message");
            const totalCount = document.getElementById("total-count");

            loading.style.display = "none";
            totalCount.textContent = notes.length;

            if (notes.length === 0) {
                tableWrap.style.display = "none";
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            tableWrap.style.display = "block";

            tbody.innerHTML = notes.map((note, idx) => {
                const date = note.updatedAt ? new Date(note.updatedAt.seconds * 1000).toLocaleString() : "-";
                const contentText = note.content || "";
                const summary = contentText.length > 80 ? contentText.slice(0, 80) + "..." : contentText;
                const activeClass = note.id === activeNoteId ? "active" : "";
                
                return `
                    <tr class="board-row ${activeClass}" id="board-row-${note.id}" data-id="${note.id}">
                        <td style="text-align: center; color: #64748b;">${idx + 1}</td>
                        <td style="font-weight: 700; color: #0f172a;" title="${escapeHtml(note.userEmail)}">${escapeHtml(note.userEmail)}</td>
                        <td style="color: #475569;" title="${escapeHtml(note.studyTitle || note.studyId)}">📚 ${escapeHtml(note.studyTitle || note.studyId)}</td>
                        <td style="color: #334155;" title="${escapeHtml(contentText)}">${escapeHtml(summary)}</td>
                        <td style="text-align: center; color: #94a3b8; font-size: 0.82rem;">${date}</td>
                        <td style="text-align: center;">
                            <button class="btn-delete-row" data-id="${note.id}" style="background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; border-radius:4px; padding:3px 8px; font-size:0.7rem; cursor:pointer; font-weight:700;">삭제</button>
                        </td>
                    </tr>
                `;
            }).join("");

            // 행 클릭 이벤트 바인딩
            tbody.querySelectorAll(".board-row").forEach(row => {
                row.addEventListener("click", (e) => {
                    // 삭제 버튼 클릭 시 이벤트 전파 차단
                    if (e.target.closest(".btn-delete-row")) return;
                    
                    const id = row.dataset.id;
                    selectNote(id);
                });
            });

            // 개별 삭제 버튼 이벤트 바인딩
            tbody.querySelectorAll(".btn-delete-row").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    await deleteNoteDirect(id);
                });
            });
        }

        // 특정 피드백 선택 상세 보기 함수
        function selectNote(id) {
            const note = allNotes.find(n => n.id === id);
            if (!note) return;

            activeNoteId = id;

            // 기존 행 active 스타일 변경
            document.querySelectorAll(".board-row").forEach(row => {
                if (row.dataset.id === id) {
                    row.classList.add("active");
                } else {
                    row.classList.remove("active");
                }
            });

            // 상세 영역 데이터 주입
            document.getElementById("detail-email").textContent = note.userEmail || "anonymous";
            document.getElementById("detail-uid").textContent = note.userId || "-";
            document.getElementById("detail-study-title").textContent = note.studyTitle || "-";
            document.getElementById("detail-study-id").textContent = note.studyId || "-";
            document.getElementById("detail-content").textContent = note.content || "";

            // 삭제 버튼 바인딩
            const delBtn = document.getElementById("detail-btn-delete");
            delBtn.onclick = async () => {
                await deleteNoteDirect(id);
            };

            // 바로가기 버튼 바인딩
            const goBtn = document.getElementById("detail-btn-go");
            goBtn.href = `/learn/viewer.html?id=${note.studyId}`;

            // 상세 영역 보이기
            const detailSec = document.getElementById("detail-section");
            detailSec.style.display = "block";
            
            // 부드러운 스크롤 이동
            detailSec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 상세 영역 닫기 함수
        function closeDetail() {
            activeNoteId = null;
            document.getElementById("detail-section").style.display = "none";
            document.querySelectorAll(".board-row").forEach(row => {
                row.classList.remove("active");
            });
        }

        // 삭제 처리 공통 함수
        async function deleteNoteDirect(id) {
            if (!confirm("이 피드백 노트를 정말로 삭제하시겠습니까? 데이터베이스에서 영구적으로 지워집니다.")) return;
            try {
                await deleteDoc(doc(db, "study_notes", id));
                allNotes = allNotes.filter(n => n.id !== id);
                
                if (activeNoteId === id) {
                    closeDetail();
                }
                
                renderNotes(allNotes);
            } catch (err) {
                alert("삭제 실패: " + err.message);
            }
        }

        // 검색 필터링 함수
        function filterNotes() {
            const keyword = document.getElementById("search-keyword").value.trim().toLowerCase();
            if (!keyword) {
                renderNotes(allNotes);
                return;
            }

            const filtered = allNotes.filter(note => {
                const email = (note.userEmail || "").toLowerCase();
                const title = (note.studyTitle || "").toLowerCase();
                const id = (note.studyId || "").toLowerCase();
                const content = (note.content || "").toLowerCase();

                return email.includes(keyword) || title.includes(keyword) || id.includes(keyword) || content.includes(keyword);
            });

            renderNotes(filtered);
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 전역 범위 연결
        window.loadNotesData = loadNotesData;
        window.filterNotes = filterNotes;
        window.closeDetail = closeDetail;

        // 초기 화면 진입 시 트리거
        document.addEventListener("DOMContentLoaded", () => {
            loadNotesData();
        });
    </script>
</body>
</html>

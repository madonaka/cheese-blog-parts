                    <tr>
                        <td style='width:50%; vertical-align:top; border:1px solid #cbd5e1; padding:20px; background:#fff;'>
                            <h3 style='margin:0 0 12px 0; color:#ea580c; font-size:1.15rem; border-bottom:2px solid #fed7aa; padding-bottom:8px;'>1. 기획 배경 및 목적 (Why)</h3>
                            <div style='font-size:1rem; color:#333; line-height:1.6;'>${formatToSubBullets(data.background_purpose)}</div>
                        </td>
                        <td style='width:50%; vertical-align:top; border:1px solid #cbd5e1; padding:20px; background:#f8fafc;'>
                            <h3 style='margin:0 0 12px 0; color:#ea580c; font-size:1.15rem; border-bottom:2px solid #fed7aa; padding-bottom:8px;'>2. 현상 및 핵심 문제점 (What)</h3>
                            <div style='font-size:1rem; color:#333; line-height:1.6;'>${formatToSubBullets(data.current_issue)}</div>
                        </td>
                    </tr>
                    <tr>
                        <td style='width:50%; vertical-align:top; border:1px solid #cbd5e1; padding:20px; background:#f8fafc;'>
                            <h3 style='margin:0 0 12px 0; color:#ea580c; font-size:1.15rem; border-bottom:2px solid #fed7aa; padding-bottom:8px;'>3. 해결 방안 및 핵심 전략 (How)</h3>
                            <div style='font-size:1rem; color:#333; line-height:1.6;'>${formatToSubBullets(data.strategy)}</div>
                        </td>
                        <td style='width:50%; vertical-align:top; border:1px solid #cbd5e1; padding:20px; background:#fff;'>
                            <h3 style='margin:0 0 12px 0; color:#ea580c; font-size:1.15rem; border-bottom:2px solid #fed7aa; padding-bottom:8px;'>4. 기대 효과 및 소요 예산 (ROI)</h3>
                            <div style='font-size:1rem; color:#333; line-height:1.6;'>${formatToSubBullets(data.roi)}</div>
                        </td>
                    </tr>
                </table>
                <div id='schedule-placeholder'></div>
            </div>
            `;

          if (tinymce.get('doc-content')) {
            tinymce.get('doc-content').setContent(editorContent);
          }

          let hasSchedule = Array.isArray(data.schedule) && data.schedule.length > 0;
          if (hasSchedule) {
            const firstTask = data.schedule[0];
            const sDate = (firstTask && firstTask.start_date) ? String(firstTask.start_date) : new Date().toISOString();

            document.getElementById('sch-start-month').value = sDate.substring(0, 7);
            document.getElementById('sch-project-name').value = data.title || "기획 일정";
            document.getElementById('sch-input-list').innerHTML = "";

            data.schedule.forEach(task => {
              addScheduleRow(task.category || "", task.task_name || "작업", task.start_date || "", task.end_date || "", task.output || "");
            });
            setTimeout(() => { insertSmartSchedule(); }, 500);
          }

          // 🚨 [수정] 모달에 공통 보라색 버튼 주입 호출!
          setTimeout(() => { injectConfirmButton(); }, 100);

          setTimeout(() => {
            alert("✨ AI가 기획안과 일정표를 작성했습니다!\n본문을 수정하거나 일정을 조정한 뒤, 하단의 [✨ 기획안 확정] 버튼을 누르면 대시보드에 세팅됩니다.");
          }, 600);

        } else {
          alert("AI 생성 실패: " + json.msg);
        }
      } catch (e) {
        console.error("AI Proposal Error:", e);
        alert("통신 오류가 발생했습니다. (데이터 포맷 분석 중 에러)");
      } finally {
        if (typeof hideAILoading === 'function') hideAILoading();
      }
    }

    // ==========================================================
    // 🌟 [완전 개편] AI 및 수동 기획서 모두 대응하는 '만능 저장 함수'
    // ==========================================================
    // (기존 confirmAndSaveAIProposal 함수는 덮어써서 지워주세요!)
    window.confirmAndSaveProposal = async function () {
      const finalTitle = document.getElementById('doc-title').value || "새로운 기획서";
      let contentHtml = "";
      let updatedSchedule = [];

      // 1. 에디터에서 사용자가 타이핑/수정한 '최종 HTML 본문'과 '일정표'를 긁어옵니다.
      if (tinymce.get('doc-content')) {
        contentHtml = tinymce.get('doc-content').getContent();

        const parser = new DOMParser();
        const doc = parser.parseFromString(contentHtml, 'text/html');
        const scheduleSection = doc.querySelector('.schedule-section');

        // 표에 삽입된 데이터를 역추적해서 완벽한 일정 배열로 변환!
        if (scheduleSection) {
          const configRaw = scheduleSection.getAttribute('data-config');
          if (configRaw) {
            const config = JSON.parse(decodeURIComponent(configRaw));
            updatedSchedule = config.rows.map(r => ({
              category: r.cat || "",
              task_name: r.task || "",
              start_date: r.s || "",
              end_date: r.e || "",
              output: r.output || ""
            }));
          }
        }
      }

      // 일정표를 1개도 안 넣었으면 빠꾸시킵니다.
      if (updatedSchedule.length === 0) {
        alert("⚠️ 일정표(Schedule)가 비어 있습니다!\n\n상단의 [📅 일정표 넣기] 버튼을 눌러 일정을 먼저 세팅해 주세요.");
        return;
      }

      // 2. 서버로 보낼 최종 데이터 세팅 (수동/자동 통합)
      const finalData = {
        title: finalTitle,
        schedule: updatedSchedule,
        fullHtml: contentHtml // 👈 사용자가 직접 편집한 100% 원본 텍스트 전달!
      };

      if (typeof showAdminLoading === 'function') showAdminLoading("DB에 기획서와 일정을 저장하는 중입니다... 💾");

      try {
        const res = await fetch(window.CHEESE_ADMIN_API_BASE, {
          method: "POST",
          body: JSON.stringify({ mode: "saveProposal", pData: finalData })
        });
        const json = await res.json();

        if (json.result === "success") {
          alert("✨ 기획서와 세부 일정이 대시보드에 완벽하게 생성되었습니다!");
          closeModal('doc-modal');

          // UI 원상복구
          document.getElementById('ai-confirm-btn')?.remove();
          const btnSaveDoc = document.getElementById('btn-save-doc');
          if (btnSaveDoc) btnSaveDoc.style.display = 'block';

          if (typeof loadAllData === 'function') await loadAllData();
        } else {
          alert("저장 실패: " + json.msg);
        }
      } catch (e) {
        console.error(e); alert("통신 오류가 발생했습니다.");
      } finally {
        if (typeof hideAdminLoading === 'function') hideAdminLoading();
      }
    };

    // -------------------------------------------------------------
    // 🔥 기획서 열람 시 실시간 Todo 리스트(Task) 연동 기능 (어제 코드와 동일)
    // -------------------------------------------------------------
    const originalOpenDocModal = window.openDocModal;

    window.openDocModal = function (docId, title, content, type) {
      if (typeof originalOpenDocModal === 'function') {
        originalOpenDocModal(docId, title, content, type);
      }
      const oldContainer = document.getElementById('realtime-todo-container');
      if (oldContainer) oldContainer.remove();

      if (type === '기획서' && docId) {
        const modalBody = document.querySelector('#doc-modal .modal-body-custom');
        if (modalBody) {
          const todoContainer = document.createElement('div');
          todoContainer.id = 'realtime-todo-container';
          todoContainer.style.marginTop = "20px";
          todoContainer.innerHTML = '<div style="text-align:center; padding: 30px; color:#64748b; font-weight:bold;">⏳ 현장의 실시간 진행 현황을 불러오는 중입니다...</div>';
          modalBody.appendChild(todoContainer);
          fetchAndRenderRealtimeTodos(docId);
        }
      }
    };

    async function fetchAndRenderRealtimeTodos(proposalId) {
      try {
        const res = await fetch(window.CHEESE_ADMIN_API_BASE + "?mode=getAllData");
        const json = await res.json();
        if (json.result !== "success") throw new Error("데이터 로드 실패");

        const goals = json.goals || [];
        const tasks = json.tasks || [];

        const relatedMidGoals = goals.filter(g => g['비고'] === proposalId);
        const midGoalIds = relatedMidGoals.map(g => g['ID']);
        if (midGoalIds.length === 0) {
          document.getElementById('realtime-todo-container').innerHTML = '';
          return;
        }

        const relatedTasks = tasks.filter(t => midGoalIds.includes(t['연결_중간목표ID']));
        relatedTasks.sort((a, b) => (a['기한'] || '').localeCompare(b['기한'] || ''));

        let html = `<div style="margin-top: 50px; padding-top: 25px; border-top: 2px dashed #cbd5e1; font-family:'Pretendard','Malgun Gothic',sans-serif;"><h3 style="color: #4f46e5; margin-bottom: 16px; font-size: 1.3rem; display:flex; align-items:center; gap:8px;"><span>🔥</span> 실제 진행 중인 세부 Todo 리스트 (실시간)</h3>`;

        if (relatedTasks.length === 0) {
          html += `<div style="background:#f8fafc; padding:20px; border-radius:8px; color:#64748b; font-size:0.95rem; text-align:center;">아직 현장에서 추가된 세부 할 일이 없습니다. <br><b>할 일 관리(Todo)</b> 메뉴에서 이 프로젝트에 할 일을 추가해 보세요!</div>`;
        } else {
          html += `<div style="border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;"><table style="width:100%; border-collapse:collapse; text-align:left;"><thead><tr style="background:#f8fafc; color:#475569; font-size:0.9rem;"><th style="padding:12px 15px; border-bottom:1px solid #e2e8f0; width: 80px; text-align:center;">상태</th><th style="padding:12px 15px; border-bottom:1px solid #e2e8f0;">작업명</th><th style="padding:12px 15px; border-bottom:1px solid #e2e8f0; width: 120px;">기한</th><th style="padding:12px 15px; border-bottom:1px solid #e2e8f0; width: 250px;">연결된 공정 (중간목표)</th></tr></thead><tbody>`;

          relatedTasks.forEach(t => {
            const status = t['상태'] || '대기';
            let badgeColor = status === '진행중' ? '#3b82f6' : (status === '완료' ? '#22c55e' : '#94a3b8');
            const parentGoal = relatedMidGoals.find(g => g['ID'] === t['연결_중간목표ID']);
            const parentName = parentGoal ? parentGoal['제목'] : '-';

            html += `<tr style="border-bottom:1px solid #f1f5f9; font-size:0.95rem; background:#fff;"><td style="padding:12px 15px; text-align:center;"><span style="background:${badgeColor}; color:#fff; padding:4px 10px; border-radius:12px; font-size:0.8rem; font-weight:bold;">${status}</span></td><td style="padding:12px 15px; color:#1e293b; font-weight:500;">${t['제목']}</td><td style="padding:12px 15px; color:#64748b; font-size:0.9rem;">${t['기한'] || '-'}</td><td style="padding:12px 15px; color:#64748b; font-size:0.85rem;">${parentName}</td></tr>`;
          });
          html += `</tbody></table></div>`;
        }
        html += `</div>`;
        document.getElementById('realtime-todo-container').innerHTML = html;
      } catch (e) {
        document.getElementById('realtime-todo-container').innerHTML = `<div style="background:#fee2e2; color:#ef4444; padding:15px; border-radius:8px; text-align:center; margin-top:20px;">❌ 실시간 데이터를 불러오는 중 오류가 발생했습니다.</div>`;
      }
    }
  </script>
</body>

</html>

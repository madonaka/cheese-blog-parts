<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>작업 로그 관리 | Cheese Lab</title>

  <link rel="stylesheet" href="../admin.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    window.CHEESE_ADMIN_API_BASE = "https://script.google.com/macros/s/AKfycbwn1TrLeSIAe570LRWMJxRzx88u3LQYF38Kme9WhMd-YQsrMsSggrNy3I_2SGKGXTpS/exec";
  </script>
  <script src="../admin-common.js" defer></script>

  <style>
    :root {
      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-sub: #64748b;
    }

    .log-header {
      margin-bottom: 24px;
    }

    .log-header h2 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-main);
      margin: 0;
      letter-spacing: -0.02em;
    }

    .log-header p {
      color: var(--text-sub);
      margin-top: 6px;
      font-size: 1rem;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 18px;
    }

    .log-date {
      flex-shrink: 0;
      font-weight: 800;
      color: var(--text-main);
      font-variant-numeric: tabular-nums;
    }

    .log-content {
      flex: 1;
      color: #334155;
      line-height: 1.5;
      word-break: break-word;
    }

    .log-hash {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text-sub);
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .log-empty {
      padding: 80px;
      text-align: center;
      color: #94a3b8;
      font-size: 1.05rem;
      background: #f8fafc;
      border-radius: 16px;
      border: 2px dashed var(--border-color);
    }
  </style>
</head>

<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>
    <main class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>

      <section class="admin-content">
        <div class="log-header">
          <h2>작업 로그</h2>
          <p>worklog.md에 쌓인 기록을 최신순으로 표시합니다.</p>
        </div>

        <div id="log-list" class="log-list">
          <div class="log-empty">불러오는 중...</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.CHEESE_ADMIN_ACTIVE_PAGE = "menu-log";

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function parseWorklog(text) {
      const entries = [];
      text.split('\n').forEach(raw => {
        const line = raw.trim();
        if (!line.startsWith('- ')) return;
        const parts = line.slice(2).split('|').map(s => s.trim());
        if (parts.length < 2) return;
        entries.push({ date: parts[0], content: parts[1], hash: parts[2] || '' });
      });
      // 날짜 내림차순 (동일 날짜는 파일 순서 = 최신 우선 유지)
      entries.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
      return entries;
    }

    async function loadWorklog() {
      const root = document.getElementById('log-list');
      try {
        const res = await fetch('../../worklog.md', { cache: 'no-store' });
        const text = await res.text();
        const entries = parseWorklog(text);

        if (entries.length === 0) {
          root.innerHTML = '<div class="log-empty">아직 쌓인 기록이 없습니다.</div>';
          return;
        }

        root.innerHTML = entries.map(e => `
          <div class="log-row">
            <span class="log-date">${escapeHtml(e.date)}</span>
            <span class="log-content">${escapeHtml(e.content)}</span>
            ${e.hash ? `<span class="log-hash">${escapeHtml(e.hash)}</span>` : ''}
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
        root.innerHTML = '<div class="log-empty">worklog.md를 불러오지 못했습니다.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadWorklog);
  </script>
</body>

</html>

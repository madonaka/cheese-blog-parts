<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>작업 로그 관리 | Cheese Lab</title>

  <link rel="stylesheet" href="../admin.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    window.CHEESE_ADMIN_API_BASE = "https://script.google.com/macros/s/AKfycbwn1TrLeSIAe570LRWMJxRzx88u3LQYF38Kme9WhMd-YQsrMsSggrNy3I_2SGKGXTpS/exec";
  </script>
  <script src="../admin-common.js" defer></script>

  <style>
    :root {
      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --primary: #2563eb;
    }

    .log-header {
      margin-bottom: 24px;
    }

    .log-header h2 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-main);
      margin: 0;
      letter-spacing: -0.02em;
    }

    .log-header p {
      color: var(--text-sub);
      margin-top: 6px;
      font-size: 1rem;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-entry {
      display: flex;
      flex-direction: column;
    }

    .log-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .log-row:hover {
      border-color: #cbd5e1;
      background: #fafcff;
    }

    .log-row.open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .log-date {
      flex-shrink: 0;
      font-weight: 800;
      color: var(--text-main);
      font-variant-numeric: tabular-nums;
    }

    .log-content {
      flex: 1;
      color: #334155;
      line-height: 1.5;
      word-break: break-word;
    }

    .log-project {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 2px 9px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .log-project.admin {
      background: #eff6ff;
      color: #2563eb;
    }

    .log-project.store {
      background: #fef3c7;
      color: #b45309;
    }

    .log-hash {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text-sub);
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .log-chevron {
      flex-shrink: 0;
      color: #94a3b8;
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .log-row.open .log-chevron {
      transform: rotate(90deg);
    }

    /* 펼침 상세 패널 */
    .log-detail {
      display: none;
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 16px 18px;
      background: #f8fafc;
    }

    .log-detail.open {
      display: block;
    }

    .log-detail-msg {
      white-space: pre-wrap;
      color: #334155;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border-color);
    }

    .log-files {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-file {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }

    .log-file-status {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-weight: 800;
      font-family: monospace;
    }

    .log-file-path {
      flex: 1;
      font-family: monospace;
      color: #334155;
      word-break: break-all;
    }

    .log-file-stat {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 0.8rem;
    }

    .add { color: #16a34a; }
    .del { color: #dc2626; }

    .log-gh-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .log-gh-link:hover {
      text-decoration: underline;
    }

    .log-muted {
      color: var(--text-sub);
      font-size: 0.85rem;
    }

    .log-empty {
      padding: 80px;
      text-align: center;
      color: #94a3b8;
      font-size: 1.05rem;
      background: #f8fafc;
      border-radius: 16px;
      border: 2px dashed var(--border-color);
    }
  </style>
</head>

<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>
    <main class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>

      <section class="admin-content">
        <div class="log-header">
          <h2>작업 로그</h2>
          <p>worklog.md에 쌓인 기록을 최신순으로 표시합니다. 항목을 누르면 해당 커밋의 변경 내용을 볼 수 있습니다.</p>
        </div>

        <div id="log-list" class="log-list">
          <div class="log-empty">불러오는 중...</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.CHEESE_ADMIN_ACTIVE_PAGE = "menu-log";
    const REPO_BY_PROJECT = {
      "관리자": "madonaka/cheese-blog-parts",
      "스토어프론트": "madonaka/cheese-storefront"
    };
    let g_entries = [];

    function repoFor(project) {
      return REPO_BY_PROJECT[project] || "madonaka/cheese-blog-parts";
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function parseWorklog(text) {
      const entries = [];
      text.split('\n').forEach(raw => {
        const line = raw.trim();
        if (!line.startsWith('- ')) return;
        const parts = line.slice(2).split('|').map(s => s.trim());
        if (parts.length < 2) return;
        let date, project, content, hash;
        if (parts.length >= 4) {
          // 날짜 | 프로젝트 | 내용 | 커밋해시
          [date, project, content, hash] = [parts[0], parts[1], parts[2], parts[3]];
        } else {
          // 레거시: 날짜 | 내용 | 커밋해시 (프로젝트 없음)
          date = parts[0]; project = ''; content = parts[1]; hash = parts[2] || '';
        }
        entries.push({ date, project, content, hash, loaded: false });
      });
      // 날짜 내림차순 (동일 날짜는 파일 순서 = 최신 우선 유지)
      entries.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
      return entries;
    }

    async function loadWorklog() {
      const root = document.getElementById('log-list');
      try {
        const res = await fetch('../../worklog.md', { cache: 'no-store' });
        const text = await res.text();
        g_entries = parseWorklog(text);

        if (g_entries.length === 0) {
          root.innerHTML = '<div class="log-empty">아직 쌓인 기록이 없습니다.</div>';
          return;
        }

        root.innerHTML = g_entries.map((e, i) => `
          <div class="log-entry">
            <div class="log-row" id="row-${i}" onclick="toggleDetail(${i})">
              <span class="log-date">${escapeHtml(e.date)}</span>
              ${e.project ? `<span class="log-project ${e.project === '스토어프론트' ? 'store' : 'admin'}">${escapeHtml(e.project)}</span>` : ''}
              <span class="log-content">${escapeHtml(e.content)}</span>
              ${e.hash ? `<span class="log-hash">${escapeHtml(e.hash)}</span>` : ''}
              <span class="log-chevron">▶</span>
            </div>
            <div class="log-detail" id="detail-${i}"></div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
        root.innerHTML = '<div class="log-empty">worklog.md를 불러오지 못했습니다.</div>';
      }
    }

    function toggleDetail(i) {
      const row = document.getElementById('row-' + i);
      const panel = document.getElementById('detail-' + i);
      if (!row || !panel) return;

      if (panel.classList.contains('open')) {
        panel.classList.remove('open');
        row.classList.remove('open');
        return;
      }
      panel.classList.add('open');
      row.classList.add('open');
      loadDetail(i);
    }

    function statusMark(s) {
      const m = { added: 'A', modified: 'M', removed: 'D', renamed: 'R' };
      return m[s] || '·';
    }

    async function loadDetail(i) {
      const e = g_entries[i];
      const panel = document.getElementById('detail-' + i);
      if (!e || !panel || e.loaded) return;

      const repo = repoFor(e.project);
      const ghUrl = e.hash ? `https://github.com/${repo}/commit/${e.hash}` : '';

      if (!e.hash) {
        e.loaded = true;
        panel.innerHTML = '<div class="log-muted">연결된 커밋 해시가 없습니다.</div>';
        return;
      }

      panel.innerHTML = '<div class="log-muted">GitHub에서 커밋 정보를 불러오는 중...</div>';
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/commits/${e.hash}`);
        if (!res.ok) throw new Error('status ' + res.status);
        const c = await res.json();

        const msg = escapeHtml((c.commit && c.commit.message) || '(메시지 없음)');
        const files = (c.files || []).map(f => `
          <div class="log-file">
            <span class="log-file-status">${statusMark(f.status)}</span>
            <span class="log-file-path">${escapeHtml(f.filename)}</span>
            <span class="log-file-stat"><span class="add">+${f.additions}</span> <span class="del">-${f.deletions}</span></span>
          </div>`).join('');

        panel.innerHTML = `
          <div class="log-detail-msg">${msg}</div>
          <div class="log-files">${files || '<div class="log-muted">변경 파일 정보가 없습니다.</div>'}</div>
          <a class="log-gh-link" href="${ghUrl}" target="_blank" rel="noopener">GitHub에서 커밋 보기 ↗</a>`;
        e.loaded = true;
      } catch (err) {
        console.error(err);
        // loaded=false 로 두어 다시 펼칠 때 재시도
        panel.innerHTML = `
          <div class="log-muted">커밋 정보를 불러오지 못했습니다. (아직 push되지 않았거나 접근 제한)</div>
          <a class="log-gh-link" href="${ghUrl}" target="_blank" rel="noopener">GitHub에서 커밋 보기 ↗</a>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadWorklog);
  </script>
</body>

</html>

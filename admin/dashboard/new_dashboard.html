<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>콘텐츠 대시보드 · Cheese Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../admin.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* =========================================
       Content-Focused Dashboard Styles
    ========================================= */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .dash-title .t {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .dash-title .s {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 0.25rem;
      font-weight: 500;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    /* KPI Summary Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .kpi-card {
      background: #fff;
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 1rem;
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .kpi-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary, #3b82f6);
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
    }

    .kpi-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      background: #f1f5f9;
    }

    .kpi-num {
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #0f172a;
      line-height: 1;
    }

    .kpi-num .unit {
      font-size: 0.85rem;
      font-weight: 700;
      color: #94a3b8;
      margin-left: 2px;
    }

    .kpi-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-sub);
    }

    /* Bento Grid Layout */
    .bento-layout {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.5rem;
      align-items: start;
    }

    .bento-main {
      grid-column: span 7;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .bento-side {
      grid-column: span 5;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      padding: 1.5rem;
      border-radius: 1rem;
      background: #fff;
    }

    .card-header {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #0f172a;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .card-title .cnt {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary, #3b82f6);
      background: #eff6ff;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .card-link {
      font-size: 0.8rem;
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .card-link:hover {
      color: var(--primary);
    }

    /* Series ranking list */
    .series-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 520px;
      overflow-y: auto;
    }

    .series-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.7rem 0.75rem;
      border-radius: 0.75rem;
      background: #f8fafc;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .series-item:hover {
      background: #fff;
      border-color: var(--border-color, #e2e8f0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .series-thumb {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      object-fit: cover;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .series-thumb.ph {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .series-body {
      flex: 1;
      min-width: 0;
    }

    .series-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .series-name .grp {
      font-size: 0.68rem;
      font-weight: 700;
      color: #64748b;
      background: #e2e8f0;
      padding: 1px 6px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .series-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .series-bar-bg {
      flex: 1;
      height: 7px;
      background: #e9eef5;
      border-radius: 999px;
      overflow: hidden;
    }

    .series-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary, #3b82f6);
      transition: width 0.7s ease-out;
    }

    .series-count {
      font-size: 0.85rem;
      font-weight: 800;
      color: #334155;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .series-count .u {
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
    }

    .series-draft {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f59e0b;
      flex-shrink: 0;
    }

    /* Breakdown rows (인물DB / 독서DB) */
    .bd-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .bd-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .bd-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .bd-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #475569;
      width: 88px;
      flex-shrink: 0;
    }

    .bd-bar-bg {
      flex: 1;
      height: 8px;
      background: #f1f5f9;
      border-radius: 999px;
      overflow: hidden;
    }

    .bd-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.7s ease-out;
    }

    .bd-count {
      font-size: 0.9rem;
      font-weight: 800;
      color: #1e293b;
      width: 42px;
      text-align: right;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    /* Mini stat trio (독서DB) */
    .mini-trio {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .mini-stat {
      background: #f8fafc;
      border-radius: 0.75rem;
      padding: 0.9rem;
      text-align: center;
    }

    .mini-stat .n {
      font-size: 1.4rem;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .mini-stat .l {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .empty-note {
      font-size: 0.88rem;
      color: #64748b;
      text-align: center;
      padding: 2.5rem 0;
      font-weight: 600;
    }

    /* Skeleton Loading */
    .shimmer {
      background: #f1f5f9;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .shimmer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
      animation: load 1.2s infinite;
    }

    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (max-width: 1200px) {
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 1024px) {
      .bento-main,
      .bento-side {
        grid-column: span 12;
      }
    }

    @media (max-width: 640px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>

    <div class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>

      <main style="position: relative;">
        <header class="dash-header">
          <div class="dash-title">
            <h1 class="t">콘텐츠 대시보드</h1>
            <p class="s">학습 시리즈와 인물DB 등 콘텐츠 자산 현황을 한눈에 확인하세요.</p>
          </div>
          <div class="status-pill">
            <span style="display:inline-block; width:8px; height:8px; background:#3b82f6; border-radius:50%;"></span>
            <span id="updateStamp">불러오는 중…</span>
          </div>
        </header>

        <!-- KPI Summary Row -->
        <section class="kpi-row" id="kpiRow">
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
          <div class="kpi-card"><div class="shimmer" style="height:72px;"></div></div>
        </section>

        <section class="bento-layout">
          <!-- Main: 시리즈별 항목 수 -->
          <div class="bento-main">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">📚 시리즈별 학습 항목
                  <span class="cnt" id="seriesCountBadge">–</span>
                </h2>
                <a href="../blog/learn_series.html" class="card-link">시리즈 관리 →</a>
              </div>
              <ul class="series-list" id="seriesList">
                <li><div class="shimmer" style="height:56px; width:100%; margin-bottom:0.6rem;"></div></li>
                <li><div class="shimmer" style="height:56px; width:100%; margin-bottom:0.6rem;"></div></li>
                <li><div class="shimmer" style="height:56px; width:100%;"></div></li>
              </ul>
            </div>
          </div>

          <!-- Side: 인물DB / 독서DB / 이슈 시리즈 -->
          <div class="bento-side">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">🧑‍🏫 학습 인물DB
                  <span class="cnt" id="learnCharBadge">–</span>
                </h2>
                <a href="../blog/learn_character_manage.html" class="card-link">인물DB 관리 →</a>
              </div>
              <div class="bd-list" id="learnCharList">
                <div class="shimmer" style="height:120px; width:100%;"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 class="card-title">📖 독서 인물DB</h2>
                <a href="../blog/character_manage.html" class="card-link">독서DB 관리 →</a>
              </div>
              <div class="mini-trio" id="readingTrio">
                <div class="mini-stat"><div class="shimmer" style="height:48px;"></div></div>
                <div class="mini-stat"><div class="shimmer" style="height:48px;"></div></div>
                <div class="mini-stat"><div class="shimmer" style="height:48px;"></div></div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 class="card-title">🗂 이슈 분석 시리즈</h2>
                <a href="../blog/article_manage.html" class="card-link">이슈 시리즈 →</a>
              </div>
              <div class="mini-trio" id="issueTrio" style="grid-template-columns: repeat(2, 1fr);">
                <div class="mini-stat"><div class="shimmer" style="height:48px;"></div></div>
                <div class="mini-stat"><div class="shimmer" style="height:48px;"></div></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="../admin-common.js"></script>
  <script>
    function escapeHtml(s) { return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", "&#039;"); }

    function mountShell() {
      if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'dashboard', subtitle: '콘텐츠 대시보드' });
      if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'dashboard' });
    }

    // adminDataApi 공통 호출 (admin-common.js가 window.CHEESE_ADMIN_DB_API / TOKEN 설정)
    async function fetchCollection(collection) {
      if (!window.CHEESE_ADMIN_DB_API) throw new Error('CHEESE_ADMIN_DB_API 주소가 설정되지 않았습니다.');
      const res = await fetch(window.CHEESE_ADMIN_DB_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': window.CHEESE_ADMIN_TOKEN || '' },
        body: JSON.stringify({ action: 'get', collection })
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || '서버 통신 오류');
      return json.data || json.dataList || [];
    }

    // ── KPI 렌더링 ──────────────────────────────
    function renderKpis(stats) {
      const cards = [
        { icon: '📚', bg: '#eff6ff', num: stats.seriesCount, unit: '개', label: '학습 시리즈', href: '../blog/learn_series.html' },
        { icon: '📑', bg: '#ecfeff', num: stats.episodeCount, unit: '편', label: '총 학습 항목', href: '../blog/learn_manage.html' },
        { icon: '🧑‍🏫', bg: '#f0fdf4', num: stats.personCount, unit: '명', label: '학습 인물', href: '../blog/learn_character_manage.html' },
        { icon: '⚡', bg: '#fef2f2', num: stats.eventCount, unit: '건', label: '학습 사건', href: '../blog/learn_character_manage.html' },
        { icon: '📖', bg: '#fffbeb', num: stats.readingCharCount, unit: '명', label: '독서 인물', href: '../blog/character_manage.html' },
        { icon: '🗂', bg: '#faf5ff', num: stats.issueCount, unit: '개', label: '이슈 시리즈', href: '../blog/article_manage.html' },
      ];
      const row = document.getElementById('kpiRow');
      row.innerHTML = cards.map(c => `
        <div class="kpi-card" onclick="location.href='${c.href}'">
          <div class="kpi-icon" style="background:${c.bg};">${c.icon}</div>
          <div class="kpi-num">${c.num.toLocaleString()}<span class="unit">${c.unit}</span></div>
          <div class="kpi-label">${c.label}</div>
        </div>
      `).join('');
    }

    // ── 시리즈별 항목 수 ─────────────────────────
    function renderSeriesList(seriesArr, sequences) {
      const ul = document.getElementById('seriesList');
      document.getElementById('seriesCountBadge').textContent = `${seriesArr.length}개`;

      if (!seriesArr.length) {
        ul.innerHTML = '<li class="empty-note">등록된 학습 시리즈가 없습니다.</li>';
        return;
      }

      // series_id 별 항목 수 집계
      const countMap = {};
      let orphanCount = 0;
      sequences.forEach(seq => {
        const sid = seq.series_id;
        if (sid) countMap[sid] = (countMap[sid] || 0) + 1;
        else orphanCount++;
      });

      const rows = seriesArr.map(s => ({
        id: s.id,
        name: s.name || s.title || s.id,
        group: s.group || '',
        thumb: s.thumbnail || '',
        isDraft: s.status === 'draft',
        count: countMap[s.id] || 0
      }));
      rows.sort((a, b) => b.count - a.count);

      const maxCount = Math.max(1, ...rows.map(r => r.count));

      ul.innerHTML = rows.map(r => {
        const pct = Math.round((r.count / maxCount) * 100);
        const thumb = r.thumb
          ? `<img class="series-thumb" src="${escapeHtml(r.thumb)}" alt="" onerror="this.classList.add('ph');this.removeAttribute('src');this.textContent='📘';">`
          : `<div class="series-thumb ph">📘</div>`;
        const grp = r.group ? `<span class="grp">${escapeHtml(r.group)}</span>` : '';
        const draft = r.isDraft ? `<span class="series-draft" title="작성 중(draft)"></span>` : '';
        return `
          <li class="series-item" onclick="location.href='../blog/learn_manage.html'">
            ${thumb}
            <div class="series-body">
              <div class="series-name">${draft}${escapeHtml(r.name)}${grp}</div>
              <div class="series-bar-wrap">
                <div class="series-bar-bg"><div class="series-bar-fill" style="width:${pct}%;"></div></div>
              </div>
            </div>
            <div class="series-count">${r.count}<span class="u">편</span></div>
          </li>
        `;
      }).join('');

      if (orphanCount > 0) {
        ul.insertAdjacentHTML('beforeend', `
          <li class="series-item" style="background:#fffbeb;" onclick="location.href='../blog/learn_manage.html'">
            <div class="series-thumb ph" style="background:#fef3c7;">❓</div>
            <div class="series-body">
              <div class="series-name">시리즈 미지정 항목</div>
              <div class="series-bar-wrap">
                <div class="series-bar-bg"><div class="series-bar-fill" style="width:100%; background:#f59e0b;"></div></div>
              </div>
            </div>
            <div class="series-count">${orphanCount}<span class="u">편</span></div>
          </li>
        `);
      }
    }

    // ── 학습 인물DB 분류 ─────────────────────────
    function renderLearnChars(chars) {
      document.getElementById('learnCharBadge').textContent = `${chars.length}명·건`;
      const root = document.getElementById('learnCharList');

      const types = [
        { key: 'character', label: '인물', color: '#3b82f6' },
        { key: 'event', label: '사건', color: '#6366f1' },
        { key: 'concept', label: '사상·개념', color: '#0d9488' },
        { key: 'nation', label: '나라·국가', color: '#d97706' },
        { key: 'organization', label: '정당·단체', color: '#a21caf' },
      ];

      const counts = {};
      chars.forEach(c => { const t = c.type || 'character'; counts[t] = (counts[t] || 0) + 1; });
      const maxCount = Math.max(1, ...types.map(t => counts[t.key] || 0));

      if (!chars.length) {
        root.innerHTML = '<div class="empty-note">등록된 인물·사건이 없습니다.</div>';
        return;
      }

      root.innerHTML = types.map(t => {
        const n = counts[t.key] || 0;
        const pct = Math.round((n / maxCount) * 100);
        return `
          <div class="bd-row">
            <span class="bd-dot" style="background:${t.color};"></span>
            <span class="bd-name">${t.label}</span>
            <div class="bd-bar-bg"><div class="bd-bar-fill" style="width:${pct}%; background:${t.color};"></div></div>
            <span class="bd-count">${n}</span>
          </div>
        `;
      }).join('');
    }

    // ── 독서 인물DB ──────────────────────────────
    function renderReading(charCount, bookCount, eventCount) {
      document.getElementById('readingTrio').innerHTML = `
        <div class="mini-stat"><div class="n">${charCount}</div><div class="l">👤 인물</div></div>
        <div class="mini-stat"><div class="n">${bookCount}</div><div class="l">📕 도서</div></div>
        <div class="mini-stat"><div class="n">${eventCount}</div><div class="l">⚡ 사건</div></div>
      `;
    }

    // ── 이슈 분석 시리즈 ─────────────────────────
    function renderIssues(analysis) {
      const total = analysis.length;
      const withContent = analysis.filter(d => (d.content || '').replace(/<[^>]*>?/gm, '').trim().length > 0).length;
      document.getElementById('issueTrio').innerHTML = `
        <div class="mini-stat"><div class="n">${total}</div><div class="l">🗂 전체 시리즈</div></div>
        <div class="mini-stat"><div class="n">${withContent}</div><div class="l">✍️ 본문 작성됨</div></div>
      `;
    }

    function stampNow() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      document.getElementById('updateStamp').textContent =
        `Update: ${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    async function loadDashboard() {
      const [series, sequences, learnChars, readingChars, readingBooks, readingEvents, issueSeries] =
        await Promise.allSettled([
          fetchCollection('learn_series'),
          fetchCollection('learn_sequences'),
          fetchCollection('learn_characters'),
          fetchCollection('reading_characters'),
          fetchCollection('reading_books'),
          fetchCollection('reading_book_events'),
          fetchCollection('series_analysis'),
        ]);

      const val = r => (r.status === 'fulfilled' && Array.isArray(r.value)) ? r.value : [];
      const seriesArr = val(series);
      const seqArr = val(sequences);
      const learnCharArr = val(learnChars);
      const readingCharArr = val(readingChars);
      const readingBookArr = val(readingBooks);
      const readingEventArr = val(readingEvents);
      const issueArr = val(issueSeries);

      const personCount = learnCharArr.filter(c => (c.type || 'character') === 'character').length;
      const eventCount = learnCharArr.filter(c => c.type === 'event').length;

      renderKpis({
        seriesCount: seriesArr.length,
        episodeCount: seqArr.length,
        personCount,
        eventCount,
        readingCharCount: readingCharArr.length,
        issueCount: issueArr.length,
      });

      renderSeriesList(seriesArr, seqArr);
      renderLearnChars(learnCharArr);
      renderReading(readingCharArr.length, readingBookArr.length, readingEventArr.length);
      renderIssues(issueArr);
      stampNow();

      // 일부 컬렉션 로드 실패 시 콘솔에 기록 (디버깅용)
      [['learn_series', series], ['learn_sequences', sequences], ['learn_characters', learnChars],
       ['reading_characters', readingChars], ['reading_books', readingBooks],
       ['reading_book_events', readingEvents], ['series_analysis', issueSeries]]
        .filter(([, r]) => r.status === 'rejected')
        .forEach(([name, r]) => console.warn(`[대시보드] ${name} 로드 실패:`, r.reason));
    }

    (function init() {
      mountShell();
      loadDashboard().catch(e => {
        console.error('대시보드 로드 실패', e);
        document.getElementById('seriesList').innerHTML =
          '<li class="empty-note" style="color:#ef4444;">데이터 로드에 실패했습니다. 콘솔을 확인하세요.</li>';
      });
    })();
  </script>
</body>

</html>

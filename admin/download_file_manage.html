<!-- admin/download_file_manage.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다운로드 파일 관리 - Cheese History Admin</title>
    <link rel="stylesheet" href="./admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 페이지 고유 스타일만 남기고 레이아웃은 admin.css를 따름 */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        /* Header Style */
        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title-group h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .page-title-group p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Upload Zone - Glassmorphism */
        .upload-dropzone {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border-color: #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            background: #fff;
        }
        .upload-dropzone:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1);
        }
        .upload-dropzone i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
        }
        .upload-dropzone p {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .upload-dropzone span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Search Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
        }
        .search-wrapper {
            flex: 1;
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: all 0.2s;
            background: #fff;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Card List */
        .file-list-card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }
        .file-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .file-card {
            background: #fff;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: all 0.3s ease;
        }
        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }
        
        .card-top {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .file-icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .type-pdf { background: #fee2e2; color: #ef4444; }
        .type-epub { background: #fef3c7; color: #d97706; }
        .type-zip { background: #dcfce7; color: #10b981; }
        .type-image { background: #e0e7ff; color: #4f46e5; }
        .type-other { background: #f1f5f9; color: #64748b; }

        .file-info {
            overflow: hidden;
        }
        .file-info h4 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .file-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(0,0,0,0.05);
            color: #64748b;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #f8fafc;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-products {
            padding-top: 10px;
            border-top: 1px solid #f8fafc;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .product-tag {
            background: #eff6ff;
            color: #3b82f6;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid #dbeafe;
        }
        .product-tag.none {
            background: #f8fafc;
            color: #94a3b8;
            border-color: #e2e8f0;
            font-weight: 500;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 36px;
            gap: 6px;
        }
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-copy { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
        .btn-download { background: var(--primary); color: white; }
        .btn-delete { background: #fff1f2; color: #e11d48; border: 1px solid #ffe4e6; }

        .btn-copy:hover { background: #f1f5f9; }
        .btn-download:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-delete:hover { background: #ffe4e6; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            background: #fff;
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalSlide 0.3s ease-out;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-weight: 800; font-size: 1.2rem; }
        
        .upload-queue-list {
            overflow-y: auto;
            margin-bottom: 25px;
            flex: 1;
            padding-right: 5px;
        }
        .queue-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .queue-item-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; }
        .queue-input {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
        }
        .queue-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .progress-bar-container {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            display: none;
            margin-top: 10px;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>
        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <main>
                <header class="page-header">
                    <div class="page-title-group">
                        <h1>다운로드 파일 리포지토리</h1>
                        <p>디지털 상품 파일을 클라우드에 보관하고 스토어와 연동합니다.</p>
                    </div>
                    <button class="btn-submit" style="width: auto; padding: 10px 16px; border-radius: 8px; font-weight: 700; font-size: 0.85rem;" onclick="loadFiles()">
                        <i class="fas fa-sync-alt"></i> 새로고침
                    </button>
                </header>

                <!-- Upload Section -->
                <div class="upload-dropzone" id="fileDropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>업로드할 파일을 여기에 드래그하세요</p>
                    <span>또는 클릭하여 파일을 선택하세요 (최대 100MB)</span>
                    <input type="file" id="fileInput" style="display: none;" multiple>
                </div>

                <!-- List Section -->
                <section class="file-list-card">
                    <div class="filter-bar">
                        <div class="search-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="fileSearch" class="search-input" placeholder="보관된 파일의 이름을 검색하세요..." oninput="filterFiles()">
                        </div>
                    </div>

                    <div id="fileList" class="file-card-grid">
                        <!-- JS에서 동적으로 채워짐 -->
                        <div style="grid-column: 1/-1; text-align: center; padding: 80px 0;">
                            <i class="fas fa-circle-notch fa-spin" style="font-size: 2.5rem; color: #cbd5e1; margin-bottom: 20px;"></i>
                            <p style="color: #94a3b8; font-weight: 500; font-size: 0.9rem;">파일 정보를 불러오고 있습니다...</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Upload Rename Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>파일 업로드 설정</h3>
                <button onclick="closeUploadModal()" style="border:none; background:none; font-size:1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">저장소에 보관할 이름을 지정해주세요.</p>
            
            <div id="uploadQueue" class="upload-queue-list">
                <!-- 파일 목록 동적 생성 -->
            </div>

            <div id="overallProgress" class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="uploadStatusText" style="font-size: 0.8rem; text-align: center; color: #3b82f6; display: none; margin-top: 5px;">업로드 진행 중...</p>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeUploadModal()" style="flex:1; padding:12px; border-radius:10px; border:1px solid #e2e8f0; background:#fff; font-weight:600; cursor:pointer;">취소</button>
                <button id="btnStartUpload" style="flex:2; padding:12px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer;" onclick="processPendingUploads()">업로드 시작</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./admin-common.js"></script>
    <script type="text/javascript">
        // Firebase 직접 접근 대신에 새롭게 구축된 Cloud Functions 백엔드를 통과하도록 설정합니다.
        async function safeFetchDB(payload) {
            if (!window.CHEESE_ADMIN_DB_API) throw new Error("CHEESE_ADMIN_DB_API 주소가 설정되지 않았습니다.");
            const res = await fetch(window.CHEESE_ADMIN_DB_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || "서버 통신 오류");
            return data;
        }

        let allFiles = [];
        let allProducts = [];
        let pendingFiles = [];

        // 초기 로드
        window.addEventListener('load', () => {
            if (window.renderAdminHeader) window.renderAdminHeader({ mountId: 'admin-header-slot', badgeText: 'Repository', subtitle: '파일 통합 저장소' });
            if (window.renderAdminMenu) window.renderAdminMenu({ mountId: 'admin-menu-slot', active: 'download_file_manage' });
            loadFiles();
        });

        // 파일 목록 로드
        async function loadFiles() {
            const listContainer = document.getElementById('fileList');
            try {
                // [Change] 파일과 상품 정보를 동시에 가져옵니다.
                const [fileRes, productRes] = await Promise.all([
                    safeFetchDB({ action: "get", collection: "download_files", orderByField: "createdAt" }),
                    safeFetchDB({ action: "get", collection: "products" })
                ]);
                
                allFiles = fileRes.data || [];
                allProducts = productRes.dataList || productRes.data || [];
                
                renderFiles(allFiles);
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<p style="text-align:center; color:red; padding:50px;">데이터 통신 중 오류가 발생했습니다.</p>';
            }
        }

        function renderFiles(files) {
            const listContainer = document.getElementById('fileList');
            if (files.length === 0) {
                listContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 80px 0; color: #94a3b8;"><i class="fas fa-folder-open" style="font-size: 2.5rem; margin-bottom: 20px;"></i><p style="font-size:0.9rem;">저장된 파일이 없습니다.</p></div>';
                return;
            }

            listContainer.innerHTML = files.map((file, index) => {
                const date = file.createdAt ? new Date(file.createdAt).toLocaleDateString('ko-KR', {year:'numeric', month:'short', day:'numeric'}) : 'N/A';
                
                let icon = 'fa-file';
                let colorClass = 'type-other';
                const format = (file.format || '').toLowerCase();
                
                if (format.includes('pdf')) { icon = 'fa-file-pdf'; colorClass = 'type-pdf'; }
                else if (format.includes('epub')) { icon = 'fa-book'; colorClass = 'type-epub'; }
                else if (format.includes('zip') || format.includes('rar') || format.includes('7z')) { icon = 'fa-file-archive'; colorClass = 'type-zip'; }
                else if (['jpg','jpeg','png','webp','gif'].includes(format)) { icon = 'fa-file-image'; colorClass = 'type-image'; }

                return `
                    <div class="file-card" style="animation: fadeIn 0.4s ease-out forwards; animation-delay: ${index * 0.05}s">
                        <div class="card-top">
                            <div class="file-icon-box ${colorClass}">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="file-info">
                                <h4 title="${file.name}">${file.name}</h4>
                                <span class="file-badge">${file.format || 'FILE'}</span>
                            </div>
                        </div>
                        
                        <div class="card-meta">
                            <div class="meta-item"><i class="fas fa-hdd"></i> ${file.size || '0 MB'}</div>
                            <div class="meta-item"><i class="fas fa-calendar-alt"></i> ${date}</div>
                        </div>

                        <div class="card-products">
                            ${(() => {
                                const linked = allProducts.filter(p => p.download_url === file.url)
                                    .map(p => `${p.title} (v${p.version || '1.0.0'})`);
                                if (linked.length === 0) return '<span class="product-tag none">연결된 상품 없음</span>';
                                return linked.map(info => `<span class="product-tag" title="${info}">${info}</span>`).join('');
                            })()}
                        </div>

                        <div class="card-actions">
                            <button class="btn-action btn-copy" onclick="window.copyToClipboard('${file.url}')">
                                <i class="fas fa-link"></i> 복사
                            </button>
                            <a href="${file.url}" target="_blank" class="btn-action btn-download">
                                <i class="fas fa-external-link-alt"></i> 열기
                            </a>
                            <button class="btn-action btn-delete" onclick="window.deleteFile('${file.id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.filterFiles = () => {
            const keyword = document.getElementById('fileSearch').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(keyword));
            renderFiles(filtered);
        };

        // 삭제 기능
        window.deleteFile = async (id) => {
            if (!confirm("정말 이 파일을 삭제하시겠습니까?\n이 파일을 사용 중인 상품의 다운로드 링크가 깨지게 됩니다.")) return;
            try {
                await safeFetchDB({ action: "delete", collection: "download_files", id: id });
                alert("삭제되었습니다.");
                loadFiles();
            } catch (err) {
                alert("삭제 오류: " + err.message);
            }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert("파일 링크가 복사되었습니다.");
            });
        };

        // 업로드 기능 통합
        const dropZone = document.getElementById('fileDropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "#3b82f6";
            dropZone.style.background = "#eff6ff";
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = "#f1f5f9";
            dropZone.style.background = "#fff";
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "#f1f5f9";
            dropZone.style.background = "#fff";
            handleFileSelection(e.dataTransfer.files);
        });
        fileInput.onchange = (e) => handleFileSelection(e.target.files);

        // [추가] 파일 선택 시 바로 업로드하지 않고 모달을 띄워 이름을 입력받음
        function handleFileSelection(files) {
            if (!files || files.length === 0) return;
            
            pendingFiles = Array.from(files);
            const queueList = document.getElementById('uploadQueue');
            queueList.innerHTML = pendingFiles.map((file, idx) => {
                const size = (file.size / (1024 * 1024)).toFixed(1) + " MB";
                // 확장자 제외한 파일명 기본값
                const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                return `
                    <div class="queue-item">
                        <div class="queue-item-info">
                            <span>Original: ${file.name}</span>
                            <span>Size: ${size}</span>
                        </div>
                        <input type="text" class="queue-input" id="rename-${idx}" value="${baseName}" placeholder="보관될 이름을 입력하세요">
                    </div>
                `;
            }).join('');

            document.getElementById('uploadModal').classList.add('show');
            document.getElementById('overallProgress').style.display = 'none';
            document.getElementById('uploadStatusText').style.display = 'none';
            document.getElementById('btnStartUpload').disabled = false;
        }

        window.closeUploadModal = () => {
            if (window.isUploading) {
                if (!confirm("업로드 중입니다. 취소하시겠습니까? (이미 완료된 파일은 저장됩니다)")) return;
            }
            document.getElementById('uploadModal').classList.remove('show');
            pendingFiles = [];
            fileInput.value = "";
        };

        // [핵심] 실제 업로드 프로세스
        window.isUploading = false;
        window.processPendingUploads = async () => {
            if (pendingFiles.length === 0) return;
            window.isUploading = true;
            
            const btn = document.getElementById('btnStartUpload');
            const progressContainer = document.getElementById('overallProgress');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('uploadStatusText');
            
            btn.disabled = true;
            btn.innerText = "처리 중...";
            progressContainer.style.display = 'block';
            statusText.style.display = 'block';

            try {
                for (let i = 0; i < pendingFiles.length; i++) {
                    const file = pendingFiles[i];
                    const customName = document.getElementById(`rename-${i}`).value.trim() || file.name;
                    // 원본 확장자 유지
                    const ext = file.name.includes('.') ? file.name.substring(file.name.lastIndexOf('.')) : '';
                    const finalName = customName.endsWith(ext) ? customName : customName + ext;

                    statusText.innerText = `[${i+1}/${pendingFiles.length}] ${finalName} 업로드 중...`;
                    
                    const result = await window.uploadFileToGoogleDrive(file);
                    
                    if (result && result.downloadUrl) {
                        await safeFetchDB({
                            action: "create",
                            collection: "download_files",
                            data: {
                                name: finalName,
                                url: result.downloadUrl,
                                size: (file.size / (1024 * 1024)).toFixed(1) + " MB",
                                format: ext.replace('.', '').toUpperCase() || 'FILE',
                                createdAt: new Date().toISOString()
                            }
                        });
                    }
                    
                    const percent = ((i + 1) / pendingFiles.length) * 100;
                    progressBar.style.width = percent + "%";
                }
                
                alert("모든 파일이 성공적으로 업로드되었습니다.");
                document.getElementById('uploadModal').classList.remove('show');
                loadFiles();
            } catch (err) {
                alert("업로드 중 오류가 발생했습니다: " + err.message);
                console.error(err);
            } finally {
                window.isUploading = false;
                btn.disabled = false;
                btn.innerText = "업로드 시작";
                progressContainer.style.display = 'none';
                statusText.style.display = 'none';
                progressBar.style.width = "0%";
            }
        };

        window.loadFiles = loadFiles;
    </script>
</body>
</html>

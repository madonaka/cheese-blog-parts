<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>통합 주문/다운로드 관리 · Cheese Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./admin.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .product-manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .product-table-card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            overflow-x: auto;
        }

        table.admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        table.admin-table th,
        table.admin-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        table.admin-table th {
            background: #f8fafc;
            font-weight: 700;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .badge-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #f1f5f9;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            color: #3b82f6;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.2s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .modal-card {
            background: #fff;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.25);
            padding: 2rem;
            position: relative;
            overflow-y: auto;
        }

        .modal-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-card-title {
            font-size: 1.25rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #475569;
        }

        .form-control {
            width: 100%;
            padding: 0.65rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-submit {
            background: #ff6b21;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .info-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #334155;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="admin-shell">
        <div id="admin-header-slot"></div>

        <div class="admin-main">
            <aside id="admin-menu-slot" class="admin-sidebar"></aside>

            <div class="admin-content">
                <div class="product-manage-header">
                    <div>
                        <h2 style="font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 0.2rem;">주문/다운로드 관리 (통합)</h2>
                        <p style="color: #64748b; font-size: 0.95rem;">모든 고객(회원, 비회원)의 다운로드 횟수를 추가하거나 기간을 연장할 수 있습니다.</p>
                    </div>
                </div>

                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <select id="searchType" class="form-control" style="width: auto;">
                        <option value="all">전체검색 (이름/이메일)</option>
                        <option value="email">이메일/연락처</option>
                        <option value="name">주문자명</option>
                    </select>
                    <input type="text" id="searchInput" class="form-control" placeholder="검색어를 입력하세요..." style="flex:1;" oninput="applySearchFilter()" />
                </div>

                <div class="product-table-card">
                    <table class="admin-table" id="ordersTable">
                        <thead>
                            <tr>
                                <th>최근 주문일시</th>
                                <th>주문자명 (이메일)</th>
                                <th>총 구매 건수</th>
                                <th>최근 구매 상품</th>
                                <th>상세 목록</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" style="text-align:center; padding: 2rem;">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Detail List Modal -->
    <div class="modal-overlay" id="customerOrdersModal">
        <div class="modal-card" style="max-width: 800px;">
            <div class="modal-card-header">
                <h3 class="modal-card-title" id="customerModalTitle">고객 구매 목록</h3>
                <button onclick="closeCustomerModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                <input type="text" id="customerSearchInput" class="form-control" placeholder="상품명 또는 주문번호 검색..." style="flex:1;" oninput="applyCustomerSearchFilter()" />
                <select id="customerStatusFilter" class="form-control" style="width: auto;" onchange="applyCustomerSearchFilter()">
                    <option value="all">전체 상태</option>
                    <option value="active">다운로드 가능</option>
                    <option value="expired">만료 혹은 초과</option>
                </select>
            </div>

            <div style="max-height: 50vh; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px;">
                <table class="admin-table" id="customerOrdersTable" style="margin-top:0;">
                    <thead style="position: sticky; top: 0; z-index: 10;">
                        <tr>
                            <th>주문일시/번호</th>
                            <th>상품명</th>
                            <th>다운로드</th>
                            <th>만료 기한</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;">데이터를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Specific Order Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-card">
            <div class="modal-card-header">
                <h3 class="modal-card-title">다운로드 횟수 & 기간 조정</h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div class="info-box" id="modalOrderInfo">
                <!-- 주문 요약 정보 삽입 구간 -->
            </div>

            <form id="orderForm" onsubmit="event.preventDefault(); saveOrderChanges();">
                <input type="hidden" id="editOrderId" />
                
                <div class="form-group">
                    <label>최대 다운로드 횟수 (현재보다 늘려주면 잔여횟수가 생깁니다)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="editMaxDownloads" class="form-control" required style="flex:1;" />
                        <button type="button" class="btn-cancel" onclick="addDownloads(5)" style="background:#e0f2fe; color:#0284c7;">+5회 추가</button>
                    </div>
                </div>

                <div class="form-group" style="padding-top:10px;">
                    <label>다운로드 종료 일시 (만료되면 연장 가능)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="datetime-local" id="editExpiryDate" class="form-control" required style="flex:1;" />
                        <button type="button" class="btn-cancel" onclick="addDays(7)" style="background:#dcfce7; color:#166534;">+7일 연장</button>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
                    <button type="submit" class="btn-submit">변경 저장</button>
                </div>
            </form>
        </div>
    </div>


    <script src="./admin-common.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, Timestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
            authDomain: "auth.cheesehistory.com",
            projectId: "cheese-history-platform",
            storageBucket: "cheese-history-platform.firebasestorage.app",
            messagingSenderId: "206588835864",
            appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeOrders = [];
        let groupedOrdersList = [];
        let currentModalCustomerEmail = null; // 현재 열려있는 고객의 이메일

        window.loadOrders = async () => {
            const tbody = document.querySelector("#ordersTable tbody");
            try {
                // 1. users 컬렉션 로드 (UID -> Email, Name 매핑용)
                const usersSnap = await getDocs(collection(db, "users"));
                const userMap = new Map();
                usersSnap.forEach(doc => {
                    const data = doc.data();
                    userMap.set(doc.id, {
                        email: data.email || 'no-email',
                        name: data.displayName || '회원'
                    });
                });

                // 2. guest_orders 와 orders 모두 가져오기
                const [guestSnap, memberSnap] = await Promise.all([
                    getDocs(query(collection(db, "guest_orders"), orderBy("created_at", "desc"))),
                    getDocs(query(collection(db, "orders"), orderBy("created_at", "desc")))
                ]);
                
                let allOrders = [];

                guestSnap.docs.forEach(d => {
                    allOrders.push({
                        id: d.id,
                        collectionName: "guest_orders", // 식별용
                        ...d.data()
                    });
                });

                memberSnap.docs.forEach(d => {
                    const data = d.data();
                    const userInfo = userMap.get(data.uid) || { email: 'unknown-member@email', name: '알 수 없는 회원' };
                    allOrders.push({
                        id: d.id,
                        collectionName: "orders",
                        // 비회원 객체 구조와 동일하게 속성 추가시켜서 통합 그룹핑 호환
                        guest_contact: userInfo.email,
                        guest_name: userInfo.name + " (회원)",
                        ...data
                    });
                });

                activeOrders = allOrders.sort((a,b) => (b.created_at?.seconds || 0) - (a.created_at?.seconds || 0));
                
                buildGroupedOrders();
                renderTable(groupedOrdersList);
            } catch (error) {
                console.error("오류 로드 중 에러:", error);
                const tbody = document.querySelector("#ordersTable tbody");
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        };

        window.buildGroupedOrders = () => {
            const map = new Map();
            activeOrders.forEach(order => {
                const email = order.guest_contact || 'no-email';
                if (!map.has(email)) {
                    map.set(email, {
                        email: email,
                        name: order.guest_name || '익명',
                        orders: [],
                        latestDateObj: order.created_at?.toDate ? order.created_at.toDate() : new Date(0),
                        latestTitle: order.title || '알 수 없음'
                    });
                }
                const group = map.get(email);
                group.orders.push(order);
                const orderDate = order.created_at?.toDate ? order.created_at.toDate() : new Date(0);
                if (orderDate > group.latestDateObj) {
                    group.latestDateObj = orderDate;
                    group.latestTitle = order.title || '알 수 없음';
                    group.name = order.guest_name || group.name;
                }
            });
            groupedOrdersList = Array.from(map.values()).sort((a,b) => b.latestDateObj - a.latestDateObj);
        };

        window.renderTable = (groupArray) => {
            const tbody = document.querySelector("#ordersTable tbody");
            let html = "";

            if (!groupArray || groupArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem; color: #64748b;">조건에 맞는 고객이 없습니다.</td></tr>`;
                return;
            }

            groupArray.forEach((group) => {
                const latestDateStr = group.latestDateObj.getTime() > 0 ? group.latestDateObj.toLocaleString() : 'N/A';
                
                html += `
                    <tr>
                        <td>${latestDateStr}</td>
                        <td>
                            <strong>${group.name}</strong><br>
                            <span style="font-size:0.8rem; color:#64748b;">${group.email}</span>
                        </td>
                        <td><span style="font-weight:700; color:#3b82f6;">${group.orders.length}</span> 건</td>
                        <td>${group.latestTitle} <span style="font-size:0.8rem; color:#888;">등</span></td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="openCustomerModal('${group.email}')" style="background: #f8fafc; padding: 6px 12px; border-radius: 6px; border: 1px solid #e2e8f0;">🔍 전체 보기</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        };

        window.applySearchFilter = () => {
            const searchType = document.getElementById("searchType").value;
            const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

            const filteredGroups = groupedOrdersList.filter(group => {
                if (!keyword) return true;

                const rawName = (group.name || "").toLowerCase();
                const rawEmail = (group.email || "").toLowerCase();

                if (searchType === 'email') return rawEmail.includes(keyword);
                if (searchType === 'name') return rawName.includes(keyword);
                
                // all 인 경우
                return rawEmail.includes(keyword) || rawName.includes(keyword);
            });

            renderTable(filteredGroups);
        };

        // 특정 고객의 상세 구매 내역 모달 열기
        window.openCustomerModal = (email) => {
            currentModalCustomerEmail = email;
            const group = groupedOrdersList.find(g => g.email === email);
            if (!group) return;

            document.getElementById('customerModalTitle').innerText = `[${group.name}]님의 통합 구매 내역`;
            document.getElementById('customerSearchInput').value = '';
            document.getElementById('customerStatusFilter').value = 'all';
            
            applyCustomerSearchFilter(); // 렌더링 포함
            document.getElementById('customerOrdersModal').classList.add('show');
        };

        window.closeCustomerModal = () => {
            document.getElementById('customerOrdersModal').classList.remove('show');
            currentModalCustomerEmail = null;
        };

        window.applyCustomerSearchFilter = () => {
            if (!currentModalCustomerEmail) return;
            const group = groupedOrdersList.find(g => g.email === currentModalCustomerEmail);
            if (!group) return;

            const keyword = document.getElementById("customerSearchInput").value.toLowerCase().trim();
            const statusType = document.getElementById("customerStatusFilter").value;
            const now = new Date();

            const filteredOrders = group.orders.filter(data => {
                let isExpired = false;
                let expiryDateObj = null;

                if (data.download_expiry) {
                    expiryDateObj = data.download_expiry.toDate ? data.download_expiry.toDate() : new Date(data.download_expiry);
                } else if (data.created_at) {
                    expiryDateObj = new Date(data.created_at.toDate().getTime() + 7 * 24 * 60 * 60 * 1000);
                }
                if (expiryDateObj && now > expiryDateObj) isExpired = true;

                const usage = data.download_count || 0;
                const max = data.max_downloads || 5;
                const countExhausted = usage >= max;
                const trulyExpired = isExpired || countExhausted;

                if (statusType === 'active' && trulyExpired) return false;
                if (statusType === 'expired' && !trulyExpired) return false;

                if (!keyword) return true;

                const rawId = data.id.toLowerCase();
                const rawTitle = (data.title || "").toLowerCase();
                return rawId.includes(keyword) || rawTitle.includes(keyword);
            });

            renderCustomerTable(filteredOrders);
        };

        window.renderCustomerTable = (ordersArray) => {
            const tbody = document.querySelector("#customerOrdersTable tbody");
            let html = "";

            if (!ordersArray || ordersArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem; color: #64748b;">조건에 맞는 주문이나 일치하는 검색 결과가 없습니다.</td></tr>`;
                return;
            }

            ordersArray.forEach((data) => {
                const createdAt = data.created_at?.toDate ? data.created_at.toDate().toLocaleString() : 'N/A';
                
                let expiryStr = 'N/A';
                let isExpired = false;
                let expiryDateObj = null;

                if (data.download_expiry) {
                    expiryDateObj = data.download_expiry.toDate ? data.download_expiry.toDate() : new Date(data.download_expiry);
                } else if (data.created_at) {
                    expiryDateObj = new Date(data.created_at.toDate().getTime() + 7 * 24 * 60 * 60 * 1000);
                }
                
                const now = new Date();
                if (expiryDateObj) {
                    expiryStr = expiryDateObj.toLocaleString();
                    if (now > expiryDateObj) isExpired = true;
                }

                const usage = data.download_count || 0;
                const max = data.max_downloads || 5;
                const countExhausted = usage >= max;

                const titleStr = data.title ? (data.title.substring(0, 20) + (data.title.length > 20 ? '...' : '')) : '알 수 없음';
                const orderIdShort = data.id.substring(data.id.length - 8);

                html += `
                    <tr>
                        <td>
                            <div style="font-size:0.75rem; color:#94a3b8; font-family:monospace; margin-bottom:2px;">#${orderIdShort}</div>
                            ${createdAt}
                        </td>
                        <td>${data.icon || ''} ${titleStr}</td>
                        <td>
                            <span style="color: ${countExhausted ? '#ef4444' : '#10b981'}; font-weight:700;">${usage}</span> / ${max}회
                        </td>
                        <td>
                            <span style="color: ${isExpired ? '#ef4444' : '#64748b'};">${expiryStr}</span>
                        </td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="openOrderModal('${data.id}')">수정/연장</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        };

        window.openOrderModal = (orderId) => {
            const order = activeOrders.find(o => o.id === orderId);
            if (!order) return;

            document.getElementById('editOrderId').value = orderId;
            document.getElementById('editMaxDownloads').value = order.max_downloads || 5;
            
            // 만료일시 포맷팅 (YYYY-MM-DDTHH:mm 용) - KST 공통 유틸리티 활용
            let expiryDateObj = null;
            if (order.download_expiry) {
                expiryDateObj = order.download_expiry.toDate ? order.download_expiry.toDate() : new Date(order.download_expiry);
            } else if (order.created_at) {
                const baseDate = order.created_at.toDate ? order.created_at.toDate() : new Date(order.created_at);
                expiryDateObj = new Date(baseDate.getTime() + 7 * 24 * 60 * 60 * 1000);
            } else {
                expiryDateObj = new Date();
            }
            
            // KST 공통 유틸리티를 사용하여 datetime-local 형식(YYYY-MM-DDTHH:mm)으로 변환
            const kstFull = getKSTDateTimeString(expiryDateObj); // YYYY-MM-DD HH:mm:ss
            const localISOTime = kstFull.replace(' ', 'T').slice(0, 16);
            document.getElementById('editExpiryDate').value = localISOTime;

            // 요약 정보
            document.getElementById('modalOrderInfo').innerHTML = `
                <strong>주문자:</strong> ${order.guest_name} (${order.guest_contact})<br>
                <strong>상품명:</strong> ${order.title}<br>
                <strong>현재 사용량:</strong> ${order.download_count || 0}회 다운로드 완료 (잔여: ${Math.max((order.max_downloads || 5) - (order.download_count || 0), 0)}회)<br>
                <div style="margin-top:8px; font-size:0.8rem; color:#ef4444;">이곳에서 최대 횟수와 기간을 늘려주면 즉시 재다운로드가 가능해집니다.</div>
            `;

            document.getElementById('orderModal').classList.add('show');
        };

        window.closeModal = () => {
            document.getElementById('orderModal').classList.remove('show');
        };

        // +5회 버튼 로직
        window.addDownloads = (amount) => {
            const input = document.getElementById('editMaxDownloads');
            input.value = parseInt(input.value) + amount;
        };

        // +7일 버튼 로직
        window.addDays = (days) => {
            const input = document.getElementById('editExpiryDate');
            if(!input.value) return;
            const currentObj = new Date(input.value);
            currentObj.setDate(currentObj.getDate() + days);
            
            // 연장 후에도 KST 기준으로 문자열 변환
            const kstFull = getKSTDateTimeString(currentObj);
            input.value = kstFull.replace(' ', 'T').slice(0, 16);
        };

        window.saveOrderChanges = async () => {
            const orderId = document.getElementById('editOrderId').value;
            const newMax = parseInt(document.getElementById('editMaxDownloads').value);
            const newExpiryStr = document.getElementById('editExpiryDate').value;

            if(!orderId || isNaN(newMax) || !newExpiryStr) {
                alert("값을 올바르게 입력해주세요.");
                return;
            }

            try {
                // 어떤 컬렉션인지 식별
                const orderData = activeOrders.find(o => o.id === orderId);
                if (!orderData) return;
                
                const collectionName = orderData.collectionName || "guest_orders";
                const docRef = doc(db, collectionName, orderId);
                const expiryDate = new Date(newExpiryStr);
                
                // Firestore Timestamp로 저장
                await updateDoc(docRef, {
                    max_downloads: newMax,
                    download_expiry: Timestamp.fromDate(expiryDate)
                });

                alert("성공적으로 변경되었습니다. 고객이 이제 다운로드할 수 있습니다.");
                
                // 변경 사항을 실시간 반영하기 위해 모달을 닫고 데이터를 재로드합니다
                closeModal();
                await loadOrders(); 
                
                // 만약 특정 고객 창이 열려있었다면 그 데이터로 창을 다시 렌더링
                if (currentModalCustomerEmail) {
                    applyCustomerSearchFilter();
                }

            } catch (error) {
                console.error("수정 에러:", error);
                alert("수정 중 문제가 발생했습니다: " + error.message);
            }
        };

        // 바로 초기화
        window.loadOrders();
    </script>
</body>

</html>

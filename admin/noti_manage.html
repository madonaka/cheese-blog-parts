<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>알림 시스템 관리 - Cheese Lab</title>
  <link rel="stylesheet" href="./admin.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* 알림 관리 전용 스타일 */
    .noti-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); max-width: 800px; }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 0.9rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    .form-desc { font-size: 0.75rem; color: #64748b; margin-bottom: 8px; display: block; }
    
    .styled-input, .styled-textarea, .styled-select {
      width: 100%; padding: 14px 18px; border: 1.5px solid #f1f5f9; border-radius: 12px;
      font-size: 0.95rem; background: #f8fafc; transition: all 0.2s;
    }
    .styled-textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
    .styled-input:focus, .styled-textarea:focus, .styled-select:focus {
      background: #fff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none;
    }

    .radio-group { display: flex; gap: 20px; margin-bottom: 10px; }
    .radio-label { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #334155; }
    .radio-label input[type="radio"] { width: 18px; height: 18px; accent-color: #3b82f6; }

    .btn-send { 
      padding: 16px 32px; border-radius: 12px; background: #2563eb; color: #fff; border: none; 
      font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); 
      width: 100%; transition: all 0.2s;
    }
    .btn-send:hover { background: #1d4ed8; transform: translateY(-2px); }
    .btn-send:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    /* 로딩 오버레이 */
    #loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
      z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 15px;
    }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script src="./admin-common.js" defer></script>
</head>
<body>
  <div class="admin-shell">
    <div id="admin-header-slot"></div>
    <main class="admin-main">
      <aside id="admin-menu-slot" class="admin-sidebar"></aside>
      
      <section class="admin-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
          <div>
            <h2 style="margin:0;">🔔 알림 시스템 관리</h2>
            <p style="color:#718096; font-size:0.9rem; margin-top:5px;">전체 고객 또는 특정 회원의 스토어 프론트 마이페이지로 푸시 알림을 발송합니다.</p>
          </div>
        </div>

        <div class="noti-card">
          <!-- 타겟 설정 -->
          <div class="form-group">
            <label class="form-label">발송 대상 선택</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="targetType" value="specific" checked onchange="toggleTargetInput()">
                👤 특정 회원에게 발송
              </label>
              <label class="radio-label">
                <input type="radio" name="targetType" value="all" onchange="toggleTargetInput()">
                📢 전체 회원에게 발송 (공지)
              </label>
            </div>
          </div>

          <div class="form-group" id="target-email-group">
            <label class="form-label">회원 이메일</label>
            <span class="form-desc">알림을 받을 회원의 로그인 이메일을 정확히 입력하세요.</span>
            <input type="email" id="target-email" class="styled-input" placeholder="user@example.com">
          </div>

          <hr style="border: 0; border-top: 1px dashed #e2e8f0; margin: 30px 0;">

          <!-- 알림 컨텐츠 구성 -->
          <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 20px;">
            <div class="form-group">
              <label class="form-label">아이콘 (이모지)</label>
              <input type="text" id="noti-icon" class="styled-input" value="🔔" placeholder="예: 🎁, 🚀">
            </div>
            <div class="form-group">
              <label class="form-label">이동할 링크 URL (옵션)</label>
              <input type="text" id="noti-link" class="styled-input" placeholder="클릭 시 이동할 경로 (예: /detail.html?id=XXX)">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">알림 메시지 내용</label>
            <textarea id="noti-message" class="styled-textarea" placeholder="고객의 마이페이지 알림함에 표시될 내용을 입력해 주세요."></textarea>
          </div>

          <button id="btn-submit" class="btn-send" onclick="sendNotification()">알림 발송하기 🚀</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text" style="font-weight: 700; color: #1e293b;">발송 준비 중...</div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, query, where, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgLF7lEKQxdsUked-i_Pf0FJEdP_d1Ab4",
    authDomain: "auth.cheesehistory.com",
    projectId: "cheese-history-platform",
    storageBucket: "cheese-history-platform.firebasestorage.app",
    messagingSenderId: "206588835864",
    appId: "1:206588835864:web:18cc695d72c6fc96c4ab6d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.toggleTargetInput = function() {
    const type = document.querySelector('input[name="targetType"]:checked').value;
    const emailGroup = document.getElementById('target-email-group');
    if (type === 'specific') {
      emailGroup.style.display = 'block';
    } else {
      emailGroup.style.display = 'none';
    }
  };

  function showLoading(text) {
    document.getElementById('loading-text').innerText = text;
    document.getElementById('loading-overlay').style.display = 'flex';
  }
  function hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

  window.sendNotification = async function() {
    const targetType = document.querySelector('input[name="targetType"]:checked').value;
    const targetEmail = document.getElementById('target-email').value.trim();
    const icon = document.getElementById('noti-icon').value.trim() || '🔔';
    const link = document.getElementById('noti-link').value.trim() || '#';
    const message = document.getElementById('noti-message').value.trim();

    if (!message) {
      alert("알림 메시지 내용을 입력해 주세요.");
      return;
    }

    if (targetType === 'specific' && !targetEmail) {
      alert("전송할 회원의 이메일을 입력해 주세요.");
      return;
    }

    const confirmMsg = targetType === 'all' 
      ? `⚠️ 정말로 서비스의 [전체 회원]에게 알림을 발송하시겠습니까?\n\n메시지: ${message}`
      : `[${targetEmail}] 회원님에게 알림을 발송하시겠습니까?`;

    if (!confirm(confirmMsg)) return;

    showLoading("데이터베이스 확인 중...");

    try {
      if (targetType === 'specific') {
        const q = query(collection(db, "users"), where("email", "==", targetEmail));
        const snap = await getDocs(q);
        
        if (snap.empty) {
          hideLoading();
          alert("가입된 정보가 없는 회원이거나 이메일이 잘못되었습니다.");
          return;
        }

        const uid = snap.docs[0].id;
        showLoading("알림 발송 중...");
        
        // 단일 배치 발송 (안전성)
        const batch = writeBatch(db);
        const ref = doc(collection(db, "notifications"));
        batch.set(ref, {
          uid: uid,
          icon: icon,
          message: message,
          link: link,
          is_read: false,
          is_hidden: false,
          created_at: serverTimestamp()
        });
        await batch.commit();

      } else if (targetType === 'all') {
        showLoading("전체 회원 목록 가져오는 중...");
        const usersSnap = await getDocs(collection(db, "users"));
        
        if (usersSnap.empty) {
          hideLoading();
          alert("발송할 회원이 없습니다.");
          return;
        }

        let batches = [];
        let currentBatch = writeBatch(db);
        let count = 0;
        let totalSent = 0;

        usersSnap.forEach(userDoc => {
          const uid = userDoc.id;
          const ref = doc(collection(db, "notifications"));
          
          currentBatch.set(ref, {
            uid: uid,
            icon: icon,
            message: message,
            link: link,
            is_read: false,
            is_hidden: false,
            created_at: serverTimestamp()
          });
          
          count++;
          totalSent++;

          // Firestore batch는 최대 500개까지만 허용되므로 여유있게 450개 단위로 나눔
          if (count === 450) {
            batches.push(currentBatch);
            currentBatch = writeBatch(db);
            count = 0;
          }
        });
        
        if (count > 0) batches.push(currentBatch);

        showLoading(`총 ${totalSent}명에게 알림 발송 중...`);
        for (const b of batches) {
          await b.commit();
        }
      }

      hideLoading();
      alert("🎉 알림 전송이 완료되었습니다!");
      
      // 폼 초기화
      document.getElementById('noti-message').value = '';
      if(targetType === 'specific') document.getElementById('target-email').value = '';

    } catch (e) {
      hideLoading();
      console.error(e);
      alert("알림 전송 중 오류가 발생했습니다: " + e.message);
    }
  };
</script>
</body>
</html>
